<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Engineer — IT Support</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f7f7f7;--bg3:#efefef;--fg:#111;--fg2:#444;--fg3:#888;--border:#e2e2e2;--border2:#ccc;--card:#fff;--sans:'Noto Sans Thai','Space Grotesk',sans-serif;--display:'Space Grotesk','Noto Sans Thai',sans-serif;--mono:'JetBrains Mono',monospace;--ease:cubic-bezier(.22,.61,.36,1)}
[data-theme="dark"]{--bg:#111;--bg2:#1a1a1a;--bg3:#222;--fg:#eee;--fg2:#aaa;--fg3:#666;--border:#2a2a2a;--border2:#3a3a3a;--card:#1a1a1a}
html,body{height:100%;background:var(--bg);color:var(--fg);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
a{color:inherit;text-decoration:none}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;transition:background .3s}
.lcard{width:100%;max-width:340px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:28px 22px;animation:up .35s var(--ease);transition:background .3s,border-color .3s}
.lcard-logo{text-align:center;margin-bottom:22px}
.lcard-icon{display:inline-flex;width:40px;height:40px;background:var(--fg);border-radius:8px;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:700;color:var(--bg);margin-bottom:8px;transition:background .3s,color .3s}
.lcard-t{font-family:var(--display);font-size:17px;font-weight:700;color:var(--fg)}
.lcard-s{font-size:13px;color:var(--fg2);margin-top:2px}
.lf{margin-bottom:10px}
.lf label{display:block;font-size:10px;font-weight:700;color:var(--fg3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.lf input{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:7px;padding:9px 11px;color:var(--fg);font-family:var(--sans);font-size:14px;outline:none;transition:border-color .2s,background .3s,color .3s}
.lf input:focus{border-color:var(--fg)}.lf input::placeholder{color:var(--fg3)}
.lbtn{width:100%;margin-top:4px;padding:10px;background:var(--fg);color:var(--bg);border:none;border-radius:7px;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s,background .3s,color .3s}.lbtn:hover{opacity:.8}.lbtn:disabled{opacity:.3}
.lerr{color:#c00;font-size:12px;text-align:center;margin-top:6px;min-height:16px}
[data-theme="dark"] .lerr{color:#f66}
.llinks{text-align:center;margin-top:12px;font-size:12px;color:var(--fg3)}.llinks a{color:var(--fg2);margin:0 6px}

#app{display:none}#app.on{display:block}
.top{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border);transition:background .3s,border-color .3s}
.top-logo{width:26px;height:26px;background:var(--fg);border-radius:6px;display:grid;place-items:center;font-family:var(--mono);font-size:9px;font-weight:700;color:var(--bg);flex-shrink:0;transition:background .3s,color .3s}
.top-t{font-family:var(--display);font-size:14px;font-weight:700;flex:1;color:var(--fg)}
.top-clock{font-family:var(--mono);font-size:11px;color:var(--fg3)}
.smb{padding:5px 9px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--fg2);font-family:var(--sans);font-size:11px;cursor:pointer;transition:all .15s}.smb:hover{background:var(--bg2);color:var(--fg)}

.content{max-width:660px;margin:0 auto;padding:14px}
.eng-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
.es{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;transition:background .3s,border-color .3s}
.es-v{font-family:var(--display);font-size:22px;font-weight:700;color:var(--fg)}.es-l{font-size:10px;color:var(--fg3);margin-top:1px;text-transform:uppercase;letter-spacing:.04em}

.tabs{display:flex;gap:3px;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:5px;transition:border-color .3s}
.tab{padding:5px 12px;border-radius:5px;border:none;background:transparent;color:var(--fg3);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.tab:hover{color:var(--fg)}.tab.on{background:var(--bg3);color:var(--fg);font-weight:600}
.tab .ct{background:var(--fg);color:var(--bg);border-radius:5px;font-size:9px;font-weight:700;padding:1px 5px;margin-left:3px;transition:background .3s,color .3s}

.jcard{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:6px;transition:all .2s var(--ease);animation:up .25s var(--ease) both}
.jcard:hover{border-color:var(--border2)}
.jc-top{display:flex;align-items:flex-start;gap:6px;margin-bottom:6px}
.jc-id{font-family:var(--mono);font-size:10px;color:var(--fg3)}
.jc-type{font-size:14px;font-weight:600;color:var(--fg)}
.pill{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:var(--bg3);color:var(--fg2);transition:background .3s,color .3s}
.jc-meta{font-size:12px;color:var(--fg2);display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
.jc-detail{font-size:13px;color:var(--fg2);line-height:1.5;background:var(--bg2);border-radius:6px;padding:8px;margin-bottom:6px;transition:background .3s}
.jc-btns{display:flex;gap:3px}
.jc-b{flex:1;padding:7px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--fg2);font-family:var(--sans);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;text-align:center}
.jc-b:hover{background:var(--bg2);color:var(--fg)}
.jc-b.pri{background:var(--fg);color:var(--bg);border-color:var(--fg)}.jc-b.pri:hover{opacity:.8}

.empty{text-align:center;padding:28px 14px}.empty-t{font-size:14px;font-weight:600;color:var(--fg2)}.empty-d{font-size:12px;color:var(--fg3);margin-top:2px}

.mod-bg{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:300;display:none;align-items:center;justify-content:center;padding:16px}.mod-bg.on{display:flex}
[data-theme="dark"] .mod-bg.on{background:rgba(0,0,0,.6)}
.mod{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;width:100%;max-width:400px;animation:up .2s var(--ease);max-height:90vh;overflow-y:auto;transition:background .3s,border-color .3s}
.mod-t{font-family:var(--display);font-size:15px;font-weight:700;margin-bottom:10px;color:var(--fg)}
.fg{margin-bottom:8px}.fg label{font-size:10px;font-weight:700;color:var(--fg3);margin-bottom:3px;display:block;text-transform:uppercase;letter-spacing:.04em}
.fg input,.fg textarea{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:7px;padding:8px 10px;color:var(--fg);font-family:var(--sans);font-size:13px;outline:none;transition:border-color .2s,background .3s,color .3s}
.fg input:focus,.fg textarea:focus{border-color:var(--fg)}.fg input::placeholder,.fg textarea::placeholder{color:var(--fg3)}
.fg textarea{resize:none;min-height:70px;line-height:1.5}
.mod-f{display:flex;gap:5px;margin-top:10px}
.bp{flex:1;padding:9px;background:var(--fg);color:var(--bg);border:none;border-radius:7px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:background .3s,color .3s}.bp:hover{opacity:.8}
.bo2{flex:1;padding:9px;background:var(--bg2);color:var(--fg);border:1px solid var(--border);border-radius:7px;font-family:var(--sans);font-size:13px;cursor:pointer;transition:background .3s,color .3s,border-color .3s}

.toast{position:fixed;top:12px;right:12px;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:8px 14px;font-size:13px;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.06);animation:up .2s var(--ease);display:none;color:var(--fg);transition:background .3s,border-color .3s,color .3s}
</style>
</head>
<body>
<div id="login">
<div class="lcard">
<div class="lcard-logo"><div class="lcard-icon">EN</div><div class="lcard-t">Engineer Portal</div><div class="lcard-s">Technician Login</div></div>
<div class="lf"><label>Username</label><input id="l-user" placeholder="username"/></div>
<div class="lf"><label>Password</label><input type="password" id="l-pass" placeholder="password"/></div>
<button class="lbtn" id="btn-login">Login</button>
<div class="lerr" id="l-err"></div>
<div class="llinks"><a href="/">Home</a><a href="/report">Report</a><a href="/admin">Admin</a></div>
</div></div>

<div id="app">
<div class="top">
  <div class="top-logo">EN</div>
  <div class="top-t" id="eng-name">Engineer</div>
  <div class="top-clock" id="clock">--:--</div>
  <button class="smb" onclick="togTheme()">Theme</button>
  <button class="smb" id="btn-rf" onclick="doRefresh()">Refresh</button>
  <button class="smb" onclick="logout()">Logout</button>
</div>
<div class="content">
  <div class="eng-stats" id="eng-stats"></div>
  <div class="tabs" id="tabs"></div>
  <div id="job-list"></div>
</div>
</div>

<div class="mod-bg" id="mod-bg"><div class="mod" id="mod"></div></div>
<div class="toast" id="toast"></div>

<script>
let AUTH=null,tickets=[],tab='active',sse=null;
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function api(p,o={}){const h={'Content-Type':'application/json',...(o.headers||{})};if(AUTH?.token)h['Authorization']='Bearer '+AUTH.token;return fetch(p,{...o,headers:h}).then(r=>r.json()).catch(e=>({ok:false,error:e.message}));}
function statusLabel(s){return(s||'--').replace(/[⏱️⚙️✅❌]/g,'').trim();}

async function tryAuto(){const s=localStorage.getItem('eng_auth');if(!s)return false;try{const{token}=JSON.parse(s);const d=await api('/api/auth/me',{headers:{'Authorization':'Bearer '+token}});if(d.ok&&['engineer','admin','superadmin'].includes(d.user.role)){AUTH={token,user:d.user};return true;}}catch(_){}localStorage.removeItem('eng_auth');return false;}

document.getElementById('btn-login').onclick=async()=>{
  const u=document.getElementById('l-user').value.trim(),p=document.getElementById('l-pass').value;
  const err=document.getElementById('l-err'),btn=document.getElementById('btn-login');
  err.textContent='';if(!u||!p){err.textContent='Enter username and password';return;}
  btn.disabled=true;btn.textContent='Connecting...';
  try{const d=await api('/api/auth/login',{method:'POST',body:JSON.stringify({username:u,password:p})});if(!d.ok)throw new Error(d.error||'Login failed');AUTH={token:d.token,user:d.user};localStorage.setItem('eng_auth',JSON.stringify(AUTH));boot();}
  catch(e){err.textContent=e.message;}finally{btn.disabled=false;btn.textContent='Login';}
};
['l-user','l-pass'].forEach(id=>document.getElementById(id).onkeydown=e=>{if(e.key==='Enter')document.getElementById('btn-login').click();});
function logout(){AUTH=null;localStorage.removeItem('eng_auth');location.reload();}
function togTheme(){const d=document.documentElement;d.dataset.theme=d.dataset.theme==='dark'?'':'dark';localStorage.setItem('eng_theme',d.dataset.theme);}
if(localStorage.getItem('eng_theme')==='dark')document.documentElement.dataset.theme='dark';

async function boot(){document.getElementById('login').style.display='none';document.getElementById('app').classList.add('on');document.getElementById('eng-name').textContent=AUTH.user.name;startClock();connectSSE();await loadTickets();render();}
async function loadTickets(){try{const d=await api('/api/tickets');if(d.ok){const my=AUTH.user.name;tickets=(d.tickets||[]).filter(t=>t.engineerName===my||t.assigned_to===my||AUTH.user.role==='superadmin');}}catch(e){}}
async function doRefresh(){document.getElementById('btn-rf').textContent='...';await loadTickets();document.getElementById('btn-rf').textContent='Refresh';render();toast('Refreshed');}
function connectSSE(){if(sse)try{sse.close();}catch(_){}sse=new EventSource('/api/events');sse.addEventListener('ticket_updated',()=>{loadTickets().then(render)});sse.addEventListener('ticket_created',()=>{loadTickets().then(render)});}
function startClock(){const t=()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});};t();setInterval(t,1000);}

function render(){
  const active=tickets.filter(t=>/ระหว่าง/.test(t.status||''));
  const review=tickets.filter(t=>/ตรวจ/.test(t.status||''));
  const done=tickets.filter(t=>/เสร็จ/.test(t.status||''));
  document.getElementById('eng-stats').innerHTML=`<div class="es"><div class="es-v">${active.length}</div><div class="es-l">Active</div></div><div class="es"><div class="es-v">${review.length}</div><div class="es-l">Review</div></div><div class="es"><div class="es-v">${done.length}</div><div class="es-l">Done</div></div>`;
  document.getElementById('tabs').innerHTML=[{id:'active',lb:'Active',ct:active.length},{id:'review',lb:'Review',ct:review.length},{id:'done',lb:'Done',ct:done.length}].map(t=>`<button class="tab${tab===t.id?' on':''}" onclick="tab='${t.id}';render()">${t.lb}${t.ct?`<span class="ct">${t.ct}</span>`:''}</button>`).join('');
  const list=tab==='active'?active:tab==='review'?review:done;
  if(!list.length){document.getElementById('job-list').innerHTML=`<div class="empty"><div class="empty-t">${tab==='active'?'No active jobs':tab==='review'?'No jobs in review':'No completed jobs'}</div><div class="empty-d">Pull to refresh</div></div>`;return;}
  document.getElementById('job-list').innerHTML=list.map((t,i)=>{const rid=esc(t._recordId);return`<div class="jcard" style="animation-delay:${i*.03}s"><div class="jc-top"><div style="flex:1"><div class="jc-id">${esc(t.id||'--')}</div><div class="jc-type">${esc(t.type||'-')}</div></div><span class="pill">${statusLabel(t.status)}</span></div><div class="jc-meta"><span>${esc(t.brand||'-')} / ${esc(t.branchCode||'-')}</span><span>${esc(t.reporter||'-')}</span><span>${esc(t.sentDate||'-')}</span></div>${t.detail?`<div class="jc-detail">${esc(t.detail)}</div>`:''}${t.workDetail?`<div class="jc-detail" style="border-left:2px solid var(--fg)"><strong>Report:</strong> ${esc(t.workDetail)}${t.partsUsed?` | Parts: ${esc(t.partsUsed)}`:''}${t.workHours?` | ${esc(t.workHours)}h`:''}</div>`:''}<div class="jc-btns">${tab==='active'?`<button class="jc-b pri" onclick="openSubmit('${rid}')">Submit Work</button>`:''}<button class="jc-b" onclick="openDetail('${rid}')">Detail</button></div></div>`;}).join('');
}

function openMod(h){document.getElementById('mod').innerHTML=h;document.getElementById('mod-bg').classList.add('on');}
function closeMod(){document.getElementById('mod-bg').classList.remove('on');}
document.getElementById('mod-bg').onclick=e=>{if(e.target.id==='mod-bg')closeMod();};

function openSubmit(rid){const t=tickets.find(x=>x._recordId===rid);if(!t)return;openMod(`<div class="mod-t">Submit Work Report</div><div style="font-family:var(--mono);font-size:11px;color:var(--fg3);margin-bottom:8px">${esc(t.id)} — ${esc(t.type)}</div><div class="fg"><label>Work Detail *</label><textarea id="m-wd" placeholder="Describe work done...">${esc(t.workDetail||'')}</textarea></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px"><div class="fg"><label>Parts Used</label><input id="m-pt" value="${esc(t.partsUsed||'')}" placeholder="e.g. LAN cable"/></div><div class="fg"><label>Hours</label><input id="m-wh" type="number" value="${esc(t.workHours||'')}" placeholder="1.5"/></div></div><div class="mod-f"><button class="bo2" onclick="closeMod()">Cancel</button><button class="bp" onclick="doSubmit('${esc(rid)}')">Submit</button></div>`);}
async function doSubmit(rid){const wd=(document.getElementById('m-wd')?.value||'').trim();if(!wd){toast('Enter work detail');return;}const pt=(document.getElementById('m-pt')?.value||'').trim();const wh=(document.getElementById('m-wh')?.value||'').trim();try{const d=await api(`/api/tickets/${rid}/engineer-submit`,{method:'PATCH',body:JSON.stringify({workDetail:wd,partsUsed:pt,workHours:wh})});if(!d.ok)throw new Error(d.error||'Failed');tickets=tickets.map(x=>x._recordId===rid?{...x,workDetail:wd,partsUsed:pt,workHours:wh,status:'ตรวจงาน'}:x);closeMod();render();toast('Submitted');}catch(e){toast('Error: '+e.message);}}

function openDetail(rid){const t=tickets.find(x=>x._recordId===rid);if(!t)return;openMod(`<div class="mod-t">Ticket Detail</div><div style="font-family:var(--mono);font-size:11px;color:var(--fg3);margin-bottom:8px">${esc(t.id)}</div>${[['Type',t.type],['Brand',t.brand],['Branch',t.branchCode],['Reporter',t.reporter],['Phone',t.phone],['Date',t.sentDate],['Location',t.location]].map(([l,v])=>`<div style="display:flex;gap:4px;margin-bottom:2px;font-size:13px"><span style="color:var(--fg3);min-width:55px;font-size:11px">${l}</span><span style="color:var(--fg);font-weight:500">${esc(v||'-')}</span></div>`).join('')}${t.detail?`<div style="background:var(--bg2);border-radius:6px;padding:8px;font-size:13px;color:var(--fg);margin-top:6px;line-height:1.5;transition:background .3s">${esc(t.detail)}</div>`:''}${t.adminNote?`<div style="background:var(--bg2);border-radius:6px;padding:8px;font-size:12px;color:var(--fg2);margin-top:5px;border-left:2px solid var(--fg);transition:background .3s">Admin: ${esc(t.adminNote)}</div>`:''}<div class="mod-f"><button class="bo2" onclick="closeMod()" style="width:100%">Close</button></div>`);}

let toastT;function toast(m){const el=document.getElementById('toast');el.textContent=m;el.style.display='block';el.style.animation='none';el.offsetHeight;el.style.animation='';clearTimeout(toastT);toastT=setTimeout(()=>el.style.display='none',2500);}
(async()=>{if(await tryAuto().catch(()=>false))boot();})();
</script>
</body>
</html>
