<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Engineer — IT Support</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f6f6f4;--bg3:#edede9;--bg4:#e4e4df;
  --fg:#0a0a0a;--fg2:#3a3a38;--fg3:#7a7a75;--fg4:#a8a8a2;
  --border:#e0e0db;--border2:#c8c8c2;--card:#fff;
  --green:#2d7a4f;--red:#b83232;--blue:#1e5fa8;
  --display:'Prompt',sans-serif;--sans:'Prompt',sans-serif;--mono:'Prompt',monospace;
  --ease:cubic-bezier(.22,.61,.36,1);
  --sb-w:240px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
[data-t="dark"]{
  --bg:#0a0a0a;--bg2:#141413;--bg3:#1e1e1c;--bg4:#282826;
  --fg:#f0f0eb;--fg2:#b8b8b2;--fg3:#7a7a75;--fg4:#4a4a46;
  --border:#252523;--border2:#353532;--card:#141413;
  --green:#4ade80;--red:#f87171;--blue:#60a5fa;
}
html,body{height:100%;background:var(--bg);color:var(--fg);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s;overflow:hidden}
a{color:inherit;text-decoration:none}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* LOGIN */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;transition:background .4s}
.lcard{width:100%;max-width:360px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:32px 24px;animation:up .4s var(--ease);transition:all .4s}
.lcard-logo{text-align:center;margin-bottom:24px}
.lcard-icon{display:inline-flex;width:44px;height:44px;background:var(--fg);border-radius:10px;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:500;color:var(--bg);margin-bottom:10px;transition:all .4s}
.lcard-t{font-family:var(--display);font-size:18px;font-weight:800;color:var(--fg);letter-spacing:-.03em}
.lcard-s{font-size:13px;color:var(--fg3);margin-top:2px}
.lf{margin-bottom:10px}
.lf label{display:block;font-family:var(--display);font-size:10px;font-weight:700;color:var(--fg4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.lf .iw{position:relative}
.lf input{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;padding:10px 36px 10px 12px;color:var(--fg);font-family:var(--sans);font-size:14px;outline:none;transition:all .3s}
.lf input:focus{border-color:var(--fg)}.lf input::placeholder{color:var(--fg4)}
.eye{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--fg4);cursor:pointer;font-family:var(--mono);font-size:10px;padding:4px}
.lbtn{width:100%;margin-top:6px;padding:11px;background:var(--fg);color:var(--bg);border:none;border-radius:8px;font-family:var(--display);font-size:14px;font-weight:700;cursor:pointer;transition:all .3s}.lbtn:hover{opacity:.8}.lbtn:disabled{opacity:.3}
.lerr{color:var(--red);font-size:12px;text-align:center;margin-top:6px;min-height:16px}
.llinks{text-align:center;margin-top:14px;font-size:12px;color:var(--fg4)}.llinks a{color:var(--fg3);margin:0 6px}

/* APP */
#app{display:none;height:100vh;overflow:hidden}
#app.on{display:flex}

/* SIDEBAR OVERLAY */
.sb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:140;display:none;backdrop-filter:blur(1px)}
.sb-overlay.open{display:block}

/* SIDEBAR */
.sidebar{
  position:fixed;left:0;top:0;height:100%;width:var(--sb-w);
  background:var(--card);border-right:1px solid var(--border);
  z-index:150;display:flex;flex-direction:column;
  transform:translateX(-100%);
  transition:transform .32s var(--ease);
  padding-top:var(--safe-top);
}
.sidebar.open{transform:translateX(0)}
.sb-head{padding:16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sb-logo{width:32px;height:32px;background:var(--fg);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:500;color:var(--bg);flex-shrink:0;transition:all .4s}
.sb-title{font-family:var(--display);font-size:14px;font-weight:800;flex:1;letter-spacing:-.02em}
.sb-close{background:transparent;border:none;color:var(--fg3);cursor:pointer;font-size:16px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all .2s}
.sb-close:hover{background:var(--bg2);color:var(--fg)}
.sb-user{padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-uname{font-size:13px;font-weight:600;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-urole{font-size:11px;color:var(--fg3);margin-top:1px}
.sb-nav{flex:1;padding:8px;overflow-y:auto;scrollbar-width:none}
.sb-nav::-webkit-scrollbar{display:none}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;border:none;background:transparent;color:var(--fg3);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;width:100%;text-align:left;transition:all .15s;white-space:nowrap}
.nav-item:hover{background:var(--bg2);color:var(--fg)}
.nav-item.on{background:var(--bg3);color:var(--fg);font-weight:600}
.nav-item .ni{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.nav-item .nb{margin-left:auto;background:var(--fg);color:var(--bg);border-radius:5px;font-size:9px;font-weight:700;padding:1px 5px;flex-shrink:0;transition:all .4s}
.sb-foot{padding:10px;border-top:1px solid var(--border);flex-shrink:0;position:relative;padding-bottom:calc(10px + var(--safe-bottom))}

/* PREVIEW ROLE — DROPDOWN (upward) */
.pv-drop{
  position:absolute;bottom:calc(100% + 4px);left:8px;right:8px;
  background:var(--card);border:1.5px solid var(--border2);
  border-radius:10px;box-shadow:0 -8px 24px rgba(0,0,0,.15);
  padding:8px;display:flex;flex-direction:column;gap:2px;
  opacity:0;transform:translateY(6px);pointer-events:none;
  transition:opacity .2s,transform .2s var(--ease);z-index:200;overflow:hidden;
}
.pv-drop.open{opacity:1;transform:translateY(0);pointer-events:all}
.pv-ropt{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;cursor:pointer;font-size:12px;color:var(--fg2);border:none;background:transparent;width:100%;text-align:left;transition:background .12s;font-family:var(--sans)}
.pv-ropt:hover{background:var(--bg2)}
.pv-ropt.active{background:var(--fg);color:var(--bg)}
.pv-rdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pv-rbadge{font-size:9px;margin-left:auto;padding:2px 6px;border-radius:99px;font-weight:700}
.rb-super{background:#fef3c7;color:#92400e}.rb-manager{background:#ede9fe;color:#5b21b6}
.rb-admin{background:#dbeafe;color:#1e40af}.rb-lead{background:#d1fae5;color:#065f46}
.rb-eng{background:#e0f2fe;color:#0c4a6e}.rb-guest{background:#f1f5f9;color:#475569}
.pv-confirm{display:flex;align-items:center;gap:6px;padding:8px 8px 2px;border-top:1px solid var(--border);margin-top:4px}
.pv-hint{font-size:11px;color:var(--fg4);flex:1;font-family:var(--sans)}
.pv-ok{background:var(--fg);border:none;border-radius:7px;padding:6px 11px;color:var(--bg);font-size:11px;font-weight:700;cursor:pointer;font-family:var(--display);transition:all .2s;display:flex;align-items:center;gap:4px}
.pv-ok:hover{opacity:.8}.pv-ok.go{background:var(--green)}
.pv-timer{position:absolute;bottom:0;left:0;height:2px;background:var(--fg);border-radius:2px;width:100%;transition:width linear}

/* PREVIEW TRIGGER */
.pv-trigger{display:none;align-items:center;gap:7px;padding:8px 10px;background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;cursor:pointer;transition:all .2s;user-select:none;margin-bottom:6px}
.pv-trigger.show{display:flex}
.pv-trigger:hover{background:var(--bg3);border-color:var(--border2)}
.pv-trigger.open{background:var(--fg);border-color:var(--fg)}
.pv-trigger.open .pv-t-icon,.pv-trigger.open .pv-t-label,.pv-trigger.open .pv-t-arrow{color:var(--bg)}
[data-t="dark"] .pv-trigger.open .pv-t-icon{filter:none}
.pv-t-icon{font-size:13px;flex-shrink:0}
.pv-t-label{font-size:11.5px;font-weight:600;color:var(--fg2);flex:1;font-family:var(--display);white-space:nowrap}
.pv-t-role{font-size:10px;background:var(--fg);color:var(--bg);padding:2px 8px;border-radius:99px;font-weight:700;white-space:nowrap;transition:all .2s}
.pv-trigger.open .pv-t-role{background:var(--bg);color:var(--fg)}
.pv-t-arrow{font-size:10px;color:var(--fg4);transition:transform .25s}
.pv-trigger.open .pv-t-arrow{transform:rotate(180deg)}

/* FOOTER BUTTONS */
.sb-foot-row{display:flex;gap:4px}
.sb-fbt{flex:1;padding:8px 6px;background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--fg3);font-family:var(--sans);font-size:12px;cursor:pointer;transition:all .15s;text-align:center}
.sb-fbt:hover{background:var(--bg2);color:var(--fg)}
.sb-fbt.danger:hover{background:rgba(184,50,50,.08);border-color:var(--red);color:var(--red)}
.sb-home{display:block;text-align:center;font-size:12px;color:var(--fg3);padding:7px;border-radius:7px;transition:all .15s;margin-bottom:6px}
.sb-home:hover{background:var(--bg2);color:var(--fg)}

/* MAIN AREA */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:8px;padding:10px 16px;padding-top:calc(var(--safe-top) + 10px);background:var(--bg);border-bottom:1px solid var(--border);transition:all .4s;flex-shrink:0}
.btn-hamburger{background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--fg3);font-size:15px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.btn-hamburger:hover{background:var(--bg2);color:var(--fg)}
.top-t{font-family:var(--display);font-size:14px;font-weight:800;flex:1;color:var(--fg);letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-clock{font-family:var(--mono);font-size:11px;color:var(--fg4);flex-shrink:0}
.smb{padding:5px 10px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--fg3);font-family:var(--sans);font-size:11px;font-weight:500;cursor:pointer;transition:all .2s;flex-shrink:0;white-space:nowrap}
.smb:hover{background:var(--bg2);color:var(--fg)}

/* GPS STATUS BAR */
#gps-status-bar{display:flex;align-items:center;gap:8px;padding:5px 16px;font-size:12px;font-weight:500;background:var(--bg2);border-bottom:1px solid var(--border);transition:all .4s;flex-shrink:0}
.gps-pulse{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;flex-shrink:0}
.gps-pulse.off{background:var(--red);animation:none}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:14px;padding-bottom:calc(14px + var(--safe-bottom));-webkit-overflow-scrolling:touch}
.content-inner{max-width:680px;margin:0 auto}

/* STATS */
.eng-stats{padding:12px 14px 0;background:var(--bg)}
.stat-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:1024px){.stat-grid-4{grid-template-columns:repeat(2,1fr)}}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 12px;text-align:left;transition:all .4s;position:relative;overflow:hidden}
.stat-box::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0}
.stat-box.sb-blue::after{background:#6366f1}
.stat-box.sb-amber::after{background:#f59e0b}
.stat-box.sb-green::after{background:#22c55e}
.stat-box.sb-dark::after{background:var(--fg)}
.stat-val{font-family:var(--display);font-size:32px;font-weight:800;letter-spacing:-.05em;color:var(--fg);line-height:1}
.stat-lbl{font-size:11px;color:var(--fg3);font-weight:600;margin-top:4px}
.stat-bar{height:4px;background:var(--bg3);border-radius:99px;margin-top:10px;overflow:hidden}
.stat-fill{height:100%;border-radius:99px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
/* Dashboard overview section */
.eng-overview{padding:10px 14px 0}
.ov-greeting{font-size:13px;font-weight:700;color:var(--fg2);margin-bottom:2px}
.ov-sub{font-size:11px;color:var(--fg4)}
/* ── NE4: Desktop sidebar always visible (same as Admin) ── */
@media(min-width:1025px){
  .sidebar{transform:translateX(0)!important;position:relative;height:100%}
  .sb-overlay{display:none!important}
  .sb-close{display:none!important}
  #app{display:flex}
  .main-area{flex:1}
  .tabs{display:none!important}
  .eng-stats{margin-top:4px}
}
.es{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;transition:all .4s;cursor:pointer}
.es:hover{border-color:var(--border2)}
.es-v{font-family:var(--display);font-size:24px;font-weight:800;color:var(--fg);letter-spacing:-.03em}
.es-l{font-size:10px;color:var(--fg4);margin-top:1px;font-family:var(--display);font-weight:600;text-transform:uppercase;letter-spacing:.06em}

/* JOB CARDS */
.jcard{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:6px;transition:all .25s var(--ease);animation:up .3s var(--ease) both;position:relative;overflow:hidden}
.jcard:hover{border-color:var(--border2)}
@keyframes stampIn{0%{opacity:0;transform:rotate(-8deg) scale(1.4)}60%{opacity:1;transform:rotate(-8deg) scale(0.92)}80%{transform:rotate(-8deg) scale(1.04)}100%{transform:rotate(-8deg) scale(1)}}
.stamp-overlay{position:absolute;top:10px;right:10px;transform:rotate(-8deg);pointer-events:none;z-index:10;animation:stampIn .3s cubic-bezier(.22,.61,.36,1) both}
.stamp-badge{border:3px solid currentColor;border-radius:6px;padding:3px 10px;font-family:var(--display);font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;opacity:.75;white-space:nowrap;display:inline-block}
.stamp-working{color:#e67e22;background:rgba(230,126,34,.07)}
.stamp-review{color:#2b5ea8;background:rgba(43,94,168,.07)}
.stamp-done{color:#2d7a4f;background:rgba(45,122,79,.07)}
.jc-top{display:flex;align-items:flex-start;gap:6px;margin-bottom:6px}
.jc-id{font-family:var(--mono);font-size:10px;color:var(--fg4)}
.jc-type{font-family:var(--display);font-size:14px;font-weight:700;color:var(--fg);letter-spacing:-.02em}
.pill{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:var(--bg3);color:var(--fg2);font-family:var(--mono);transition:all .4s}
.jc-meta{font-size:12px;color:var(--fg3);display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
.jc-detail{font-size:13px;color:var(--fg2);line-height:1.5;background:var(--bg2);border-radius:6px;padding:8px 10px;margin-bottom:8px;transition:background .4s}
.jc-btns{display:flex;gap:4px;flex-wrap:wrap}
.jc-b{flex:1;min-width:80px;padding:8px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--fg3);font-family:var(--display);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;position:relative;overflow:hidden;user-select:none}
.jc-b:hover{background:var(--bg2);color:var(--fg)}
.jc-b:active{transform:scale(.94);opacity:.8}
.jc-b.pri{background:var(--fg);color:var(--bg);border-color:var(--fg);box-shadow:0 4px 0 rgba(0,0,0,.25),0 2px 8px rgba(0,0,0,.15)}
.jc-b.pri:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 6px 0 rgba(0,0,0,.2),0 4px 12px rgba(0,0,0,.15)}
.jc-b.pri:active{transform:translateY(3px) scale(.97);box-shadow:0 1px 0 rgba(0,0,0,.2);opacity:1}
.jc-b.danger{color:var(--red);border-color:var(--red)}.jc-b.danger:hover{background:var(--red);color:var(--bg)}
.timer-bar{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;transition:all .4s}
.timer-val{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--fg);letter-spacing:.02em}
.timer-label{font-size:11px;color:var(--fg4);flex:1}
.gps-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}

/* EMERGENCY */
.em-search{margin-bottom:12px}
.em-search input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--fg);font-family:var(--sans);font-size:14px;outline:none;transition:all .3s}
.em-search input:focus{border-color:var(--fg)}
.em-search input::placeholder{color:var(--fg4)}
.em-cat{margin-bottom:8px}
.em-cat-h{padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-family:var(--display);font-size:14px;font-weight:700;color:var(--fg);display:flex;align-items:center;justify-content:space-between;transition:all .2s;letter-spacing:-.02em}
.em-cat-h:hover{background:var(--bg2)}
.em-cat-h .arrow{transition:transform .3s var(--ease);font-family:var(--mono);font-size:10px;color:var(--fg4)}
.em-cat.open .arrow{transform:rotate(90deg)}
.em-list{max-height:0;overflow:hidden;transition:max-height .4s var(--ease)}
.em-cat.open .em-list{max-height:1200px}
.em-item{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);transition:all .2s}
.em-item:last-child{border-bottom:none}
.em-item:hover{background:var(--bg2)}
.em-name{flex:1;font-size:13px;color:var(--fg);font-weight:500}
.em-phone{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--fg);text-decoration:none;padding:6px 12px;border:1px solid var(--border);border-radius:6px;transition:all .2s}
.em-phone:hover{background:var(--fg);color:var(--bg);border-color:var(--fg)}
.empty{text-align:center;padding:32px 14px}
.empty-t{font-family:var(--display);font-size:15px;font-weight:700;color:var(--fg3)}
.empty-d{font-size:12px;color:var(--fg4);margin-top:2px}

/* MODAL */
.mod-bg{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:300;display:none;align-items:center;justify-content:center;padding:16px}
.mod-bg.on{display:flex}
[data-t="dark"] .mod-bg.on{background:rgba(0,0,0,.6)}
.mod{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;width:100%;max-width:420px;animation:up .2s var(--ease);max-height:90vh;overflow-y:auto;transition:all .4s}
.mod-t{font-family:var(--display);font-size:16px;font-weight:800;margin-bottom:12px;color:var(--fg);letter-spacing:-.02em}
.fg{margin-bottom:8px}
.fg label{font-family:var(--display);font-size:10px;font-weight:700;color:var(--fg4);margin-bottom:3px;display:block;text-transform:uppercase;letter-spacing:.06em}
.fg input,.fg textarea{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:7px;padding:9px 10px;color:var(--fg);font-family:var(--sans);font-size:13px;outline:none;transition:all .3s}
.fg input:focus,.fg textarea:focus{border-color:var(--fg)}
.fg input::placeholder,.fg textarea::placeholder{color:var(--fg4)}
.fg textarea{resize:none;min-height:80px;line-height:1.5}
.mod-f{display:flex;gap:5px;margin-top:12px}
.bp{flex:1;padding:10px;background:var(--fg);color:var(--bg);border:none;border-radius:7px;font-family:var(--display);font-size:13px;font-weight:700;cursor:pointer;transition:all .3s}.bp:hover{opacity:.8}
.bo2{flex:1;padding:10px;background:var(--bg2);color:var(--fg);border:1px solid var(--border);border-radius:7px;font-family:var(--sans);font-size:13px;cursor:pointer;transition:all .3s}
.toast{position:fixed;top:14px;right:14px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:13px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.08);animation:up .2s var(--ease);display:none;color:var(--fg);font-weight:500;transition:all .4s}

function updateSidebarNav(){

/* ═══ AUTO RE-LOGIN ══════════════════════════════════════════ */
let _relogging=false;
async function autoRelogin(){
  if(_relogging)return false;_relogging=true;
  try{
    const c=JSON.parse(localStorage.getItem('eng_cred')||'null');
    if(!c)return false;
    const d=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(c)}).then(r=>r.json());
    if(!d.ok)return false;
    AUTH={token:d.token,user:d.user};localStorage.setItem('eng_auth',JSON.stringify(AUTH));return true;
  }catch(_){return false;}finally{_relogging=false;}
}

async function api(p,o={}){
  const h={'Content-Type':'application/json',...(o.headers||{})};
  if(AUTH?.token)h['Authorization']='Bearer '+AUTH.token;
  let res=await fetch(p,{...o,headers:h}).catch(()=>null);
  if(!res)return{ok:false,error:'Network error'};
  if(res.status===401){
    const ok=await autoRelogin();
    if(ok){h['Authorization']='Bearer '+AUTH.token;res=await fetch(p,{...o,headers:h}).catch(()=>null);if(!res)return{ok:false,error:'Network error'};}
  }
  return res.json().catch(()=>({ok:false,error:'Invalid response'}));
}

/* ═══ GPS TRACKING ═══════════════════════════════════════════ */
function startGPSTracking(){
  if(!('geolocation' in navigator)){updateGPSBar(false,'GPS ไม่รองรับบนอุปกรณ์นี้');return;}
  if(gpsWatch!==null)navigator.geolocation.clearWatch(gpsWatch);
  gpsWatch=navigator.geolocation.watchPosition(
    pos=>{
      _gpsActive=true;const{latitude,longitude,accuracy}=pos.coords;
      api('/api/gps',{method:'POST',body:JSON.stringify({latitude,longitude,accuracy,engineer_name:AUTH.user.name,user_id:AUTH.user.id,brand:AUTH.user.brand})});
      updateGPSBar(true,`${latitude.toFixed(5)}, ${longitude.toFixed(5)}`);
    },
    err=>{_gpsActive=false;const msgs={1:'ไม่ได้รับอนุญาต GPS',2:'ไม่พบตำแหน่ง',3:'หมดเวลา GPS'};updateGPSBar(false,msgs[err.code]||'GPS ไม่พร้อมใช้งาน');},
    {enableHighAccuracy:true,maximumAge:30000,timeout:15000}
  );
}
function updateGPSBar(ok,msg){
  const dot=document.getElementById('gps-dot'),text=document.getElementById('gps-text'),bar=document.getElementById('gps-status-bar');
  if(!dot||!text||!bar)return;
  if(ok){dot.className='gps-pulse';text.style.color='var(--green)';text.textContent='📍 GPS Active — '+msg;bar.style.background='rgba(45,122,79,.08)';bar.style.borderBottomColor='rgba(45,122,79,.2)';}
  else{dot.className='gps-pulse off';text.style.color='var(--red)';text.textContent='⚠️ '+msg;bar.style.background='rgba(184,50,50,.06)';bar.style.borderBottomColor='rgba(184,50,50,.15)';}
}
function stopGPSTracking(){if(gpsWatch!==null){navigator.geolocation.clearWatch(gpsWatch);gpsWatch=null;}_gpsActive=false;updateGPSBar(false,'GPS หยุดทำงาน');}

/* ═══ AUTH ═══════════════════════════════════════════════════ */
async function tryAuto(){
  const s=localStorage.getItem('eng_auth');if(!s)return false;
  try{
    const{token}=JSON.parse(s);
    const d=await api('/api/auth/me',{headers:{'Authorization':'Bearer '+token}});
    if(d.ok&&['engineer','lead_engineer','admin','superadmin','manager','guest'].includes(d.user.role)){AUTH={token,user:d.user};return true;}
  }catch(_){}
  localStorage.removeItem('eng_auth');return false;
}

document.getElementById('btn-login').onclick=async()=>{
  const u=document.getElementById('l-user').value.trim(),p=document.getElementById('l-pass').value;
  const err=document.getElementById('l-err'),btn=document.getElementById('btn-login');
  err.textContent='';if(!u||!p){err.textContent='Enter username and password';return;}
  btn.disabled=true;btn.textContent='Connecting...';
  try{
    const d=await api('/api/auth/login',{method:'POST',body:JSON.stringify({username:u,password:p})});
    if(!d.ok)throw new Error(d.error||'Login failed');
    AUTH={token:d.token,user:d.user};
    localStorage.setItem('eng_auth',JSON.stringify(AUTH));
    localStorage.setItem('eng_cred',JSON.stringify({username:u,password:p}));
    boot();
  }catch(e){err.textContent=e.message;}finally{btn.disabled=false;btn.textContent='Login';}
};
['l-user','l-pass'].forEach(id=>document.getElementById(id).onkeydown=e=>{if(e.key==='Enter')document.getElementById('btn-login').click();});

function logout(){
  stopGPSTracking();
  localStorage.removeItem('eng_st_'+(AUTH?.user?.id||'x'));
  localStorage.removeItem('eng_cred');
  AUTH=null;localStorage.removeItem('eng_auth');location.reload();
}

/* ═══ BOOT ═══════════════════════════════════════════════════ */
async function boot(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').classList.add('on');
  const u=AUTH.user;
  document.getElementById('sb-name').textContent=u.name;
  document.getElementById('sb-role').textContent=({'superadmin':'Super Admin','manager':'Manager','admin':'Admin','lead_engineer':'Lead Engineer','engineer':'ช่าง IT','guest':'Guest (Demo)'})[u.role]||u.role;

/* ═══ DATA ════════════════════════════════════════════════════ */
async function loadTickets(){
  try{
    const d=await api('/api/tickets');
    if(d.ok){
      const my=AUTH.user.name,role=AUTH.user.role;
      const canSeeAll=['lead_engineer','admin','superadmin','manager','guest'].includes(role);
      tickets=(d.tickets||[]).filter(t=>canSeeAll||t.engineerName===my||t.assignedTo===my||t.assigned_to===my);
    }
  }catch(e){}
}
async function doRefresh(){await loadTickets();render();toast('Refreshed');}
function connectSSE(){
  if(sse)try{sse.close();}catch(_){}
  sse=new EventSource('/api/events');
  sse.addEventListener('ticket_updated',()=>{loadTickets().then(render)});
  sse.addEventListener('ticket_created',()=>{loadTickets().then(render)});
}
function startClock(){
  const t=()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});};
  t();setInterval(t,1000);
}
function startWorkTimers(){
  if(window._workTimerInterval)clearInterval(window._workTimerInterval);
  window._workTimerInterval=setInterval(()=>{
    tickets.filter(x=>/ระหว่าง/.test(x.status||'')).forEach(t=>{
      const el=document.getElementById('timer-'+t._recordId);if(!el)return;
      let sa=t.started_at||t.startedAt||null;
      if(!sa){try{const sv=JSON.parse(localStorage.getItem('eng_st_'+(AUTH?.user?.id||'x'))||'{}');if(sv[t._recordId])sa=sv[t._recordId];}catch(_){}}
      if(!sa)return;
      const ms=Date.now()-new Date(sa).getTime();if(ms<0)return;
      const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);
      el.textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    });
  },1000);
}

/* ═══ RENDER ══════════════════════════════════════════════════ */
function render(){
  const isGuest=AUTH?.user?.role==='guest';
  const active=tickets.filter(t=>/assigned|accepted|in_progress|ระหว่าง/.test(t.status||''));
  const review=tickets.filter(t=>/review|revision|ตรวจ/.test(t.status||''));
  const done=tickets.filter(t=>/completed|เสร็จ/.test(t.status||''));

  document.getElementById('eng-stats').innerHTML=`
    <div class="es" onclick="switchTab('active')"><div class="es-v">${active.length}</div><div class="es-l">Active</div></div>
    <div class="es" onclick="switchTab('review')"><div class="es-v">${review.length}</div><div class="es-l">Review</div></div>
    <div class="es" onclick="switchTab('done')"><div class="es-v">${done.length}</div><div class="es-l">Done</div></div>`;

  updateSidebarNav();

  const view=document.getElementById('view');
  if(tab==='emergency'){renderEmergency(view);return;}

  const list=tab==='active'?active:tab==='review'?review:done;
  if(!list.length){
    view.innerHTML=`<div class="empty"><div class="empty-t">${{active:'ยังไม่มีงานมอบหมาย',review:'ไม่มีงานรอตรวจ',done:'ยังไม่มีงานเสร็จสิ้น'}[tab]||'Empty'}</div></div>`;
    return;
  }

  view.innerHTML=list.map((t,i)=>{
    const rid=esc(t._recordId);
    const isAssigned=/assigned|มอบหมาย/.test(t.status||'');
    const isAccepted=/accepted|รับงาน/.test(t.status||'');
    const isWorking=/in_progress|ระหว่าง/.test(t.status||'');
    const isReview=/ตรวจ|review/.test(t.status||'');
    const isDone=/เสร็จ|completed/.test(t.status||'');
    let sa=t.started_at||t.startedAt||null;
    if(!sa){try{const sv=JSON.parse(localStorage.getItem('eng_st_'+(AUTH?.user?.id||'x'))||'{}');if(sv[t._recordId])sa=sv[t._recordId];}catch(_){}}
    const hasStarted=isWorking&&!!sa;
    let stamp='';
    if(hasStarted)stamp=`<div class="stamp-overlay"><div class="stamp-badge stamp-working">IN PROGRESS</div></div>`;
    else if(isReview)stamp=`<div class="stamp-overlay"><div class="stamp-badge stamp-review">REVIEW</div></div>`;
    else if(isDone)stamp=`<div class="stamp-overlay"><div class="stamp-badge stamp-done">COMPLETE</div></div>`;

    return`<div class="jcard" style="animation-delay:${i*.03}s">
      ${stamp}
      ${hasStarted?`<div class="timer-bar"><div class="gps-dot"></div><div class="timer-label">กำลังทำงาน</div><div class="timer-val" id="timer-${esc(t._recordId)}">00:00:00</div></div>`:''}
      <div class="jc-top">
        <div style="flex:1"><div class="jc-id">${esc(t.id||'--')}</div><div class="jc-type">${esc(t.type||'-')}</div></div>
        <span class="pill">${statusLabel(t.status)}</span>
      </div>
      <div class="jc-meta">
        <span>${esc(t.brand||'-')} / ${esc(t.branchCode||'-')}</span>
        <span>${esc(t.reporter||'-')}</span>
        <span>${esc(t.sentDate||'-')}</span>
      </div>
      ${t.detail?`<div class="jc-detail">${esc(t.detail)}</div>`:''}
      ${t.workDetail?`<div class="jc-detail" style="border-left:2px solid var(--fg)"><strong>Report:</strong> ${esc(t.workDetail)}</div>`:''}
      <div class="jc-btns">
        ${isGuest?`<button class="jc-b" style="opacity:.4;cursor:not-allowed" title="Demo mode">🔒 รับงาน</button><button class="jc-b" style="opacity:.4;cursor:not-allowed" title="Demo mode">🔒 เริ่มงาน</button><button class="jc-b" onclick="openDetail('${rid}')">Detail</button>`
        :`${isAssigned?`<button class="jc-b pri" onclick="doAccept('${rid}')">✅ รับงาน</button>`:''}
          ${isAccepted?`<button class="jc-b pri" onclick="doStartWork('${rid}')">🚀 เริ่มงาน</button>`:''}
          ${isWorking&&!hasStarted?`<button class="jc-b pri" onclick="doStartWork('${rid}')">🚀 เริ่มงาน</button>`:''}
          ${hasStarted?`<button class="jc-b" style="opacity:.6;cursor:default">⏱️ กำลังทำอยู่</button><button class="jc-b pri" onclick="openSubmit('${rid}')">✅ Complete</button><button class="jc-b" onclick="openUpload('${rid}')">📷 Photo</button>`:''}
          <button class="jc-b" onclick="openDetail('${rid}')">Detail</button>`}
      </div>
    </div>`;
  }).join('');
  startWorkTimers();
}

async function doAccept(rid){
  try{await api(`/api/tickets/${rid}/accept`,{method:'POST'});tickets=tickets.map(x=>x._recordId===rid?{...x,status:'accepted'}:x);render();toast('Job accepted');}

}
function showGPSPermissionPopup(onGranted){
  openMod(`<div style="text-align:center;padding:8px 0">
    <div style="font-size:36px;margin-bottom:12px">📍</div>
    <div class="mod-t" style="text-align:center">ต้องการเปิด GPS</div>
    <div style="font-size:13px;color:var(--fg3);line-height:1.6;margin-bottom:16px">กรุณาอนุญาตให้เว็บไซต์เข้าถึงตำแหน่งของคุณ<br>เพื่อบันทึกตำแหน่งเริ่มงาน</div>
    <button class="bp" style="width:100%;margin-bottom:8px" onclick="requestGPSPermission()">🔓 อนุญาตให้เข้าถึง GPS</button>
    <div style="font-size:11px;color:var(--fg4);line-height:1.7;background:var(--bg2);border-radius:7px;padding:10px;text-align:left;margin-bottom:8px"><b>ถ้าปุ่มไม่ขึ้น popup:</b><br>iOS: Settings → Safari → Location → Allow<br>Android: Settings → Apps → Browser → Permissions → Location</div>
    <button class="bo2" style="width:100%" onclick="closeMod()">ยกเลิก</button>
  </div>`);

}
function requestGPSPermission(){
  navigator.geolocation.getCurrentPosition(
    pos=>{_gpsActive=true;updateGPSBar(true,`${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`);closeMod();if(window._gpsGrantedCallback){window._gpsGrantedCallback();window._gpsGrantedCallback=null;}},
    err=>{const msgs={1:'กด Allow ในป๊อปอัพของ browser',2:'ไม่พบสัญญาณ GPS',3:'หมดเวลา ลองใหม่อีกครั้ง'};document.getElementById('mod').querySelector('.bp').textContent='🔄 ลองอีกครั้ง';toast('⚠️ '+(msgs[err.code]||'ไม่สามารถเข้าถึง GPS'));},
    {enableHighAccuracy:true,timeout:15000}
  );
}
async function doStartWork(rid){
  if(!_gpsActive){showGPSPermissionPopup(()=>doStartWork(rid));return;}
  try{
    const startedAt=new Date().toISOString();
    const t=tickets.find(x=>x._recordId===rid);
    const d=await api(`/api/tickets/${rid}/status`,{method:'PATCH',body:JSON.stringify({status:'อยู่ระหว่างดำเนินการ ⚙️',brand:t?.brand||'',started_at:startedAt})});
    if(!d.ok)throw new Error(d.error||'Failed');
    try{const sv=JSON.parse(localStorage.getItem('eng_st_'+(AUTH?.user?.id||'x'))||'{}');sv[rid]=startedAt;localStorage.setItem('eng_st_'+(AUTH?.user?.id||'x'),JSON.stringify(sv));}catch(_){}
    navigator.geolocation.getCurrentPosition(pos=>{api('/api/gps',{method:'POST',body:JSON.stringify({latitude:pos.coords.latitude,longitude:pos.coords.longitude,accuracy:pos.coords.accuracy,ticket_id:rid,engineer_name:AUTH.user.name,user_id:AUTH.user.id,brand:AUTH.user.brand})});},()=>{},{enableHighAccuracy:true,timeout:5000});
    await loadTickets();render();toast('🚀 เริ่มงานแล้ว!');
  }catch(e){toast('Error: '+e.message);}
}

      </div>

      <input type="file" id="m-img-gal" accept="image/*" multiple style="display:none" onchange="addEngPhoto(this)">

    <div class="mod-f"><button class="bo2" onclick="closeMod()">ยกเลิก</button><button class="bp" onclick="doSubmit('${esc(rid)}')">✅ ส่งงาน</button></div>`);

function addEngPhoto(input){
  if(!window._engPhotos) window._engPhotos=[];
  const files=Array.from(input.files);
  const remaining=3-window._engPhotos.length;
  if(remaining<=0){toast('ใส่รูปได้สูงสุด 3 รูป');return;}
  files.slice(0,remaining).forEach(file=>{
    const url=URL.createObjectURL(file);
    window._engPhotos.push({file,url});
  });
  // Render preview
  const prev=document.getElementById('m-img-preview');
  if(prev) prev.innerHTML=window._engPhotos.map((p,i)=>`
    <div style="position:relative;display:inline-block">
      <img src="${p.url}" style="width:72px;height:72px;object-fit:cover;border-radius:6px;border:1px solid var(--border)">
      <button onclick="removeEngPhoto(${i})" style="position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:var(--red);border:none;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0">✕</button>
    </div>`).join('');
  input.value='';
}
function removeEngPhoto(i){
  if(!window._engPhotos) return;
  window._engPhotos.splice(i,1);
  const prev=document.getElementById('m-img-preview');
  if(prev) prev.innerHTML=window._engPhotos.map((p,idx)=>`
    <div style="position:relative;display:inline-block">
      <img src="${p.url}" style="width:72px;height:72px;object-fit:cover;border-radius:6px;border:1px solid var(--border)">
      <button onclick="removeEngPhoto(${idx})" style="position:absolute;top:-4px;right:-4px;width:18px;height:18px;border-radius:50%;background:var(--red);border:none;color:#fff;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0">✕</button>
    </div>`).join('');
}
async function doSubmit(rid){
  const wd=(document.getElementById('m-wd')?.value||'').trim();
  if(!wd){toast('กรุณากรอกรายละเอียดงาน');return;}
  const pt=(document.getElementById('m-pt')?.value||'').trim();
  const wh=(document.getElementById('m-wh')?.value||'').trim();
  try{
    // Upload photos first
    const uploadedUrls=[];
    for(const p of (window._engPhotos||[])){
      const fd=new FormData();
      fd.append('file',p.file);
      fd.append('ticket_id',rid);
      const up=await fetch('/api/upload',{method:'POST',headers:{'Authorization':'Bearer '+(AUTH?.token||'')},body:fd});
      const uj=await up.json();
      if(uj.url) uploadedUrls.push(uj.url);
    }
    const d=await api(`/api/tickets/${rid}/engineer-submit`,{method:'PATCH',body:JSON.stringify({workDetail:wd,partsUsed:pt,workHours:wh,completed_lat:window._completeLat||null,completed_lng:window._completeLng||null,images:uploadedUrls.length?JSON.stringify(uploadedUrls):undefined})});
    if(!d.ok)throw new Error(d.error||'Failed');
    try{const sv=JSON.parse(localStorage.getItem('eng_st_'+(AUTH?.user?.id||'x'))||'{}');delete sv[rid];localStorage.setItem('eng_st_'+(AUTH?.user?.id||'x'),JSON.stringify(sv));}catch(_){}
    tickets=tickets.map(x=>x._recordId===rid?{...x,workDetail:wd,partsUsed:pt,workHours:wh,status:'ตรวจงาน '}:x);
    window._engPhotos=[];
    closeMod();render();toast('ส่งงานสำเร็จ ✅');
  }catch(e){toast('Error: '+e.message);}
}

let pvOpen=false,pvPendRole='',pvPendPage='',pvTimer=null,pvCurRole='',pvCurPage='Engineer';

function initPreviewRole(){
  pvCurRole=AUTH?.user?.role||'';
  if(pvCurRole==='superadmin'){
    const trig=document.getElementById('pv-trigger');
    trig.classList.add('show');
    document.getElementById('pv-t-role').textContent=pvCurRole;
    document.querySelectorAll('.pv-ropt').forEach(b=>b.classList.toggle('active',b.textContent.trim().startsWith(pvCurRole)));
    pvPendRole=pvCurRole;pvPendPage='Engineer';
  }
}

function pvToggle(){
  pvOpen=!pvOpen;
  const drop=document.getElementById('pv-drop'),trig=document.getElementById('pv-trigger');
  drop.classList.toggle('open',pvOpen);trig.classList.toggle('open',pvOpen);
  if(pvOpen)pvStartTimer();else pvClearTimer();
}
function pvClose(){
  pvOpen=false;
  document.getElementById('pv-drop').classList.remove('open');
  document.getElementById('pv-trigger').classList.remove('open');
  pvClearTimer();
}
function pvStartTimer(){
  pvClearTimer();
  const bar=document.getElementById('pv-timer');
  bar.style.transition='none';bar.style.width='100%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{bar.style.transition='width 5s linear';bar.style.width='0%';}));
  pvTimer=setTimeout(()=>pvClose(),5000);
}
function pvClearTimer(){
  if(pvTimer){clearTimeout(pvTimer);pvTimer=null;}
  const bar=document.getElementById('pv-timer');bar.style.transition='none';bar.style.width='100%';
}
function pvPickRole(el,role,page){
  document.querySelectorAll('.pv-ropt').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');pvPendRole=role;pvPendPage=page;
  document.getElementById('pv-hint').textContent='→ '+role;
  pvStartTimer();
}
function pvConfirm(){
  const btn=document.getElementById('pv-ok-btn');
  btn.classList.add('go');btn.textContent='🔐 กำลังเปลี่ยน...';pvClearTimer();
  setTimeout(()=>{
    btn.classList.remove('go');btn.textContent='🔏 ยืนยัน';
    document.getElementById('pv-hint').textContent='เลือก role แล้วกด ✓';
    pvClose();
    const fr=pvCurRole,fp=pvCurPage;
    pvShowLoading(fr,pvPendRole,fp,pvPendPage,()=>{
      pvCurRole=pvPendRole;pvCurPage=pvPendPage;
      document.getElementById('pv-t-role').textContent=pvCurRole;
      document.querySelectorAll('.pv-ropt').forEach(b=>b.classList.toggle('active',b.textContent.trim().startsWith(pvCurRole)));
      if(['superadmin','manager','admin','guest'].includes(pvPendRole)&&pvPendPage==='Admin')window.location.href='/admin';
    });
  },800);
}
function pvShowLoading(fr,tr,fp,tp,cb){
  const ov=document.getElementById('pv-overlay');
  const slR=document.getElementById('pvo-sl-role'),slP=document.getElementById('pvo-sl-page'),pSt=document.getElementById('pvo-p-static');
  const rc=fr!==tr,pc=fp!==tp;
  document.getElementById('pvo-r-old').textContent=fr;document.getElementById('pvo-r-new').textContent=tr;
  document.getElementById('pvo-p-old').textContent=fp+' Portal';document.getElementById('pvo-p-new').textContent=tp+' Portal';
  pSt.textContent=fp+' Portal';
  slR.classList.remove('do-flip');slP.classList.remove('do-flip');
  ['pvo-r-old','pvo-r-new','pvo-p-old','pvo-p-new'].forEach(id=>{const el=document.getElementById(id);el.style.animation='none';el.offsetHeight;el.style.animation='';});
  ['pvo-r-old','pvo-p-old'].forEach(id=>{const el=document.getElementById(id);el.style.opacity='1';el.style.transform='rotateX(0)';});
  ['pvo-r-new','pvo-p-new'].forEach(id=>{const el=document.getElementById(id);el.style.opacity='0';el.style.transform='rotateX(90deg)';});
  slR.style.display='flex';slP.style.display=pc?'flex':'none';pSt.style.display=pc?'none':'block';
  ov.style.animation='';ov.style.opacity='1';ov.style.display='flex';
  if(rc)setTimeout(()=>slR.classList.add('do-flip'),700);
  if(pc)setTimeout(()=>slP.classList.add('do-flip'),rc?1200:700);
  const total=(pc&&rc)?2800:2200;
  setTimeout(()=>{ov.style.animation='pvOut .45s ease forwards';setTimeout(()=>{ov.style.display='none';ov.style.animation='';if(cb)cb();},450);},total);
}

document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeSidebar();pvClose();}});

function renderEngJobList(containerId, list, isActive){
  const isGuest = AUTH?.user?.role==='guest';
  const el = document.getElementById(containerId);
  if(!list.length){
    el.innerHTML = `<div class="empty"><div class="empty-t">${isActive?'ยังไม่มีงานที่รับ':'ยังไม่มีงานเสร็จ'}</div></div>`;
    return;
  }
  // skeleton first
  el.innerHTML = '<div>' + Array(Math.min(list.length,3)).fill(0).map(()=>`
    <div class="sk-card"><div class="sk-row"><div class="sk sk-circle"></div><div class="sk-block">
      <div class="sk sk-line" style="width:60%"></div><div class="sk sk-line" style="width:40%;height:10px"></div>
    </div></div><div class="sk sk-line" style="width:80%"></div></div>`).join('') + '</div>';

  setTimeout(()=>{
    el.innerHTML = list.map((t,i)=>{
      const rid = esc(t._recordId);
      const isAssigned = /assigned|มอบหมาย/.test(t.status||'');
      const isAccepted = /accepted|รับงาน/.test(t.status||'');
      const isWorking  = /in_progress|ระหว่าง/.test(t.status||'');
      const isReview   = /ตรวจ|review/.test(t.status||'');
      const isDone     = /เสร็จ|completed/.test(t.status||'');
      let sa = t.started_at||t.startedAt||null;
      if(!sa){try{const sv=JSON.parse(localStorage.getItem('eng_st_'+(AUTH?.user?.id||'x'))||'{}');if(sv[t._recordId])sa=sv[t._recordId];}catch(_){}}
      const hasStarted = isWorking&&!!sa;
      let stamp='';
      if(hasStarted) stamp=`<div class="stamp-overlay"><div class="stamp-badge stamp-working">IN PROGRESS</div></div>`;
      else if(isReview) stamp=`<div class="stamp-overlay"><div class="stamp-badge stamp-review">REVIEW</div></div>`;
      else if(isDone)   stamp=`<div class="stamp-overlay"><div class="stamp-badge stamp-done">COMPLETE</div></div>`;

      return `<div class="job-card" style="animation:up .3s var(--ease) ${i*.04}s both" onclick="openDetail('${rid}')">
        ${stamp}
        ${hasStarted?`<div class="timer-bar"><div class="gps-dot"></div><div class="timer-label">กำลังทำงาน</div><div class="timer-val" id="timer-${esc(t._recordId)}">00:00:00</div></div>`:''}
        <div class="job-card-id">${esc(t.id||t.ticket_id||'--')} · ${esc(t.brand||'')}</div>
        <div class="job-card-title">${esc(t.type||t.category||'-')}</div>
        <div class="job-card-meta">
          <span class="pill">${statusLabel(t.status)}</span>
          <span style="font-size:11px;color:var(--fg4)">${esc(t.branchCode||'')} · ${esc(t.sentDate||'')}</span>
        </div>
        ${t.detail?`<div style="font-size:12px;color:var(--fg3);margin-top:6px;line-height:1.5">${esc(t.detail.substring(0,80))}${t.detail.length>80?'…':''}</div>`:''}
        <div class="jc-btns" style="margin-top:8px">
          ${isGuest
            ? `<button class="jc-b" style="opacity:.4;cursor:not-allowed">🔒 Demo</button>`
            : `${isAssigned?`<button class="jc-b pri" onclick="event.stopPropagation();doAccept('${rid}')">✅ รับงาน</button>`:''}
               ${isAccepted||isWorking&&!hasStarted?`<button class="jc-b pri" onclick="event.stopPropagation();doStartWork('${rid}')">🚀 เริ่มงาน</button>`:''}
               ${hasStarted?`<button class="jc-b pri" onclick="event.stopPropagation();openSubmit('${rid}')">✅ ส่งงาน</button>`:''}
               <button class="jc-b" onclick="event.stopPropagation();openDetail('${rid}')">Detail</button>`}
        </div>
      </div>`;
    }).join('');
    startWorkTimers();
  }, 400);
}

async function loadEngHistory(){
  const el = document.getElementById('hist-list');
  if(!el) return;
  el.innerHTML = '<div style="color:var(--fg4);text-align:center;padding:20px;font-size:13px">กำลังโหลด...</div>';
  try {
    // NE2: use BOTH name and username to match, strict filter
    const engName = AUTH?.user?.name || '';
    const engUser = AUTH?.user?.username || '';
    let url = `/api/tickets?limit=500`;
    if(_histFrom) url += `&from=${_histFrom}`;
    if(_histTo)   url += `&to=${_histTo}T23:59:59`;
    const d = await fetch(url, {headers:{Authorization:`Bearer ${localStorage.getItem('eng_auth')}`}}).then(r=>r.json());
    // NE2: strict filter — only tickets where engineerName matches logged-in user
    const allTix = d.tickets||d.data||[];
    const list = allTix
      .filter(t => {
        const en = (t.engineerName||t.engineer_name||t.assignedTo||'').toLowerCase();
        return en && (en===engName.toLowerCase() || en===engUser.toLowerCase());
      })
      .sort((a,b)=>new Date(b.sentDate||0)-new Date(a.sentDate||0));
    if(!list.length){
      el.innerHTML='<div class="empty"><div class="empty-t">ไม่พบประวัติในช่วงเวลาที่เลือก</div></div>';return;
    }
    el.innerHTML = `<div style="font-size:11px;color:var(--fg4);margin-bottom:8px">พบ ${list.length} รายการ</div>
      <div class="acc-list">${list.map(t=>`
        <div class="acc-item">
          <div class="acc-head" onclick="this.parentElement.classList.toggle('open')">
            <span class="acc-q">${esc(t.id||t.ticket_id||'--')} — ${esc(t.type||'-')} (${esc(t.brand||'')})</span>
            <span class="acc-ic">+</span>
          </div>
          <div class="acc-body">
            สาขา: ${esc(t.branchCode||'-')} · ผู้แจ้ง: ${esc(t.reporter||'-')}<br>
            วันที่: ${esc(t.sentDate||'-')} · สถานะ: <b>${statusLabel(t.status)}</b><br>
            ${t.workDetail?`งาน: ${esc(t.workDetail)}<br>`:''}
            ${t.partsUsed?`อุปกรณ์: ${esc(t.partsUsed)}`:''}
          </div>
        </div>`).join('')}
      </div>`;
  } catch(e) {
    // Fallback to in-memory tickets
    let all = [...tickets].sort((a,b)=>new Date(b.sentDate||0)-new Date(a.sentDate||0));
    if(_histFrom) all = all.filter(t=>new Date(t.sentDate||0)>=new Date(_histFrom));
    if(_histTo)   all = all.filter(t=>new Date(t.sentDate||0)<=new Date(_histTo+'T23:59:59'));
    if(!all.length){el.innerHTML='<div class="empty"><div class="empty-t">ไม่พบประวัติ</div></div>';return;}
    el.innerHTML = `<div style="font-size:11px;color:var(--fg4);margin-bottom:8px">พบ ${all.length} รายการ (จาก cache)</div>
      <div class="acc-list">${all.map(t=>`
        <div class="acc-item">
          <div class="acc-head" onclick="this.parentElement.classList.toggle('open')">
            <span class="acc-q">${esc(t.id||t.ticket_id||'--')} — ${esc(t.type||'-')} (${esc(t.brand||'')})</span>
            <span class="acc-ic">+</span>
          </div>
          <div class="acc-body">สาขา: ${esc(t.branchCode||'-')} · ผู้แจ้ง: ${esc(t.reporter||'-')} · วันที่: ${esc(t.sentDate||'-')} · สถานะ: ${statusLabel(t.status)}</div>
        </div>`).join('')}
      </div>`;
  }
}

<script>
/**
 * IT Support Visual Builder — builder-core.js
 * Embed into any HTML page. Press Ctrl+Shift+B to activate.
 * Canva/Photoshop-style: every UI atom is independently draggable.
 */
(function() {
'use strict';

// ══════════════════════════════════════════════════════════════
// ATOMIC BLOCK SELECTORS — these become individual drag items
// ══════════════════════════════════════════════════════════════
const ATOM_SELECTORS = [
  // Stats
  '.stat-box', '.stat', '.es',
  // Cards
  '.jcard', '.job-card', '.ucard', '.k-card', '.crd',
  // Nav
  '.navb', '.nav-item', '.tab-btn',
  // Rows
  '.tog-row', '.log-i', '.bb', '.drow', '.br-table tr',
  // Sections
  '#gps-status-bar', '.topbar', '.tabs',
  // Accordion items
  '.acc-item',
  // Topbar buttons
  '.smb', '.tbtn',
  // Misc
  '.pill', '.rbdg', '.stat-l',
  // Any element with data-block
  '[data-block]',
];

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
const STATE = {
  active: false,
  pages: {}, // { pageName: { elements: [...], canvasW, canvasH } }
  currentPage: 'engineer',
  selectedId: null,
  isDragging: false,
  dragId: null,
  dragOx: 0, dragOy: 0,
  isResizing: false,
  resizeId: null, resizeHandle: '',
  resizeStart: null,
  scale: 1,
  offX: 0, offY: 0,
  elCounter: 1,
};

// ══════════════════════════════════════════════════════════════
// DOM PARSER — extract atomic blocks from page
// ══════════════════════════════════════════════════════════════
function parsePageAtoms(container) {
  const atoms = [];
  const seen = new Set();

  // Find all atomic elements
  ATOM_SELECTORS.forEach(sel => {
    try {
      container.querySelectorAll(sel).forEach(el => {
        if (seen.has(el)) return;
        seen.add(el);
        const rect = el.getBoundingClientRect();
        const containerRect = container.getBoundingClientRect();
        if (rect.width < 4 || rect.height < 4) return;
        // Get most specific class name
        const mainClass = el.className && typeof el.className === 'string'
          ? el.className.split(' ').find(c => c.length > 2 && !['on','open','selected'].includes(c)) || 'element'
          : (el.id || 'element');
        atoms.push({
          uid: 'b' + (STATE.elCounter++),
          name: getBlockName(el),
          icon: getBlockIcon(mainClass),
          x: Math.round(rect.left - containerRect.left),
          y: Math.round(rect.top - containerRect.top),
          w: Math.round(rect.width),
          h: Math.round(rect.height),
          html: el.outerHTML,
          originalEl: el,
          visible: true,
          locked: false,
          zIndex: parseInt(window.getComputedStyle(el).zIndex) || 1,
          opacity: 1,
          customCSS: '',
        });
      });
    } catch(e) {}
  });

  // Sort by DOM order (y position)
  atoms.sort((a, b) => a.y - b.y || a.x - b.x);
  return atoms;
}

function getBlockName(el) {
  const cls = el.className && typeof el.className === 'string' ? el.className : '';
  const id = el.id || '';
  if (cls.includes('stat-box')) return '📊 Stat Box';
  if (cls.includes('stat')) return '📊 Stat';
  if (cls.includes('jcard') || cls.includes('job-card')) return '🔧 Job Card';
  if (cls.includes('ucard')) return '👤 User Card';
  if (cls.includes('k-card')) return '🎯 Kanban Card';
  if (cls.includes('navb') || cls.includes('nav-item')) return '🔗 Nav Item';
  if (cls.includes('tab-btn')) return '📑 Tab Button';
  if (cls.includes('tog-row')) return '🔘 Toggle Row';
  if (cls.includes('log-i')) return '📋 Log Item';
  if (cls.includes('acc-item')) return '📂 Accordion';
  if (cls.includes('crd')) return '🗂 Card';
  if (id === 'gps-status-bar') return '📍 GPS Bar';
  if (cls.includes('topbar')) return '⬛ Topbar';
  if (cls.includes('tabs')) return '📑 Tabs';
  if (cls.includes('smb')) return '🔲 Button';
  if (cls.includes('bb')) return '📊 Bar Row';
  if (el.tagName === 'TR') return '📋 Table Row';
  if (el.dataset.block) return el.dataset.block;
  return el.tagName.toLowerCase() + (id ? '#'+id : '.' + (cls.split(' ')[0] || ''));
}

function getBlockIcon(cls) {
  const iconMap = {
    'stat-box':'📊','stat':'📊','jcard':'🔧','job-card':'🔧',
    'ucard':'👤','k-card':'🎯','navb':'🔗','nav-item':'🔗',
    'tab-btn':'📑','tog-row':'🔘','log-i':'📋','acc-item':'📂',
    'crd':'🗂','topbar':'⬛','tabs':'📑','smb':'🔲','bb':'📈',
    'pill':'🏷','rbdg':'🏅','es':'📊',
  };
  for (const [k,v] of Object.entries(iconMap)) {
    if (cls.includes(k)) return v;
  }
  return '🔲';
}

// ══════════════════════════════════════════════════════════════
// BUILDER UI INJECTION
// ══════════════════════════════════════════════════════════════
function injectBuilder() {
  if (document.getElementById('__builder__')) return;

  // Load JSZip for export
  if (!window.JSZip) {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js';
    document.head.appendChild(s);
  }

  const overlay = document.createElement('div');
  overlay.id = '__builder__';
  overlay.innerHTML = getBuilderHTML();
  document.body.appendChild(overlay);

  // Inject styles
  const style = document.createElement('style');
  style.id = '__builder_styles__';
  style.textContent = getBuilderCSS();
  document.head.appendChild(style);

  // Parse current page atoms
  const pageName = document.title.split('—')[0].trim() || 'Page';
  const atoms = parsePageAtoms(document.getElementById('app') || document.body);
  const area = document.getElementById('app') || document.body;
  const rect = area.getBoundingClientRect();
  STATE.pages[pageName] = {
    elements: atoms,
    canvasW: Math.round(rect.width) || 390,
    canvasH: Math.round(rect.height) || 844,
    sourceHTML: document.documentElement.outerHTML,
  };
  STATE.currentPage = pageName;

  setupBuilderEvents();
  renderBuilder();
}

// PUBLIC API — window.__BLDR__
// ══════════════════════════════════════════════════════════════
window.__BLDR__ = {
  zoom(delta) {
    STATE.scale = Math.max(0.05, Math.min(4, STATE.scale + delta));
    applyTransform();
  },
  fitCanvas() { fitCanvas(); },
  toggleDark() {
    const bg = document.getElementById('__bldr_canvas_bg__');
    if (bg) bg.style.background = bg.style.background === 'rgb(10, 10, 10)' ? '#fff' : '#0a0a0a';
  },
  deleteSelected() { deleteSelected(); },
  duplicateSelected() { duplicateSelected(); },
  bringFwd() { modifyZ(1); },
  sendBwd() { modifyZ(-1); },
  reparseAtoms() {
    const pg = STATE.pages[STATE.currentPage];
    if (!pg) return;
    const container = document.getElementById('app') || document.body;
    const area = container.getBoundingClientRect();
    const newAtoms = parsePageAtoms(container);
    // Place them at their original positions
    newAtoms.forEach(a => {
      if (!pg.elements.find(e => e.name === a.name)) pg.elements.push(a);
    });
    renderBuilder();
    alert(`✅ Parsed ${newAtoms.length} atoms from current page`);
  },
  addPage() {
    const name = prompt('Page name:', 'New Page ' + (Object.keys(STATE.pages).length+1));
    if (!name) return;
    STATE.pages[name] = { elements:[], canvasW:390, canvasH:844, sourceHTML:'' };
    STATE.currentPage = name;
    renderBuilder();
  },
  exportZip() { exportZip(); },
  close() {
    const el = document.getElementById('__builder__');
    const st = document.getElementById('__builder_styles__');
    if (el) el.remove();
    if (st) st.remove();
    STATE.active = false;
  },
  canvasDown(e) { canvasDown(e); },
  canvasMove(e) { canvasMove(e); },
  canvasUp(e) { canvasUp(e); },
};

function renderBuilder() {
  renderPageTabs();
  renderAtomList();
  renderCanvas();
  renderProps();
}

function renderPageTabs() {
  const cont = document.getElementById('__bl_pages__');
  if (!cont) return;
  cont.innerHTML = Object.keys(STATE.pages).map(name =>
    `<button class="__bl_page_tab__${STATE.currentPage===name?' active':''}"
      onclick="__BLDR__._switchPage('${name}')">${name}</button>`
  ).join('');

function renderCanvas() {

function updateCtrls() {

// ══════════════════════════════════════════════════════════════
// CANVAS TRANSFORM
// ══════════════════════════════════════════════════════════════
function applyTransform() {
  const cv = document.getElementById('__bldr_canvas__');
  if (cv) cv.style.transform = `translate(${STATE.offX}px,${STATE.offY}px) scale(${STATE.scale})`;
  const zlbl = document.getElementById('__bl_zlbl__');
  if (zlbl) zlbl.textContent = Math.round(STATE.scale*100)+'%';
}
function fitCanvas() {
  const area = document.getElementById('__bldr_canvas_area__');
  const pg = STATE.pages[STATE.currentPage];
  if (!area || !pg) return;
  const aW = area.clientWidth, aH = area.clientHeight;
  STATE.scale = Math.min((aW-60)/pg.canvasW, (aH-60)/pg.canvasH, 1);
  STATE.scale = Math.round(STATE.scale*10)/10;
  STATE.offX = (aW - pg.canvasW*STATE.scale)/2;
  STATE.offY = (aH - pg.canvasH*STATE.scale)/2;
  applyTransform();
}

// ══════════════════════════════════════════════════════════════
// MOUSE EVENTS
// ══════════════════════════════════════════════════════════════
let _panStart = null, _selStart = null, _resizeStart = null, _dragStart = null;

function elDown(e, uid) {
  e.stopPropagation();
  if (e.target.classList.contains('__bl_rh__')) return;
  const pg = STATE.pages[STATE.currentPage];
  const el = pg?.elements.find(x=>x.uid===uid);
  if (!el || el.locked) return;
  selectOnly(uid);
  const pos = cvPos(e);
  _dragStart = { uid, ox: pos.x - el.x, oy: pos.y - el.y };
  STATE.isDragging = true;
  document.body.style.cursor = 'grabbing';
}

window.__BLDR__._rhDown = function(e, uid, handle) {
  const pg = STATE.pages[STATE.currentPage];
  const el = pg?.elements.find(x=>x.uid===uid);
  if (!el) return;
  _resizeStart = { uid, handle, sx: e.clientX, sy: e.clientY, ...el };
  STATE.isResizing = true;
  document.body.style.cursor = e.target.style.cursor;
};

function canvasDown(e) {
  const area = document.getElementById('__bldr_canvas_area__');
  if (e.target.id === '__bldr_canvas_area__' || e.target.id === '__bldr_canvas__' || e.target.id === '__bldr_canvas_bg__') {
    if (e.altKey || e.button===1) {
      _panStart = { sx: e.clientX, sy: e.clientY, ox: STATE.offX, oy: STATE.offY };
    } else {
      const rect = area.getBoundingClientRect();
      _selStart = { sx: e.clientX-rect.left, sy: e.clientY-rect.top };
      selectOnly(null);
    }
  }
}
function canvasMove(e) {
  if (_panStart) {
    STATE.offX = _panStart.ox + (e.clientX - _panStart.sx);
    STATE.offY = _panStart.oy + (e.clientY - _panStart.sy);
    applyTransform(); return;
  }
  if (_resizeStart) {
    const dx = (e.clientX - _resizeStart.sx) / STATE.scale;
    const dy = (e.clientY - _resizeStart.sy) / STATE.scale;
    const pg = STATE.pages[STATE.currentPage];
    const el = pg?.elements.find(x=>x.uid===_resizeStart.uid);
    if (!el) return;
    const h = _resizeStart.handle;
    if (h.includes('e')) el.w = Math.max(20, _resizeStart.w + dx);
    if (h.includes('s')) el.h = Math.max(8, _resizeStart.h + dy);
    if (h.includes('w')) { el.x = _resizeStart.x+dx; el.w = Math.max(20, _resizeStart.w-dx); }
    if (h.includes('n')) { el.y = _resizeStart.y+dy; el.h = Math.max(8, _resizeStart.h-dy); }
    const dom = document.getElementById('__dom_'+el.uid);
    if (dom) { dom.style.left=el.x+'px'; dom.style.top=el.y+'px'; dom.style.width=el.w+'px'; dom.style.height=el.h+'px'; }
    renderProps(); return;
  }
  if (STATE.isDragging && _dragStart) {
    const pos = cvPos(e);
    const pg = STATE.pages[STATE.currentPage];
    const el = pg?.elements.find(x=>x.uid===_dragStart.uid);
    if (!el) return;
    let nx = Math.round((pos.x - _dragStart.ox)/4)*4;
    let ny = Math.round((pos.y - _dragStart.oy)/4)*4;
    el.x = nx; el.y = ny;
    const dom = document.getElementById('__dom_'+el.uid);
    if (dom) { dom.style.left=nx+'px'; dom.style.top=ny+'px'; }
    renderProps(); return;
  }
  if (_selStart) {
    const area = document.getElementById('__bldr_canvas_area__');
    const rect = area.getBoundingClientRect();
    const cx = e.clientX-rect.left, cy = e.clientY-rect.top;
    const sb = document.getElementById('__bl_selbox__');
    if (sb) { sb.style.display='block'; sb.style.left=Math.min(_selStart.sx,cx)+'px'; sb.style.top=Math.min(_selStart.sy,cy)+'px'; sb.style.width=Math.abs(cx-_selStart.sx)+'px'; sb.style.height=Math.abs(cy-_selStart.sy)+'px'; }
  }
}
function canvasUp(e) {
  if (STATE.isDragging) renderCanvas();
  if (_resizeStart) renderCanvas();
  const sb = document.getElementById('__bl_selbox__');
  if (sb) sb.style.display='none';
  STATE.isDragging = false;
  STATE.isResizing = false;
  _dragStart = null; _panStart = null; _selStart = null; _resizeStart = null;
  document.body.style.cursor = '';
}
function cvPos(e) {
  const area = document.getElementById('__bldr_canvas_area__').getBoundingClientRect();
  return { x: (e.clientX-area.left-STATE.offX)/STATE.scale, y: (e.clientY-area.top-STATE.offY)/STATE.scale };
}

// ══════════════════════════════════════════════════════════════
// SELECTION & ACTIONS
// ══════════════════════════════════════════════════════════════
window.selectOnly = function(uid) {
  STATE.selectedId = uid;
  renderCanvas(); renderProps();
};
window.toggleVis = function(uid) {
  const pg = STATE.pages[STATE.currentPage];
  const el = pg?.elements.find(x=>x.uid===uid);
  if (el) { el.visible=!el.visible; renderCanvas(); }
};
window.toggleLock = function(uid) {
  const pg = STATE.pages[STATE.currentPage];
  const el = pg?.elements.find(x=>x.uid===uid);
  if (el) el.locked=!el.locked;
};

window.__BLDR__._sp = function(uid, key, val) {
  const pg = STATE.pages[STATE.currentPage];
  const el = pg?.elements.find(x=>x.uid===uid);
  if (!el) return;
  el[key] = val;
  const dom = document.getElementById('__dom_'+uid);
  if (dom) { if(key==='x')dom.style.left=val+'px'; if(key==='y')dom.style.top=val+'px'; if(key==='w')dom.style.width=val+'px'; if(key==='h')dom.style.height=val+'px'; if(key==='opacity')dom.style.opacity=val; if(key==='zIndex')dom.style.zIndex=val; }
};
window.__BLDR__._sps = function(uid, key, val) {
  const pg = STATE.pages[STATE.currentPage];
  const el = pg?.elements.find(x=>x.uid===uid);
  if (!el) return;
  el[key] = val;
  if (key==='html'||key==='customCSS') renderCanvas();
};

function deleteSelected() {
  const pg = STATE.pages[STATE.currentPage];
  if (!pg || !STATE.selectedId) return;
  pg.elements = pg.elements.filter(x=>x.uid!==STATE.selectedId);
  STATE.selectedId = null;
  renderBuilder();
}
function duplicateSelected() {
  const pg = STATE.pages[STATE.currentPage];
  if (!pg || !STATE.selectedId) return;
  const orig = pg.elements.find(x=>x.uid===STATE.selectedId);
  if (!orig) return;
  const copy = {...orig, uid:'b'+(STATE.elCounter++), x:orig.x+16, y:orig.y+16};
  pg.elements.push(copy);
  STATE.selectedId = copy.uid;
  renderBuilder();
}
function modifyZ(delta) {
  const pg = STATE.pages[STATE.currentPage];
  const el = pg?.elements.find(x=>x.uid===STATE.selectedId);
  if (el) { el.zIndex = Math.max(1,(el.zIndex||1)+delta); renderCanvas(); }
}

let _atomDragUid = null;
window.__BLDR__._atomDragStart = function(e, uid) { _atomDragUid = uid; e.dataTransfer.effectAllowed='copy'; };
window.__BLDR__._atomDragEnd = function() { _atomDragUid = null; };

// ══════════════════════════════════════════════════════════════
// EXPORT ZIP
// ══════════════════════════════════════════════════════════════
async function exportZip() {
  if (!window.JSZip) { alert('JSZip loading... try again in 2s'); return; }
  const zip = new JSZip();
  Object.entries(STATE.pages).forEach(([name, pg]) => {
    const safe = name.replace(/[^a-zA-Z0-9]/g,'_').toLowerCase();
    const html = generatePageHTML(name, pg);
    zip.file(safe + '.html', html);
  });
  // Add layout JSON
  const layoutJSON = JSON.stringify(
    Object.fromEntries(Object.entries(STATE.pages).map(([k,pg]) => [k, {
      canvasW: pg.canvasW, canvasH: pg.canvasH,
      elements: pg.elements.map(el => ({uid:el.uid,name:el.name,x:el.x,y:el.y,w:el.w,h:el.h,zIndex:el.zIndex,visible:el.visible,customCSS:el.customCSS}))
    }])), null, 2);
  zip.file('layout.json', layoutJSON);
  zip.file('README.txt', `IT Support Visual Builder Export\nGenerated: ${new Date().toLocaleString('th-TH')}\n\nPages: ${Object.keys(STATE.pages).join(', ')}`);
  const blob = await zip.generateAsync({type:'blob'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'it-support-layout-' + Date.now() + '.zip';
  a.click();
  URL.revokeObjectURL(a.href);
}

function generatePageHTML(name, pg) {
  const sorted = pg.elements.filter(e=>e.visible).sort((a,b)=>(a.zIndex||1)-(b.zIndex||1));
  const body = sorted.map(el => {
    const css = `position:absolute;left:${el.x}px;top:${el.y}px;width:${el.w}px;height:${el.h}px;opacity:${el.opacity||1};z-index:${el.zIndex||1}${el.customCSS?';'+el.customCSS:''}`;
    return `  <!-- ${el.name} -->\n  <div style="${css}">${el.html}</div>`;
  }).join('\n\n');
  return `<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${name} — IT Support</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f6f6f4;--bg3:#edede9;--fg:#0a0a0a;--fg2:#3a3a38;--fg3:#7a7a75;--fg4:#a8a8a2;--border:#e0e0db;--green:#2d7a4f;--sans:'Prompt',sans-serif}
body{width:${pg.canvasW}px;min-height:${pg.canvasH}px;background:var(--bg);font-family:var(--sans);position:relative}
</style>
</head>
<body>
<!-- Builder Export: ${name} — ${new Date().toLocaleString('th-TH')} — ${sorted.length} elements -->
${body}
</body>
</html>`;
}

// HELPERS
// ══════════════════════════════════════════════════════════════
function escA(s){return String(s||'').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function escH(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ══════════════════════════════════════════════════════════════
// EVENTS SETUP
// ══════════════════════════════════════════════════════════════
function setupBuilderEvents() {
  // Wheel zoom
  const area = document.getElementById('__bldr_canvas_area__');
  area.addEventListener('wheel', e => {
    e.preventDefault();
    const d = e.deltaY>0 ? -0.05 : 0.05;
    const rect = area.getBoundingClientRect();
    const mx = e.clientX-rect.left, my = e.clientY-rect.top;
    const prev = STATE.scale;
    STATE.scale = Math.max(0.05, Math.min(4, STATE.scale+d));
    STATE.offX = mx - (mx-STATE.offX)*(STATE.scale/prev);
    STATE.offY = my - (my-STATE.offY)*(STATE.scale/prev);
    applyTransform();
  }, {passive:false});

  // Drop atom onto canvas
  area.addEventListener('dragover', e => { e.preventDefault(); });
  area.addEventListener('drop', e => {
    e.preventDefault();
    if (!_atomDragUid) return;
    const pg = STATE.pages[STATE.currentPage];
    if (!pg) return;
    const orig = pg.elements.find(x=>x.uid===_atomDragUid);
    if (!orig) return;
    const pos = cvPos(e);
    const copy = {...orig, uid:'b'+(STATE.elCounter++), x:Math.round(pos.x/4)*4, y:Math.round(pos.y/4)*4};
    pg.elements.push(copy);
    STATE.selectedId = copy.uid;
    renderBuilder();
    _atomDragUid = null;
  });

  // Keyboard
  document.addEventListener('keydown', e => {
    const inInput = ['INPUT','TEXTAREA'].includes(e.target.tagName);
    if (!STATE.active) return;
    if (inInput) return;
    const step = e.shiftKey ? 10 : 1;
    if (e.key==='Delete'||e.key==='Backspace') deleteSelected();
    if (e.key==='Escape') selectOnly(null);
    if (e.key==='ArrowLeft') moveEl(-step,0);
    if (e.key==='ArrowRight') moveEl(step,0);
    if (e.key==='ArrowUp') { e.preventDefault(); moveEl(0,-step); }
    if (e.key==='ArrowDown') { e.preventDefault(); moveEl(0,step); }
    if ((e.metaKey||e.ctrlKey)&&e.key==='d') { e.preventDefault(); duplicateSelected(); }
  });

  // Global mouseup
  document.addEventListener('mouseup', () => {
    if (STATE.isDragging) { STATE.isDragging=false; _dragStart=null; renderCanvas(); }
    if (STATE.isResizing) { STATE.isResizing=false; _resizeStart=null; renderCanvas(); }
    _panStart=null; _selStart=null;
    const sb = document.getElementById('__bl_selbox__');
    if (sb) sb.style.display='none';
    document.body.style.cursor='';
  });

  // Fit on load
  setTimeout(() => { fitCanvas(); STATE.active = true; }, 100);
}

function moveEl(dx, dy) {
  const pg = STATE.pages[STATE.currentPage];
  const el = pg?.elements.find(x=>x.uid===STATE.selectedId);
  if (!el) return;
  el.x+=dx; el.y+=dy;
  renderCanvas(); renderProps();
}

function activate() {
  if (STATE.active) return;
  STATE.active = true;
  injectBuilder();
}

// Trigger button (hidden)
function injectTriggerButton() {
  const btn = document.createElement('button');
  btn.id = '__bldr_trigger__';
  btn.title = 'Dev Builder (Ctrl+Shift+B)';
  btn.textContent = '⚡';
  btn.style.cssText = 'position:fixed;bottom:16px;right:16px;z-index:999998;width:36px;height:36px;border-radius:50%;background:#4d8ef5;color:#fff;border:none;cursor:pointer;font-size:16px;box-shadow:0 4px 16px rgba(77,142,245,.5);transition:all .2s;opacity:.7';
  btn.onmouseenter = () => btn.style.opacity='1';
  btn.onmouseleave = () => btn.style.opacity='.7';
  btn.onclick = activate;
  document.body.appendChild(btn);
}

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if ((e.ctrlKey||e.metaKey) && e.shiftKey && e.key==='B') {
    e.preventDefault();
    if (STATE.active) window.__BLDR__.close();
    else activate();
  }
});

// Auto-inject trigger button when DOM ready
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', injectTriggerButton);
} else {
  injectTriggerButton();
}

})(); // IIFE end

</script>
</body>
</html>
