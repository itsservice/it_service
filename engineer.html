<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>Engineer — IT Support</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@500;600;700;800&family=Noto+Sans+Thai:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07070a;--bg2:#0d0d12;--bg3:#141419;--bg4:#1c1c24;
  --b1:rgba(255,255,255,.06);--b2:rgba(255,255,255,.12);--b3:rgba(255,255,255,.2);
  --fg:rgba(255,255,255,.93);--fg2:rgba(255,255,255,.5);--fg3:rgba(255,255,255,.22);
  --accent:#00e5a0;--blue:#3b82f6;--warn:#f59e0b;--danger:#ef4444;--purple:#a855f7;
  --r:10px;--r2:16px;--r3:20px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
  --font-th:'Noto Sans Thai',sans-serif;--font-h:'Syne',sans-serif;--font-m:'JetBrains Mono',monospace;
}
body.theme-light{
  --bg:#f0f2f7;--bg2:#ffffff;--bg3:#f7f8fc;--bg4:#eef0f6;
  --b1:rgba(0,0,0,.07);--b2:rgba(0,0,0,.13);--b3:rgba(0,0,0,.22);
  --fg:rgba(0,0,0,.88);--fg2:rgba(0,0,0,.5);--fg3:rgba(0,0,0,.28);
  --accent:#00b87a;--blue:#2563eb;--warn:#d97706;--danger:#dc2626;--purple:#7c3aed;
}
html,body{height:100%;background:var(--bg);color:var(--fg);font-family:var(--font-th);font-size:14px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px}
a{color:inherit;text-decoration:none}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.login-card{width:100%;max-width:400px;background:var(--bg2);border:1px solid var(--b2);border-radius:24px;padding:40px 32px;animation:fadeUp .4s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.l-logo{text-align:center;margin-bottom:32px}
.l-icon{display:inline-flex;width:60px;height:60px;background:var(--blue);border-radius:18px;align-items:center;justify-content:center;font-size:28px;margin-bottom:14px}
.l-title{font-family:var(--font-h);font-size:22px;font-weight:700}
.l-sub{font-size:13px;color:var(--fg2);margin-top:5px}
.l-field{margin-bottom:14px}
.l-field label{display:block;font-size:11px;font-weight:700;color:var(--fg3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:7px}
.l-field input{width:100%;background:var(--bg3);border:1.5px solid var(--b1);border-radius:var(--r);padding:13px 15px;color:var(--fg);font-family:var(--font-th);font-size:15px;outline:none;transition:border-color .2s}
.l-field input:focus{border-color:var(--blue)}
.l-btn{width:100%;margin-top:8px;padding:15px;background:var(--blue);color:#fff;border:none;border-radius:var(--r2);font-family:var(--font-th);font-size:16px;font-weight:700;cursor:pointer;transition:opacity .15s}
.l-btn:hover{opacity:.85}.l-btn:disabled{opacity:.4;cursor:default}
.l-err{color:var(--danger);font-size:13px;text-align:center;margin-top:10px;min-height:18px}
.l-links{text-align:center;margin-top:18px;font-size:13px;color:var(--fg3)}
.l-links a{color:var(--fg2)}

/* APP */
#app{display:none;min-height:100vh;flex-direction:column}
#app.ready{display:flex}
.topbar{background:var(--bg2);border-bottom:1px solid var(--b1);padding:12px 20px;padding-top:calc(var(--safe-top)+12px);display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(0,0,0,.3)}
.tb-logo{width:34px;height:34px;background:var(--blue);border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--font-h);font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.tb-title{font-family:var(--font-h);font-size:16px;font-weight:700;flex:1}
.tb-user{font-size:12px;color:var(--fg2);white-space:nowrap}
.tb-actions{display:flex;gap:8px;align-items:center}
.btn-icon{background:transparent;border:1px solid var(--b2);border-radius:8px;color:var(--fg2);font-size:16px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.btn-icon:hover{background:var(--b1);color:var(--fg)}
.main{flex:1;padding:20px;max-width:900px;margin:0 auto;width:100%;padding-bottom:80px}

/* STATS */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.scard{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r2);padding:16px 18px;position:relative;overflow:hidden}
.scard::before{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--sc,var(--b1))}
.scard-label{font-size:11.5px;color:var(--fg2);margin-bottom:6px}
.scard-num{font-family:var(--font-h);font-size:26px;font-weight:700;color:var(--sc,var(--fg))}

/* FILTER TABS */
.filter-tabs{display:flex;gap:6px;overflow-x:auto;margin-bottom:16px;padding-bottom:2px}
.filter-tabs::-webkit-scrollbar{height:0}
.ftab{padding:7px 14px;border-radius:20px;border:1.5px solid var(--b1);background:transparent;color:var(--fg2);font-size:13px;font-weight:500;font-family:var(--font-th);cursor:pointer;white-space:nowrap;transition:all .15s;flex-shrink:0}
.ftab.active{font-weight:700}
.ftab-all.active{background:rgba(255,255,255,.08);border-color:var(--fg);color:var(--fg)}
.ftab-wait.active{background:rgba(245,158,11,.12);border-color:var(--warn);color:var(--warn)}
.ftab-mine.active{background:rgba(59,130,246,.15);border-color:var(--blue);color:var(--blue)}
.ftab-done.active{background:rgba(0,229,160,.12);border-color:var(--accent);color:var(--accent)}

/* TICKET CARDS */
.ticket-list{display:flex;flex-direction:column;gap:10px}
.tcard{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r2);padding:16px 18px;cursor:pointer;transition:border-color .15s,background .12s;position:relative;overflow:hidden}
.tcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--tc,var(--b1))}
.tcard:hover{border-color:var(--b2);background:var(--bg3)}
.tcard-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.tcard-id{font-family:var(--font-m);font-size:11.5px;color:var(--accent)}
.tcard-status{display:inline-flex;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.tcard-title{font-size:15px;font-weight:600;margin-bottom:4px;line-height:1.3}
.tcard-detail{font-size:13px;color:var(--fg2);margin-bottom:10px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tcard-meta{display:flex;flex-wrap:wrap;gap:8px;font-size:12px;color:var(--fg3)}
.tcard-badge{background:var(--b1);padding:3px 8px;border-radius:6px;color:var(--fg2)}
.tcard-assigned{background:rgba(59,130,246,.1);color:#60a5fa;padding:3px 8px;border-radius:6px;font-weight:600}
.empty-state{text-align:center;padding:60px 20px;color:var(--fg3)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-text{font-size:15px}

/* STATUS PILLS */
.s-แก้ไข{background:rgba(245,158,11,.15);color:#f59e0b}
.s-ตรวจงาน{background:rgba(34,211,238,.15);color:#22d3ee}
.s-อยู่ระหว่างดำเนินการ{background:rgba(59,130,246,.15);color:#60a5fa}
.s-รอดำเนินการ{background:rgba(168,85,247,.15);color:#c084fc}
.s-เสร็จสิ้น{background:rgba(0,229,160,.15);color:#00e5a0}
.s-ยกเลิก{background:rgba(239,68,68,.15);color:#f87171}

/* DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:none;cursor:pointer;backdrop-filter:blur(2px)}
.drawer-overlay.open{display:block}
.drawer{position:fixed;right:0;top:0;bottom:0;width:480px;max-width:100vw;background:var(--bg2);border-left:1px solid var(--b1);z-index:201;overflow-y:auto;padding-bottom:calc(var(--safe-bottom)+20px);transform:translateX(100%);transition:transform .3s cubic-bezier(.22,.61,.36,1);padding-top:var(--safe-top)}
.drawer.open{transform:none}
.drawer-head{padding:18px 20px;border-bottom:1px solid var(--b1);display:flex;align-items:flex-start;gap:12px;position:sticky;top:0;background:var(--bg2);z-index:10}
.drawer-head-info{flex:1;min-width:0}
.drawer-id{font-family:var(--font-m);font-size:12px;color:var(--accent)}
.drawer-title{font-size:15px;font-weight:700;margin-top:3px;line-height:1.3}
.btn-close-dr{background:transparent;border:1px solid var(--b2);border-radius:8px;color:var(--fg2);font-size:18px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s}
.btn-close-dr:hover{background:var(--b1);color:var(--fg)}
.drawer-body{padding:18px 20px 0}
.d-section{margin-bottom:20px}
.d-section-title{font-size:10.5px;font-weight:700;color:var(--fg3);letter-spacing:.07em;text-transform:uppercase;margin-bottom:10px}
.d-row{display:flex;margin-bottom:6px;font-size:13.5px;gap:8px;line-height:1.5}
.d-label{color:var(--fg2);min-width:80px;flex-shrink:0;font-size:13px}
.d-value{color:var(--fg);font-weight:500;flex:1;word-break:break-word}
.d-detail-box{background:var(--bg3);border-radius:var(--r);padding:13px;font-size:13.5px;line-height:1.8}
.d-work-box{background:rgba(0,229,160,.05);border:1px solid rgba(0,229,160,.15);border-radius:var(--r);padding:13px;font-size:13px;line-height:1.8}
.d-divider{height:1px;background:var(--b1);margin:0 0 20px}

/* SUBMIT FORM */
.submit-form{background:var(--bg3);border-radius:var(--r2);padding:18px;border:1px solid var(--b1)}
.submit-title{font-size:14px;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.d-form-group{margin-bottom:12px}
.d-form-label{font-size:11.5px;font-weight:600;color:var(--fg2);margin-bottom:6px;display:block;letter-spacing:.03em}
.d-form-input,.d-form-select,.d-form-textarea{width:100%;background:var(--bg);border:1.5px solid var(--b1);border-radius:var(--r);padding:11px 13px;color:var(--fg);font-family:var(--font-th);font-size:14px;outline:none;transition:border-color .2s;appearance:none}
.d-form-input:focus,.d-form-select:focus,.d-form-textarea:focus{border-color:var(--blue)}
.d-form-textarea{resize:none;min-height:100px;line-height:1.7}
.btn-submit-work{width:100%;padding:13px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-family:var(--font-th);font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s;margin-top:4px}
.btn-submit-work:hover{opacity:.85}
.btn-submit-work:disabled{opacity:.4;cursor:default}
.btn-review{width:100%;padding:13px;background:var(--accent);color:#000;border:none;border-radius:var(--r);font-family:var(--font-th);font-size:15px;font-weight:700;cursor:pointer;transition:opacity .15s;margin-top:8px}
.btn-review:hover{opacity:.85}
.success-msg{background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.25);border-radius:var(--r);padding:12px 14px;font-size:13px;color:var(--accent);text-align:center;margin-top:10px}
.already-submitted{background:rgba(0,229,160,.05);border:1px solid rgba(0,229,160,.15);border-radius:var(--r);padding:14px;font-size:13px;color:var(--accent);line-height:1.7}

/* TOAST */
.toast{position:fixed;bottom:calc(var(--safe-bottom)+20px);left:50%;transform:translateX(-50%) translateY(100px);background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r2);padding:12px 20px;font-size:14px;font-weight:500;z-index:9999;transition:transform .3s cubic-bezier(.22,.61,.36,1);white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.success{border-color:var(--accent);color:var(--accent)}
.toast.error{border-color:var(--danger);color:var(--danger)}

@media(max-width:600px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .drawer{width:100vw}
  .main{padding:14px;padding-bottom:60px}
  .topbar{padding:10px 14px;padding-top:calc(var(--safe-top)+10px)}
  .tb-user{display:none}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="l-logo">
      <div class="l-icon">🔧</div>
      <div class="l-title">IT Support — ช่าง</div>
      <div class="l-sub">Engineer Portal</div>
    </div>
    <div class="l-field">
      <label>Username</label>
      <input type="text" id="l-user" placeholder="กรอก Username" autocomplete="username"/>
    </div>
    <div class="l-field">
      <label>Password</label>
      <input type="password" id="l-pass" placeholder="กรอกรหัสผ่าน" autocomplete="current-password"/>
    </div>
    <button class="l-btn" id="btn-login">เข้าสู่ระบบช่าง</button>
    <div class="l-err" id="l-err"></div>
    <div class="l-links">
      <a href="/report">← หน้าแจ้งปัญหา</a> &nbsp;·&nbsp; <a href="/admin">Admin</a>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="tb-logo">🔧</div>
    <div class="tb-title">Engineer View</div>
    <div class="tb-user" id="tb-user">—</div>
    <div class="tb-actions">
      <button class="btn-icon" id="btn-theme" title="สลับธีม">🌙</button>
      <button class="btn-icon" id="btn-refresh" title="รีเฟรช">↻</button>
      <button class="btn-icon" id="btn-logout" title="ออกจากระบบ">⏻</button>
    </div>
  </div>

  <div class="main">
    <!-- Stats -->
    <div class="stats-row" id="stats-row">
      <div class="scard" style="--sc:var(--warn)"><div class="scard-label">งานของฉัน (รอดำเนินการ)</div><div class="scard-num" id="s-mine">—</div></div>
      <div class="scard" style="--sc:var(--blue)"><div class="scard-label">กำลังดำเนินการ</div><div class="scard-num" id="s-inprog">—</div></div>
      <div class="scard" style="--sc:var(--purple)"><div class="scard-label">รอตรวจงาน</div><div class="scard-num" id="s-review">—</div></div>
      <div class="scard" style="--sc:var(--accent)"><div class="scard-label">เสร็จสิ้นแล้ว</div><div class="scard-num" id="s-done">—</div></div>
    </div>

    <!-- Filter tabs -->
    <div class="filter-tabs">
      <button class="ftab ftab-mine active" onclick="setFilter('mine')">📋 งานของฉัน</button>
      <button class="ftab ftab-all" onclick="setFilter('all')">🌐 ทั้งหมด</button>
      <button class="ftab ftab-wait" onclick="setFilter('wait')">⏱️ รอดำเนินการ</button>
      <button class="ftab ftab-done" onclick="setFilter('done')">✅ เสร็จสิ้น</button>
    </div>

    <!-- Ticket list -->
    <div class="ticket-list" id="ticket-list">
      <div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-text">กำลังโหลด...</div></div>
    </div>
  </div>
</div>

<!-- Drawer overlay -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>

<!-- Drawer -->
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <div class="drawer-head-info">
      <div class="drawer-id" id="d-id">—</div>
      <div class="drawer-title" id="d-title">—</div>
      <div style="margin-top:6px" id="d-status-wrap"></div>
    </div>
    <button class="btn-close-dr" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
const API = '';
let AUTH = null;
let tickets = [];
let currentFilter = 'mine';
let openId = null;
const STATUSES = ['แก้ไข','รอดำเนินการ ⏱️','อยู่ระหว่างดำเนินการ ⚙️','ตรวจงาน','เสร็จสิ้น ✅','ยกเลิก ❌'];

// ── util ──
function esc(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function toast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';setTimeout(()=>t.classList.remove('show'),2500);}
function statusColor(s=''){
  if(s.includes('รอดำเนินการ'))return '#c084fc';
  if(s.includes('อยู่ระหว่าง'))return '#60a5fa';
  if(s.includes('ตรวจงาน'))return '#22d3ee';
  if(s.includes('เสร็จสิ้น'))return '#00e5a0';
  if(s.includes('ยกเลิก'))return '#f87171';
  if(s.includes('แก้ไข'))return '#f59e0b';
  return '#888';
}
function statusKey(s=''){return s.replace(/[✅⚙️⏱️❌🔍✏️]/g,'').trim();}

async function api(path,opts={}){
  const hdrs={'Content-Type':'application/json'};
  if(AUTH?.token) hdrs['Authorization']='Bearer '+AUTH.token;
  const r=await fetch(API+path,{...opts,headers:{...hdrs,...(opts.headers||{})}});
  const d=await r.json();
  if(!r.ok) throw new Error(d.message||'Error');
  return d;
}

// ── AUTH ──
async function tryRestoreAuth(){
  const saved=localStorage.getItem('eng_auth');
  if(!saved)return false;
  try{
    const {token}=JSON.parse(saved);
    const d=await api('/api/auth/me',{headers:{'Authorization':'Bearer '+token}});
    if(d.ok && d.user.role==='engineer'){AUTH={token,user:d.user};return true;}
  }catch(_){}
  localStorage.removeItem('eng_auth');
  return false;
}

document.getElementById('btn-login').onclick=async()=>{
  const uname=document.getElementById('l-user').value.trim();
  const pass=document.getElementById('l-pass').value;
  const err=document.getElementById('l-err');
  const btn=document.getElementById('btn-login');
  if(!uname||!pass){err.textContent='กรุณากรอก Username และ Password';return;}
  btn.disabled=true;btn.textContent='กำลังเข้าสู่ระบบ...';err.textContent='';
  try{
    const d=await api('/api/auth/login',{method:'POST',body:JSON.stringify({username:uname,password:pass})});
    if(d.user.role!=='engineer') throw new Error('บัญชีนี้ไม่ใช่ช่าง กรุณาใช้หน้า Admin');
    AUTH={token:d.token,user:d.user};
    localStorage.setItem('eng_auth',JSON.stringify(AUTH));
    startApp();
  }catch(e){err.textContent='❌ '+e.message;btn.disabled=false;btn.textContent='เข้าสู่ระบบช่าง';}
};
['l-user','l-pass'].forEach(id=>document.getElementById(id).addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('btn-login').click();}));

function logout(){
  try{api('/api/auth/logout',{method:'POST'});}catch(_){}
  AUTH=null;localStorage.removeItem('eng_auth');
  document.getElementById('app').classList.remove('ready');
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
}
document.getElementById('btn-logout').onclick=logout;

// ── APP START ──
async function startApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').classList.add('ready');
  document.getElementById('tb-user').textContent='🔧 '+AUTH.user.name;
  await loadTickets();
  // SSE
  try{
    const sse=new EventSource(API+'/api/events');
    sse.addEventListener('ticket_created',()=>loadTickets());
    sse.addEventListener('ticket_updated',e=>{try{const d=JSON.parse(e.data);tickets=tickets.map(t=>t._recordId===d.recordId?{...t,...d}:t);render();}catch(_){loadTickets();}});
  }catch(_){}
}

async function loadTickets(){
  const btn=document.getElementById('btn-refresh');
  btn.textContent='↻';btn.style.animation='spin .7s linear infinite';
  try{
    const d=await api('/api/tickets');
    tickets=d.tickets||d||[];
    render();
  }catch(e){toast('โหลดข้อมูลไม่สำเร็จ','error');}
  btn.style.animation='';btn.textContent='↻';
}
document.getElementById('btn-refresh').onclick=loadTickets;

// ── FILTER ──
function setFilter(f){
  currentFilter=f;
  document.querySelectorAll('.ftab').forEach(b=>b.classList.remove('active'));
  const map={mine:'ftab-mine',all:'ftab-all',wait:'ftab-wait',done:'ftab-done'};
  document.querySelector('.'+map[f])?.classList.add('active');
  render();
}

// ── RENDER ──
function render(){
  const me=AUTH?.user?.name||'';
  // stats
  document.getElementById('s-mine').textContent=tickets.filter(t=>t.engineerName===me&&!['เสร็จสิ้น ✅','ยกเลิก ❌'].includes(t.status)).length;
  document.getElementById('s-inprog').textContent=tickets.filter(t=>t.engineerName===me&&t.status==='อยู่ระหว่างดำเนินการ ⚙️').length;
  document.getElementById('s-review').textContent=tickets.filter(t=>t.engineerName===me&&t.status==='ตรวจงาน').length;
  document.getElementById('s-done').textContent=tickets.filter(t=>t.engineerName===me&&t.status==='เสร็จสิ้น ✅').length;

  let data=[...tickets];
  if(currentFilter==='mine') data=data.filter(t=>t.engineerName===me);
  else if(currentFilter==='wait') data=data.filter(t=>['แก้ไข','รอดำเนินการ ⏱️'].includes(t.status));
  else if(currentFilter==='done') data=data.filter(t=>t.status==='เสร็จสิ้น ✅');

  const list=document.getElementById('ticket-list');
  if(!data.length){
    list.innerHTML='<div class="empty-state"><div class="empty-icon">📭</div><div class="empty-text">ไม่มีงานในหมวดนี้</div></div>';
    return;
  }
  list.innerHTML=data.map(t=>{
    const sc=statusColor(t.status);
    const sk=statusKey(t.status);
    const isMe=t.engineerName===me;
    return `<div class="tcard" style="--tc:${sc}" onclick="openDrawer('${esc(t._recordId)}')">
      <div class="tcard-top">
        <div class="tcard-id">${esc(t.id||t._recordId||'—')}</div>
        <span class="tcard-status s-${esc(sk)}">${esc(t.status||'-')}</span>
      </div>
      <div class="tcard-title">${esc(t.type||'—')}</div>
      <div class="tcard-detail">${esc(t.detail||'-')}</div>
      <div class="tcard-meta">
        <span class="tcard-badge">🏪 ${esc(t.brand||'-')}</span>
        <span class="tcard-badge">📍 ${esc(t.branchCode||t.branch||'-')}</span>
        <span class="tcard-badge">📅 ${esc(t.sentDate||'-')}</span>
        ${isMe?'<span class="tcard-assigned">👤 งานของฉัน</span>':(t.engineerName?`<span class="tcard-badge">🔧 ${esc(t.engineerName)}</span>`:'<span class="tcard-badge" style="color:var(--warn)">⚠ ยังไม่มอบหมาย</span>')}
      </div>
    </div>`;
  }).join('');
}

// ── DRAWER ──
function openDrawer(id){
  const t=tickets.find(x=>x._recordId===id);
  if(!t)return;
  openId=id;
  document.getElementById('d-id').textContent='🎫 '+(t.id||t._recordId||'—');
  document.getElementById('d-title').textContent=t.type||'—';
  const sk=statusKey(t.status);
  document.getElementById('d-status-wrap').innerHTML=`<span class="tcard-status s-${esc(sk)}">${esc(t.status||'-')}</span>`;
  renderDrawerBody(t);
  document.getElementById('drawer-overlay').classList.add('open');
  document.getElementById('drawer').classList.add('open');
}

function closeDrawer(){
  openId=null;
  document.getElementById('drawer-overlay').classList.remove('open');
  document.getElementById('drawer').classList.remove('open');
}

function renderDrawerBody(t){
  const me=AUTH?.user?.name||'';
  const isMe=t.engineerName===me;
  const canSubmit=isMe&&!['เสร็จสิ้น ✅','ยกเลิก ❌','ตรวจงาน'].includes(t.status);
  const alreadySubmitted=isMe&&t.workDetail&&['ตรวจงาน','เสร็จสิ้น ✅'].includes(t.status);

  document.getElementById('drawer-body').innerHTML=`
    <div class="d-section">
      <div class="d-section-title">ข้อมูลงาน</div>
      <div class="d-row"><span class="d-label">สาขา</span><span class="d-value">${esc(t.branchCode||t.branch||'-')}</span></div>
      <div class="d-row"><span class="d-label">แบรนด์</span><span class="d-value">${esc(t.brand||'-')}</span></div>
      <div class="d-row"><span class="d-label">ผู้แจ้ง</span><span class="d-value">${esc(t.reporter||'-')}</span></div>
      <div class="d-row"><span class="d-label">เบอร์</span><span class="d-value">${esc(t.phone||'-')}</span></div>
      <div class="d-row"><span class="d-label">วันที่แจ้ง</span><span class="d-value">${esc(t.sentDate||'-')}</span></div>
    </div>

    <div class="d-divider"></div>

    <div class="d-section">
      <div class="d-section-title">รายละเอียดปัญหา</div>
      <div class="d-detail-box">${esc(t.detail||t.type||'ไม่มีรายละเอียด')}</div>
    </div>

    ${t.workDetail?`
    <div class="d-divider"></div>
    <div class="d-section">
      <div class="d-section-title">สิ่งที่ช่างดำเนินการ</div>
      <div class="d-work-box">
        <div style="font-size:11.5px;color:var(--accent);margin-bottom:6px;font-weight:600">🔧 ${esc(t.engineerName||'-')} · ${esc(t.completedAt||'-')}</div>
        ${esc(t.workDetail)}
      </div>
    </div>`:''}

    ${t.adminNote?`
    <div class="d-divider"></div>
    <div class="d-section">
      <div class="d-section-title">หมายเหตุจาก Admin</div>
      <div class="d-admin-box">${esc(t.adminNote)}</div>
    </div>`:''}

    <div class="d-divider"></div>

    ${canSubmit?`
    <div class="d-section">
      <div class="submit-form">
        <div class="submit-title">🔧 บันทึกผลการดำเนินการ</div>
        <div class="d-form-group">
          <label class="d-form-label">สิ่งที่ดำเนินการ / วิธีแก้ไข *</label>
          <textarea class="d-form-textarea" id="eng-workdetail" placeholder="อธิบายสิ่งที่ทำเพื่อแก้ปัญหา เช่น รีสตาร์ท POS, เปลี่ยนสาย LAN..."></textarea>
        </div>
        <div class="d-form-group">
          <label class="d-form-label">สถานะงาน</label>
          <select class="d-form-select" id="eng-status">
            <option value="อยู่ระหว่างดำเนินการ ⚙️">⚙️ อยู่ระหว่างดำเนินการ</option>
            <option value="ตรวจงาน" selected>🔍 ส่งตรวจงาน (เสร็จแล้ว รอ Admin ตรวจ)</option>
          </select>
        </div>
        <button class="btn-submit-work" id="btn-submit-eng" onclick="submitWork('${esc(t._recordId)}')">📤 ส่งผลการดำเนินการ</button>
      </div>
    </div>`
    :alreadySubmitted?`
    <div class="d-section">
      <div class="already-submitted">
        ✅ ส่งผลการดำเนินการแล้ว รอ Admin ตรวจสอบ
      </div>
    </div>`
    :!isMe&&!['เสร็จสิ้น ✅','ยกเลิก ❌'].includes(t.status)?`
    <div class="d-section">
      <div class="already-submitted" style="color:var(--warn);border-color:rgba(245,158,11,.25);background:rgba(245,158,11,.05)">
        ⚠️ งานนี้ยังไม่ได้รับมอบหมายให้คุณ
      </div>
    </div>`:''}
  `;
}

async function submitWork(rid){
  const workDetail=document.getElementById('eng-workdetail').value.trim();
  const status=document.getElementById('eng-status').value;
  if(!workDetail){toast('กรุณากรอกสิ่งที่ดำเนินการ','error');return;}
  const btn=document.getElementById('btn-submit-eng');
  btn.disabled=true;btn.textContent='กำลังบันทึก...';
  try{
    const d=await api(`/api/tickets/${rid}/engineer`,{method:'PATCH',body:JSON.stringify({workDetail,status,engineerName:AUTH.user.name})});
    tickets=tickets.map(t=>t._recordId===rid?{...t,workDetail,status,engineerName:AUTH.user.name,completedAt:new Date().toLocaleString('th-TH')}:t);
    toast('✅ บันทึกผลเรียบร้อย');
    const t=tickets.find(x=>x._recordId===rid);
    if(t){renderDrawerBody(t);document.getElementById('d-status-wrap').innerHTML=`<span class="tcard-status s-${esc(statusKey(t.status))}">${esc(t.status)}</span>`;}
    render();
  }catch(e){toast('❌ '+e.message,'error');btn.disabled=false;btn.textContent='📤 ส่งผลการดำเนินการ';}
}

// ── THEME ──
const btnTheme=document.getElementById('btn-theme');
let dark=true;
function applyTheme(){document.body.classList.toggle('theme-light',!dark);btnTheme.textContent=dark?'🌙':'☀️';}
btnTheme.onclick=()=>{dark=!dark;localStorage.setItem('eng_theme',dark?'dark':'light');applyTheme();}
const savedTheme=localStorage.getItem('eng_theme');
if(savedTheme==='light'){dark=false;applyTheme();}

// ── INIT ──
(async()=>{
  const ok=await tryRestoreAuth();
  if(ok){startApp();}
})();
</script>
