<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Engineer — IT Support</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f6f6f4;--bg3:#edede9;--bg4:#e4e4df;--fg:#0a0a0a;--fg2:#3a3a38;--fg3:#7a7a75;--fg4:#a8a8a2;--border:#e0e0db;--border2:#c8c8c2;--card:#fff;--green:#2d7a4f;--red:#b83232;--display:'Syne',sans-serif;--sans:'Sarabun',sans-serif;--mono:'IBM Plex Mono',monospace;--ease:cubic-bezier(.22,.61,.36,1)}
[data-t="dark"]{--bg:#0a0a0a;--bg2:#141413;--bg3:#1e1e1c;--bg4:#282826;--fg:#f0f0eb;--fg2:#b8b8b2;--fg3:#7a7a75;--fg4:#4a4a46;--border:#252523;--border2:#353532;--card:#141413;--green:#4ade80;--red:#f87171}
html,body{height:100%;background:var(--bg);color:var(--fg);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s}
a{color:inherit;text-decoration:none}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* LOGIN */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;transition:background .4s}
.lcard{width:100%;max-width:360px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:32px 24px;animation:up .4s var(--ease);transition:all .4s}
.lcard-logo{text-align:center;margin-bottom:24px}
.lcard-icon{display:inline-flex;width:44px;height:44px;background:var(--fg);border-radius:10px;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:500;color:var(--bg);margin-bottom:10px;transition:all .4s}
.lcard-t{font-family:var(--display);font-size:18px;font-weight:800;color:var(--fg);letter-spacing:-.03em}
.lcard-s{font-size:13px;color:var(--fg3);margin-top:2px}
.lf{margin-bottom:10px}
.lf label{display:block;font-family:var(--display);font-size:10px;font-weight:700;color:var(--fg4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.lf .iw{position:relative}
.lf input{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;padding:10px 36px 10px 12px;color:var(--fg);font-family:var(--sans);font-size:14px;outline:none;transition:all .3s}
.lf input:focus{border-color:var(--fg)}.lf input::placeholder{color:var(--fg4)}
.eye{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--fg4);cursor:pointer;font-family:var(--mono);font-size:10px;padding:4px}
.lbtn{width:100%;margin-top:6px;padding:11px;background:var(--fg);color:var(--bg);border:none;border-radius:8px;font-family:var(--display);font-size:14px;font-weight:700;cursor:pointer;transition:all .3s}.lbtn:hover{opacity:.8}.lbtn:disabled{opacity:.3}
.lerr{color:var(--red);font-size:12px;text-align:center;margin-top:6px;min-height:16px}
.llinks{text-align:center;margin-top:14px;font-size:12px;color:var(--fg4)}.llinks a{color:var(--fg3);margin:0 6px}

/* APP */
#app{display:none}#app.on{display:block}
.top{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border);transition:all .4s}
.top-logo{width:28px;height:28px;background:var(--fg);border-radius:7px;display:grid;place-items:center;font-family:var(--mono);font-size:10px;font-weight:500;color:var(--bg);flex-shrink:0;transition:all .4s}
.top-t{font-family:var(--display);font-size:14px;font-weight:800;flex:1;color:var(--fg);letter-spacing:-.02em}
.top-clock{font-family:var(--mono);font-size:11px;color:var(--fg4)}
.smb{padding:5px 10px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--fg3);font-family:var(--sans);font-size:11px;font-weight:500;cursor:pointer;transition:all .2s}.smb:hover{background:var(--bg2);color:var(--fg)}

/* GPS STATUS BAR */
#gps-status-bar{
  display:flex;align-items:center;gap:8px;
  padding:6px 16px;font-size:12px;font-weight:500;
  background:var(--bg2);border-bottom:1px solid var(--border);
  transition:all .4s;min-height:32px;
}
.gps-pulse{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;flex-shrink:0}
.gps-pulse.off{background:var(--red);animation:none}

.content{max-width:680px;margin:0 auto;padding:14px}

/* NAV TABS */
.nav-tabs{display:flex;gap:3px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.ntab{padding:6px 12px;border-radius:6px;border:none;background:transparent;color:var(--fg4);font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.ntab:hover{color:var(--fg)}.ntab.on{background:var(--bg3);color:var(--fg)}
.ntab .ct{background:var(--fg);color:var(--bg);border-radius:5px;font-size:9px;font-weight:700;padding:1px 5px;margin-left:3px;transition:all .4s}

/* STATS */
.eng-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
.es{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;transition:all .4s}
.es-v{font-family:var(--display);font-size:24px;font-weight:800;color:var(--fg);letter-spacing:-.03em}.es-l{font-size:10px;color:var(--fg4);margin-top:1px;font-family:var(--display);font-weight:600;text-transform:uppercase;letter-spacing:.06em}

/* JOB CARDS */
.jcard{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:6px;transition:all .25s var(--ease);animation:up .3s var(--ease) both;position:relative;overflow:hidden}
.jcard:hover{border-color:var(--border2)}
@keyframes stampIn{0%{opacity:0;transform:rotate(-12deg) scale(2.5)}60%{opacity:1;transform:rotate(-12deg) scale(0.9)}80%{transform:rotate(-12deg) scale(1.05)}100%{transform:rotate(-12deg) scale(1)}}
.stamp-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-12deg) scale(1);pointer-events:none;z-index:10;animation:stampIn .35s cubic-bezier(.22,.61,.36,1) both;display:flex;align-items:center;justify-content:center}
.stamp-badge{border:4px solid #e67e22;border-radius:8px;padding:6px 16px;color:#e67e22;font-family:var(--display);font-size:22px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;opacity:.85;box-shadow:0 0 0 2px #e67e22;background:rgba(230,126,34,.08);white-space:nowrap}
.jc-top{display:flex;align-items:flex-start;gap:6px;margin-bottom:6px}
.jc-id{font-family:var(--mono);font-size:10px;color:var(--fg4)}
.jc-type{font-family:var(--display);font-size:14px;font-weight:700;color:var(--fg);letter-spacing:-.02em}
.pill{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:var(--bg3);color:var(--fg2);font-family:var(--mono);transition:all .4s}
.jc-meta{font-size:12px;color:var(--fg3);display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
.jc-detail{font-size:13px;color:var(--fg2);line-height:1.5;background:var(--bg2);border-radius:6px;padding:8px 10px;margin-bottom:8px;transition:background .4s}
.jc-btns{display:flex;gap:4px;flex-wrap:wrap}
.jc-b{flex:1;min-width:80px;padding:8px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--fg3);font-family:var(--display);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;position:relative;overflow:hidden;user-select:none}
.jc-b:hover{background:var(--bg2);color:var(--fg)}
.jc-b:active{transform:scale(.94);opacity:.8}
.jc-b.pri{background:var(--fg);color:var(--bg);border-color:var(--fg);box-shadow:0 4px 0 rgba(0,0,0,.25),0 2px 8px rgba(0,0,0,.15)}
.jc-b.pri:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 6px 0 rgba(0,0,0,.2),0 4px 12px rgba(0,0,0,.15)}
.jc-b.pri:active{transform:translateY(3px) scale(.97);box-shadow:0 1px 0 rgba(0,0,0,.2);opacity:1}
@keyframes btnPop{0%{transform:scale(.95)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
.jc-b.pri.popping{animation:btnPop .2s var(--ease)}
.jc-b.danger{color:var(--red);border-color:var(--red)}.jc-b.danger:hover{background:var(--red);color:var(--bg)}

/* TIMER */
.timer-bar{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;transition:all .4s}
.timer-val{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--fg);letter-spacing:.02em}
.timer-label{font-size:11px;color:var(--fg4);flex:1}
.gps-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}

/* EMERGENCY */
.em-search{margin-bottom:12px}
.em-search input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--fg);font-family:var(--sans);font-size:14px;outline:none;transition:all .3s}
.em-search input:focus{border-color:var(--fg)}
.em-search input::placeholder{color:var(--fg4)}
.em-cat{margin-bottom:8px}
.em-cat-h{padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-family:var(--display);font-size:14px;font-weight:700;color:var(--fg);display:flex;align-items:center;justify-content:space-between;transition:all .2s;letter-spacing:-.02em}
.em-cat-h:hover{background:var(--bg2)}
.em-cat-h .arrow{transition:transform .3s var(--ease);font-family:var(--mono);font-size:10px;color:var(--fg4)}
.em-cat.open .arrow{transform:rotate(90deg)}
.em-list{max-height:0;overflow:hidden;transition:max-height .4s var(--ease)}
.em-cat.open .em-list{max-height:1200px}
.em-item{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);transition:all .2s}
.em-item:last-child{border-bottom:none}
.em-item:hover{background:var(--bg2)}
.em-name{flex:1;font-size:13px;color:var(--fg);font-weight:500}
.em-phone{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--fg);text-decoration:none;padding:6px 12px;border:1px solid var(--border);border-radius:6px;transition:all .2s}
.em-phone:hover{background:var(--fg);color:var(--bg);border-color:var(--fg)}

.empty{text-align:center;padding:32px 14px}.empty-t{font-family:var(--display);font-size:15px;font-weight:700;color:var(--fg3)}.empty-d{font-size:12px;color:var(--fg4);margin-top:2px}

/* MODAL */
.mod-bg{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:300;display:none;align-items:center;justify-content:center;padding:16px}.mod-bg.on{display:flex}
[data-t="dark"] .mod-bg.on{background:rgba(0,0,0,.6)}
.mod{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;width:100%;max-width:420px;animation:up .2s var(--ease);max-height:90vh;overflow-y:auto;transition:all .4s}
.mod-t{font-family:var(--display);font-size:16px;font-weight:800;margin-bottom:12px;color:var(--fg);letter-spacing:-.02em}
.fg{margin-bottom:8px}.fg label{font-family:var(--display);font-size:10px;font-weight:700;color:var(--fg4);margin-bottom:3px;display:block;text-transform:uppercase;letter-spacing:.06em}
.fg input,.fg textarea{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:7px;padding:9px 10px;color:var(--fg);font-family:var(--sans);font-size:13px;outline:none;transition:all .3s}
.fg input:focus,.fg textarea:focus{border-color:var(--fg)}.fg input::placeholder,.fg textarea::placeholder{color:var(--fg4)}
.fg textarea{resize:none;min-height:80px;line-height:1.5}
.mod-f{display:flex;gap:5px;margin-top:12px}
.bp{flex:1;padding:10px;background:var(--fg);color:var(--bg);border:none;border-radius:7px;font-family:var(--display);font-size:13px;font-weight:700;cursor:pointer;transition:all .3s}.bp:hover{opacity:.8}
.bo2{flex:1;padding:10px;background:var(--bg2);color:var(--fg);border:1px solid var(--border);border-radius:7px;font-family:var(--sans);font-size:13px;cursor:pointer;transition:all .3s}

/* MY MAP */
#eng-map{height:400px;border-radius:10px;border:1px solid var(--border);overflow:hidden;background:var(--bg2)}

.toast{position:fixed;top:14px;right:14px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:13px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.06);animation:up .2s var(--ease);display:none;color:var(--fg);font-weight:500;transition:all .4s}
</style>
</head>
<body>

<div id="login">
<div class="lcard">
<div class="lcard-logo"><div class="lcard-icon">EN</div><div class="lcard-t">Engineer Portal</div><div class="lcard-s">Technician Access</div></div>
<div class="lf"><label>Username</label><div class="iw"><input id="l-user" placeholder="username"/></div></div>
<div class="lf"><label>Password</label><div class="iw"><input type="password" id="l-pass" placeholder="password"/><button class="eye" onclick="const i=document.getElementById('l-pass');i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'SHOW':'HIDE'">SHOW</button></div></div>
<button class="lbtn" id="btn-login">Login</button>
<div class="lerr" id="l-err"></div>
<div class="llinks"><a href="/">Home</a><a href="/report">Report</a><a href="/admin">Admin</a></div>
</div></div>

<div id="app">
  <!-- TOP BAR -->
  <div class="top">
    <div class="top-logo">EN</div>
    <div class="top-t" id="eng-name">Engineer</div>
    <div class="top-clock" id="clock">--:--:--</div>
    <button class="smb" id="btn-theme" onclick="togTheme()">Dark</button>
    <button class="smb" onclick="doRefresh()">Refresh</button>
    <button class="smb" onclick="logout()">Logout</button>
  </div>

  <!-- GPS STATUS BAR -->
  <div id="gps-status-bar">
    <div class="gps-pulse off" id="gps-dot"></div>
    <span id="gps-text" style="color:var(--fg4)">กำลังหา GPS...</span>
  </div>

  <div class="content">
    <div class="eng-stats" id="eng-stats"></div>
    <div class="nav-tabs" id="nav-tabs"></div>

  </div>
</div>

<div class="mod-bg" id="mod-bg"><div class="mod" id="mod"></div></div>
<div class="toast" id="toast"></div>

<script>
let AUTH=null,tickets=[],tab='active',sse=null,gpsWatch=null,_gpsActive=false;
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function statusLabel(s){return(s||'--').replace(/[⏱️⚙️✅❌]/g,'').trim();}
// ── Auto re-login ──
let _relogging=false;
async function autoRelogin(){
  if(_relogging)return false;
  _relogging=true;
  try{
    const c=JSON.parse(localStorage.getItem('eng_cred')||'null');
    if(!c)return false;
    const d=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(c)}).then(r=>r.json());
    if(!d.ok)return false;
    AUTH={token:d.token,user:d.user};
    localStorage.setItem('eng_auth',JSON.stringify(AUTH));
    return true;
  }catch(_){return false;}
  finally{_relogging=false;}
}

async function api(p,o={}){
  const h={'Content-Type':'application/json',...(o.headers||{})};
  if(AUTH?.token)h['Authorization']='Bearer '+AUTH.token;
  let res=await fetch(p,{...o,headers:h}).catch(e=>null);
  if(!res)return{ok:false,error:'Network error'};
  // ถ้า 401 → re-login อัตโนมัติ แล้วลองใหม่
  if(res.status===401){
    const ok=await autoRelogin();
    if(ok){
      h['Authorization']='Bearer '+AUTH.token;
      res=await fetch(p,{...o,headers:h}).catch(e=>null);
      if(!res)return{ok:false,error:'Network error'};
    }
  }
  return res.json().catch(()=>({ok:false,error:'Invalid response'}));
}

// ═══ EMERGENCY DATA ═══
const EMERG=[
  {cat:'emergency',catTh:'เหตุด่วนเหตุร้าย',catEn:'Emergency',items:[
    {n:'ตำรวจ / Police',p:'191'},{n:'ดับเพลิง / Fire',p:'199'},{n:'รถหาย / Stolen Vehicle',p:'1192'},
    {n:'กองปราบ / Crime Suppression',p:'1195'},{n:'แจ้งคนหาย / Missing Person',p:'1300'},
    {n:'ร่วมด้วยช่วยกัน / Ruam Duay',p:'1677'},{n:'ศูนย์เตือนภัยพิบัติ / Disaster Warning',p:'192'},
    {n:'อุบัติเหตุทางน้ำ / Water Accident',p:'1196'}]},
  {cat:'medical',catTh:'การแพทย์และโรงพยาบาล',catEn:'Medical',items:[
    {n:'แพทย์ฉุกเฉิน / Emergency Medical',p:'1669'},{n:'หน่วยแพทย์ กทม. / BMA Emergency',p:'1646'},
    {n:'วชิรพยาบาล / Vajira Hospital',p:'1554'},{n:'รพ.ตำรวจ / Police Hospital',p:'1691'},
    {n:'กรมสุขภาพจิต / Mental Health',p:'1667'},{n:'ปภ. / DDPM',p:'1784'}]},
  {cat:'utility',catTh:'สาธารณูปโภค',catEn:'Utilities',items:[
    {n:'การไฟฟ้าภูมิภาค / PEA',p:'1129'},{n:'การไฟฟ้านครหลวง / MEA',p:'1130'},
    {n:'ประปานครหลวง / MWA',p:'1125'},{n:'ประปาภูมิภาค / PWA',p:'1162'},
    {n:'ประกันสังคม / Social Security',p:'1506'},{n:'ประกันภัย / Insurance',p:'1186'}]},
  {cat:'travel',catTh:'ระหว่างเดินทาง',catEn:'Travel',items:[
    {n:'ทางพิเศษ / Expressway',p:'1543'},{n:'ตำรวจทางหลวง / Highway Police',p:'1193'},
    {n:'ตำรวจท่องเที่ยว / Tourist Police',p:'1155'},{n:'FM91 Traffic',p:'1644'},
    {n:'การรถไฟ / State Railway',p:'1690'},{n:'กรมทางหลวงชนบท / Rural Roads',p:'1146'},
    {n:'TAC',p:'02-134-4077'}]}
];

// ═══ GPS TRACKING ═══
function startGPSTracking(){
  if(!('geolocation' in navigator)){
    updateGPSBar(false,'GPS ไม่รองรับบนอุปกรณ์นี้');return;
  }
  if(gpsWatch!==null)navigator.geolocation.clearWatch(gpsWatch);

  gpsWatch=navigator.geolocation.watchPosition(
    pos=>{
      _gpsActive=true;
      const {latitude,longitude,accuracy}=pos.coords;
      // ส่ง GPS ไป server
      api('/api/gps',{method:'POST',body:JSON.stringify({
        latitude,longitude,accuracy,
        engineer_name:AUTH.user.name,
        user_id:AUTH.user.id,
        brand:AUTH.user.brand
      })});
      updateGPSBar(true,`${latitude.toFixed(5)}, ${longitude.toFixed(5)}`);
    },
    err=>{
      _gpsActive=false;
      const msgs={1:'ไม่ได้รับอนุญาต GPS',2:'ไม่พบตำแหน่ง',3:'หมดเวลา GPS'};
      updateGPSBar(false,msgs[err.code]||'GPS ไม่พร้อมใช้งาน');
    },
    {enableHighAccuracy:true,maximumAge:30000,timeout:15000}
  );
}

function updateGPSBar(ok,msg){
  const dot=document.getElementById('gps-dot');
  const text=document.getElementById('gps-text');
  const bar=document.getElementById('gps-status-bar');
  if(!dot||!text||!bar)return;
  if(ok){
    dot.className='gps-pulse';
    text.style.color='var(--green)';
    text.textContent='📍 GPS Active — '+msg;
    bar.style.background='rgba(45,122,79,.08)';
    bar.style.borderBottomColor='rgba(45,122,79,.2)';
  }else{
    dot.className='gps-pulse off';
    text.style.color='var(--red)';
    text.textContent='⚠️ '+msg;
    bar.style.background='rgba(184,50,50,.06)';
    bar.style.borderBottomColor='rgba(184,50,50,.15)';
  }
}

function stopGPSTracking(){
  if(gpsWatch!==null){navigator.geolocation.clearWatch(gpsWatch);gpsWatch=null;}
  _gpsActive=false;
  updateGPSBar(false,'GPS หยุดทำงาน');
}

// ═══ AUTH ═══
async function tryAuto(){
  const s=localStorage.getItem('eng_auth');if(!s)return false;
  try{
    const{token}=JSON.parse(s);
    const d=await api('/api/auth/me',{headers:{'Authorization':'Bearer '+token}});
    if(d.ok&&['engineer','lead_engineer','admin','superadmin'].includes(d.user.role)){AUTH={token,user:d.user};return true;}
  }catch(_){}
  localStorage.removeItem('eng_auth');return false;
}

document.getElementById('btn-login').onclick=async()=>{
  const u=document.getElementById('l-user').value.trim(),p=document.getElementById('l-pass').value;
  const err=document.getElementById('l-err'),btn=document.getElementById('btn-login');
  err.textContent='';if(!u||!p){err.textContent='Enter username and password';return;}
  btn.disabled=true;btn.textContent='Connecting...';
  try{
    const d=await api('/api/auth/login',{method:'POST',body:JSON.stringify({username:u,password:p})});
    if(!d.ok)throw new Error(d.error||'Login failed');
    AUTH={token:d.token,user:d.user};
    localStorage.setItem('eng_auth',JSON.stringify(AUTH));
    // เก็บ credentials สำหรับ auto re-login
    localStorage.setItem('eng_cred',JSON.stringify({username:u,password:p}));
    boot();
  }catch(e){err.textContent=e.message;}finally{btn.disabled=false;btn.textContent='Login';}
};

['l-user','l-pass'].forEach(id=>document.getElementById(id).onkeydown=e=>{if(e.key==='Enter')document.getElementById('btn-login').click();});

function logout(){
  stopGPSTracking();
  localStorage.removeItem('eng_st_'+(AUTH?.user?.id||'x'));
  localStorage.removeItem('eng_cred'); // ล้าง credentials ตอน logout ตั้งใจ
  AUTH=null;localStorage.removeItem('eng_auth');location.reload();
}

function togTheme(){
  const d=document.documentElement;
  d.dataset.t=d.dataset.t==='dark'?'':'dark';
  document.getElementById('btn-theme').textContent=d.dataset.t==='dark'?'Light':'Dark';
}
// Default always light — no localStorage persistence

// ═══ BOOT ═══
async function boot(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').classList.add('on');
  document.getElementById('eng-name').textContent=AUTH.user.name;
  document.getElementById('btn-theme').textContent=document.documentElement.dataset.t==='dark'?'Light':'Dark';
  startClock();
  connectSSE();
  await loadTickets();
  startGPSTracking(); // เริ่ม GPS หลัง login ทันที
  render();
}

// ═══ DATA ═══
async function loadTickets(){
  try{
    const d=await api('/api/tickets');
    if(d.ok){
      const my=AUTH.user.name;
      const isLead=['lead_engineer','admin','superadmin'].includes(AUTH.user.role);
      tickets=(d.tickets||[]).filter(t=>isLead||t.engineerName===my||t.assigned_to===my);
    }
  }catch(e){}
}

async function doRefresh(){await loadTickets();render();toast('Refreshed');}

function connectSSE(){
  if(sse)try{sse.close();}catch(_){}
  sse=new EventSource('/api/events');
  sse.addEventListener('ticket_updated',()=>{loadTickets().then(render)});
  sse.addEventListener('ticket_created',()=>{loadTickets().then(render)});
}

function startClock(){
  const t=()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});};
  t();setInterval(t,1000);
}

// ═══ RENDER ═══
function render(){
  const active=tickets.filter(t=>/assigned|accepted|in_progress|ระหว่าง/.test(t.status||''));
  const review=tickets.filter(t=>/review|revision|ตรวจ/.test(t.status||''));
  const done=tickets.filter(t=>/completed|เสร็จ/.test(t.status||''));

  document.getElementById('eng-stats').innerHTML=`
    <div class="es"><div class="es-v">${active.length}</div><div class="es-l">Active</div></div>
    <div class="es"><div class="es-v">${review.length}</div><div class="es-l">Review</div></div>
    <div class="es"><div class="es-v">${done.length}</div><div class="es-l">Done</div></div>`;

  const tabs=[
    {id:'active',lb:'Jobs',ct:active.length},
    {id:'review',lb:'Review',ct:review.length},
    {id:'done',lb:'Done',ct:done.length},
    {id:'emergency',lb:'Emergency',ct:0},
    {id:'map',lb:'My Map',ct:0}
  ];
  document.getElementById('nav-tabs').innerHTML=tabs.map(t=>`
    <button class="ntab${tab===t.id?' on':''}" onclick="tab='${t.id}';render()">
      ${t.lb}${t.ct?`<span class="ct">${t.ct}</span>`:''}
    </button>`).join('');

  const view=document.getElementById('view');
  if(tab==='emergency'){renderEmergency(view);return;}
  if(tab==='map'){renderMyMap(view);return;}

  const list=tab==='active'?active:tab==='review'?review:done;
  if(!list.length){
    view.innerHTML=`<div class="empty"><div class="empty-t">${{active:'No active jobs',review:'No jobs in review',done:'No completed jobs'}[tab]||'Empty'}</div></div>`;
    return;
  }

  view.innerHTML=list.map((t,i)=>{
    const rid=esc(t._recordId);
    const isAssigned=/assigned|มอบหมาย/.test(t.status||'');
    const isAccepted=/accepted|รับงาน/.test(t.status||'');
    const isWorking=/in_progress|ระหว่าง/.test(t.status||'');
    const needStart=isWorking&&!t.workDetail;
    return`<div class="jcard" style="animation-delay:${i*.03}s">
      ${isWorking?`<div class="stamp-overlay"><div class="stamp-badge">⚙️ กำลังทำ</div></div>`:''}
      ${isWorking?`<div class="timer-bar"><div class="gps-dot"></div><div class="timer-label">Working — GPS Tracking Active</div></div>`:''}
      <div class="jc-top">
        <div style="flex:1">
          <div class="jc-id">${esc(t.id||'--')}</div>
          <div class="jc-type">${esc(t.type||'-')}</div>
        </div>
        <span class="pill">${statusLabel(t.status)}</span>
      </div>
      <div class="jc-meta">
        <span>${esc(t.brand||'-')} / ${esc(t.branchCode||'-')}</span>
        <span>${esc(t.reporter||'-')}</span>
        <span>${esc(t.sentDate||'-')}</span>
      </div>
      ${t.detail?`<div class="jc-detail">${esc(t.detail)}</div>`:''}
      ${t.workDetail?`<div class="jc-detail" style="border-left:2px solid var(--fg)"><strong>Report:</strong> ${esc(t.workDetail)}</div>`:''}
      <div class="jc-btns">
        ${isAssigned?`<button class="jc-b pri" onclick="doAccept('${rid}')">✅ รับงาน</button>`:''}
        ${isAccepted?`<button class="jc-b pri" onclick="doStartWork('${rid}')">🚀 เริ่มงาน</button>`:''}
        ${needStart?`<button class="jc-b pri" onclick="doStartWork('${rid}')">🚀 เริ่มงาน</button>`:''}
        ${isWorking?`<button class="jc-b pri" onclick="openSubmit('${rid}')">Complete</button><button class="jc-b" onclick="openUpload('${rid}')">Photo</button>`:''}
        <button class="jc-b" onclick="openDetail('${rid}')">Detail</button>
      </div>
    </div>`;
  }).join('');
}

// ═══ MY MAP ═══
function renderMyMap(el){
  el.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:6px">
      <div style="font-family:var(--display);font-size:14px;font-weight:800;letter-spacing:-.02em">📍 ตำแหน่งของฉัน</div>
      <div style="display:flex;gap:5px">
        <button class="smb" onclick="centerMyMap()">🎯 ตำแหน่งปัจจุบัน</button>
        <button class="smb" onclick="renderMyMap(document.getElementById('view'))">🔄 รีเฟรช</button>
      </div>
    </div>
    <div id="eng-map"></div>
    <div id="eng-map-info" style="margin-top:8px;font-size:12px;color:var(--fg4);text-align:center">
      ${_gpsActive?'GPS กำลังทำงาน — แผนที่จะอัปเดตอัตโนมัติ':'GPS ไม่ได้ใช้งาน — กรุณาเปิด Location'}
    </div>`;
  loadLeaflet(()=>initMyMap());
}

let _myMap=null,_myMarker=null;

function loadLeaflet(cb){
  if(!document.getElementById('leaflet-css')){
    const css=document.createElement('link');
    css.id='leaflet-css';css.rel='stylesheet';
    css.href='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css';
    document.head.appendChild(css);
  }
  if(window.L){cb();return;}
  const js=document.createElement('script');
  js.src='https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js';
  js.onload=cb;
  document.head.appendChild(js);
}

function initMyMap(){
  const mapEl=document.getElementById('eng-map');
  if(!mapEl)return;
  if(_myMap){_myMap.remove();_myMap=null;_myMarker=null;}

  _myMap=L.map('eng-map').setView([13.7563,100.5018],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap',maxZoom:19
  }).addTo(_myMap);

  // ถ้ามี GPS แล้วให้แสดงทันที
  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude,longitude}=pos.coords;
    placeMyMarker(latitude,longitude);
    _myMap.setView([latitude,longitude],15);
    const info=document.getElementById('eng-map-info');
    if(info)info.textContent=`📍 ${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;
  },()=>{
    const info=document.getElementById('eng-map-info');
    if(info)info.textContent='⚠️ ไม่สามารถดึงตำแหน่งได้ กรุณาเปิด Location';
  },{enableHighAccuracy:true,timeout:10000});
}

function placeMyMarker(lat,lng){
  if(!_myMap)return;
  const icon=L.divIcon({
    html:`<div style="background:#2b5ea8;color:#fff;border-radius:50%;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;border:3px solid #fff;box-shadow:0 2px 10px rgba(0,0,0,.4)">${(AUTH?.user?.name||'?').charAt(0).toUpperCase()}</div>`,
    iconSize:[38,38],iconAnchor:[19,19],className:''
  });
  if(_myMarker){_myMarker.setLatLng([lat,lng]);}
  else{_myMarker=L.marker([lat,lng],{icon}).addTo(_myMap).bindPopup(`<b>${AUTH?.user?.name||'ฉัน'}</b><br>${AUTH?.user?.brand||'-'}<br><small>${lat.toFixed(5)}, ${lng.toFixed(5)}</small>`);}
}

function centerMyMap(){
  navigator.geolocation.getCurrentPosition(pos=>{
    const {latitude,longitude}=pos.coords;
    if(_myMap){_myMap.setView([latitude,longitude],16);placeMyMarker(latitude,longitude);}
    const info=document.getElementById('eng-map-info');
    if(info)info.textContent=`📍 ${latitude.toFixed(5)}, ${longitude.toFixed(5)}`;
  },()=>toast('ไม่สามารถดึงตำแหน่งได้'),{enableHighAccuracy:true,timeout:10000});
}

// ═══ EMERGENCY ═══
function renderEmergency(el){
  el.innerHTML=`<div class="em-search"><input placeholder="Search emergency numbers..." oninput="filterEmerg(this.value)"/></div><div id="em-list">${EMERG.map((c,ci)=>`<div class="em-cat" id="em-cat-${ci}"><div class="em-cat-h" onclick="document.getElementById('em-cat-${ci}').classList.toggle('open')">${c.catTh} / ${c.catEn}<span class="arrow">></span></div><div class="em-list">${c.items.map(it=>`<div class="em-item" data-kw="${(it.n+' '+it.p).toLowerCase()}"><div class="em-name">${it.n}</div><a href="tel:${it.p}" class="em-phone">${it.p}</a></div>`).join('')}</div></div>`).join('')}</div>`;
}
function filterEmerg(q){
  q=q.toLowerCase();
  document.querySelectorAll('.em-item').forEach(el=>{el.style.display=el.dataset.kw.includes(q)?'':'none';});
  if(q)document.querySelectorAll('.em-cat').forEach(el=>el.classList.add('open'));
}

// ═══ ACTIONS ═══
async function doAccept(rid){
  try{
    await api(`/api/tickets/${rid}/accept`,{method:'POST'});
    tickets=tickets.map(x=>x._recordId===rid?{...x,status:'accepted'}:x);
    render();toast('Job accepted');
  }catch(e){toast('Error: '+e.message);}
}

// ── GPS Permission Popup ──
function showGPSPermissionPopup(onGranted){
  openMod(`
    <div style="text-align:center;padding:8px 0">
      <div style="font-size:36px;margin-bottom:12px">📍</div>
      <div class="mod-t" style="text-align:center">ต้องการเปิด GPS</div>
      <div style="font-size:13px;color:var(--fg3);line-height:1.6;margin-bottom:16px">
        กรุณาอนุญาตให้เว็บไซต์เข้าถึงตำแหน่งของคุณ<br>
        เพื่อบันทึกตำแหน่งเริ่มงาน
      </div>
      <button class="bp" style="width:100%;margin-bottom:8px" onclick="requestGPSPermission()">
        🔓 อนุญาตให้เข้าถึง GPS
      </button>
      <div style="font-size:11px;color:var(--fg4);line-height:1.7;background:var(--bg2);border-radius:7px;padding:10px;text-align:left;margin-bottom:8px">
        <b>ถ้าปุ่มไม่ขึ้น popup:</b><br>
        iOS: Settings → Safari → Location → Allow<br>
        Android: Settings → Apps → Browser → Permissions → Location
      </div>
      <button class="bo2" style="width:100%" onclick="closeMod()">ยกเลิก</button>
    </div>`);
  window._gpsGrantedCallback=onGranted;
}

function requestGPSPermission(){
  navigator.geolocation.getCurrentPosition(
    pos=>{
      _gpsActive=true;
      updateGPSBar(true,`${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`);
      closeMod();
      if(window._gpsGrantedCallback){window._gpsGrantedCallback();window._gpsGrantedCallback=null;}
    },
    err=>{
      const msgs={1:'กด Allow ในป๊อปอัพของ browser',2:'ไม่พบสัญญาณ GPS',3:'หมดเวลา ลองใหม่อีกครั้ง'};
      document.getElementById('mod').querySelector('.bp').textContent='🔄 ลองอีกครั้ง';
      toast('⚠️ '+(msgs[err.code]||'ไม่สามารถเข้าถึง GPS'));
    },
    {enableHighAccuracy:true,timeout:15000}
  );
}

async function doStartWork(rid){
  // Feature 3: ถ้า GPS ไม่ active → แสดง popup ขอสิทธิ์ก่อน
  if(!_gpsActive){
    showGPSPermissionPopup(()=>doStartWork(rid));
    return;
  }

  try{
    const startedAt=new Date().toISOString();
    const t=tickets.find(x=>x._recordId===rid);

    // Feature 1: บันทึก started_at ลง DB ผ่าน API
    const d=await api(`/api/tickets/${rid}/status`,{method:'PATCH',body:JSON.stringify({
      status:'อยู่ระหว่างดำเนินการ ⚙️',
      brand:t?.brand||'',
      started_at:startedAt
    })});
    if(!d.ok)throw new Error(d.error||'Failed');

    // เก็บ started_at ใน localStorage สำรองไว้ด้วย
    try{
      const saved=JSON.parse(localStorage.getItem('eng_st_'+(AUTH?.user?.id||'x'))||'{}');
      saved[rid]=startedAt;
      localStorage.setItem('eng_st_'+(AUTH?.user?.id||'x'),JSON.stringify(saved));
    }catch(_){}

    // ส่ง GPS พร้อม ticket_id
    navigator.geolocation.getCurrentPosition(pos=>{
      api('/api/gps',{method:'POST',body:JSON.stringify({
        latitude:pos.coords.latitude,longitude:pos.coords.longitude,
        accuracy:pos.coords.accuracy,ticket_id:rid,
        engineer_name:AUTH.user.name,user_id:AUTH.user.id,brand:AUTH.user.brand
      })});
    },()=>{},{enableHighAccuracy:true,timeout:5000});

    tickets=tickets.map(x=>x._recordId===rid?{...x,status:'อยู่ระหว่างดำเนินการ ⚙️',started_at:startedAt}:x);
    render();
    toast('🚀 เริ่มงานแล้ว!');
  }catch(e){toast('Error: '+e.message);}
}

// ═══ MODALS ═══
function openMod(h){document.getElementById('mod').innerHTML=h;document.getElementById('mod-bg').classList.add('on');}
function closeMod(){document.getElementById('mod-bg').classList.remove('on');}
document.getElementById('mod-bg').onclick=e=>{if(e.target.id==='mod-bg')closeMod();};

function openSubmit(rid){
  const t=tickets.find(x=>x._recordId===rid);if(!t)return;

  // Feature 1: คำนวณชั่วโมงจาก started_at ใน ticket (DB) หรือ localStorage สำรอง
  let autoHours='';
  let startedAt=t.started_at||t.startedAt||null;
  if(!startedAt){
    try{
      const saved=JSON.parse(localStorage.getItem('eng_st_'+(AUTH?.user?.id||'x'))||'{}');
      if(saved[rid])startedAt=saved[rid];
    }catch(_){}
  }
  if(startedAt){
    const ms=Date.now()-new Date(startedAt).getTime();
    if(ms>0)autoHours=(ms/3600000).toFixed(2);
  }

  openMod(`<div class="mod-t">Complete Work</div>
    <div style="font-family:var(--mono);font-size:11px;color:var(--fg4);margin-bottom:10px">${esc(t.id)} — ${esc(t.type)}</div>
    <div class="fg"><label>Work Detail *</label><textarea id="m-wd" placeholder="Describe work done...">${esc(t.workDetail||'')}</textarea></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">
      <div class="fg"><label>Parts Used</label><input id="m-pt" value="${esc(t.partsUsed||'')}" placeholder="e.g. LAN cable"/></div>
      <div class="fg"><label>Hours ${autoHours?'⏱️ อัตโนมัติ':''}</label><input id="m-wh" type="number" step="0.01" value="${autoHours||esc(t.workHours||'')}" placeholder="1.5"/></div>
    </div>
    <div class="fg"><label>Photo (camera)</label><input type="file" accept="image/*" capture="camera" id="m-photo"/></div>
    <div id="m-loc" style="font-size:11px;color:var(--fg4);margin-bottom:8px;text-align:center">📍 กำลังดึงตำแหน่งปัจจุบัน...</div>
    <div class="mod-f">
      <button class="bo2" onclick="closeMod()">Cancel</button>
      <button class="bp" onclick="doSubmit('${esc(rid)}')">Submit Work</button>
    </div>`);

  // Feature 2: ดึง GPS ตำแหน่งจบงานทันทีที่เปิด modal
  window._completeLat=null;window._completeLng=null;
  navigator.geolocation.getCurrentPosition(pos=>{
    window._completeLat=pos.coords.latitude;
    window._completeLng=pos.coords.longitude;
    const locEl=document.getElementById('m-loc');
    if(locEl)locEl.innerHTML=`📍 ตำแหน่งจบงาน: ${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`;
  },()=>{
    const locEl=document.getElementById('m-loc');
    if(locEl)locEl.innerHTML='⚠️ ไม่สามารถดึงตำแหน่งได้';
  },{enableHighAccuracy:true,timeout:10000});
}

async function doSubmit(rid){
  const wd=(document.getElementById('m-wd')?.value||'').trim();
  if(!wd){toast('กรุณากรอกรายละเอียดงาน');return;}
  const pt=(document.getElementById('m-pt')?.value||'').trim();
  const wh=(document.getElementById('m-wh')?.value||'').trim();

  // Feature 2: รวม GPS จบงาน
  const payload={
    workDetail:wd,partsUsed:pt,workHours:wh,
    completed_lat:window._completeLat||null,
    completed_lng:window._completeLng||null
  };

  try{
    const d=await api(`/api/tickets/${rid}/engineer-submit`,{method:'PATCH',body:JSON.stringify(payload)});
    if(!d.ok)throw new Error(d.error||'Failed');

    // ล้าง localStorage startTime
    try{
      const saved=JSON.parse(localStorage.getItem('eng_st_'+(AUTH?.user?.id||'x'))||'{}');
      delete saved[rid];
      localStorage.setItem('eng_st_'+(AUTH?.user?.id||'x'),JSON.stringify(saved));
    }catch(_){}

    tickets=tickets.map(x=>x._recordId===rid?{...x,workDetail:wd,partsUsed:pt,workHours:wh,status:'ตรวจงาน '}:x);
    closeMod();render();toast('ส่งงานสำเร็จ ✅');
  }catch(e){toast('Error: '+e.message);}
}

function openUpload(rid){
  openMod(`<div class="mod-t">Upload Photo</div>
    <div class="fg"><label>Camera (live photo)</label><input type="file" accept="image/*" capture="camera"/></div>
    <div class="fg"><label>Additional from gallery</label><input type="file" accept="image/*" multiple/></div>
    <div class="mod-f"><button class="bo2" onclick="closeMod()">Close</button></div>`);
}

function openDetail(rid){
  const t=tickets.find(x=>x._recordId===rid);if(!t)return;
  openMod(`<div class="mod-t">Ticket Detail</div>
    <div style="font-family:var(--mono);font-size:11px;color:var(--fg4);margin-bottom:8px">${esc(t.id)}</div>
    ${[['Type',t.type],['Brand',t.brand],['Branch',t.branchCode],['Reporter',t.reporter],['Phone',t.phone],['Date',t.sentDate],['Location',t.location]]
      .map(([l,v])=>`<div style="display:flex;gap:4px;margin-bottom:2px;font-size:13px"><span style="color:var(--fg4);min-width:60px;font-size:11px;font-weight:600">${l}</span><span style="color:var(--fg);font-weight:500">${esc(v||'-')}</span></div>`).join('')}
    ${t.detail?`<div style="background:var(--bg2);border-radius:6px;padding:8px 10px;font-size:13px;color:var(--fg);margin-top:8px;line-height:1.5">${esc(t.detail)}</div>`:''}
    ${t.adminNote?`<div style="background:var(--bg2);border-radius:6px;padding:8px 10px;font-size:12px;color:var(--fg3);margin-top:5px;border-left:2px solid var(--fg)">Admin: ${esc(t.adminNote)}</div>`:''}
    <div class="mod-f"><button class="bo2" onclick="closeMod()" style="width:100%">Close</button></div>`);
}

let toastT;
function toast(m){
  const el=document.getElementById('toast');
  el.textContent=m;el.style.display='block';el.style.animation='none';
  el.offsetHeight;el.style.animation='';
  clearTimeout(toastT);toastT=setTimeout(()=>el.style.display='none',2500);
}

// ═══ INIT ═══
(async()=>{if(await tryAuto().catch(()=>false))boot();})();
</script>
