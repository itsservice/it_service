<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="theme-color" content="#fafafa"/>
<title>Engineer — IT Support</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fafafa;--bg2:#fff;--bg3:#f2f2f0;--bg4:#e8e8e5;
  --fg:#111;--fg2:#333;--fg3:#888;--fg4:#aaa;
  --border:#e5e5e3;--border2:#d0d0cd;--card:#fff;
  --green:#16a34a;--red:#dc2626;--blue:#2563eb;
  --shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03);
  --shadow2:0 8px 30px rgba(0,0,0,.08);
  --r:14px;--r2:10px;
  --display:'Prompt',sans-serif;--sans:'Prompt',sans-serif;--mono:'Prompt',monospace;
  --ease:cubic-bezier(.22,.61,.36,1);
  --sb-w:240px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
[data-t="dark"]{
  --bg:#0c0c0c;--bg2:#161616;--bg3:#1c1c1a;--bg4:#262624;
  --fg:#eee;--fg2:#bbb;--fg3:#777;--fg4:#555;
  --border:#222;--border2:#333;--card:#161616;
  --green:#4ade80;--red:#f87171;--blue:#60a5fa;
  --shadow:0 1px 3px rgba(0,0,0,.2);--shadow2:0 8px 30px rgba(0,0,0,.3);
}
html,body{height:100%;background:var(--bg);color:var(--fg);font-family:var(--sans);font-size:15px;font-weight:400;-webkit-font-smoothing:antialiased;transition:background .35s,color .35s;overflow:hidden}
a{color:inherit;text-decoration:none}
button{font-family:var(--sans)}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes stampIn{0%{opacity:0;transform:rotate(-8deg) scale(1.4)}60%{opacity:1;transform:rotate(-8deg) scale(.92)}100%{transform:rotate(-8deg) scale(1)}}

/* ═══ LOGIN ═══ */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.lcard{width:100%;max-width:360px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:32px 24px;animation:fadeUp .4s var(--ease);box-shadow:var(--shadow)}
.lcard-logo{text-align:center;margin-bottom:24px}
.lcard-icon{display:inline-flex;width:44px;height:44px;background:var(--fg);border-radius:var(--r2);align-items:center;justify-content:center;font-size:12px;font-weight:600;color:var(--bg);margin-bottom:10px;cursor:pointer;transition:all .3s}
.lcard-icon:active{transform:scale(.85)}
.lcard-t{font-size:18px;font-weight:600;color:var(--fg)}
.lcard-s{font-size:13px;color:var(--fg3);margin-top:2px}
.lf{margin-bottom:10px}
.lf label{display:block;font-size:11px;font-weight:600;color:var(--fg3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.lf .iw{position:relative}
.lf input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r2);padding:12px 36px 12px 14px;color:var(--fg);font-size:15px;outline:none;transition:all .25s}
.lf input:focus{border-color:var(--fg)}.lf input::placeholder{color:var(--fg4);font-weight:300}
.eye{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--fg4);cursor:pointer;font-size:10px;padding:4px}
.lbtn{width:100%;margin-top:6px;padding:13px;background:var(--fg);color:var(--bg);border:none;border-radius:var(--r2);font-size:15px;font-weight:600;cursor:pointer;transition:all .25s}
.lbtn:active{transform:scale(.97)}.lbtn:hover{opacity:.85}.lbtn:disabled{opacity:.3}
.lerr{color:var(--red);font-size:12px;text-align:center;margin-top:6px;min-height:16px}
.llinks{text-align:center;margin-top:14px;font-size:12px;color:var(--fg4)}.llinks a{color:var(--fg3);margin:0 6px}

/* ═══ APP ═══ */
#app{display:none;height:100vh;overflow:hidden}
#app.on{display:flex}

/* ═══ SIDEBAR ═══ */
.sb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:140;display:none;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.sb-overlay.open{display:block}
.sidebar{position:fixed;left:0;top:0;height:100%;width:var(--sb-w);background:var(--card);border-right:1px solid var(--border);z-index:150;display:flex;flex-direction:column;transform:translateX(-100%);transition:transform .32s var(--ease);padding-top:var(--safe-top)}
.sidebar.open{transform:translateX(0)}
.sb-head{padding:16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sb-logo{width:32px;height:32px;background:var(--fg);border-radius:var(--r2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--bg);flex-shrink:0}
.sb-title{font-size:14px;font-weight:600;flex:1}
.sb-close{background:transparent;border:none;color:var(--fg3);cursor:pointer;font-size:16px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:var(--r2);transition:all .2s}
.sb-close:active{background:var(--bg2);color:var(--fg)}
.sb-user{padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-uname{font-size:13px;font-weight:600;color:var(--fg)}
.sb-urole{font-size:11px;color:var(--fg3);margin-top:1px}
.sb-nav{flex:1;padding:8px;overflow-y:auto;scrollbar-width:none}.sb-nav::-webkit-scrollbar{display:none}
.nav-item{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:var(--r2);border:none;background:transparent;color:var(--fg3);font-size:13px;font-weight:500;cursor:pointer;width:100%;text-align:left;transition:all .2s;white-space:nowrap}
.nav-item:active{transform:scale(.97)}
.nav-item:hover{background:var(--bg2);color:var(--fg)}
.nav-item.on{background:var(--bg3);color:var(--fg);font-weight:600}
.nav-item .ni{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.nav-item .nb{margin-left:auto;background:var(--fg);color:var(--bg);border-radius:50px;font-size:9px;font-weight:700;padding:2px 6px;flex-shrink:0}
.sb-foot{padding:10px;border-top:1px solid var(--border);flex-shrink:0;padding-bottom:calc(10px + var(--safe-bottom))}

/* Preview Role */
.pv-drop{position:absolute;bottom:calc(100% + 4px);left:8px;right:8px;background:var(--card);border:1.5px solid var(--border2);border-radius:var(--r);box-shadow:var(--shadow2);padding:8px;display:flex;flex-direction:column;gap:2px;opacity:0;transform:translateY(6px);pointer-events:none;transition:opacity .2s,transform .2s var(--ease);z-index:200;overflow:hidden}
.pv-drop.open{opacity:1;transform:translateY(0);pointer-events:all}
.pv-ropt{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r2);cursor:pointer;font-size:12px;color:var(--fg2);border:none;background:transparent;width:100%;text-align:left;transition:background .15s;font-family:var(--sans)}
.pv-ropt:active{background:var(--bg2)}
.pv-ropt.active{background:var(--fg);color:var(--bg)}
.pv-rdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pv-rbadge{font-size:9px;margin-left:auto;padding:2px 6px;border-radius:50px;font-weight:700}
.rb-super{background:#fef3c7;color:#92400e}.rb-manager{background:#ede9fe;color:#5b21b6}
.rb-admin{background:#dbeafe;color:#1e40af}.rb-lead{background:#d1fae5;color:#065f46}
.rb-eng{background:#e0f2fe;color:#0c4a6e}.rb-guest{background:#f1f5f9;color:#475569}
.pv-confirm{display:flex;align-items:center;gap:6px;padding:8px 8px 2px;border-top:1px solid var(--border);margin-top:4px}
.pv-hint{font-size:11px;color:var(--fg4);flex:1}
.pv-ok{background:var(--fg);border:none;border-radius:var(--r2);padding:6px 11px;color:var(--bg);font-size:11px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:4px}
.pv-ok:hover{opacity:.8}.pv-ok.go{background:var(--green)}
.pv-timer{position:absolute;bottom:0;left:0;height:2px;background:var(--fg);border-radius:2px;width:100%;transition:width linear}
.pv-trigger{display:none;align-items:center;gap:7px;padding:8px 10px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--r2);cursor:pointer;transition:all .2s;user-select:none;margin-bottom:6px}
.pv-trigger.show{display:flex}
.pv-trigger:active{transform:scale(.96)}
.pv-trigger.open{background:var(--fg);border-color:var(--fg)}
.pv-trigger.open .pv-t-icon,.pv-trigger.open .pv-t-label,.pv-trigger.open .pv-t-arrow{color:var(--bg)}
.pv-t-icon{font-size:13px;flex-shrink:0}
.pv-t-label{font-size:11.5px;font-weight:600;color:var(--fg2);flex:1;white-space:nowrap}
.pv-t-role{font-size:10px;background:var(--fg);color:var(--bg);padding:2px 8px;border-radius:50px;font-weight:700;white-space:nowrap}
.pv-trigger.open .pv-t-role{background:var(--bg);color:var(--fg)}
.pv-t-arrow{font-size:10px;color:var(--fg4);transition:transform .25s}
.pv-trigger.open .pv-t-arrow{transform:rotate(180deg)}

/* Preview Overlay */
#pv-overlay{display:none;position:fixed;inset:0;z-index:9999;background:var(--bg);align-items:center;justify-content:center;flex-direction:column;gap:12px;font-family:var(--sans)}
.pvo-line1{font-size:11px;color:var(--fg4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.pvo-slot{width:160px;height:36px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;perspective:200px}
.pvo-box{position:absolute;font-size:20px;font-weight:700;color:var(--fg);transition:all .5s var(--ease)}
.pvo-old{opacity:1;transform:rotateX(0)}.pvo-new{opacity:0;transform:rotateX(90deg)}
.do-flip .pvo-old{opacity:0;transform:rotateX(-90deg)}.do-flip .pvo-new{opacity:1;transform:rotateX(0)}
.pvo-static{font-size:16px;font-weight:600;color:var(--fg3);display:none}
.pvo-dots{display:flex;gap:6px;margin-top:8px}.pvo-dot{width:6px;height:6px;border-radius:50%;background:var(--fg4);animation:pulse 1s infinite}
.pvo-dot:nth-child(2){animation-delay:.2s}.pvo-dot:nth-child(3){animation-delay:.4s}
@keyframes pvOut{to{opacity:0}}

/* ═══ MAIN AREA ═══ */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* Topbar */
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:8px;padding:12px 16px;padding-top:calc(var(--safe-top) + 12px);background:var(--bg);border-bottom:1px solid var(--border);transition:all .35s;flex-shrink:0;backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.btn-hamburger{background:transparent;border:1px solid var(--border);border-radius:var(--r2);color:var(--fg3);font-size:15px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.btn-hamburger:active{transform:scale(.9);background:var(--bg2)}
.top-t{font-size:15px;font-weight:600;flex:1;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-clock{font-size:11px;color:var(--fg4);flex-shrink:0;font-variant-numeric:tabular-nums}
.smb{padding:6px 12px;background:transparent;border:1px solid var(--border);border-radius:var(--r2);color:var(--fg3);font-size:11px;font-weight:500;cursor:pointer;transition:all .25s;flex-shrink:0}
.smb:active{transform:scale(.94)}.smb:hover{background:var(--bg2);color:var(--fg)}

/* GPS Bar */
#gps-status-bar{display:flex;align-items:center;gap:8px;padding:6px 16px;font-size:12px;font-weight:500;background:var(--bg2);border-bottom:1px solid var(--border);transition:all .35s;flex-shrink:0}
.gps-pulse{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;flex-shrink:0}
.gps-pulse.off{background:var(--red);animation:none}
.gps-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;flex-shrink:0}

/* Content */
.content{flex:1;overflow-y:auto;padding:14px;padding-bottom:calc(14px + var(--safe-bottom));-webkit-overflow-scrolling:touch}
.content-inner{max-width:680px;margin:0 auto}

/* Stats */
.eng-stats{padding:12px 14px 0;background:var(--bg)}
.eng-overview{padding:10px 14px 0}
.ov-greeting{font-size:13px;font-weight:600;color:var(--fg2);margin-bottom:2px}
.ov-sub{font-size:11px;color:var(--fg4)}
.stat-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:640px){.stat-grid-4{grid-template-columns:repeat(2,1fr)}}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px 12px;text-align:left;transition:all .35s;position:relative;overflow:hidden;cursor:pointer}
.stat-box:active{transform:scale(.97)}
.stat-box::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:var(--r) var(--r) 0 0}
.stat-box.sb-blue::after{background:#6366f1}.stat-box.sb-amber::after{background:#f59e0b}
.stat-box.sb-green::after{background:#22c55e}.stat-box.sb-dark::after{background:var(--fg)}
.stat-val{font-size:28px;font-weight:700;letter-spacing:-.04em;color:var(--fg);line-height:1}
.stat-lbl{font-size:11px;color:var(--fg3);font-weight:500;margin-top:4px}
.stat-bar{height:3px;background:var(--bg3);border-radius:99px;margin-top:10px;overflow:hidden}
.stat-fill{height:100%;border-radius:99px;transition:width 1.2s var(--ease)}

/* Cards */
.crd{background:var(--card);border:1px solid var(--border);border-radius:var(--r);transition:all .35s;overflow:hidden}
.crd-h{padding:10px 14px;font-size:12px;font-weight:600;color:var(--fg3);border-bottom:1px solid var(--border)}

/* Stats mini */
.es{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);padding:12px;text-align:center;transition:all .35s;cursor:pointer}
.es:active{transform:scale(.95)}.es:hover{border-color:var(--fg4)}
.es-v{font-size:22px;font-weight:700;color:var(--fg);letter-spacing:-.03em}
.es-l{font-size:10px;color:var(--fg4);margin-top:1px;font-weight:500;text-transform:uppercase;letter-spacing:.06em}

/* Tabs */
.tabs{display:flex;gap:3px;padding:8px 14px 0;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{padding:8px 16px;border-radius:50px;border:none;background:transparent;color:var(--fg4);font-size:12px;font-weight:500;cursor:pointer;transition:all .25s;white-space:nowrap;flex-shrink:0}
.tab-btn:active{transform:scale(.95)}
.tab-btn.on{background:var(--bg3);color:var(--fg);font-weight:600;border:1px solid var(--border)}
.tab-panel{display:none}.tab-panel.on{display:block;animation:fadeUp .35s var(--ease)}

/* Job Cards */
.jcard,.job-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:8px;transition:all .25s var(--ease);animation:up .3s var(--ease) both;position:relative;overflow:hidden;cursor:pointer}
.jcard:active,.job-card:active{transform:scale(.98)}
.jcard:hover,.job-card:hover{border-color:var(--fg4)}
.job-card-id{font-size:11px;color:var(--fg4);margin-bottom:2px;letter-spacing:.02em}
.job-card-title{font-size:15px;font-weight:600;color:var(--fg);margin-bottom:6px}
.job-card-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.stamp-overlay{position:absolute;top:10px;right:10px;transform:rotate(-8deg);pointer-events:none;z-index:10;animation:stampIn .3s var(--ease) both}
.stamp-badge{border:2px solid currentColor;border-radius:6px;padding:3px 10px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;opacity:.7;white-space:nowrap}
.stamp-working{color:#e67e22;background:rgba(230,126,34,.07)}
.stamp-review{color:#2b5ea8;background:rgba(43,94,168,.07)}
.stamp-done{color:var(--green);background:rgba(22,163,74,.07)}
.jc-top{display:flex;align-items:flex-start;gap:6px;margin-bottom:6px}
.jc-id{font-size:11px;color:var(--fg4)}
.jc-type{font-size:15px;font-weight:600;color:var(--fg)}
.pill{display:inline-flex;padding:3px 10px;border-radius:50px;font-size:10px;font-weight:600;background:var(--bg3);color:var(--fg2)}
.jc-meta{display:flex;gap:8px;flex-wrap:wrap;font-size:12px;color:var(--fg3);margin-bottom:4px}
.jc-detail{font-size:13px;color:var(--fg3);line-height:1.5;margin-top:6px;padding:8px 10px;background:var(--bg);border-radius:var(--r2);border-left:3px solid var(--border2)}
.jc-btns{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
.jc-b{padding:8px 14px;border-radius:var(--r2);border:1px solid var(--border);background:var(--card);color:var(--fg);font-size:12px;font-weight:600;cursor:pointer;transition:all .25s}
.jc-b:active{transform:scale(.93)}.jc-b:hover{background:var(--bg2)}
.jc-b.pri{background:var(--fg);color:var(--bg);border-color:var(--fg)}
.jc-b.pri:hover{opacity:.85}

/* Timer bar */
.timer-bar{display:flex;align-items:center;gap:8px;padding:6px 10px;background:rgba(22,163,74,.08);border-radius:var(--r2);margin-bottom:8px;font-size:12px;font-weight:600;color:var(--green)}
[data-t="dark"] .timer-bar{background:rgba(74,222,128,.08)}
.timer-val{margin-left:auto;font-variant-numeric:tabular-nums}
.timer-label{flex:1}

/* Modal */
.mod-bg{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.4);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
.mod-bg.on{opacity:1;pointer-events:all}
.mod{background:var(--card);border-radius:var(--r) var(--r) 0 0;max-height:90vh;overflow-y:auto;width:100%;max-width:500px;padding:20px;animation:up .3s var(--ease);box-shadow:var(--shadow2)}
@media(min-width:641px){.mod{border-radius:var(--r);margin-bottom:10vh}}
.mod-t{font-size:16px;font-weight:600;color:var(--fg);margin-bottom:12px}
.mod-f{display:flex;gap:6px;margin-top:12px}
.bp{flex:1;padding:12px;background:var(--fg);color:var(--bg);border:none;border-radius:var(--r2);font-size:14px;font-weight:600;cursor:pointer;transition:all .25s}
.bp:active{transform:scale(.97)}.bp:hover{opacity:.85}
.bo2{flex:1;padding:12px;background:var(--bg2);color:var(--fg);border:1px solid var(--border);border-radius:var(--r2);font-size:14px;font-weight:600;cursor:pointer;transition:all .25s}
.bo2:active{transform:scale(.97)}
.fg{margin-bottom:10px}
.fg label{display:block;font-size:11px;font-weight:600;color:var(--fg3);letter-spacing:.04em;text-transform:uppercase;margin-bottom:4px}
.fg input,.fg textarea,.fg select{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r2);padding:12px 14px;color:var(--fg);font-size:15px;outline:none;transition:all .25s;font-family:var(--sans)}
.fg input:focus,.fg textarea:focus{border-color:var(--fg)}
.fg textarea{resize:none;min-height:80px;line-height:1.6}

/* Empty */
.empty{text-align:center;padding:40px 20px;color:var(--fg4)}
.empty-t{font-size:14px;font-weight:500}

/* Emergency */
.em-search{margin-bottom:12px}
.em-search input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r2);padding:12px 14px;color:var(--fg);font-size:15px;outline:none;transition:all .25s}
.em-search input:focus{border-color:var(--fg)}.em-search input::placeholder{color:var(--fg4);font-weight:300}
.em-cat{background:var(--card);border:1px solid var(--border);border-radius:var(--r2);margin-bottom:6px;overflow:hidden}
.em-cat-h{padding:12px 14px;cursor:pointer;display:flex;justify-content:space-between;font-size:14px;font-weight:500;user-select:none}
.em-cat-h:active{background:var(--bg2)}
.em-cat-h .arrow{color:var(--fg4);transition:transform .25s}
.em-cat.open .arrow{transform:rotate(90deg)}
.em-list{max-height:0;overflow:hidden;transition:max-height .35s var(--ease)}
.em-cat.open .em-list{max-height:800px}
.em-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-top:1px solid var(--border)}
.em-name{font-size:13px;color:var(--fg);flex:1}
.em-phone{font-size:14px;font-weight:600;color:var(--blue);padding:6px 12px;border-radius:var(--r2);background:var(--bg);border:1px solid var(--border);transition:all .2s}
.em-phone:active{transform:scale(.95)}

/* Toggle */

/* ═══ AUTO RE-LOGIN ══════════════════════════════════════════ */
let _relogging=false;
async function autoRelogin(){
  if(_relogging)return false;_relogging=true;
  try{
    const c=JSON.parse(localStorage.getItem('eng_cred')||'null');
    if(!c)return false;
    const d=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(c)}).then(r=>r.json());
    if(!d.ok)return false;
    AUTH={token:d.token,user:d.user};localStorage.setItem('eng_auth',JSON.stringify(AUTH));return true;
  }catch(_){return false;}finally{_relogging=false;}
}

async function api(p,o={}){
  const h={'Content-Type':'application/json',...(o.headers||{})};
  if(AUTH?.token)h['Authorization']='Bearer '+AUTH.token;
  let res=await fetch(p,{...o,headers:h}).catch(()=>null);
  if(!res)return{ok:false,error:'Network error'};
  if(res.status===401){
    const ok=await autoRelogin();
    if(ok){h['Authorization']='Bearer '+AUTH.token;res=await fetch(p,{...o,headers:h}).catch(()=>null);if(!res)return{ok:false,error:'Network error'};}
  }
  return res.json().catch(()=>({ok:false,error:'Invalid response'}));
}

/* ═══ GPS TRACKING ═══════════════════════════════════════════ */
function startGPSTracking(){
  if(!('geolocation' in navigator)){updateGPSBar(false,'GPS ไม่รองรับบนอุปกรณ์นี้');return;}
  if(gpsWatch!==null)navigator.geolocation.clearWatch(gpsWatch);
  gpsWatch=navigator.geolocation.watchPosition(
    pos=>{
      _gpsActive=true;const{latitude,longitude,accuracy}=pos.coords;
      api('/api/gps',{method:'POST',body:JSON.stringify({latitude,longitude,accuracy,engineer_name:AUTH.user.name,user_id:AUTH.user.id,brand:AUTH.user.brand})});
      updateGPSBar(true,`${latitude.toFixed(5)}, ${longitude.toFixed(5)}`);
    },
    err=>{_gpsActive=false;const msgs={1:'ไม่ได้รับอนุญาต GPS',2:'ไม่พบตำแหน่ง',3:'หมดเวลา GPS'};updateGPSBar(false,msgs[err.code]||'GPS ไม่พร้อมใช้งาน');},
    {enableHighAccuracy:true,maximumAge:30000,timeout:15000}
  );
}
function updateGPSBar(ok,msg){
  const dot=document.getElementById('gps-dot'),text=document.getElementById('gps-text'),bar=document.getElementById('gps-status-bar');
  if(!dot||!text||!bar)return;
  if(ok){dot.className='gps-pulse';text.style.color='var(--green)';text.textContent='📍 GPS Active — '+msg;bar.style.background='rgba(45,122,79,.08)';bar.style.borderBottomColor='rgba(45,122,79,.2)';}
  else{dot.className='gps-pulse off';text.style.color='var(--red)';text.textContent='⚠️ '+msg;bar.style.background='rgba(184,50,50,.06)';bar.style.borderBottomColor='rgba(184,50,50,.15)';}
}
function stopGPSTracking(){if(gpsWatch!==null){navigator.geolocation.clearWatch(gpsWatch);gpsWatch=null;}_gpsActive=false;updateGPSBar(false,'GPS หยุดทำงาน');}

/* ═══ AUTH ═══════════════════════════════════════════════════ */
async function tryAuto(){
  const s=localStorage.getItem('eng_auth');if(!s)return false;
  try{
    const{token}=JSON.parse(s);
    const d=await api('/api/auth/me',{headers:{'Authorization':'Bearer '+token}});
    if(d.ok&&['engineer','lead_engineer','admin','superadmin','manager','guest'].includes(d.user.role)){AUTH={token,user:d.user};return true;}
  }catch(_){}
  localStorage.removeItem('eng_auth');return false;
}

document.getElementById('btn-login').onclick=async()=>{
  const u=document.getElementById('l-user').value.trim(),p=document.getElementById('l-pass').value;
  const err=document.getElementById('l-err'),btn=document.getElementById('btn-login');
  err.textContent='';if(!u||!p){err.textContent='Enter username and password';return;}
  btn.disabled=true;btn.textContent='Connecting...';
  try{
    const d=await api('/api/auth/login',{method:'POST',body:JSON.stringify({username:u,password:p})});
    if(!d.ok)throw new Error(d.error||'Login failed');
    AUTH={token:d.token,user:d.user};
    localStorage.setItem('eng_auth',JSON.stringify(AUTH));
    localStorage.setItem('eng_cred',JSON.stringify({username:u,password:p}));
    boot();
  }catch(e){err.textContent=e.message;}finally{btn.disabled=false;btn.textContent='Login';}
};
['l-user','l-pass'].forEach(id=>document.getElementById(id).onkeydown=e=>{if(e.key==='Enter')document.getElementById('btn-login').click();});

function logout(){
  stopGPSTracking();
  localStorage.removeItem('eng_st_'+(AUTH?.user?.id||'x'));
  localStorage.removeItem('eng_cred');
  AUTH=null;localStorage.removeItem('eng_auth');location.reload();
}

/* ═══ BOOT ═══════════════════════════════════════════════════ */
async function boot(){
  document.getElementById('login').style.display='none';
  document.getElementById('app').classList.add('on');
  const u=AUTH.user;
  document.getElementById('sb-name').textContent=u.name;
  document.getElementById('sb-role').textContent=({'superadmin':'Super Admin','manager':'Manager','admin':'Admin','lead_engineer':'Lead Engineer','engineer':'ช่าง IT','guest':'Guest (Demo)'})[u.role]||u.role;
  startClock();connectSSE();
  await loadTickets();
  render();startGPSTracking();initPreviewRole();
}

/* ═══ DATA ════════════════════════════════════════════════════ */
async function loadTickets(){
  try{
    const d=await api('/api/tickets');
    if(d.ok){
      const my=AUTH.user.name,role=AUTH.user.role;
      const canSeeAll=['lead_engineer','admin','superadmin','manager','guest'].includes(role);
      tickets=(d.tickets||[]).filter(t=>canSeeAll||t.engineerName===my||t.assignedTo===my||t.assigned_to===my);
    }
  }catch(e){}
}
async function doRefresh(){await loadTickets();render();toast('Refreshed');}
function connectSSE(){
  if(sse)try{sse.close();}catch(_){}
  sse=new EventSource('/api/events');
  sse.addEventListener('ticket_updated',()=>{loadTickets().then(render)});
  sse.addEventListener('ticket_created',()=>{loadTickets().then(render)});
}
function startClock(){
  const t=()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});};
  t();setInterval(t,1000);
}
function startWorkTimers(){
  if(window._workTimerInterval)clearInterval(window._workTimerInterval);
  window._workTimerInterval=setInterval(()=>{
    tickets.filter(x=>/ระหว่าง/.test(x.status||'')).forEach(t=>{
      const el=document.getElementById('timer-'+t._recordId);if(!el)return;
      let sa=t.started_at||t.startedAt||null;
      if(!sa){try{const sv=JSON.parse(localStorage.getItem('eng_st_'+(AUTH?.user?.id||'x'))||'{}');if(sv[t._recordId])sa=sv[t._recordId];}catch(_){}}
      if(!sa)return;
      const ms=Date.now()-new Date(sa).getTime();if(ms<0)return;
      const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);
      el.textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    });
  },1000);
}

/* ═══ RENDER ══════════════════════════════════════════════════ */
function render(){
  const isGuest=AUTH?.user?.role==='guest';
  const active=tickets.filter(t=>/assigned|accepted|in_progress|ระหว่าง/.test(t.status||''));
  const review=tickets.filter(t=>/review|revision|ตรวจ/.test(t.status||''));
  const done=tickets.filter(t=>/completed|เสร็จ/.test(t.status||''));

  document.getElementById('eng-stats').innerHTML=`
    <div class="es" onclick="switchTab('active')"><div class="es-v">${active.length}</div><div class="es-l">Active</div></div>
    <div class="es" onclick="switchTab('review')"><div class="es-v">${review.length}</div><div class="es-l">Review</div></div>
    <div class="es" onclick="switchTab('done')"><div class="es-v">${done.length}</div><div class="es-l">Done</div></div>`;

  updateSidebarNav();

  const view=document.getElementById('view');
  if(tab==='emergency'){renderEmergency(view);return;}

  const list=tab==='active'?active:tab==='review'?review:done;
  if(!list.length){
    view.innerHTML=`<div class="empty"><div class="empty-t">${{active:'ยังไม่มีงานมอบหมาย',review:'ไม่มีงานรอตรวจ',done:'ยังไม่มีงานเสร็จสิ้น'}[tab]||'Empty'}</div></div>`;
    return;
  }

  view.innerHTML=list.map((t,i)=>{
    const rid=esc(t._recordId);
    const isAssigned=/assigned|มอบหมาย/.test(t.status||'');
    const isAccepted=/accepted|รับงาน/.test(t.status||'');
    const isWorking=/in_progress|ระหว่าง/.test(t.status||'');
    const isReview=/ตรวจ|review/.test(t.status||'');
    const isDone=/เสร็จ|completed/.test(t.status||'');
    let sa=t.started_at||t.startedAt||null;
    if(!sa){try{const sv=JSON.parse(localStorage.getItem('eng_st_'+(AUTH?.user?.id||'x'))||'{}');if(sv[t._recordId])sa=sv[t._recordId];}catch(_){}}
    const hasStarted=isWorking&&!!sa;
    let stamp='';
    if(hasStarted)stamp=`<div class="stamp-overlay"><div class="stamp-badge stamp-working">IN PROGRESS</div></div>`;
    else if(isReview)stamp=`<div class="stamp-overlay"><div class="stamp-badge stamp-review">REVIEW</div></div>`;
    else if(isDone)stamp=`<div class="stamp-overlay"><div class="stamp-badge stamp-done">COMPLETE</div></div>`;

    return`<div class="jcard" style="animation-delay:${i*.03}s">
      ${stamp}
      ${hasStarted?`<div class="timer-bar"><div class="gps-dot"></div><div class="timer-label">กำลังทำงาน</div><div class="timer-val" id="timer-${esc(t._recordId)}">00:00:00</div></div>`:''}
      <div class="jc-top">
        <div style="flex:1"><div class="jc-id">${esc(t.id||'--')}</div><div class="jc-type">${esc(t.type||'-')}</div></div>
        <span class="pill">${statusLabel(t.status)}</span>
      </div>
      <div class="jc-meta">
        <span>${esc(t.brand||'-')} / ${esc(t.branchCode||'-')}</span>
        <span>${esc(t.reporter||'-')}</span>
        <span>${esc(t.sentDate||'-')}</span>
      </div>
      ${t.detail?`<div class="jc-detail">${esc(t.detail)}</div>`:''}
      ${t.workDetail?`<div class="jc-detail" style="border-left:2px solid var(--fg)"><strong>Report:</strong> ${esc(t.workDetail)}</div>`:''}
      <div class="jc-btns">
        ${isGuest?`<button class="jc-b" style="opacity:.4;cursor:not-allowed" title="Demo mode">🔒 รับงาน</button><button class="jc-b" style="opacity:.4;cursor:not-allowed" title="Demo mode">🔒 เริ่มงาน</button><button class="jc-b" onclick="openDetail('${rid}')">Detail</button>`
        :`${isAssigned?`<button class="jc-b pri" onclick="doAccept('${rid}')">✅ รับงาน</button>`:''}
          ${isAccepted?`<button class="jc-b pri" onclick="doStartWork('${rid}')">🚀 เริ่มงาน</button>`:''}
          ${isWorking&&!hasStarted?`<button class="jc-b pri" onclick="doStartWork('${rid}')">🚀 เริ่มงาน</button>`:''}
          ${hasStarted?`<button class="jc-b" style="opacity:.6;cursor:default">⏱️ กำลังทำอยู่</button><button class="jc-b pri" onclick="openSubmit('${rid}')">✅ Complete</button><button class="jc-b" onclick="openUpload('${rid}')">📷 Photo</button>`:''}
          <button class="jc-b" onclick="openDetail('${rid}')">Detail</button>`}
      </div>
    </div>`;
  }).join('');
  startWorkTimers();
}

async function doAccept(rid){

function requestGPSPermission(){
  navigator.geolocation.getCurrentPosition(
    pos=>{_gpsActive=true;updateGPSBar(true,`${pos.coords.latitude.toFixed(5)}, ${pos.coords.longitude.toFixed(5)}`);closeMod();if(window._gpsGrantedCallback){window._gpsGrantedCallback();window._gpsGrantedCallback=null;}},
    err=>{const msgs={1:'กด Allow ในป๊อปอัพของ browser',2:'ไม่พบสัญญาณ GPS',3:'หมดเวลา ลองใหม่อีกครั้ง'};document.getElementById('mod').querySelector('.bp').textContent='🔄 ลองอีกครั้ง';toast('⚠️ '+(msgs[err.code]||'ไม่สามารถเข้าถึง GPS'));},
    {enableHighAccuracy:true,timeout:15000}

async function doStartWork(rid){
  if(!_gpsActive){showGPSPermissionPopup(()=>doStartWork(rid));return;}
  try{
    const startedAt=new Date().toISOString();
    const t=tickets.find(x=>x._recordId===rid);
    const d=await api(`/api/tickets/${rid}/status`,{method:'PATCH',body:JSON.stringify({status:'อยู่ระหว่างดำเนินการ ⚙️',brand:t?.brand||'',started_at:startedAt})});
    if(!d.ok)throw new Error(d.error||'Failed');
    try{const sv=JSON.parse(localStorage.getItem('eng_st_'+(AUTH?.user?.id||'x'))||'{}');sv[rid]=startedAt;localStorage.setItem('eng_st_'+(AUTH?.user?.id||'x'),JSON.stringify(sv));}catch(_){}
    navigator.geolocation.getCurrentPosition(pos=>{api('/api/gps',{method:'POST',body:JSON.stringify({latitude:pos.coords.latitude,longitude:pos.coords.longitude,accuracy:pos.coords.accuracy,ticket_id:rid,engineer_name:AUTH.user.name,user_id:AUTH.user.id,brand:AUTH.user.brand})});},()=>{},{enableHighAccuracy:true,timeout:5000});
    await loadTickets();render();toast('🚀 เริ่มงานแล้ว!');
  }catch(e){toast('Error: '+e.message);}
}

function addEngPhoto(input){
  if(!window._engPhotos) window._engPhotos=[];

  files.slice(0,remaining).forEach(file=>{

  });

async function doSubmit(rid){
  const wd=(document.getElementById('m-wd')?.value||'').trim();
  if(!wd){toast('กรุณากรอกรายละเอียดงาน');return;}
  const pt=(document.getElementById('m-pt')?.value||'').trim();
  const wh=(document.getElementById('m-wh')?.value||'').trim();
  try{
    // Upload photos first
    const uploadedUrls=[];
    for(const p of (window._engPhotos||[])){
      const fd=new FormData();
      fd.append('file',p.file);
      fd.append('ticket_id',rid);
      const up=await fetch('/api/upload',{method:'POST',headers:{'Authorization':'Bearer '+(AUTH?.token||'')},body:fd});
      const uj=await up.json();
      if(uj.url) uploadedUrls.push(uj.url);
    }
    const d=await api(`/api/tickets/${rid}/engineer-submit`,{method:'PATCH',body:JSON.stringify({workDetail:wd,partsUsed:pt,workHours:wh,completed_lat:window._completeLat||null,completed_lng:window._completeLng||null,images:uploadedUrls.length?JSON.stringify(uploadedUrls):undefined})});
    if(!d.ok)throw new Error(d.error||'Failed');
    try{const sv=JSON.parse(localStorage.getItem('eng_st_'+(AUTH?.user?.id||'x'))||'{}');delete sv[rid];localStorage.setItem('eng_st_'+(AUTH?.user?.id||'x'),JSON.stringify(sv));}catch(_){}
    tickets=tickets.map(x=>x._recordId===rid?{...x,workDetail:wd,partsUsed:pt,workHours:wh,status:'ตรวจงาน '}:x);
    window._engPhotos=[];
    closeMod();render();toast('ส่งงานสำเร็จ ✅');
  }catch(e){toast('Error: '+e.message);}
}

/* ═══ PREVIEW ROLE ═══════════════════════════════════════════ */
let pvOpen=false,pvPendRole='',pvPendPage='',pvTimer=null,pvCurRole='',pvCurPage='Engineer';

function initPreviewRole(){
  pvCurRole=AUTH?.user?.role||'';
  if(pvCurRole==='superadmin'){
    const trig=document.getElementById('pv-trigger');

function pvToggle(){
  pvOpen=!pvOpen;

function pvClose(){
  pvOpen=false;
  document.getElementById('pv-drop').classList.remove('open');
  document.getElementById('pv-trigger').classList.remove('open');

function pvStartTimer(){
  pvClearTimer();

}
function pvClearTimer(){
  if(pvTimer){clearTimeout(pvTimer);pvTimer=null;}
  const bar=document.getElementById('pv-timer');bar.style.transition='none';bar.style.width='100%';

function pvPickRole(el,role,page){
  document.querySelectorAll('.pv-ropt').forEach(b=>b.classList.remove('active'));

function pvConfirm(){
  const btn=document.getElementById('pv-ok-btn');

  setTimeout(()=>{
    btn.classList.remove('go');btn.textContent='🔏 ยืนยัน';

      document.querySelectorAll('.pv-ropt').forEach(b=>b.classList.toggle('active',b.textContent.trim().startsWith(pvCurRole)));
      if(['superadmin','manager','admin','guest'].includes(pvPendRole)&&pvPendPage==='Admin')window.location.href='/admin';
    });
  },800);
}
function pvShowLoading(fr,tr,fp,tp,cb){
  const ov=document.getElementById('pv-overlay');
  const slR=document.getElementById('pvo-sl-role'),slP=document.getElementById('pvo-sl-page'),pSt=document.getElementById('pvo-p-static');
  const rc=fr!==tr,pc=fp!==tp;
  document.getElementById('pvo-r-old').textContent=fr;document.getElementById('pvo-r-new').textContent=tr;
  document.getElementById('pvo-p-old').textContent=fp+' Portal';document.getElementById('pvo-p-new').textContent=tp+' Portal';
  pSt.textContent=fp+' Portal';
  slR.classList.remove('do-flip');slP.classList.remove('do-flip');
  ['pvo-r-old','pvo-r-new','pvo-p-old','pvo-p-new'].forEach(id=>{const el=document.getElementById(id);el.style.animation='none';el.offsetHeight;el.style.animation='';});
  ['pvo-r-old','pvo-p-old'].forEach(id=>{const el=document.getElementById(id);el.style.opacity='1';el.style.transform='rotateX(0)';});
  ['pvo-r-new','pvo-p-new'].forEach(id=>{const el=document.getElementById(id);el.style.opacity='0';el.style.transform='rotateX(90deg)';});
  slR.style.display='flex';slP.style.display=pc?'flex':'none';pSt.style.display=pc?'none':'block';
  ov.style.animation='';ov.style.opacity='1';ov.style.display='flex';
  if(rc)setTimeout(()=>slR.classList.add('do-flip'),700);
  if(pc)setTimeout(()=>slP.classList.add('do-flip'),rc?1200:700);
  const total=(pc&&rc)?2800:2200;
  setTimeout(()=>{ov.style.animation='pvOut .45s ease forwards';setTimeout(()=>{ov.style.display='none';ov.style.animation='';if(cb)cb();},450);},total);
}

const BRAND_COLORS_E={'Dunkin\'':'#FF6B00','Greyhound Cafe\'':'#2D6A4F','Greyhound Original':'#1B4332','Au Bon Pain':'#C8A96E','Funky Fries':'#FFD600','Another Hound Cafe\'':'#8B4513','Bean Hound':'#52B788'};
function brandColorE(n){return BRAND_COLORS_E[n]||'#888';}
let engTab = 'dashboard';
function switchEngTab(t){
  engTab = t; tab = t;
  // Mobile: toggle tab-btn highlight
  document.querySelectorAll('#eng-tabs .tab-btn').forEach(b=>b.classList.toggle('on', b.dataset.tab===t));
  // Show/hide tab panels
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('on'));
  document.getElementById('tab-'+t)?.classList.add('on');
  // Desktop: update sidebar nav highlight
  document.querySelectorAll('#sb-nav .nav-item').forEach(b=>{
    b.classList.toggle('on', b.getAttribute('onclick')?.includes("'"+t+"'"));
  });
  // Update topbar title
  const titles={active:'งานของฉัน',review:'ตรวจงาน',done:'งานเสร็จ',history:'ประวัติ',settings:'ตั้งค่า',emergency:'ฉุกเฉิน'};
  const el=document.getElementById('top-title');
  if(el&&titles[t])el.textContent=titles[t];
  closeSidebar();
  renderEngTab();
}

function renderEngTab(){

  const active = tickets.filter(t=>/อยู่ระหว่างดำเนินการ|in_progress|assigned|accepted|ระหว่าง/.test(t.status||''));
  const review = tickets.filter(t=>/ตรวจงาน|review/.test(t.status||''));
  const done   = tickets.filter(t=>/เสร็จสิ้น|completed/.test(t.status||''));
  const total  = tickets.length;

  // ── Stats removed from here → now in renderEngDashboard tab ──
  const mx = Math.max(total,1);
  const engName = AUTH?.user?.name||AUTH?.user?.username||'Engineer';
  const now = new Date();
  const dateStr = now.toLocaleDateString('th-TH',{weekday:'short',day:'numeric',month:'short'});
  // Brand breakdown from my tickets
  const myBrands={};tickets.forEach(t=>{const b=t.brand||'Other';myBrands[b]=(myBrands[b]||0)+1;});

    <div class="ov-sub">${dateStr}</div>

  <div style="padding:0 14px 10px">
    <div class="stat-grid-4" style="margin-bottom:12px">
      <div class="stat-box sb-blue" style="animation:up .3s var(--ease) .05s both">

        <div class="stat-val">${review.length}</div>
        <div class="stat-bar"><div class="stat-fill" style="background:#f59e0b;width:${Math.min(review.length/mx*100,100)}%"></div></div>
      </div>
      <div class="stat-box sb-green" style="animation:up .3s var(--ease) .1s both">
        <div class="stat-lbl" style="margin-top:0;margin-bottom:6px">✅ ${isEngLangEN?'Done':'เสร็จแล้ว'}</div>
        <div class="stat-val">${done.length}</div>
        <div class="stat-bar"><div class="stat-fill" style="background:#22c55e;width:${Math.min(done.length/mx*100,100)}%"></div></div>
      </div>
      <div class="stat-box sb-dark" style="animation:up .3s var(--ease) .15s both">
        <div class="stat-lbl" style="margin-top:0;margin-bottom:6px">📋 ${isEngLangEN?'Total':'ทั้งหมด'}</div>

function renderEngJobList(containerId, list, isActive){
  const isGuest = AUTH?.user?.role==='guest';
  const el = document.getElementById(containerId);
  if(!list.length){
    el.innerHTML = `<div class="empty"><div class="empty-t">${isActive?'ยังไม่มีงานที่รับ':'ยังไม่มีงานเสร็จ'}</div></div>`;
    return;
  }
  // skeleton first
  el.innerHTML = '<div>' + Array(Math.min(list.length,3)).fill(0).map(()=>`
    <div class="sk-card"><div class="sk-row"><div class="sk sk-circle"></div><div class="sk-block">
      <div class="sk sk-line" style="width:60%"></div><div class="sk sk-line" style="width:40%;height:10px"></div>
    </div></div><div class="sk sk-line" style="width:80%"></div></div>`).join('') + '</div>';

  setTimeout(()=>{
    el.innerHTML = list.map((t,i)=>{
      const rid = esc(t._recordId);
      const isAssigned = /assigned|มอบหมาย/.test(t.status||'');
      const isAccepted = /accepted|รับงาน/.test(t.status||'');
      const isWorking  = /in_progress|ระหว่าง/.test(t.status||'');
      const isReview   = /ตรวจ|review/.test(t.status||'');
      const isDone     = /เสร็จ|completed/.test(t.status||'');
      let sa = t.started_at||t.startedAt||null;
      if(!sa){try{const sv=JSON.parse(localStorage.getItem('eng_st_'+(AUTH?.user?.id||'x'))||'{}');if(sv[t._recordId])sa=sv[t._recordId];}catch(_){}}
      const hasStarted = isWorking&&!!sa;
      let stamp='';
      if(hasStarted) stamp=`<div class="stamp-overlay"><div class="stamp-badge stamp-working">IN PROGRESS</div></div>`;
      else if(isReview) stamp=`<div class="stamp-overlay"><div class="stamp-badge stamp-review">REVIEW</div></div>`;
      else if(isDone)   stamp=`<div class="stamp-overlay"><div class="stamp-badge stamp-done">COMPLETE</div></div>`;

      return `<div class="job-card" style="animation:up .3s var(--ease) ${i*.04}s both" onclick="openDetail('${rid}')">
        ${stamp}
        ${hasStarted?`<div class="timer-bar"><div class="gps-dot"></div><div class="timer-label">กำลังทำงาน</div><div class="timer-val" id="timer-${esc(t._recordId)}">00:00:00</div></div>`:''}
        <div class="job-card-id">${esc(t.id||t.ticket_id||'--')} · ${esc(t.brand||'')}</div>
        <div class="job-card-title">${esc(t.type||t.category||'-')}</div>
        <div class="job-card-meta">
          <span class="pill">${statusLabel(t.status)}</span>
          <span style="font-size:11px;color:var(--fg4)">${esc(t.branchCode||'')} · ${esc(t.sentDate||'')}</span>
        </div>
        ${t.detail?`<div style="font-size:12px;color:var(--fg3);margin-top:6px;line-height:1.5">${esc(t.detail.substring(0,80))}${t.detail.length>80?'…':''}</div>`:''}
        <div class="jc-btns" style="margin-top:8px">
          ${isGuest
            ? `<button class="jc-b" style="opacity:.4;cursor:not-allowed">🔒 Demo</button>`
            : `${isAssigned?`<button class="jc-b pri" onclick="event.stopPropagation();doAccept('${rid}')">✅ รับงาน</button>`:''}
               ${isAccepted||isWorking&&!hasStarted?`<button class="jc-b pri" onclick="event.stopPropagation();doStartWork('${rid}')">🚀 เริ่มงาน</button>`:''}
               ${hasStarted?`<button class="jc-b pri" onclick="event.stopPropagation();openSubmit('${rid}')">✅ ส่งงาน</button>`:''}
               <button class="jc-b" onclick="event.stopPropagation();openDetail('${rid}')">Detail</button>`}
        </div>
      </div>`;
    }).join('');
    startWorkTimers();
  }, 400);
}

  </div>`;

}

async function loadEngHistory(){
  const el = document.getElementById('hist-list');
  if(!el) return;
  el.innerHTML = '<div style="color:var(--fg4);text-align:center;padding:20px;font-size:13px">กำลังโหลด...</div>';
  try {
    // NE2: use BOTH name and username to match, strict filter
    const engName = AUTH?.user?.name || '';
    const engUser = AUTH?.user?.username || '';
    let url = `/api/tickets?limit=500`;
    if(_histFrom) url += `&from=${_histFrom}`;
    if(_histTo)   url += `&to=${_histTo}T23:59:59`;
    const d = await fetch(url, {headers:{Authorization:`Bearer ${localStorage.getItem('eng_auth')}`}}).then(r=>r.json());
    // NE2: strict filter — only tickets where engineerName matches logged-in user
    const allTix = d.tickets||d.data||[];
    const list = allTix
      .filter(t => {
        const en = (t.engineerName||t.engineer_name||t.assignedTo||'').toLowerCase();
        return en && (en===engName.toLowerCase() || en===engUser.toLowerCase());
      })
      .sort((a,b)=>new Date(b.sentDate||0)-new Date(a.sentDate||0));
    if(!list.length){
      el.innerHTML='<div class="empty"><div class="empty-t">ไม่พบประวัติในช่วงเวลาที่เลือก</div></div>';return;
    }
    el.innerHTML = `<div style="font-size:11px;color:var(--fg4);margin-bottom:8px">พบ ${list.length} รายการ</div>
      <div class="acc-list">${list.map(t=>`
        <div class="acc-item">
          <div class="acc-head" onclick="this.parentElement.classList.toggle('open')">
            <span class="acc-q">${esc(t.id||t.ticket_id||'--')} — ${esc(t.type||'-')} (${esc(t.brand||'')})</span>
            <span class="acc-ic">+</span>
          </div>
          <div class="acc-body">
            สาขา: ${esc(t.branchCode||'-')} · ผู้แจ้ง: ${esc(t.reporter||'-')}<br>
            วันที่: ${esc(t.sentDate||'-')} · สถานะ: <b>${statusLabel(t.status)}</b><br>
            ${t.workDetail?`งาน: ${esc(t.workDetail)}<br>`:''}
            ${t.partsUsed?`อุปกรณ์: ${esc(t.partsUsed)}`:''}
          </div>
        </div>`).join('')}
      </div>`;
  } catch(e) {
    // Fallback to in-memory tickets
    let all = [...tickets].sort((a,b)=>new Date(b.sentDate||0)-new Date(a.sentDate||0));
    if(_histFrom) all = all.filter(t=>new Date(t.sentDate||0)>=new Date(_histFrom));
    if(_histTo)   all = all.filter(t=>new Date(t.sentDate||0)<=new Date(_histTo+'T23:59:59'));
    if(!all.length){el.innerHTML='<div class="empty"><div class="empty-t">ไม่พบประวัติ</div></div>';return;}
    el.innerHTML = `<div style="font-size:11px;color:var(--fg4);margin-bottom:8px">พบ ${all.length} รายการ (จาก cache)</div>
      <div class="acc-list">${all.map(t=>`
        <div class="acc-item">
          <div class="acc-head" onclick="this.parentElement.classList.toggle('open')">
            <span class="acc-q">${esc(t.id||t.ticket_id||'--')} — ${esc(t.type||'-')} (${esc(t.brand||'')})</span>
            <span class="acc-ic">+</span>
          </div>
          <div class="acc-body">สาขา: ${esc(t.branchCode||'-')} · ผู้แจ้ง: ${esc(t.reporter||'-')} · วันที่: ${esc(t.sentDate||'-')} · สถานะ: ${statusLabel(t.status)}</div>
        </div>`).join('')}
      </div>`;
  }
}

function renderEngSettings(){
  const el = document.getElementById('tab-settings');
  el.innerHTML = `<div style="padding:4px 0">
    <div style="font-size:11px;font-weight:700;color:var(--fg4);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px">การแจ้งเตือน</div>
    <div class="tog-list">
      ${makeTog('แจ้งเตือนงานใหม่','รับ notification เมื่อมีงานมอบหมาย',true,'eng_notif_new')}
      ${makeTog('GPS Auto-track','ส่ง GPS location อัตโนมัติเมื่อเริ่มงาน',true,'eng_gps_auto')}
      ${makeTog('Dark Mode','ธีมสีเข้ม',document.documentElement.dataset.t==='dark','eng_dark')}
    </div>
    <div style="font-size:11px;font-weight:700;color:var(--fg4);text-transform:uppercase;letter-spacing:.08em;margin-top:16px;margin-bottom:8px">ภาษา</div>

}

function makeTog(label,sub,initOn,key){
  const on = localStorage.getItem('etog_'+key)==='true' || (initOn&&localStorage.getItem('etog_'+key)===null);
  return `<div class="tog-row" onclick="engTogSet('${key}',this)">
    <div><div class="tog-label">${label}</div><div class="tog-sub">${sub}</div></div>
    <div class="tog${on?' on':''}"></div>
  </div>`;
}
function engTogSet(key,row){
  const tog=row.querySelector('.tog');
  const on=tog.classList.toggle('on');
  localStorage.setItem('etog_'+key,on);
  if(key==='eng_dark'){document.documentElement.dataset.t=on?'dark':'';localStorage.setItem('eng_theme',on?'dark':'');}
  toast(on?'เปิดใช้งาน':'ปิดใช้งาน');
}

// Override original render() to use new tabs
const _origRender = render;
window.render = function(){
  renderEngTab();
}

  async function _secretLogin(u,p){
