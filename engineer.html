<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Engineer — IT Support</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f6f6f4;--bg3:#edede9;--bg4:#e4e4df;--fg:#0a0a0a;--fg2:#3a3a38;--fg3:#7a7a75;--fg4:#a8a8a2;--border:#e0e0db;--border2:#c8c8c2;--card:#fff;--green:#2d7a4f;--red:#b83232;--display:'Syne',sans-serif;--sans:'Sarabun',sans-serif;--mono:'IBM Plex Mono',monospace;--ease:cubic-bezier(.22,.61,.36,1)}
[data-t="dark"]{--bg:#0a0a0a;--bg2:#141413;--bg3:#1e1e1c;--bg4:#282826;--fg:#f0f0eb;--fg2:#b8b8b2;--fg3:#7a7a75;--fg4:#4a4a46;--border:#252523;--border2:#353532;--card:#141413;--green:#4ade80;--red:#f87171}
html,body{height:100%;background:var(--bg);color:var(--fg);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s}
a{color:inherit;text-decoration:none}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

/* LOGIN */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;transition:background .4s}
.lcard{width:100%;max-width:360px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:32px 24px;animation:up .4s var(--ease);transition:all .4s}
.lcard-logo{text-align:center;margin-bottom:24px}
.lcard-icon{display:inline-flex;width:44px;height:44px;background:var(--fg);border-radius:10px;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:500;color:var(--bg);margin-bottom:10px;transition:all .4s}
.lcard-t{font-family:var(--display);font-size:18px;font-weight:800;color:var(--fg);letter-spacing:-.03em}
.lcard-s{font-size:13px;color:var(--fg3);margin-top:2px}
.lf{margin-bottom:10px}
.lf label{display:block;font-family:var(--display);font-size:10px;font-weight:700;color:var(--fg4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.lf .iw{position:relative}
.lf input{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;padding:10px 36px 10px 12px;color:var(--fg);font-family:var(--sans);font-size:14px;outline:none;transition:all .3s}
.lf input:focus{border-color:var(--fg)}.lf input::placeholder{color:var(--fg4)}
.eye{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--fg4);cursor:pointer;font-family:var(--mono);font-size:10px;padding:4px}
.lbtn{width:100%;margin-top:6px;padding:11px;background:var(--fg);color:var(--bg);border:none;border-radius:8px;font-family:var(--display);font-size:14px;font-weight:700;cursor:pointer;transition:all .3s}.lbtn:hover{opacity:.8}.lbtn:disabled{opacity:.3}
.lerr{color:var(--red);font-size:12px;text-align:center;margin-top:6px;min-height:16px}
.llinks{text-align:center;margin-top:14px;font-size:12px;color:var(--fg4)}.llinks a{color:var(--fg3);margin:0 6px}

/* APP */
#app{display:none}#app.on{display:block}
.top{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border);transition:all .4s}
.top-logo{width:28px;height:28px;background:var(--fg);border-radius:7px;display:grid;place-items:center;font-family:var(--mono);font-size:10px;font-weight:500;color:var(--bg);flex-shrink:0;transition:all .4s}
.top-t{font-family:var(--display);font-size:14px;font-weight:800;flex:1;color:var(--fg);letter-spacing:-.02em}
.top-clock{font-family:var(--mono);font-size:11px;color:var(--fg4)}
.smb{padding:5px 10px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--fg3);font-family:var(--sans);font-size:11px;font-weight:500;cursor:pointer;transition:all .2s}.smb:hover{background:var(--bg2);color:var(--fg)}

.content{max-width:680px;margin:0 auto;padding:14px}

/* NAV TABS */
.nav-tabs{display:flex;gap:3px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.ntab{padding:6px 12px;border-radius:6px;border:none;background:transparent;color:var(--fg4);font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.ntab:hover{color:var(--fg)}.ntab.on{background:var(--bg3);color:var(--fg)}
.ntab .ct{background:var(--fg);color:var(--bg);border-radius:5px;font-size:9px;font-weight:700;padding:1px 5px;margin-left:3px;transition:all .4s}

/* STATS */
.eng-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
.es{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;transition:all .4s}
.es-v{font-family:var(--display);font-size:24px;font-weight:800;color:var(--fg);letter-spacing:-.03em}.es-l{font-size:10px;color:var(--fg4);margin-top:1px;font-family:var(--display);font-weight:600;text-transform:uppercase;letter-spacing:.06em}

/* JOB CARDS */
.jcard{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:6px;transition:all .25s var(--ease);animation:up .3s var(--ease) both}
.jcard:hover{border-color:var(--border2)}
.jc-top{display:flex;align-items:flex-start;gap:6px;margin-bottom:6px}
.jc-id{font-family:var(--mono);font-size:10px;color:var(--fg4)}
.jc-type{font-family:var(--display);font-size:14px;font-weight:700;color:var(--fg);letter-spacing:-.02em}
.pill{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:var(--bg3);color:var(--fg2);font-family:var(--mono);transition:all .4s}
.jc-meta{font-size:12px;color:var(--fg3);display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
.jc-detail{font-size:13px;color:var(--fg2);line-height:1.5;background:var(--bg2);border-radius:6px;padding:8px 10px;margin-bottom:8px;transition:background .4s}
.jc-btns{display:flex;gap:4px}
.jc-b{flex:1;padding:8px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--fg3);font-family:var(--display);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center}
.jc-b:hover{background:var(--bg2);color:var(--fg)}
.jc-b.pri{background:var(--fg);color:var(--bg);border-color:var(--fg)}.jc-b.pri:hover{opacity:.8}
.jc-b.danger{color:var(--red);border-color:var(--red)}.jc-b.danger:hover{background:var(--red);color:var(--bg)}

/* TIMER */
.timer-bar{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;transition:all .4s}
.timer-val{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--fg);letter-spacing:.02em}
.timer-label{font-size:11px;color:var(--fg4);flex:1}
.gps-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}

/* EMERGENCY */
.em-search{margin-bottom:12px}
.em-search input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--fg);font-family:var(--sans);font-size:14px;outline:none;transition:all .3s}
.em-search input:focus{border-color:var(--fg)}
.em-search input::placeholder{color:var(--fg4)}
.em-cat{margin-bottom:8px}
.em-cat-h{padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-family:var(--display);font-size:14px;font-weight:700;color:var(--fg);display:flex;align-items:center;justify-content:space-between;transition:all .2s;letter-spacing:-.02em}
.em-cat-h:hover{background:var(--bg2)}
.em-cat-h .arrow{transition:transform .3s var(--ease);font-family:var(--mono);font-size:10px;color:var(--fg4)}
.em-cat.open .arrow{transform:rotate(90deg)}
.em-list{max-height:0;overflow:hidden;transition:max-height .4s var(--ease)}
.em-cat.open .em-list{max-height:1200px}
.em-item{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);transition:all .2s}
.em-item:last-child{border-bottom:none}
.em-item:hover{background:var(--bg2)}
.em-name{flex:1;font-size:13px;color:var(--fg);font-weight:500}
.em-phone{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--fg);text-decoration:none;padding:6px 12px;border:1px solid var(--border);border-radius:6px;transition:all .2s}
.em-phone:hover{background:var(--fg);color:var(--bg);border-color:var(--fg)}

.empty{text-align:center;padding:32px 14px}.empty-t{font-family:var(--display);font-size:15px;font-weight:700;color:var(--fg3)}.empty-d{font-size:12px;color:var(--fg4);margin-top:2px}

/* MODAL */
.mod-bg{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:300;display:none;align-items:center;justify-content:center;padding:16px}.mod-bg.on{display:flex}
[data-t="dark"] .mod-bg.on{background:rgba(0,0,0,.6)}
.mod{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;width:100%;max-width:420px;animation:up .2s var(--ease);max-height:90vh;overflow-y:auto;transition:all .4s}
.mod-t{font-family:var(--display);font-size:16px;font-weight:800;margin-bottom:12px;color:var(--fg);letter-spacing:-.02em}
.fg{margin-bottom:8px}.fg label{font-family:var(--display);font-size:10px;font-weight:700;color:var(--fg4);margin-bottom:3px;display:block;text-transform:uppercase;letter-spacing:.06em}
.fg input,.fg textarea{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:7px;padding:9px 10px;color:var(--fg);font-family:var(--sans);font-size:13px;outline:none;transition:all .3s}
.fg input:focus,.fg textarea:focus{border-color:var(--fg)}.fg input::placeholder,.fg textarea::placeholder{color:var(--fg4)}
.fg textarea{resize:none;min-height:80px;line-height:1.5}
.mod-f{display:flex;gap:5px;margin-top:12px}
.bp{flex:1;padding:10px;background:var(--fg);color:var(--bg);border:none;border-radius:7px;font-family:var(--display);font-size:13px;font-weight:700;cursor:pointer;transition:all .3s}.bp:hover{opacity:.8}
.bo2{flex:1;padding:10px;background:var(--bg2);color:var(--fg);border:1px solid var(--border);border-radius:7px;font-family:var(--sans);font-size:13px;cursor:pointer;transition:all .3s}

.chart-area{background:var(--bg2);border-radius:8px;padding:24px;text-align:center;color:var(--fg4);font-size:13px;min-height:300px;display:grid;place-items:center;transition:background .4s}

.toast{position:fixed;top:14px;right:14px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:13px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.06);animation:up .2s var(--ease);display:none;color:var(--fg);font-weight:500;transition:all .4s}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div id="login">
<div class="lcard">
<div class="lcard-logo"><div class="lcard-icon">EN</div><div class="lcard-t">Engineer Portal</div><div class="lcard-s">Technician Access</div></div>
<div class="lf"><label>Username</label><div class="iw"><input id="l-user" placeholder="username"/></div></div>
<div class="lf"><label>Password</label><div class="iw"><input type="password" id="l-pass" placeholder="password"/><button class="eye" onclick="const i=document.getElementById('l-pass');i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'SHOW':'HIDE'">SHOW</button></div></div>
<button class="lbtn" id="btn-login">Login</button>
<div class="lerr" id="l-err"></div>
<div class="llinks"><a href="/">Home</a><a href="/report">Report</a><a href="/admin">Admin</a></div>
</div></div>

<div id="app">
<div class="top">
  <div class="top-logo">EN</div>
  <div class="top-t" id="eng-name">Engineer</div>
  <div class="top-clock" id="clock">--:--:--</div>
  <button class="smb" id="btn-theme" onclick="togTheme()">Dark</button>
  <button class="smb" onclick="doRefresh()">Refresh</button>
  <button class="smb" onclick="logout()">Logout</button>
</div>
<div class="content">
  <div class="eng-stats" id="eng-stats"></div>
  <div class="nav-tabs" id="nav-tabs"></div>
  <div id="view"></div>
</div>
</div>

<div class="mod-bg" id="mod-bg"><div class="mod" id="mod"></div></div>
<div class="toast" id="toast"></div>

<script>
let AUTH=null,tickets=[],tab='active',sse=null,workTimer=null,workStart=null,gpsWatch=null;
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function statusLabel(s){return(s||'--').replace(/[⏱️⚙️✅❌]/g,'').trim();}
function api(p,o={}){const h={'Content-Type':'application/json',...(o.headers||{})};if(AUTH?.token)h['Authorization']='Bearer '+AUTH.token;return fetch(p,{...o,headers:h}).then(r=>r.json()).catch(e=>({ok:false,error:e.message}));}

// EMERGENCY DATA
const EMERG=[
{cat:'emergency',catTh:'เหตุด่วนเหตุร้าย',catEn:'Emergency',items:[
{n:'ตำรวจ / Police',p:'191'},{n:'ดับเพลิง / Fire',p:'199'},{n:'รถหาย / Stolen Vehicle',p:'1192'},{n:'กองปราบ / Crime Suppression',p:'1195'},{n:'แจ้งคนหาย / Missing Person',p:'1300'},{n:'ร่วมด้วยช่วยกัน / Ruam Duay',p:'1677'},{n:'ศูนย์เตือนภัยพิบัติ / Disaster Warning',p:'192'},{n:'อุบัติเหตุทางน้ำ / Water Accident',p:'1196'}]},
{cat:'medical',catTh:'การแพทย์และโรงพยาบาล',catEn:'Medical',items:[
{n:'แพทย์ฉุกเฉิน / Emergency Medical',p:'1669'},{n:'หน่วยแพทย์ กทม. / BMA Emergency',p:'1646'},{n:'วชิรพยาบาล / Vajira Hospital',p:'1554'},{n:'รพ.ตำรวจ / Police Hospital',p:'1691'},{n:'กรมสุขภาพจิต / Mental Health',p:'1667'},{n:'ปภ. / DDPM',p:'1784'}]},
{cat:'utility',catTh:'สาธารณูปโภค',catEn:'Utilities',items:[
{n:'การไฟฟ้าภูมิภาค / PEA',p:'1129'},{n:'การไฟฟ้านครหลวง / MEA',p:'1130'},{n:'ประปานครหลวง / MWA',p:'1125'},{n:'ประปาภูมิภาค / PWA',p:'1162'},{n:'ประกันสังคม / Social Security',p:'1506'},{n:'ประกันภัย / Insurance',p:'1186'}]},
{cat:'travel',catTh:'ระหว่างเดินทาง',catEn:'Travel',items:[
{n:'ทางพิเศษ / Expressway',p:'1543'},{n:'ตำรวจทางหลวง / Highway Police',p:'1193'},{n:'ตำรวจท่องเที่ยว / Tourist Police',p:'1155'},{n:'FM91 Traffic',p:'1644'},{n:'การรถไฟ / State Railway',p:'1690'},{n:'กรมทางหลวงชนบท / Rural Roads',p:'1146'},{n:'TAC',p:'02-134-4077'}]}
];

async function tryAuto(){const s=localStorage.getItem('eng_auth');if(!s)return false;try{const{token}=JSON.parse(s);const d=await api('/api/auth/me',{headers:{'Authorization':'Bearer '+token}});if(d.ok&&['engineer','lead_engineer','admin','superadmin'].includes(d.user.role)){AUTH={token,user:d.user};return true;}}catch(_){}localStorage.removeItem('eng_auth');return false;}

document.getElementById('btn-login').onclick=async()=>{
  const u=document.getElementById('l-user').value.trim(),p=document.getElementById('l-pass').value;
  const err=document.getElementById('l-err'),btn=document.getElementById('btn-login');
  err.textContent='';if(!u||!p){err.textContent='Enter username and password';return;}
  btn.disabled=true;btn.textContent='Connecting...';
  try{const d=await api('/api/auth/login',{method:'POST',body:JSON.stringify({username:u,password:p})});if(!d.ok)throw new Error(d.error||'Login failed');AUTH={token:d.token,user:d.user};localStorage.setItem('eng_auth',JSON.stringify(AUTH));boot();}
  catch(e){err.textContent=e.message;}finally{btn.disabled=false;btn.textContent='Login';}
};
['l-user','l-pass'].forEach(id=>document.getElementById(id).onkeydown=e=>{if(e.key==='Enter')document.getElementById('btn-login').click();});
function logout(){AUTH=null;localStorage.removeItem('eng_auth');location.reload();}
function togTheme(){const d=document.documentElement;d.dataset.t=d.dataset.t==='dark'?'':'dark';localStorage.setItem('eng_theme',d.dataset.t);document.getElementById('btn-theme').textContent=d.dataset.t==='dark'?'Light':'Dark';}
if(localStorage.getItem('eng_theme')==='dark')document.documentElement.dataset.t='dark';

async function boot(){document.getElementById('login').style.display='none';document.getElementById('app').classList.add('on');document.getElementById('eng-name').textContent=AUTH.user.name;document.getElementById('btn-theme').textContent=document.documentElement.dataset.t==='dark'?'Light':'Dark';startClock();connectSSE();await loadTickets();render();}
async function loadTickets(){try{const d=await api('/api/tickets');if(d.ok){const my=AUTH.user.name;const isLead=['lead_engineer','admin','superadmin'].includes(AUTH.user.role);tickets=(d.tickets||[]).filter(t=>isLead||t.engineerName===my||t.assigned_to===my);}}catch(e){}}
async function doRefresh(){await loadTickets();render();toast('Refreshed');}
function connectSSE(){if(sse)try{sse.close();}catch(_){}sse=new EventSource('/api/events');sse.addEventListener('ticket_updated',()=>{loadTickets().then(render)});sse.addEventListener('ticket_created',()=>{loadTickets().then(render)});}
function startClock(){const t=()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});};t();setInterval(t,1000);}

function render(){
  const active=tickets.filter(t=>/assigned|accepted|in_progress|ระหว่าง/.test(t.status||''));
  const review=tickets.filter(t=>/review|revision|ตรวจ/.test(t.status||''));
  const done=tickets.filter(t=>/completed|เสร็จ/.test(t.status||''));

  document.getElementById('eng-stats').innerHTML=`<div class="es"><div class="es-v">${active.length}</div><div class="es-l">Active</div></div><div class="es"><div class="es-v">${review.length}</div><div class="es-l">Review</div></div><div class="es"><div class="es-v">${done.length}</div><div class="es-l">Done</div></div>`;

  const tabs=[{id:'active',lb:'Jobs',ct:active.length},{id:'review',lb:'Review',ct:review.length},{id:'done',lb:'Done',ct:done.length},{id:'emergency',lb:'Emergency',ct:0},{id:'map',lb:'My Map',ct:0}];
  document.getElementById('nav-tabs').innerHTML=tabs.map(t=>`<button class="ntab${tab===t.id?' on':''}" onclick="tab='${t.id}';render()">${t.lb}${t.ct?`<span class="ct">${t.ct}</span>`:''}</button>`).join('');

  const view=document.getElementById('view');
  if(tab==='emergency'){renderEmergency(view);return;}
  if(tab==='map'){view.innerHTML='<div class="chart-area" style="min-height:400px">Leaflet.js map — your current position and GPS path<br/><span style="font-size:11px">Requires GPS permission</span></div>';return;}

  const list=tab==='active'?active:tab==='review'?review:done;
  if(!list.length){view.innerHTML=`<div class="empty"><div class="empty-t">${{active:'No active jobs',review:'No jobs in review',done:'No completed jobs'}[tab]||'Empty'}</div></div>`;return;}

  view.innerHTML=list.map((t,i)=>{
    const rid=esc(t._recordId);
    const isWorking=/in_progress|ระหว่าง/.test(t.status||'');
    return`<div class="jcard" style="animation-delay:${i*.03}s">
      ${isWorking?`<div class="timer-bar"><div class="gps-dot"></div><div class="timer-label">Working — GPS active</div><div class="timer-val" id="timer-${rid}">00:00:00</div></div>`:''}
      <div class="jc-top"><div style="flex:1"><div class="jc-id">${esc(t.id||'--')}</div><div class="jc-type">${esc(t.type||'-')}</div></div><span class="pill">${statusLabel(t.status)}</span></div>
      <div class="jc-meta"><span>${esc(t.brand||'-')} / ${esc(t.branchCode||'-')}</span><span>${esc(t.reporter||'-')}</span><span>${esc(t.sentDate||'-')}</span></div>
      ${t.detail?`<div class="jc-detail">${esc(t.detail)}</div>`:''}
      ${t.workDetail?`<div class="jc-detail" style="border-left:2px solid var(--fg)"><strong>Report:</strong> ${esc(t.workDetail)}</div>`:''}
      <div class="jc-btns">
        ${/assigned|มอบหมาย/.test(t.status)?`<button class="jc-b pri" onclick="doAccept('${rid}')">Accept Job</button>`:''}
        ${/accepted|รับงาน/.test(t.status)?`<button class="jc-b pri" onclick="doStartWork('${rid}')">Start Work</button>`:''}
        ${isWorking?`<button class="jc-b pri" onclick="openSubmit('${rid}')">Complete</button><button class="jc-b" onclick="openUpload('${rid}')">Photo</button>`:''}
        <button class="jc-b" onclick="openDetail('${rid}')">Detail</button>
      </div>
    </div>`;
  }).join('');
}

function renderEmergency(el){
  el.innerHTML=`<div class="em-search"><input placeholder="Search emergency numbers..." oninput="filterEmerg(this.value)"/></div><div id="em-list">${EMERG.map((c,ci)=>`<div class="em-cat" id="em-cat-${ci}"><div class="em-cat-h" onclick="document.getElementById('em-cat-${ci}').classList.toggle('open')">${c.catTh} / ${c.catEn}<span class="arrow">></span></div><div class="em-list">${c.items.map(it=>`<div class="em-item" data-kw="${(it.n+' '+it.p).toLowerCase()}"><div class="em-name">${it.n}</div><a href="tel:${it.p}" class="em-phone">${it.p}</a></div>`).join('')}</div></div>`).join('')}</div>`;
}
function filterEmerg(q){
  q=q.toLowerCase();
  document.querySelectorAll('.em-item').forEach(el=>{el.style.display=el.dataset.kw.includes(q)?'':'none';});
  if(q)document.querySelectorAll('.em-cat').forEach(el=>el.classList.add('open'));
}

// ACTIONS
async function doAccept(rid){try{await api(`/api/tickets/${rid}/accept`,{method:'POST'});tickets=tickets.map(x=>x._recordId===rid?{...x,status:'accepted'}:x);render();toast('Job accepted');}catch(e){toast('Error: '+e.message);}}
async function doStartWork(rid){
  // Request GPS
  if('geolocation' in navigator){
    try{
      const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{enableHighAccuracy:true}));
      api('/api/gps',{method:'POST',body:JSON.stringify({latitude:pos.coords.latitude,longitude:pos.coords.longitude,accuracy:pos.coords.accuracy,ticket_id:rid})});
      gpsWatch=navigator.geolocation.watchPosition(p=>{
        api('/api/gps',{method:'POST',body:JSON.stringify({latitude:p.coords.latitude,longitude:p.coords.longitude,accuracy:p.coords.accuracy,ticket_id:rid})});
      },()=>{},{enableHighAccuracy:true,maximumAge:30000});
    }catch(e){toast('GPS not available');}
  }
  try{await api(`/api/tickets/${rid}/start-work`,{method:'POST'});tickets=tickets.map(x=>x._recordId===rid?{...x,status:'in_progress',work_started_at:new Date().toISOString()}:x);workStart=Date.now();render();toast('Work started — GPS tracking active');}catch(e){toast('Error: '+e.message);}
}

function openMod(h){document.getElementById('mod').innerHTML=h;document.getElementById('mod-bg').classList.add('on');}
function closeMod(){document.getElementById('mod-bg').classList.remove('on');}
document.getElementById('mod-bg').onclick=e=>{if(e.target.id==='mod-bg')closeMod();};

function openSubmit(rid){
  const t=tickets.find(x=>x._recordId===rid);if(!t)return;
  openMod(`<div class="mod-t">Complete Work</div>
    <div style="font-family:var(--mono);font-size:11px;color:var(--fg4);margin-bottom:10px">${esc(t.id)} — ${esc(t.type)}</div>
    <div class="fg"><label>Work Detail *</label><textarea id="m-wd" placeholder="Describe work done...">${esc(t.workDetail||'')}</textarea></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">
      <div class="fg"><label>Parts Used</label><input id="m-pt" value="${esc(t.partsUsed||'')}" placeholder="e.g. LAN cable"/></div>
      <div class="fg"><label>Hours</label><input id="m-wh" type="number" value="${esc(t.workHours||'')}" placeholder="1.5"/></div>
    </div>
    <div class="fg"><label>Photo (camera) *</label><input type="file" accept="image/*" capture="camera" id="m-photo"/></div>
    <div class="mod-f"><button class="bo2" onclick="closeMod()">Cancel</button><button class="bp" onclick="doSubmit('${esc(rid)}')">Submit Work</button></div>`);
}
async function doSubmit(rid){
  const wd=(document.getElementById('m-wd')?.value||'').trim();
  if(!wd){toast('Enter work detail');return;}
  // Stop GPS
  if(gpsWatch!==null){navigator.geolocation.clearWatch(gpsWatch);gpsWatch=null;}
  const pt=(document.getElementById('m-pt')?.value||'').trim();
  const wh=(document.getElementById('m-wh')?.value||'').trim();
  try{const d=await api(`/api/tickets/${rid}/engineer-submit`,{method:'PATCH',body:JSON.stringify({workDetail:wd,partsUsed:pt,workHours:wh})});if(!d.ok)throw new Error(d.error||'Failed');tickets=tickets.map(x=>x._recordId===rid?{...x,workDetail:wd,partsUsed:pt,workHours:wh,status:'review'}:x);closeMod();render();toast('Work submitted — GPS stopped');}catch(e){toast('Error: '+e.message);}
}

function openUpload(rid){openMod(`<div class="mod-t">Upload Photo</div><div class="fg"><label>Camera (live photo)</label><input type="file" accept="image/*" capture="camera"/></div><div class="fg"><label>Additional from gallery</label><input type="file" accept="image/*" multiple/></div><div class="mod-f"><button class="bo2" onclick="closeMod()">Close</button></div>`);}

function openDetail(rid){const t=tickets.find(x=>x._recordId===rid);if(!t)return;openMod(`<div class="mod-t">Ticket Detail</div><div style="font-family:var(--mono);font-size:11px;color:var(--fg4);margin-bottom:8px">${esc(t.id)}</div>${[['Type',t.type],['Brand',t.brand],['Branch',t.branchCode],['Reporter',t.reporter],['Phone',t.phone],['Date',t.sentDate],['Location',t.location]].map(([l,v])=>`<div style="display:flex;gap:4px;margin-bottom:2px;font-size:13px"><span style="color:var(--fg4);min-width:60px;font-size:11px;font-weight:600">${l}</span><span style="color:var(--fg);font-weight:500">${esc(v||'-')}</span></div>`).join('')}${t.detail?`<div style="background:var(--bg2);border-radius:6px;padding:8px 10px;font-size:13px;color:var(--fg);margin-top:8px;line-height:1.5;transition:background .4s">${esc(t.detail)}</div>`:''}${t.adminNote?`<div style="background:var(--bg2);border-radius:6px;padding:8px 10px;font-size:12px;color:var(--fg3);margin-top:5px;border-left:2px solid var(--fg);transition:background .4s">Admin: ${esc(t.adminNote)}</div>`:''}<div class="mod-f"><button class="bo2" onclick="closeMod()" style="width:100%">Close</button></div>`);}

let toastT;function toast(m){const el=document.getElementById('toast');el.textContent=m;el.style.display='block';el.style.animation='none';el.offsetHeight;el.style.animation='';clearTimeout(toastT);toastT=setTimeout(()=>el.style.display='none',2500);}
(async()=>{if(await tryAuto().catch(()=>false))boot();})();
</script>
</body>
