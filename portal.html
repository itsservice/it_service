<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IT Service Portal</title>
  <link rel="stylesheet" href="/assets/portal.css" />
</head>
<body>
  <!-- TOP LEFT : menu circle -->
  <button id="menuBtn" class="fab fab-left" aria-label="menu">
    <span class="hamburger"></span>
  </button>

  <!-- TOP RIGHT : info + theme -->
  <div class="topRight">
    <div class="infoBox">
      <div id="dateTime" class="dt">--</div>
      <div class="temp"><span id="tempC">--</span>°C</div>
    </div>

    <div class="themeWrap">
      <button id="themeBtn" class="fab fab-right" aria-label="theme">
        ⚙️
      </button>

      <div id="themePanel" class="panel hidden" role="menu">
        <div class="panelTitle">Theme</div>

        <button class="panelItem" data-theme="light">🌤️ Light</button>
        <button class="panelItem" data-theme="dark">🌙 Dark</button>
        <button class="panelItem" data-theme="custom">🎚️ Custom</button>

        <div id="customRow" class="customRow hidden">
          <div class="customLabel">
            🌤️ <span class="muted">Day</span>
            <span class="spacer"></span>
            <span class="muted">Night</span> 🌙
          </div>
          <input id="mixSlider" type="range" min="0" max="100" value="50" />
        </div>
      </div>
    </div>
  </div>

  <!-- MENU OVERLAY (cover only left 20% on desktop) -->
  <div id="overlay" class="overlay hidden"></div>

  <aside id="sidebar" class="sidebar" aria-label="brand menu">
    <div class="sideHeader">
      <div class="sideTitle">Brand</div>
      <button id="closeSidebarBtn" class="closeX" aria-label="close">✕</button>
    </div>

    <div class="sideSubTitle">Select brand</div>

    <div id="brandList" class="brandList"></div>
  </aside>

  <!-- MAIN CENTER -->
  <main class="main">
    <div class="center fadeUp">
      <div id="brandTitle" class="brandTitle">GD</div>

      <div class="btnStack">
        <button id="btnIssue" class="actionBtn">
          แจ้งปัญหา
        </button>
        <button id="btnTrack" class="idleBtn">
          ติดตาม Ticket
        </button>
      </div>
    </div>
  </main>

  <script src="/assets/portal.js"></script>
</body>
</html>
