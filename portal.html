<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>IT Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/portal.css"/>
</head>
<body>

  <canvas id="bgCanvas" aria-hidden="true"></canvas>

  <button id="menuBtn" class="menu-fab" aria-label="Menu" aria-expanded="false">
    <span class="bar bar-1"></span>
    <span class="bar bar-2"></span>
    <span class="bar bar-3"></span>
  </button>

  <div class="topright">
    <div class="clock-pill">
      <span class="clock-icon">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
      </span>
      <span id="clockText">--:--:--</span>
      <span class="pill-sep"></span>
      <span id="tempText">--&deg;C</span>
    </div>
    <div class="theme-wrap">
      <button id="themeBtn" class="icon-btn" aria-label="Theme">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
        </svg>
      </button>
      <div id="themePopup" class="theme-popup" role="menu" aria-hidden="true">
        <button class="popItem" data-theme="dark"><span class="pop-ico">&#127769;</span>Dark</button>
        <button class="popItem" data-theme="light"><span class="pop-ico">&#9728;&#65039;</span>Light</button>
        <button class="popItem" data-theme="auto"><span class="pop-ico">&#127450;</span>Auto</button>
        <div class="sliderWrap" id="sliderWrap" hidden>
          <div class="slider-row">
            <span>&#9728;</span>
            <input id="mixSlider" type="range" min="0" max="100" value="100"/>
            <span>&#127769;</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="scrim" class="scrim" hidden></div>

  <aside id="sidebar" class="sidebar" aria-hidden="true">
    <div class="side-head">
      <div>
        <div class="side-h1">Brands</div>
        <div class="side-h2">เลือกแบรนด์</div>
      </div>
      <button id="closeBtn" class="close-btn" aria-label="Close">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div id="brandList" class="brand-list" role="list"></div>
  </aside>

  <main class="main">
    <div class="hero" id="centerBox">
      <div class="brand-wrap">
        <div id="brandTitle" class="brand-name">&#8212;</div>
        <div class="brand-sub" id="brandSub">เลือกแบรนด์จากเมนู</div>
      </div>
      <div class="cards">
        <button id="btnReport" class="card">
          <div class="card-glow"></div>
          <div class="card-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </div>
          <div class="card-body">
            <div class="card-th">แจ้งปัญหา</div>
            <div class="card-en">Report Issue</div>
          </div>
          <div class="card-arrow">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </div>
        </button>
        <button id="btnTrack" class="card">
          <div class="card-glow"></div>
          <div class="card-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
            </svg>
          </div>
          <div class="card-body">
            <div class="card-th">ติดตาม Ticket</div>
            <div class="card-en">Track Status</div>
          </div>
          <div class="card-arrow">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
              <path d="M5 12h14M12 5l7 7-7 7"/>
            </svg>
          </div>
        </button>
      </div>
    </div>
  </main>

  <script src="/assets/portal.js"></script>
</body>
</html>
