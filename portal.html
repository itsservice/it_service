<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>IT Portal</title>
  <link rel="stylesheet" href="/assets/portal.css" />
</head>
<body>

  <!-- Position 1: Menu button -->
  <button id="menuBtn" class="fab left" aria-label="Menu" aria-expanded="false">
    <span class="hamburger" aria-hidden="true"></span>
    <span class="menuX" aria-hidden="true">✕</span>
  </button>

  <!-- Position 3: Info + Theme -->
  <div class="topRight" aria-label="TopRight">
    <div class="clockCard" id="clockCard">
      <div id="clockText">--/--/---- --:--:--</div>
      <div class="tempRow"><span id="tempText">--°C</span></div>
    </div>

    <div class="themeWrap">
      <button id="themeBtn" class="fab right" aria-label="Theme">⚙️</button>

      <div id="themePopup" class="popup" role="menu" aria-hidden="true">
        <button class="popItem" data-theme="light">🌤️ Light</button>
        <button class="popItem" data-theme="dark">🌙 Dark</button>
        <button class="popItem" data-theme="auto">🎚️ Auto</button>

        <div class="sliderWrap" id="sliderWrap" hidden>
          <div class="sliderLabel">🌤️ → 🌆 → 🌙</div>
          <input id="mixSlider" type="range" min="0" max="100" value="0" />
        </div>
      </div>
    </div>
  </div>

  <!-- scrim: click outside to close -->
  <div id="scrim" class="scrim" hidden></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="sidebar" aria-hidden="true">
    <div class="sideTop">
      <div class="sideTitle">
        <div class="sideH1">Brand</div>
        <div class="sideH2">Select brand</div>
      </div>
      <button id="closeBtn" class="closeBtn" aria-label="Close">✕</button>
    </div>

    <div id="brandList" class="brandList" role="list"></div>
  </aside>

  <!-- Main content -->
  <main class="main">
    <div class="center fadeUp" id="centerBox">
      <div id="brandTitle" class="brandTitle">-</div>

      <button id="btnReport" class="actionBtn primary">แจ้งปัญหา</button>
      <button id="btnTrack" class="actionBtn secondary">ติดตาม Ticket</button>

      <div id="notReady" class="notReady" hidden>
        ขณะนี้หน้าเว็บยังไม่พร้อมใช้งาน
      </div>
    </div>
  </main>

  <script src="/assets/portal.js"></script>
</body>
</html>
