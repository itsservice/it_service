<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Admin — IT Support</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f6f6f4;--bg3:#edede9;--bg4:#e4e4df;
  --fg:#0a0a0a;--fg2:#3a3a38;--fg3:#7a7a75;--fg4:#a8a8a2;
  --border:#e0e0db;--border2:#c8c8c2;
  --card:#fff;
  --green:#2d7a4f;--red:#b83232;--blue:#2b5ea8;--orange:#b87a1a;
  --display:'Syne',sans-serif;--sans:'Sarabun',sans-serif;--mono:'IBM Plex Mono',monospace;
  --ease:cubic-bezier(.22,.61,.36,1);--sidebar:230px
}
[data-t="dark"]{
  --bg:#0a0a0a;--bg2:#141413;--bg3:#1e1e1c;--bg4:#282826;
  --fg:#f0f0eb;--fg2:#b8b8b2;--fg3:#7a7a75;--fg4:#4a4a46;
  --border:#252523;--border2:#353532;
  --card:#141413;
  --green:#4ade80;--red:#f87171;--blue:#60a5fa;--orange:#fb923c
}
html,body{height:100%;background:var(--bg);color:var(--fg);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
a{color:inherit;text-decoration:none}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══ LOGIN ═══ */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;transition:background .4s}
.lcard{width:100%;max-width:360px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:32px 24px;animation:up .4s var(--ease);transition:all .4s}
.lcard-logo{text-align:center;margin-bottom:24px}
.lcard-icon{display:inline-flex;width:44px;height:44px;background:var(--fg);border-radius:10px;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:500;color:var(--bg);margin-bottom:10px;transition:all .4s}
.lcard-t{font-family:var(--display);font-size:18px;font-weight:800;color:var(--fg);letter-spacing:-.03em}
.lcard-s{font-size:13px;color:var(--fg3);margin-top:2px}
.lf{margin-bottom:10px}
.lf label{display:block;font-family:var(--display);font-size:10px;font-weight:700;color:var(--fg4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.lf .input-wrap{position:relative}
.lf input{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;padding:10px 36px 10px 12px;color:var(--fg);font-family:var(--sans);font-size:14px;outline:none;transition:all .3s}
.lf input:focus{border-color:var(--fg)}
.lf input::placeholder{color:var(--fg4)}
.eye-btn{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--fg3);cursor:pointer;font-family:var(--mono);font-size:10px;padding:4px;transition:color .2s}
.eye-btn:hover{color:var(--fg)}
.lbtn{width:100%;margin-top:6px;padding:11px;background:var(--fg);color:var(--bg);border:none;border-radius:8px;font-family:var(--display);font-size:14px;font-weight:700;cursor:pointer;transition:all .3s;letter-spacing:-.01em}
.lbtn:hover{opacity:.8}.lbtn:disabled{opacity:.3}
.lerr{color:var(--red);font-size:12px;text-align:center;margin-top:6px;min-height:16px}
.llinks{text-align:center;margin-top:14px;font-size:12px;color:var(--fg4)}.llinks a{color:var(--fg3);margin:0 6px;transition:color .2s}.llinks a:hover{color:var(--fg)}

/* ═══ APP ═══ */
#app{display:none;height:100vh;overflow:hidden}#app.on{display:flex}

/* SIDEBAR */
.side{position:fixed;left:0;top:0;bottom:0;width:var(--sidebar);background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:100;transform:translateX(-100%);transition:transform .3s var(--ease),background .4s,border-color .4s}
.side.open{transform:none}
.s-head{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;transition:border-color .4s}
.s-logo{width:28px;height:28px;background:var(--fg);border-radius:7px;display:grid;place-items:center;font-family:var(--mono);font-size:10px;font-weight:500;color:var(--bg);flex-shrink:0;transition:all .4s}
.s-name{font-family:var(--display);font-size:13px;font-weight:700;color:var(--fg);letter-spacing:-.02em}.s-role{font-size:10px;color:var(--fg4);font-family:var(--mono)}
.s-nav{flex:1;overflow-y:auto;padding:8px}
.navb{display:flex;align-items:center;gap:8px;width:100%;padding:9px 10px;border:none;background:transparent;border-radius:7px;cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:500;color:var(--fg3);transition:all .2s;text-align:left;margin-bottom:1px}
.navb:hover{background:var(--bg2);color:var(--fg)}
.navb.on{background:var(--bg3);color:var(--fg);font-weight:700}
.navb .ni{font-family:var(--mono);font-size:10px;font-weight:500;color:var(--fg4);width:20px;text-align:center}
.navb .bdg{margin-left:auto;background:var(--fg);color:var(--bg);border-radius:6px;font-size:9px;font-weight:700;padding:1px 6px;min-width:16px;text-align:center;transition:all .4s}
.s-foot{padding:8px;border-top:1px solid var(--border);transition:border-color .4s}
.s-foot button,.s-foot a{display:block;width:100%;padding:7px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--fg3);font-family:var(--sans);font-size:11px;font-weight:500;cursor:pointer;transition:all .3s;text-align:center;margin-bottom:3px;text-decoration:none}
.s-foot button:hover,.s-foot a:hover{background:var(--bg2);color:var(--fg)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.15);z-index:99;display:none;transition:opacity .3s}.ov.on{display:block}
[data-t="dark"] .ov.on{background:rgba(0,0,0,.5)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.top{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;transition:all .4s}
.menub{width:34px;height:34px;border-radius:7px;border:1px solid var(--border);background:var(--card);color:var(--fg3);cursor:pointer;display:grid;place-items:center;font-size:13px;transition:all .2s}
.menub:hover{background:var(--bg2);color:var(--fg)}
.top-t{font-family:var(--display);font-size:15px;font-weight:800;flex:1;color:var(--fg);letter-spacing:-.03em}
.top-clock{font-family:var(--mono);font-size:11px;color:var(--fg4)}
.status-dot{width:7px;height:7px;border-radius:50%;transition:background .4s}
.status-dot.online{background:var(--green)}.status-dot.offline{background:var(--red)}.status-dot.loading{background:var(--blue);animation:pulse 1.5s infinite}
.smb{padding:5px 10px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--fg3);font-family:var(--sans);font-size:11px;font-weight:500;cursor:pointer;transition:all .2s}.smb:hover{background:var(--bg2);color:var(--fg)}
.spinning{animation:spin .6s linear infinite}
.content{flex:1;overflow-y:auto;padding:16px;padding-bottom:80px;scroll-behavior:smooth}
.page{display:none}.page.on{display:block;animation:up .25s var(--ease)}

/* ═══ STATS ═══ */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:6px;margin-bottom:14px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;transition:all .4s}
.stat:hover{border-color:var(--border2)}
.stat-l{font-size:10px;color:var(--fg4);margin-bottom:3px;font-weight:600;font-family:var(--display);text-transform:uppercase;letter-spacing:.06em}
.stat-v{font-family:var(--display);font-size:26px;font-weight:800;color:var(--fg);letter-spacing:-.04em}

/* GRID / CARDS */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.crd{background:var(--card);border:1px solid var(--border);border-radius:8px;overflow:hidden;transition:all .4s}
.crd-h{padding:10px 14px;border-bottom:1px solid var(--border);font-family:var(--display);font-size:11px;font-weight:700;color:var(--fg);text-transform:uppercase;letter-spacing:.06em;transition:border-color .4s}

/* FILTERS / TABLE */
.filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.srch{position:relative;flex:1;min-width:140px}
.srch input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:7px;padding:8px 10px 8px 28px;color:var(--fg);font-family:var(--sans);font-size:13px;outline:none;transition:all .3s}
.srch input:focus{border-color:var(--fg)}
.srch input::placeholder{color:var(--fg4)}
.srch .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:10px;color:var(--fg4)}
.sel{background:var(--card);border:1.5px solid var(--border);border-radius:7px;padding:8px 10px;color:var(--fg);font-family:var(--sans);font-size:12px;outline:none;appearance:none;cursor:pointer;transition:all .3s}
input[type=date].sel{appearance:auto;color-scheme:light dark}

.tbl{width:100%;border-collapse:separate;border-spacing:0 3px}
.tbl th{font-family:var(--display);font-size:10px;font-weight:700;color:var(--fg4);letter-spacing:.06em;text-transform:uppercase;padding:4px 8px;text-align:left}
.tr{background:var(--card);cursor:pointer;transition:all .2s}
.tr:hover{background:var(--bg2)}
.tr td{padding:9px 8px;border-top:1px solid var(--border);border-bottom:1px solid var(--border);font-size:13px;color:var(--fg);transition:border-color .4s}
.tr td:first-child{border-left:1px solid var(--border);border-radius:7px 0 0 7px}
.tr td:last-child{border-right:1px solid var(--border);border-radius:0 7px 7px 0}
.pill{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:var(--bg3);color:var(--fg2);font-family:var(--mono);transition:all .4s}

/* DRAWER */
.drw-bg{position:fixed;inset:0;background:rgba(0,0,0,.2);z-index:200;display:none}.drw-bg.on{display:block}
[data-t="dark"] .drw-bg.on{background:rgba(0,0,0,.5)}
.drw{position:fixed;right:0;top:0;bottom:0;width:420px;max-width:100vw;background:var(--card);border-left:1px solid var(--border);z-index:201;overflow-y:auto;transform:translateX(100%);transition:transform .3s var(--ease),background .4s,border-color .4s}.drw.on{transform:none}
.drw-head{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:10px;position:sticky;top:0;background:var(--card);z-index:1;transition:all .4s}
.drw-body{padding:16px}
.dsec{font-family:var(--display);font-size:10px;font-weight:700;color:var(--fg4);letter-spacing:.08em;text-transform:uppercase;margin:14px 0 6px}.dsec:first-child{margin-top:0}
.drow{display:flex;gap:5px;margin-bottom:3px;font-size:13px}.dlbl{color:var(--fg4);min-width:70px;font-size:11px;font-weight:500}.dval{color:var(--fg);font-weight:600;flex:1}
.dbox{background:var(--bg2);border-radius:7px;padding:10px;font-size:13px;line-height:1.6;color:var(--fg);transition:background .4s}

/* MODAL */
.mod-bg{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:300;display:none;align-items:center;justify-content:center;padding:16px}.mod-bg.on{display:flex}
[data-t="dark"] .mod-bg.on{background:rgba(0,0,0,.6)}
.mod{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;width:100%;max-width:400px;animation:up .2s var(--ease);max-height:90vh;overflow-y:auto;transition:all .4s}
.mod-t{font-family:var(--display);font-size:16px;font-weight:800;margin-bottom:12px;color:var(--fg);letter-spacing:-.02em}
.fg{margin-bottom:8px}.fg label{font-family:var(--display);font-size:10px;font-weight:700;color:var(--fg4);margin-bottom:3px;display:block;text-transform:uppercase;letter-spacing:.06em}
.fg input,.fg select,.fg textarea{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:7px;padding:9px 10px;color:var(--fg);font-family:var(--sans);font-size:13px;outline:none;transition:all .3s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--fg)}
.fg input::placeholder,.fg textarea::placeholder{color:var(--fg4)}
.fg textarea{resize:none;min-height:60px;line-height:1.5}
.mod-f{display:flex;gap:6px;margin-top:12px}
.bp{flex:1;padding:10px;background:var(--fg);color:var(--bg);border:none;border-radius:7px;font-family:var(--display);font-size:13px;font-weight:700;cursor:pointer;transition:all .3s}.bp:hover{opacity:.8}.bp:disabled{opacity:.3}
.bo{flex:1;padding:10px;background:var(--bg2);color:var(--fg);border:1px solid var(--border);border-radius:7px;font-family:var(--sans);font-size:13px;cursor:pointer;transition:all .3s}

/* EMPTY / TOAST */
.empty{text-align:center;padding:36px 16px}
.empty-t{font-family:var(--display);font-size:15px;font-weight:700;color:var(--fg3);margin-bottom:3px}
.empty-d{font-size:12px;color:var(--fg4);max-width:260px;margin:0 auto 10px;line-height:1.5}
.empty-b{display:inline-flex;padding:7px 14px;border-radius:6px;background:var(--bg2);border:1px solid var(--border);color:var(--fg3);font-family:var(--sans);font-size:12px;cursor:pointer;transition:all .2s}
.empty-b:hover{border-color:var(--fg);color:var(--fg)}

.log-i{display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);transition:border-color .4s}.log-i:last-child{border-bottom:none}
.log-dot{width:6px;height:6px;border-radius:50%;background:var(--fg4);flex-shrink:0;margin-top:5px;transition:background .4s}
.log-b{flex:1}
.log-a{font-size:13px;font-weight:600;color:var(--fg)}.log-m{font-size:11px;color:var(--fg4);display:flex;gap:6px;flex-wrap:wrap;margin-top:1px}

.ugrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:6px}
.ucard{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;transition:all .3s}
.ucard:hover{border-color:var(--border2)}
.uc-h{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.uc-av{width:32px;height:32px;border-radius:8px;background:var(--bg3);display:grid;place-items:center;font-family:var(--display);font-weight:800;font-size:13px;color:var(--fg);flex-shrink:0;transition:background .4s}
.uc-n{font-family:var(--display);font-size:13px;font-weight:700;color:var(--fg);letter-spacing:-.01em}.uc-u{font-size:10px;color:var(--fg4);font-family:var(--mono)}
.uc-meta{font-size:11px;color:var(--fg3);display:flex;gap:4px;flex-wrap:wrap;margin-bottom:6px}
.rbdg{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600;background:var(--bg3);color:var(--fg3);font-family:var(--mono);transition:all .4s}
.uc-btns{display:flex;gap:3px}
.uc-b{padding:5px 8px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--fg3);font-family:var(--sans);font-size:10px;font-weight:500;cursor:pointer;transition:all .15s}
.uc-b:hover{background:var(--bg2);color:var(--fg)}

.bb{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.bb-n{font-size:12px;min-width:80px;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}
.bb-bar{flex:1;height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;transition:background .4s}
.bb-fill{height:100%;border-radius:2px;background:var(--fg);transition:width .5s var(--ease),background .4s}
.bb-c{font-family:var(--mono);font-size:11px;color:var(--fg3);min-width:20px;text-align:right}

/* CHART PLACEHOLDER */
.chart-area{background:var(--bg2);border-radius:8px;padding:24px;text-align:center;color:var(--fg4);font-size:13px;min-height:180px;display:grid;place-items:center;transition:background .4s}

.toast{position:fixed;top:14px;right:14px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:13px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.06);animation:up .2s var(--ease);display:none;color:var(--fg);font-weight:500;transition:all .4s}

@media(max-width:640px){.g2{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.drw{width:100vw}.content{padding:10px}.ugrid{grid-template-columns:1fr}
.tbl thead{display:none}.tr{display:block;margin-bottom:4px;border:1px solid var(--border);border-radius:7px;padding:9px}.tr td{display:block;border:none;padding:2px 0}.tr td:first-child,.tr td:last-child{border:none;border-radius:0}}
@media(min-width:1025px){.side{transform:none}.ov{display:none!important}.main{margin-left:var(--sidebar)}}
</style>
</head>
<body>

<div id="login">
<div class="lcard">
<div class="lcard-logo"><div class="lcard-icon">IT</div><div class="lcard-t">Admin Portal</div><div class="lcard-s">IT Support Management System</div></div>
<div class="lf"><label>Username</label><div class="input-wrap"><input id="l-user" placeholder="username" autocomplete="username"/></div></div>
<div class="lf"><label>Password</label><div class="input-wrap"><input type="password" id="l-pass" placeholder="password" autocomplete="current-password"/><button class="eye-btn" onclick="togglePw()" id="eye-btn">SHOW</button></div></div>
<button class="lbtn" id="btn-login">Login</button>
<div class="lerr" id="l-err"></div>
<div class="llinks"><a href="/">Home</a><a href="/report">Report</a><a href="/engineer">Engineer</a></div>
</div></div>

<div id="app">
<div class="ov" id="ov" onclick="closeSide()"></div>
<aside class="side" id="side">
  <div class="s-head"><div class="s-logo">IT</div><div><div class="s-name" id="s-name">--</div><div class="s-role" id="s-role">--</div></div></div>
  <nav class="s-nav" id="s-nav"></nav>
  <div class="s-foot">
    <a href="/">Home</a>
    <div style="display:flex;gap:3px">
      <button onclick="togTheme()" style="flex:1" id="theme-btn">Dark</button>
      <button onclick="logout()" style="flex:1">Logout</button>
    </div>
  </div>
</aside>
<div class="main">
  <div class="top">
    <button class="menub" onclick="togSide()">|||</button>
    <div class="top-t" id="top-t">Overview</div>
    <div class="top-clock" id="clock">--:--:--</div>
    <div class="status-dot offline" id="dot"></div>
    <button class="smb" id="btn-rf" onclick="doRefresh()">Refresh</button>
  </div>
  <div class="content">
    <div class="page on" id="pg-dash"></div>
    <div class="page" id="pg-tickets"></div>
    <div class="page" id="pg-users"></div>
    <div class="page" id="pg-log"></div>
    <div class="page" id="pg-gps"></div>
    <div class="page" id="pg-line"></div>
    <div class="page" id="pg-system"></div>
    <div class="page" id="pg-server"></div>
  </div>
</div>
</div>

<div class="drw-bg" id="drw-bg" onclick="closeDrw()"></div>
<div class="drw" id="drw"></div>
<div class="mod-bg" id="mod-bg"><div class="mod" id="mod"></div></div>
<div class="toast" id="toast"></div>

<script>
let AUTH=null,tickets=[],logs=[],users=[],pg='dash',sse=null;
const PG={dash:'Overview',tickets:'All Tickets',users:'Users',log:'Activity Log',gps:'GPS Map',line:'LINE Groups',system:'System Settings',server:'Server Logs'};
const NAV_ALL=[
  {id:'dash',ic:'D',lb:'Overview',min:40},
  {id:'tickets',ic:'T',lb:'Tickets',min:40},
  {id:'users',ic:'U',lb:'Users',min:80},
  {id:'log',ic:'L',lb:'Activity Log',min:60},
  {id:'gps',ic:'G',lb:'GPS Map',min:60},
  {id:'line',ic:'L',lb:'LINE Groups',min:100},
  {id:'system',ic:'S',lb:'System',min:100},
  {id:'server',ic:'V',lb:'Server Logs',min:100}
];
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function api(p,o={}){const h={'Content-Type':'application/json',...(o.headers||{})};if(AUTH?.token)h['Authorization']='Bearer '+AUTH.token;return fetch(p,{...o,headers:h}).then(r=>r.json()).catch(e=>({ok:false,error:e.message}));}
function statusLabel(s){return(s||'--').replace(/[⏱️⚙️✅❌]/g,'').trim();}

// ═══ PASSWORD TOGGLE ═══
function togglePw(){const i=document.getElementById('l-pass'),b=document.getElementById('eye-btn');if(i.type==='password'){i.type='text';b.textContent='HIDE';}else{i.type='password';b.textContent='SHOW';}}

// ═══ AUTH ═══
async function tryAuto(){const s=localStorage.getItem('adm_auth');if(!s)return false;try{const{token}=JSON.parse(s);const d=await api('/api/auth/me',{headers:{'Authorization':'Bearer '+token}});if(d.ok&&['superadmin','admin','manager'].includes(d.user.role)){AUTH={token,user:d.user};return true;}}catch(_){}localStorage.removeItem('adm_auth');return false;}

document.getElementById('btn-login').onclick=async()=>{
  const u=document.getElementById('l-user').value.trim(),p=document.getElementById('l-pass').value;
  const err=document.getElementById('l-err'),btn=document.getElementById('btn-login');
  err.textContent='';if(!u||!p){err.textContent='Enter username and password';return;}
  btn.disabled=true;btn.textContent='Connecting...';
  try{const d=await api('/api/auth/login',{method:'POST',body:JSON.stringify({username:u,password:p})});if(!d.ok)throw new Error(d.error||'Login failed');if(!['superadmin','admin','manager'].includes(d.user.role))throw new Error('Insufficient permissions');AUTH={token:d.token,user:d.user};localStorage.setItem('adm_auth',JSON.stringify(AUTH));boot();}
  catch(e){err.textContent=e.message;}finally{btn.disabled=false;btn.textContent='Login';}
};
['l-user','l-pass'].forEach(id=>document.getElementById(id).onkeydown=e=>{if(e.key==='Enter')document.getElementById('btn-login').click();});
function logout(){api('/api/auth/logout',{method:'POST'}).catch(()=>{});AUTH=null;localStorage.removeItem('adm_auth');location.reload();}
function togTheme(){const d=document.documentElement;d.dataset.t=d.dataset.t==='dark'?'':'dark';localStorage.setItem('adm_theme',d.dataset.t);document.getElementById('theme-btn').textContent=d.dataset.t==='dark'?'Light':'Dark';}
if(localStorage.getItem('adm_theme')==='dark'){document.documentElement.dataset.t='dark';}

// ═══ BOOT ═══
async function boot(){
  document.getElementById('login').style.display='none';document.getElementById('app').classList.add('on');
  document.getElementById('s-name').textContent=AUTH.user.name;
  const rl={superadmin:'Super Admin',admin:'Admin',manager:'Manager'};
  document.getElementById('s-role').textContent=rl[AUTH.user.role]||AUTH.user.role;
  buildNav();startClock();connectSSE();
  await Promise.allSettled([loadTickets(),loadLogs(),loadUsers()]);navTo('dash');
  document.getElementById('theme-btn').textContent=document.documentElement.dataset.t==='dark'?'Light':'Dark';
}

function buildNav(){
  const level={superadmin:100,admin:80,manager:60}[AUTH.user.role]||0;
  const items=NAV_ALL.filter(n=>level>=n.min);
  document.getElementById('s-nav').innerHTML=items.map(n=>`<button class="navb${pg===n.id?' on':''}" data-p="${n.id}"><span class="ni">${n.ic}</span><span>${n.lb}</span>${n.id==='tickets'?'<span class="bdg" id="nav-bdg" style="display:none">0</span>':''}</button>`).join('');
  document.querySelectorAll('[data-p]').forEach(b=>b.onclick=()=>navTo(b.dataset.p));
}

function navTo(p){pg=p;document.querySelectorAll('.page').forEach(el=>el.classList.remove('on'));document.getElementById('pg-'+p)?.classList.add('on');document.getElementById('top-t').textContent=PG[p]||p;document.querySelectorAll('.navb').forEach(b=>b.classList.toggle('on',b.dataset.p===p));closeSide();render();}
function togSide(){document.getElementById('side').classList.toggle('open');document.getElementById('ov').classList.toggle('on');}
function closeSide(){document.getElementById('side').classList.remove('open');document.getElementById('ov').classList.remove('on');}

// ═══ DATA ═══
async function loadTickets(){try{const d=await api('/api/tickets');if(d.ok)tickets=d.tickets||[];updateBdg();}catch(e){}}
async function loadLogs(){try{const d=await api('/api/logs?limit=200');if(d.ok)logs=d.logs||[];}catch(e){}}
async function loadUsers(){try{const d=await api('/api/users');if(d.ok)users=d.users||[];}catch(e){}}
function updateBdg(){const n=tickets.filter(t=>/รอ|pending/.test(t.status||'')).length;const b=document.getElementById('nav-bdg');if(b){b.textContent=n;b.style.display=n?'':'none';}}
async function doRefresh(){const b=document.getElementById('btn-rf');b.textContent='...';document.getElementById('dot').className='status-dot loading';await Promise.allSettled([loadTickets(),loadLogs(),loadUsers()]);b.textContent='Refresh';document.getElementById('dot').className='status-dot online';render();toast('Refreshed');}
function connectSSE(){if(sse)try{sse.close();}catch(_){}sse=new EventSource('/api/events');sse.onopen=()=>{document.getElementById('dot').className='status-dot online';};sse.onerror=()=>{document.getElementById('dot').className='status-dot offline';setTimeout(connectSSE,5000);};sse.addEventListener('ticket_created',()=>{loadTickets().then(render)});sse.addEventListener('ticket_updated',()=>{loadTickets().then(render)});}
function startClock(){const t=()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});};t();setInterval(t,1000);}

// ═══ RENDER ═══
function render(){try{({dash:rDash,tickets:rTickets,users:rUsers,log:rLog,gps:rGPS,line:rLine,system:rSystem,server:rServer}[pg]||rDash)();}catch(e){console.error(e);}}

  document.getElementById('pg-dash').innerHTML=`
    <div style="margin-bottom:14px"><div style="font-family:var(--display);font-size:18px;font-weight:800;color:var(--fg);letter-spacing:-.03em">Welcome, ${esc(AUTH.user.name)}</div><div style="font-size:12px;color:var(--fg4);margin-top:2px">${new Date().toLocaleDateString('th-TH',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div></div>
    <div class="stats">
      <div class="stat"><div class="stat-l">Total</div><div class="stat-v">${t}</div></div>
      <div class="stat"><div class="stat-l">Pending</div><div class="stat-v">${w}</div></div>
      <div class="stat"><div class="stat-l">In Progress</div><div class="stat-v">${p}</div></div>
      <div class="stat"><div class="stat-l">Review</div><div class="stat-v">${rv}</div></div>
      <div class="stat"><div class="stat-l">Completed</div><div class="stat-v">${dn}</div></div>
      <div class="stat"><div class="stat-l">SLA</div><div class="stat-v">${t?Math.round(dn/t*100):0}%</div></div>
    </div>
    <div class="g2" style="margin-bottom:10px">
      <div class="crd"><div class="crd-h">By Brand</div><div style="padding:10px 14px">${brands.length?brands.map(([b,n])=>`<div class="bb"><div class="bb-n">${esc(b)}</div><div class="bb-bar"><div class="bb-fill" style="width:${Math.round(n/maxB*100)}%"></div></div><div class="bb-c">${n}</div></div>`).join(''):'<div style="color:var(--fg4);text-align:center;padding:14px;font-size:13px">No data</div>'}</div></div>
      <div class="crd"><div class="crd-h">Recent Tickets</div><div style="padding:4px 10px">${recent.length?recent.map(x=>`<div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:border-color .4s" onclick="openDrw('${esc(x._recordId)}')"><span style="font-family:var(--mono);font-size:10px;color:var(--fg4);flex-shrink:0">${esc(x.id||'--')}</span><span style="flex:1;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--fg)">${esc(x.type||'-')}</span><span class="pill">${statusLabel(x.status)}</span></div>`).join(''):'<div class="empty"><div class="empty-t">No tickets yet</div></div>'}</div></div>
    </div>
    <div class="g2">
      <div class="crd" style="cursor:pointer" onclick="navTo('tickets')">
        <div class="crd-h">📊 Ticket ตามแบรนด์ (คลิกเพื่อดูทั้งหมด)</div>
        <div style="padding:12px 14px">
          ${Object.entries(bc).sort((a,b)=>b[1]-a[1]).map(([b,n])=>`
          <div class="bb" onclick="event.stopPropagation();tF.brand=decodeURIComponent('${encodeURIComponent(b)}');tF.p=1;navTo('tickets')" style="cursor:pointer;padding:3px 0;border-radius:5px;transition:background .15s" onmouseover="this.style.background='var(--bg2)'" onmouseout="this.style.background=''">
            <div class="bb-n" style="min-width:110px">${esc(b)}</div>
            <div class="bb-bar"><div class="bb-fill" style="width:${Math.round(n/maxB*100)}%"></div></div>
            <div class="bb-c">${n}</div>
          </div>`).join('')}
          ${Object.keys(bc).length===0?'<div style="color:var(--fg4);text-align:center;padding:14px;font-size:13px">ยังไม่มีข้อมูล</div>':''}
        </div>
      </div>
      <div class="crd">
        <div class="crd-h">📅 แนวโน้มรายวัน (7 วันล่าสุด)</div>
        <div style="padding:12px 14px">
          ${(()=>{
            const days=[];
            for(let i=6;i>=0;i--){
              const d=new Date();d.setDate(d.getDate()-i);
              const key=d.toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit'});
              const iso=d.toISOString().slice(0,10);
              const cnt=tickets.filter(t=>{
                const raw=t.sentDate||t.createdAt||t.created_at||'';
                if(!raw)return false;
                return String(raw).startsWith(iso)||(String(raw).includes(key));
              }).length;
              days.push({key,cnt});
            }
            const maxD=Math.max(1,...days.map(d=>d.cnt));
            return days.map(d=>`
            <div class="bb" style="margin-bottom:6px">
              <div style="font-size:11px;min-width:45px;color:var(--fg3)">${d.key}</div>

              <div class="bb-c" style="color:var(--blue)">${d.cnt}</div>
            </div>`).join('');
          })()}
        </div>
      </div>
    </div>`;
}

let tF={status:'',brand:'',q:'',dateFrom:'',dateTo:'',p:1};const PP=15;
function rTickets(){
  const brands=[...new Set(tickets.map(x=>x.brand).filter(Boolean))].sort();
  let data=[...tickets];
  if(tF.status)data=data.filter(x=>(x.status||'').includes(tF.status));
  if(tF.brand)data=data.filter(x=>x.brand===tF.brand);
  if(tF.q){const q=tF.q.toLowerCase();data=data.filter(x=>`${x.id} ${x.reporter} ${x.phone} ${x.type} ${x.detail} ${x.branchCode}`.toLowerCase().includes(q));}
  if(tF.dateFrom||tF.dateTo){data=data.filter(x=>{const raw=x.sentDate||x.createdAt||x.sent_date||'';if(!raw)return true;const d=new Date(raw.replace(/\/([0-9]{4})/g,(m,y)=>parseInt(y)>2400?'/'+(y-543):m));if(isNaN(d))return true;if(tF.dateFrom&&d<new Date(tF.dateFrom+'T00:00:00'))return false;if(tF.dateTo&&d>new Date(tF.dateTo+'T23:59:59'))return false;return true;});}
  const tp=Math.max(1,Math.ceil(data.length/PP));tF.p=Math.min(tF.p,tp);
  const paged=data.slice((tF.p-1)*PP,tF.p*PP);
  document.getElementById('pg-tickets').innerHTML=`
    <div class="filters">
      <div class="srch"><span class="si">Q</span><input placeholder="Search..." value="${esc(tF.q)}" oninput="tF.q=this.value;tF.p=1;rTickets()"/></div>
      <select class="sel" onchange="tF.status=this.value;tF.p=1;rTickets()">
        <option value="">ทุกสถานะ</option>
        <option value="รอดำเนินการ">รอดำเนินการ ⏱️</option>
        <option value="อยู่ระหว่างดำเนินการ">อยู่ระหว่างดำเนินการ ⚙️</option>
        <option value="ตรวจงาน">ตรวจงาน 🔍</option>
        <option value="เสร็จสิ้น">เสร็จสิ้น ✅</option>
        <option value="ยกเลิก">ยกเลิก ❌</option>
        <option value="แก้ไข">แก้ไข ✏️</option>
      </select>
      <select class="sel" onchange="tF.brand=this.value;tF.p=1;rTickets()"><option value="">All Brands</option>${brands.map(b=>`<option ${tF.brand===b?'selected':''}>${esc(b)}</option>`).join('')}</select>
      <input type="date" class="sel" value="${esc(tF.dateFrom)}" onchange="tF.dateFrom=this.value;tF.p=1;rTickets()" title="จากวันที่" style="max-width:140px"/>
      <span style="font-size:12px;color:var(--fg3);align-self:center">ถึง</span>
      <input type="date" class="sel" value="${esc(tF.dateTo)}" onchange="tF.dateTo=this.value;tF.p=1;rTickets()" title="ถึงวันที่" style="max-width:140px"/>
      ${(tF.dateFrom||tF.dateTo)?`<button class="smb" onclick="tF.dateFrom='';tF.dateTo='';tF.p=1;rTickets()" style="color:var(--red)">✕ ล้างวัน</button>`:''}
    </div>
    ${paged.length?`<table class="tbl"><thead><tr><th>Ticket</th><th>Type</th><th>Brand</th><th>Status</th><th>Date</th></tr></thead><tbody>${paged.map(x=>`<tr class="tr" onclick="openDrw('${esc(x._recordId)}')"><td><span style="font-family:var(--mono);font-size:10px;color:var(--fg4)">${esc(x.id||'--')}</span><div style="font-size:11px;color:var(--fg4);margin-top:1px">${esc(x.reporter||'')}</div></td><td><div style="font-weight:600">${esc(x.type||'-')}</div></td><td style="font-size:12px">${esc(x.brand||'-')}</td><td><span class="pill">${statusLabel(x.status)}</span></td><td style="font-size:12px;color:var(--fg3)">${esc(x.sentDate||'-')}</td></tr>`).join('')}</tbody></table>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px;font-size:12px;color:var(--fg4)"><span>${data.length} items | page ${tF.p}/${tp}</span><div style="display:flex;gap:3px">${tF.p>1?`<button class="smb" onclick="tF.p--;rTickets()">Prev</button>`:''} ${tF.p<tp?`<button class="smb" onclick="tF.p++;rTickets()">Next</button>`:''}</div></div>`
    :'<div class="empty"><div class="empty-t">No tickets found</div><div class="empty-d">Adjust filters or wait for new tickets</div></div>'}`;
}

  const sorted=[...users].sort((a,b)=>({superadmin:0,admin:1,manager:2,lead_engineer:3,engineer:4}[a.role]||9)-({superadmin:0,admin:1,manager:2,lead_engineer:3,engineer:4}[b.role]||9));

async function loadLineGroups(){
  try{
    const d=await api('/api/line-config');
    if(!d.ok)return;
    const cfg=d.config||{};
    const setVal=(key,val)=>{const el=document.getElementById('lg-'+key);if(el&&val)el.value=val;};
    setVal('adminGroupId',cfg.adminGroupId||'');
    const bg=cfg.brandGroups||{};
    setVal('dunkin',bg["Dunkin'"]||'');
    setVal('greyhoundCafe',bg['Greyhound Cafe']||'');
    setVal('greyhoundOriginal',bg['Greyhound Original']||'');
    setVal('auBonPain',bg['Au Bon Pain']||'');
    setVal('funkyFries',bg['Funky Fries']||'');
  }catch(_){}
}
async function saveLineGroups(){
  const g=k=>document.getElementById('lg-'+k)?.value?.trim()||'';
  const payload={
    adminGroupId:g('adminGroupId'),
    brandGroups:{"Dunkin'":g('dunkin'),'Greyhound Cafe':g('greyhoundCafe'),'Greyhound Original':g('greyhoundOriginal'),'Au Bon Pain':g('auBonPain'),'Funky Fries':g('funkyFries')}
  };
  try{
    const d=await api('/api/line-config',{method:'PATCH',body:JSON.stringify(payload)});
    const msg=document.getElementById('line-msg');
    if(msg)msg.innerHTML=d.ok?'<span style="color:var(--green)">✅ บันทึกแล้ว</span>':'<span style="color:var(--red)">❌ '+(d.error||'error')+'</span>';
    setTimeout(()=>{const m=document.getElementById('line-msg');if(m)m.innerHTML='';},3000);
  }catch(e){const msg=document.getElementById('line-msg');if(msg)msg.innerHTML='<span style="color:var(--red)">❌ '+e.message+'</span>';}
}
async function testLineGroup(key){
  const val=document.getElementById('lg-'+key)?.value?.trim();
  if(!val){toast('กรุณากรอก LINE Group ID ก่อน');return;}
  try{
    const d=await api('/api/line-config/test',{method:'POST',body:JSON.stringify({to:val})});
    toast(d.ok?'✅ ส่ง Test สำเร็จ!':'❌ '+(d.error||'ส่งไม่สำเร็จ'));
  }catch(e){toast('❌ '+e.message);}
}
function rGPS(){document.getElementById('pg-gps').innerHTML='<div style="font-family:var(--display);font-size:16px;font-weight:800;letter-spacing:-.02em;margin-bottom:10px">GPS Map</div><div class="chart-area" style="min-height:400px">Leaflet.js map placeholder<br/><span style="font-size:11px">Real-time engineer locations will appear here</span></div>';}
function rSystem(){
  const cfg=window._lineCfg||{};
  document.getElementById('pg-system').innerHTML=`
    <div style="margin-bottom:16px">
      <div style="font-family:var(--display);font-size:18px;font-weight:800;letter-spacing:-.02em">⚙️ System Settings</div>
      <div style="font-size:13px;color:var(--fg3);margin-top:3px">LINE Notification Groups — Super Admin only</div>
    </div>
    <div class="crd" style="max-width:600px">
      <div class="crd-h">LINE Group IDs</div>
      <div style="padding:16px">
        ${[
          {label:'🔔 Admin Group (ทุก Ticket)',key:'adminGroupId'},
          {label:"🍩 Dunkin'",key:'dunkin'},
          {label:'☕ Greyhound Cafe',key:'greyhoundCafe'},
          {label:'🐕 Greyhound Original',key:'greyhoundOriginal'},
          {label:'🥐 Au Bon Pain',key:'auBonPain'},
          {label:'🍟 Funky Fries',key:'funkyFries'},
        ].map(({label,key})=>`
        <div style="margin-bottom:12px">
          <div style="font-size:11px;font-weight:700;color:var(--fg3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em">${label}</div>
          <div style="display:flex;gap:6px">
            <input id="line-${key}" class="sel" style="flex:1;border-radius:7px;padding:8px 10px" 
              value="${esc(cfg[key]||cfg.brandGroups?.[label.replace(/^[^\s]+\s/,'')]||'')}" 
              placeholder="C... หรือ U... (LINE ID)"/>
            <button class="smb" onclick="testLine('${key}')">Test</button>
          </div>
        </div>`).join('')}
        <div style="display:flex;gap:8px;margin-top:6px">
          <button class="smb" style="background:var(--fg);color:var(--bg);border-color:var(--fg)" onclick="saveLineConfig()">💾 บันทึก</button>
          <button class="smb" onclick="loadLineConfig()">🔄 โหลด</button>
        </div>
        <div id="system-msg" style="margin-top:8px;font-size:12px;color:var(--green);min-height:16px"></div>
      </div>
    </div>`;
  loadLineConfig();
}
async function loadLineConfig(){
  try{
    const d=await api('/api/line-config');
    if(d.ok){window._lineCfg=d.config||{};rSystem();}
  }catch(_){}
}
async function saveLineConfig(){
  const keys=['adminGroupId','dunkin','greyhoundCafe','greyhoundOriginal','auBonPain','funkyFries'];
  const payload={adminGroupId:'',brandGroups:{}};
  const el=id=>document.getElementById('line-'+id)?.value?.trim()||'';
  payload.adminGroupId=el('adminGroupId');
  payload.brandGroups={"Dunkin'":el('dunkin'),'Greyhound Cafe':el('greyhoundCafe'),'Greyhound Original':el('greyhoundOriginal'),'Au Bon Pain':el('auBonPain'),'Funky Fries':el('funkyFries')};
  try{
    const d=await api('/api/line-config',{method:'PATCH',body:JSON.stringify(payload)});
    const msg=document.getElementById('system-msg');
    if(msg)msg.textContent=d.ok?'✅ บันทึกแล้ว':'❌ '+(d.error||'error');
  }catch(e){const msg=document.getElementById('system-msg');if(msg)msg.textContent='❌ '+e.message;}
}
async function testLine(key){
  const val=document.getElementById('line-'+key)?.value?.trim();
  if(!val){toast('กรุณากรอก LINE ID ก่อน');return;}
  try{
    const d=await api('/api/line-config/test',{method:'POST',body:JSON.stringify({to:val})});
    toast(d.ok?'✅ ส่ง Test สำเร็จ':'❌ '+(d.error||'ส่งไม่สำเร็จ'));
  }catch(e){toast('❌ '+e.message);}
}
function rServer(){
  document.getElementById('pg-server').innerHTML=`
    <div style="margin-bottom:16px">
      <div style="font-family:var(--display);font-size:18px;font-weight:800;letter-spacing:-.02em">🖥️ Server Logs</div>
      <div style="font-size:13px;color:var(--fg3);margin-top:3px">Health check, memory, uptime — Super Admin only</div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:16px" id="srv-stats">
      <div class="stat" style="cursor:pointer" onclick="loadServerHealth()"><div class="stat-l">⏱️ Uptime</div><div class="stat-v" id="srv-uptime" style="font-size:22px">—</div></div>
      <div class="stat"><div class="stat-l">🧠 Memory</div><div class="stat-v" id="srv-mem" style="font-size:22px">—</div></div>
      <div class="stat"><div class="stat-l">📡 Status</div><div class="stat-v" id="srv-status" style="font-size:22px">—</div></div>
      <div class="stat"><div class="stat-l">🎫 Tickets (RAM)</div><div class="stat-v" id="srv-tickets" style="font-size:22px">—</div></div>
    </div>
    <div class="crd" style="max-width:600px">
      <div class="crd-h" style="display:flex;align-items:center;justify-content:space-between">
        Activity Log (ล่าสุด)
        <button class="smb" onclick="loadServerHealth()">🔄 รีเฟรช</button>
      </div>
      <div id="srv-log-list" style="padding:10px 14px;max-height:400px;overflow-y:auto">
        <div style="color:var(--fg4);text-align:center;padding:20px">กดรีเฟรชเพื่อโหลด...</div>
      </div>
    </div>`;
  loadServerHealth();
}
async function loadServerHealth(){
  try{
    const d=await api('/health');
    if(d.ok){
      const fmt=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h?`${h}h ${m}m`:`${m}m`};
      const upEl=document.getElementById('srv-uptime');if(upEl)upEl.textContent=fmt(d.uptime||0);
      const memEl=document.getElementById('srv-mem');if(memEl)memEl.textContent=d.memory||'—';
      const stEl=document.getElementById('srv-status');if(stEl){stEl.textContent='Online';stEl.style.color='var(--green)';}
    }
  }catch(_){}
  try{
    const tEl=document.getElementById('srv-tickets');if(tEl)tEl.textContent=tickets.length;
    const d=await api('/api/logs?limit=50');
    const logEl=document.getElementById('srv-log-list');
    if(logEl&&d.ok&&d.logs?.length){
      logEl.innerHTML=d.logs.map(l=>`<div class="log-i">
        <div class="log-dot" style="background:${l.action==='login'?'var(--green)':l.action?.includes('delete')?'var(--red)':'var(--fg3)'}"></div>
        <div class="log-b">
          <div class="log-a" style="font-size:13px">${esc(l.action||'-')} ${l.ticketLabel?`<span style="font-family:var(--mono);font-size:10px;color:var(--fg4)">${esc(l.ticketLabel)}</span>`:''}</div>
          <div class="log-m"><span>👤 ${esc(l.user?.name||'System')}</span><span>🕐 ${esc(l.displayTs||l.ts||'')}</span></div>
          ${l.detail?`<div style="font-size:12px;color:var(--fg3)">${esc(l.detail)}</div>`:''}
        </div>
      </div>`).join('');
    }else if(logEl){logEl.innerHTML='<div style="color:var(--fg4);text-align:center;padding:20px">ยังไม่มี log</div>';}
  }catch(_){}
}

// ═══ DRAWER ═══
function openDrw(rid){
  const t=tickets.find(x=>x._recordId===rid||x.id===rid||x.ticket_id===rid||String(x.id)===String(rid));
  if(!t){toast('ไม่พบ Ticket: '+rid);return;}
  const realRid=t._recordId||t.id||t.ticket_id||rid;
  document.getElementById('drw-bg').classList.add('on');document.getElementById('drw').classList.add('on');
  const ST=['รอดำเนินการ ⏱️','อยู่ระหว่างดำเนินการ ⚙️','ตรวจงาน','เสร็จสิ้น ✅','ยกเลิก ❌','แก้ไข ✏️'];
  document.getElementById('drw').innerHTML=`<div class="drw-head"><div style="flex:1"><div style="font-family:var(--mono);font-size:11px;color:var(--fg4)">${esc(t.id||t._recordId)}</div><div style="font-family:var(--display);font-size:15px;font-weight:800;margin-top:2px;color:var(--fg);letter-spacing:-.02em">${esc(t.type||'--')}</div><div style="margin-top:4px"><span class="pill">${statusLabel(t.status)}</span></div></div><button class="smb" onclick="closeDrw()">Close</button></div>
  <div class="drw-body">
    <div class="dsec">Actions</div>
    <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px">
      <button class="smb" onclick="openAssign('${esc(realRid)}')">Assign</button>
      ${!/(เสร็จสิ้น|ยกเลิก)/.test(t.status||'')?`<button class="smb" style="background:var(--fg);color:var(--bg);border-color:var(--fg)" onclick="openClose('${esc(realRid)}')">Close Ticket</button>`:''}
      <button class="smb" onclick="openNote('${esc(realRid)}')">Note</button>
    </div>
    <div class="dsec">Status</div>
    <select class="sel" style="width:100%;margin-bottom:10px" onchange="qStatus('${esc(realRid)}',this.value)">${ST.map(s=>`<option${(t.status||'').includes(s)?' selected':''}>${s}</option>`).join('')}</select>
    <div class="dsec">Reporter</div>
    ${[['Name',t.reporter],['Phone',t.phone],['Date',t.sentDate],['Brand',t.brand],['Branch',t.branchCode],['Location',t.location]].map(([l,v])=>`<div class="drow"><span class="dlbl">${l}</span><span class="dval">${esc(v||'-')}</span></div>`).join('')}
    <div class="dsec">Detail</div><div class="dbox">${esc(t.detail||'-')}</div>
    ${t.workDetail?`<div class="dsec">Engineer Report</div><div class="dbox" style="border-left:2px solid var(--fg)"><div style="font-size:11px;font-weight:700;margin-bottom:2px">${esc(t.engineerName||'-')}</div>${esc(t.workDetail)}${t.partsUsed?`<div style="font-size:12px;color:var(--fg3);margin-top:2px">Parts: ${esc(t.partsUsed)}</div>`:''}${t.workHours?`<div style="font-size:12px;color:var(--fg3)">Hours: ${esc(t.workHours)}</div>`:''}</div>`:''}
    ${t.adminNote?`<div class="dsec">Admin Note</div><div class="dbox">${esc(t.adminNote)}</div>`:''}
  </div>`;
}
function closeDrw(){document.getElementById('drw-bg').classList.remove('on');document.getElementById('drw').classList.remove('on');}
async function qStatus(rid,status){try{const t=tickets.find(x=>x._recordId===rid);await api(`/api/tickets/${rid}/status`,{method:'PATCH',body:JSON.stringify({status,brand:t?.brand||''})});tickets=tickets.map(x=>x._recordId===rid?{...x,status}:x);updateBdg();render();toast('Status updated');}catch(e){toast('Error: '+e.message);}}

// ═══ MODALS ═══
function openMod(h){document.getElementById('mod').innerHTML=h;document.getElementById('mod-bg').classList.add('on');}
function closeMod(){document.getElementById('mod-bg').classList.remove('on');}
document.getElementById('mod-bg').onclick=e=>{if(e.target.id==='mod-bg')closeMod();};

function openAssign(rid){const engs=users.filter(u=>['engineer','lead_engineer'].includes(u.role));openMod(`<div class="mod-t">Assign Engineer</div><div class="fg"><label>Select Engineer</label><select class="sel" id="m-eng" style="width:100%"><option value="">-- Select --</option>${engs.map(e=>`<option value="${esc(e.name)}">${esc(e.name)} [${e.role}] (${esc(e.brand||'-')})</option>`).join('')}</select></div><div class="mod-f"><button class="bo" onclick="closeMod()">Cancel</button><button class="bp" onclick="doAssign('${esc(rid)}')">Assign</button></div>`);}
async function doAssign(rid){const n=document.getElementById('m-eng').value;if(!n)return toast('Select engineer');try{const t=tickets.find(x=>x._recordId===rid);await api(`/api/tickets/${rid}/assign`,{method:'PATCH',body:JSON.stringify({engineerName:n,assignedTo:n,brand:t?.brand||''})});tickets=tickets.map(x=>x._recordId===rid?{...x,engineerName:n,status:'assigned'}:x);closeMod();closeDrw();render();toast('Assigned');}catch(e){toast('Error: '+e.message);}}
function openClose(rid){openMod(`<div class="mod-t">Close Ticket</div><div class="fg"><label>Review Note</label><textarea id="m-note" placeholder="Review notes..."></textarea></div><div class="mod-f"><button class="bo" onclick="closeMod()">Cancel</button><button class="bp" onclick="doClose('${esc(rid)}')">Close Ticket</button></div>`);}
async function doClose(rid){const note=(document.getElementById('m-note')?.value||'').trim();try{await api(`/api/tickets/${rid}/close`,{method:'PATCH',body:JSON.stringify({adminNote:note,brand:tickets.find(x=>x._recordId===rid)?.brand||''})});tickets=tickets.map(x=>x._recordId===rid?{...x,status:'completed',adminNote:note,closedBy:AUTH.user.name}:x);closeMod();closeDrw();updateBdg();render();toast('Ticket closed');}catch(e){toast('Error: '+e.message);}}
function openNote(rid){const t=tickets.find(x=>x._recordId===rid);openMod(`<div class="mod-t">Admin Note</div><div class="fg"><label>Note</label><textarea id="m-anote">${esc(t?.adminNote||'')}</textarea></div><div class="mod-f"><button class="bo" onclick="closeMod()">Cancel</button><button class="bp" onclick="doNote('${esc(rid)}')">Save</button></div>`);}
async function doNote(rid){const note=(document.getElementById('m-anote')?.value||'').trim();try{await api(`/api/tickets/${rid}`,{method:'PATCH',body:JSON.stringify({adminNote:note})});tickets=tickets.map(x=>x._recordId===rid?{...x,adminNote:note}:x);closeMod();openDrw(rid);toast('Saved');}catch(e){toast('Error: '+e.message);}}

// ═══ USERS ═══
function openAddUser(){openMod(`<div class="mod-t">Add User</div>${uForm({})}<div class="mod-f"><button class="bo" onclick="closeMod()">Cancel</button><button class="bp" onclick="doAddUser()">Add</button></div>`);}
function openEditUser(id){const u=users.find(x=>x.id===id);if(!u)return;openMod(`<div class="mod-t">Edit ${esc(u.name)}</div>${uForm(u)}<div class="mod-f"><button class="bo" onclick="closeMod()">Cancel</button><button class="bp" onclick="doEditUser('${esc(id)}')">Save</button></div>`);}
function uForm(u){const BR=["ALL","Dunkin'","Greyhound Cafe","Greyhound Original","Au Bon Pain","Funky Fries"];const ROLES=['superadmin','admin','manager','lead_engineer','engineer'];return`<div class="fg"><label>Name</label><input id="uf-n" value="${esc(u.name||'')}"/></div><div class="fg"><label>Username</label><input id="uf-u" value="${esc(u.username||'')}" ${u.id?'disabled':''}/></div>${u.id?`<div class="fg"><label>Current Password</label><div class="input-wrap"><input id="uf-cur" type="password" value="${esc(u.password_plain||'')}" readonly style="background:var(--bg3)"/><button class="eye-btn" onclick="const i=document.getElementById('uf-cur');i.type=i.type==='password'?'text':'password';this.innerHTML=i.type==='password'?'<svg width=16 height=16 viewBox=&quot;0 0 24 24&quot; fill=none stroke=currentColor stroke-width=2><path d=&quot;M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z&quot;/><circle cx=12 cy=12 r=3/></svg>':'<svg width=16 height=16 viewBox=&quot;0 0 24 24&quot; fill=none stroke=currentColor stroke-width=2><path d=&quot;M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24&quot;/><line x1=1 y1=1 x2=23 y2=23/></svg>'"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'SHOW':'HIDE'">SHOW</button></div></div>`:''}<div class="fg"><label>${u.id?'New Password (blank = no change)':'Password'}</label><div class="input-wrap"><input id="uf-p" type="password"/><button class="eye-btn" onclick="const i=document.getElementById('uf-p');i.type=i.type==='password'?'text':'password';this.textContent=i.type==='password'?'SHOW':'HIDE'">SHOW</button></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:5px"><div class="fg"><label>Role</label><select class="sel" id="uf-r" style="width:100%">${ROLES.map(r=>`<option${u.role===r?' selected':''}>${r}</option>`).join('')}</select></div><div class="fg"><label>Brand</label><select class="sel" id="uf-b" style="width:100%">${BR.map(b=>`<option${u.brand===b?' selected':''}>${esc(b)}</option>`).join('')}</select></div></div><div class="fg"><label>LINE User ID</label><input id="uf-line" value="${esc(u.line_user_id||'')}" placeholder="For personal LINE notifications"/></div><div class="fg"><label>Phone</label><input id="uf-ph" value="${esc(u.phone||'')}" placeholder="08x-xxx-xxxx"/></div>`;}
async function doAddUser(){const n=document.getElementById('uf-n').value.trim(),u=document.getElementById('uf-u').value.trim(),p=document.getElementById('uf-p').value;if(!n||!u||!p)return toast('Fill all required fields');try{const d=await api('/api/users',{method:'POST',body:JSON.stringify({name:n,username:u,password:p,role:document.getElementById('uf-r').value,brand:document.getElementById('uf-b').value,line_user_id:document.getElementById('uf-line').value.trim(),phone:document.getElementById('uf-ph').value.trim()})});if(!d.ok)throw new Error(d.error);users.push(d.user);closeMod();render();toast('User added');}catch(e){toast('Error: '+e.message);}}
async function doEditUser(id){const data={name:document.getElementById('uf-n').value.trim(),role:document.getElementById('uf-r').value,brand:document.getElementById('uf-b').value,line_user_id:document.getElementById('uf-line').value.trim(),phone:document.getElementById('uf-ph').value.trim()};const p=document.getElementById('uf-p').value;if(p)data.password=p;try{const d=await api('/api/users/'+id,{method:'PATCH',body:JSON.stringify(data)});if(!d.ok)throw new Error(d.error);users=users.map(u=>u.id===id?{...u,...d.user}:u);closeMod();render();toast('Saved');}catch(e){toast('Error: '+e.message);}}
async function delUser(id,name){if(!confirm('Delete user '+name+'?'))return;try{const d=await api('/api/users/'+id,{method:'DELETE'});if(!d.ok)throw new Error(d.error);users=users.filter(u=>u.id!==id);render();toast('Deleted');}catch(e){toast('Error: '+e.message);}}

let toastT;function toast(m){const el=document.getElementById('toast');el.textContent=m;el.style.display='block';el.style.animation='none';el.offsetHeight;el.style.animation='';clearTimeout(toastT);toastT=setTimeout(()=>el.style.display='none',2500);}

(async()=>{if(await tryAuto().catch(()=>false))boot();})();
</script>
