<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>แจ้งปัญหา — IT Support</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Noto+Sans+Thai:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#080809;--bg2:#0e0e12;--bg3:#16161d;
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);--b3:rgba(255,255,255,.22);
  --fg:rgba(255,255,255,.92);--fg2:rgba(255,255,255,.52);--fg3:rgba(255,255,255,.25);
  --accent:#00e5a0;--accent2:#0099ff;--warn:#ff9640;--danger:#ff4d6d;
  --r:12px;--r2:18px;--r3:24px;
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
  --font-th:'Noto Sans Thai',sans-serif;--font-head:'Syne',sans-serif;--font-mono:'JetBrains Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--fg);font-family:var(--font-th);font-size:15px;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}

/* ── LAYOUT ── */
.app{min-height:100vh;display:flex;flex-direction:column;padding-top:calc(var(--safe-top) + 0px)}
.header{padding:20px 20px 0;display:flex;align-items:center;gap:12px}
.logo{width:40px;height:40px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--font-head);font-size:18px;font-weight:800;color:#000;flex-shrink:0}
.header-text h1{font-family:var(--font-head);font-size:18px;font-weight:700;line-height:1.1}
.header-text p{font-size:12px;color:var(--fg3);margin-top:2px}
.online-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);flex-shrink:0;transition:background .3s}
.header-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.refresh-dot{width:8px;height:8px;border-radius:50%;background:transparent;flex-shrink:0}
.refresh-dot.spinning{background:#3b82f6;animation:pulse-blue .7s ease-in-out infinite}
@keyframes pulse-blue{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.6)}}

/* ── TABS ── */
.tabs{display:flex;margin:20px 20px 0;background:var(--bg2);border-radius:var(--r2);padding:4px;border:1px solid var(--b1)}
.tab{flex:1;padding:10px;border:none;background:transparent;color:var(--fg2);font-family:var(--font-th);font-size:14px;font-weight:500;border-radius:var(--r);cursor:pointer;transition:all .2s;text-align:center}
.tab.active{background:var(--bg3);color:var(--fg);font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,.3)}

/* ── MAIN ── */
.main{flex:1;padding:20px;padding-bottom:calc(90px + var(--safe-bottom))}
.section{display:none}.section.active{display:block}

/* ── FORM ── */
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--fg2);margin-bottom:7px;letter-spacing:.04em;text-transform:uppercase}
.form-group label .req{color:var(--accent);margin-left:2px}
.form-group input,.form-group select,.form-group textarea{
  width:100%;background:var(--bg2);border:1.5px solid var(--b2);border-radius:var(--r);
  padding:13px 15px;color:var(--fg);font-family:var(--font-th);font-size:15px;outline:none;
  transition:border-color .2s;appearance:none;-webkit-appearance:none
}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:var(--accent)}
.form-group input::placeholder,.form-group textarea::placeholder{color:var(--fg3)}
.form-group select option{background:#111115;color:var(--fg)}
.form-group textarea{resize:none;min-height:100px;line-height:1.6}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.char-count{font-size:11px;color:var(--fg3);text-align:right;margin-top:4px}

/* ── BUTTONS ── */
.btn-submit{
  width:100%;padding:16px;background:var(--accent);color:#000;
  border:none;border-radius:var(--r2);font-family:var(--font-th);
  font-size:16px;font-weight:700;cursor:pointer;margin-top:8px;
  transition:opacity .15s,transform .1s;letter-spacing:.01em
}
.btn-submit:hover{opacity:.88}.btn-submit:active{transform:scale(.98)}
.btn-submit:disabled{opacity:.4;cursor:default}

/* ── SUCCESS STATE ── */
.success-card{
  background:var(--bg2);border:1.5px solid rgba(0,229,160,.2);
  border-radius:var(--r3);padding:28px 22px;text-align:center;margin-top:8px;
  animation:fadeIn .4s ease
}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.success-icon{font-size:44px;margin-bottom:12px}
.success-title{font-family:var(--font-head);font-size:20px;font-weight:700;margin-bottom:8px}
.ticket-badge{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.3);
  border-radius:8px;padding:8px 16px;margin:14px 0;
  font-family:var(--font-mono);font-size:18px;font-weight:500;color:var(--accent)
}
.success-note{font-size:13px;color:var(--fg2);line-height:1.7;margin-bottom:18px}
.btn-new{
  padding:12px 24px;background:transparent;border:1.5px solid var(--b2);
  color:var(--fg);border-radius:var(--r);font-family:var(--font-th);
  font-size:14px;cursor:pointer;transition:border-color .15s
}
.btn-new:hover{border-color:var(--b3)}
.btn-copy{
  padding:7px 14px;background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.3);
  color:var(--accent);border-radius:8px;font-size:12px;cursor:pointer;
  margin-left:8px;font-family:var(--font-th);border:none;transition:background .15s
}
.btn-copy:hover{background:rgba(0,229,160,.2)}

/* ── TRACK ── */
.search-wrap{position:relative;margin-bottom:20px}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--fg3);font-size:16px;pointer-events:none}
.search-input{
  width:100%;background:var(--bg2);border:1.5px solid var(--b2);
  border-radius:var(--r2);padding:14px 14px 14px 42px;
  color:var(--fg);font-family:var(--font-th);font-size:15px;outline:none;
  transition:border-color .2s
}
.search-input:focus{border-color:var(--accent)}
.search-input::placeholder{color:var(--fg3)}
.search-hint{font-size:12px;color:var(--fg3);margin-top:8px;text-align:center}

/* ── TICKET CARD ── */
.ticket-card{
  background:var(--bg2);border:1.5px solid var(--b1);border-radius:var(--r2);
  padding:18px;margin-bottom:12px;cursor:pointer;transition:border-color .15s
}
.ticket-card:hover{border-color:var(--b2)}
.tc-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:10px}
.tc-id{font-family:var(--font-mono);font-size:13px;color:var(--accent);font-weight:500}
.tc-brand{font-size:11px;color:var(--fg3);margin-top:3px}
.status-pill{
  padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;
  flex-shrink:0;white-space:nowrap
}
.tc-type{font-size:14px;font-weight:600;margin-bottom:6px;line-height:1.4}
.tc-detail{font-size:13px;color:var(--fg2);line-height:1.6;margin-bottom:10px;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.tc-meta{display:flex;gap:14px;font-size:11.5px;color:var(--fg3)}

/* ── TIMELINE ── */
.timeline{margin-top:20px;padding-top:20px;border-top:1px solid var(--b1)}
.tl-title{font-size:12px;font-weight:600;color:var(--fg3);letter-spacing:.05em;text-transform:uppercase;margin-bottom:14px}
.tl-steps{display:flex;gap:0;position:relative}
.tl-step{flex:1;position:relative;padding-bottom:8px}
.tl-step::after{content:'';position:absolute;top:12px;left:calc(50% + 12px);right:calc(-50% + 12px);height:2px;background:var(--b1)}
.tl-step:last-child::after{display:none}
.tl-step.done::after{background:var(--accent)}
.tl-dot{width:24px;height:24px;border-radius:50%;border:2px solid var(--b2);background:var(--bg2);margin:0 auto 6px;display:flex;align-items:center;justify-content:center;font-size:10px;position:relative;z-index:1}
.tl-step.done .tl-dot{background:var(--accent);border-color:var(--accent);color:#000;font-size:11px}
.tl-step.active .tl-dot{border-color:var(--accent);box-shadow:0 0 12px rgba(0,229,160,.4)}
.tl-label{text-align:center;font-size:10.5px;color:var(--fg3);line-height:1.3}
.tl-step.done .tl-label,.tl-step.active .tl-label{color:var(--fg)}
.tl-step.cancelled .tl-dot{background:rgba(255,77,109,.2);border-color:#ff4d6d;color:#ff4d6d}

/* ── HISTORY (recent from localStorage) ── */
.history-title{font-size:12px;font-weight:600;color:var(--fg3);letter-spacing:.05em;text-transform:uppercase;margin:20px 0 12px}
.history-toggle{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;background:var(--bg2);border-radius:var(--r);
  border:1px solid var(--b1);cursor:pointer;font-size:13px;color:var(--fg2);
  transition:border-color .15s;user-select:none;margin-top:8px
}
.history-toggle:hover{border-color:var(--b2)}
.history-toggle .ht-arrow{margin-left:auto;transition:transform .2s;font-size:10px}
.history-toggle.open .ht-arrow{transform:rotate(180deg)}
.history-dropdown{
  background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);
  margin-top:4px;overflow:hidden;
  max-height:0;opacity:0;
  transition:max-height .25s ease, opacity .2s ease;
}
.history-dropdown.open{max-height:500px;opacity:1}
.history-item{
  display:flex;align-items:center;gap:10px;padding:12px;
  background:transparent;cursor:pointer;
  border-bottom:1px solid var(--b1);transition:background .15s
}
.history-item:last-child{border-bottom:none}
.history-item:hover{background:var(--bg3,#1a1a22)}
.hi-id{font-family:var(--font-mono);font-size:12px;color:var(--accent);flex:1}
.hi-brand{font-size:12px;color:var(--fg2)}
.hi-status{margin-left:auto}

/* ── STATUS COLORS ── */
.s-แก้ไข{background:rgba(255,150,64,.15);color:#ff9640}
.s-อยู่ระหว่างดำเนินการ{background:rgba(0,153,255,.15);color:#0099ff}
.s-รอดำเนินการ{background:rgba(155,89,182,.15);color:#b87be8}
.s-เสร็จสิ้น{background:rgba(0,229,160,.15);color:#00e5a0}
.s-ยกเลิก{background:rgba(255,77,109,.15);color:#ff4d6d}

/* ── ERROR / INFO ── */
.alert{padding:12px 16px;border-radius:var(--r);font-size:13.5px;margin-bottom:14px;display:flex;gap:10px;align-items:flex-start}
.alert-err{background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.25);color:#ff8099}
.alert-info{background:rgba(0,153,255,.08);border:1px solid rgba(0,153,255,.2);color:#66b3ff}

/* ── EMPTY ── */
.empty{text-align:center;padding:50px 20px;color:var(--fg3)}
.empty-icon{font-size:40px;margin-bottom:10px}
.empty-text{font-size:15px}
.empty-sub{font-size:13px;margin-top:6px;opacity:.6}

/* ── LOADING ── */
.filter-row{display:flex;gap:8px;align-items:stretch}
.filter-select{background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r);color:var(--fg);font-size:13px;padding:0 12px;height:46px;min-width:0;flex:1;outline:none;appearance:none;-webkit-appearance:none}
.filter-select:focus{border-color:var(--accent)}
.filter-select::placeholder{color:var(--fg3)}
@media(max-width:480px){.filter-row{flex-wrap:wrap}.filter-select{flex:1 1 45%}}
.loading{display:flex;align-items:center;gap:10px;padding:30px;justify-content:center;color:var(--fg3)}
.spinner{width:18px;height:18px;border:2px solid var(--b2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── RESPONSIVE ── */
@media(min-width:640px){
  .app{max-width:520px;margin:0 auto;padding-top:40px}
  .header{padding:0 0 0}
  .tabs,.main{padding-left:0;padding-right:0}
  .btn-submit{max-width:100%}
}

.group-section{margin-bottom:8px}
.group-toggle{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--bg2);border-radius:var(--r);border:1px solid var(--b1);cursor:pointer;font-size:13px;font-weight:600;color:var(--fg);user-select:none}
.group-toggle .ht-arrow{transition:transform .2s;font-size:10px}
.group-toggle.open .ht-arrow{transform:rotate(180deg)}
.g-count{background:var(--accent);color:#000;border-radius:99px;font-size:10px;font-weight:700;padding:1px 7px}
.group-body{overflow:hidden;max-height:0;transition:max-height .25s ease}
.group-body.open{max-height:1000px}
.ticket-row{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--b1);cursor:pointer;transition:background .15s}
.ticket-row:hover{background:var(--bg3,#1a1a22)}
.ticket-row:last-child{border-bottom:none}
.ticket-row-type{font-size:12px;color:var(--fg2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ticket-row-branch{font-size:11px;color:var(--fg3);white-space:nowrap}
/* ═══════════════════════════════════════════════════
   FAB NAVIGATION PANEL
   - ปุ่มหลักมุมขวาล่าง fixed
   - กางออก L-shape: แนวตั้ง (↑⌕↓) + แนวนอน (pagination)
   - mobile: bottom ขยับเหนือ bottom-nav
═══════════════════════════════════════════════════ */
.fab-wrap{position:fixed;right:16px;bottom:16px;z-index:9999;display:flex;align-items:flex-end;justify-content:flex-end;pointer-events:none}
.fab-wrap *{pointer-events:auto}
.fab-main{width:50px;height:50px;border:none;border-radius:50%;background:var(--accent);color:#000;font-size:22px;font-weight:700;box-shadow:0 8px 24px rgba(0,229,160,.35);cursor:pointer;transition:transform .25s ease,background .2s;position:relative;z-index:3;display:flex;align-items:center;justify-content:center;line-height:1}
.fab-main:hover{background:#00c98a}
.fab-wrap.fab-open .fab-main{transform:rotate(45deg)}
/* Top branch — แนวตั้ง ↑⌕↓ */
.fab-branch-top{position:absolute;right:2px;bottom:calc(50px + 12px);display:flex;flex-direction:column-reverse;align-items:center;gap:8px;opacity:0;visibility:hidden;transition:opacity .25s ease,visibility .25s ease}
.fab-wrap.fab-open .fab-branch-top{opacity:1;visibility:visible}
/* Left branch — แนวนอน pagination */
.fab-branch-left{position:absolute;right:calc(50px + 12px);bottom:2px;display:flex;flex-direction:row-reverse;align-items:center;gap:6px;opacity:0;visibility:hidden;transition:opacity .25s ease,visibility .25s ease;max-width:calc(100vw - 90px);overflow-x:auto;padding:4px 2px;scrollbar-width:none}
.fab-branch-left::-webkit-scrollbar{display:none}
.fab-wrap.fab-open .fab-branch-left{opacity:1;visibility:visible}
/* FAB buttons */
.fab-btn{min-width:40px;height:40px;border:none;border-radius:20px;background:var(--bg3);color:var(--fg);cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.4);padding:0 12px;font-size:13px;font-family:var(--font-th);white-space:nowrap;transition:transform .15s,background .15s,opacity .15s;border:1px solid var(--b2);display:flex;align-items:center;justify-content:center}
.fab-btn:hover{transform:translateY(-2px);background:var(--bg4,#1c1c24)}
.fab-btn.fab-icon{width:40px;min-width:40px;padding:0;font-size:16px}
.fab-btn.fab-active{background:var(--accent);color:#000;border-color:var(--accent);font-weight:700}
.fab-btn.fab-disabled{opacity:.35;cursor:not-allowed;pointer-events:none}
/* Search popup */
.fab-search-pop{position:absolute;right:calc(40px + 16px);bottom:calc(40px + 56px);width:min(260px,calc(100vw - 100px));background:var(--bg2);border:1px solid var(--b2);border-radius:14px;box-shadow:0 12px 40px rgba(0,0,0,.5);padding:14px;opacity:0;visibility:hidden;transform:translateY(8px);transition:all .2s ease;z-index:10}
.fab-search-pop.fab-search-open{opacity:1;visibility:visible;transform:translateY(0)}
.fab-search-pop label{display:block;font-size:11px;font-weight:600;color:var(--fg3);margin-bottom:7px;letter-spacing:.04em;text-transform:uppercase}
.fab-search-input{width:100%;height:40px;background:var(--bg3);border:1.5px solid var(--b1);border-radius:10px;padding:0 12px;outline:none;color:var(--fg);font-family:var(--font-th);font-size:14px;transition:border-color .2s}
.fab-search-input:focus{border-color:var(--accent)}
.fab-search-hint{margin-top:7px;font-size:11px;color:var(--fg3);line-height:1.5}
/* per-page selector in fab */
.fab-perpage{background:var(--bg3);border:1px solid var(--b2);border-radius:20px;color:var(--fg);font-family:var(--font-th);font-size:12px;padding:0 10px;height:40px;outline:none;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.4)}
/* Mobile: ขยับเหนือ bottom-nav */
@media(max-width:768px){
  .fab-wrap{bottom:calc(60px + var(--safe-bottom) + 8px)}
  .fab-branch-left{max-width:calc(100vw - 80px)}
}

/* Report: no bottom-nav so FAB stays at default bottom */
@media(max-width:768px){
  .fab-wrap{bottom:16px}
}


/* CLOCK + TEMP widget — report header */
.clock-widget{display:flex;align-items:center;gap:5px;font-size:11px;color:rgba(255,255,255,.6);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:4px 10px;white-space:nowrap;flex-shrink:0;margin-top:6px}
#clock-time{font-family:monospace;font-size:12px;color:rgba(255,255,255,.9);font-weight:500}
#clock-temp{color:#00e5a0;font-weight:600}

</style>
</head>
<body>
<style>
#app-splash{position:fixed;inset:0;background:#07070a;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .4s ease}
#app-splash.hide{opacity:0;pointer-events:none}
.splash-logo{width:56px;height:56px;background:#00e5a0;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#000;font-family:'Syne',sans-serif;animation:splashPulse 1.2s ease-in-out infinite}
@keyframes splashPulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.08);opacity:.85}}
.splash-text{font-size:13px;color:rgba(255,255,255,.35);font-family:'Noto Sans Thai',sans-serif}
.splash-bar{width:160px;height:2px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.splash-fill{height:100%;background:#00e5a0;border-radius:2px;animation:splashLoad 2s ease-out forwards}
@keyframes splashLoad{from{width:0}to{width:85%}}
</style>
<div id="app-splash">
  <div class="splash-logo">IT</div>
  <div class="splash-bar"><div class="splash-fill"></div></div>
  <div class="splash-text">กำลังโหลด...</div>
</div>
<script>
// ซ่อน splash เมื่อหน้าพร้อม
window.hideSplash = function(){
  const s = document.getElementById('app-splash');
  if(s){ s.classList.add('hide'); setTimeout(()=>s.remove(), 450); }
};
// บังคับซ่อน splash หลัง 8 วิ ถ้า load ไม่เสร็จ
setTimeout(window.hideSplash, 8000);
</script>
<div class="app">
  <div class="header">
    <div class="logo">IT</div>
    <div class="header-text">
      <h1>IT Support</h1>
      <p>ระบบแจ้งปัญหาและติดตามงาน</p>
    </div>
    <div class="header-right" style="flex-direction:column;align-items:flex-end;gap:4px">
    <div style="display:flex;align-items:center;gap:8px">
      <div class="refresh-dot" id="refresh-dot"></div>
      <div class="online-dot" id="dot"></div>
    </div>
    <div class="clock-widget"><span>🕐</span><span id="clock-time">--:--:--</span><span id="clock-temp">--°C</span></div>
  </div>
  </div>

  <div class="tabs" style="margin-top:20px">
    <button class="tab active" data-tab="submit">✏️ แจ้งปัญหา</button>
    <button class="tab" data-tab="track">🔍 ติดตาม</button>
  </div>

  <div class="main">
    <!-- SUBMIT TAB -->
    <div class="section active" id="tab-submit">
      <div id="form-area">
        <div id="form-error" class="alert alert-err" style="display:none"></div>

            <select id="f-type">

              <option>งานระบบไฟฟ้า/แสงว่าง</option>
              <option>งานระบบประปาและสุขาภิบาล</option>
              <option>งานระบบปรับอากาศ</option>
              <option>งานเครื่องจักร/อุปกรณ์เฉพาะทาง</option>
              <option>เครื่องทำกาแฟ/เครื่องบดกาแฟ</option>
              <option>เครื่องทำน้ำร้อน</option>
              <option>ตู้แช่/ตู้เย็น</option>
              <option>เครื่องกรอกน้ำ/ไส้กรอกน้ำ</option>
              <option>เครื่องซีลแก้ว</option>
              <option>งานโครงสร้าง</option>
              <option>กล้องวงจรปิด</option>
              <option>งานระบบ IT/Network</option>
              <option>อื่นๆ</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>สถานที่/โซน</label>
          <input type="text" id="f-location" placeholder="เช่น ชั้น 2 / ครัว / เคาน์เตอร์"/>
        </div>
        <div class="form-group">
          <label>รายละเอียดปัญหา <span class="req">*</span></label>
          <textarea id="f-detail" placeholder="อธิบายอาการปัญหา เช่น เครื่องปรับอากาศไม่ทำงาน เปิดไม่ติดตั้งแต่เช้า..." maxlength="500"></textarea>
          <div class="char-count"><span id="char-num">0</span>/500</div>
        </div>
        <button class="btn-submit" id="btn-submit">

        <div style="font-size:13px;color:var(--fg2);margin-bottom:16px">หมายเลขอ้างอิง: <span id="success-id" style="font-family:var(--font-mono);color:var(--accent)">—</span></div>
        <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap">
          <button class="btn-copy" id="btn-copy">คัดลอก</button>
          <button class="btn-new" id="btn-new">แจ้งปัญหาใหม่</button>

      <div id="success-area" style="display:none"></div>

    <!-- TRACK TAB -->
    <div class="section" id="tab-track">
      <div class="filter-row">
        <div class="search-wrap" style="flex:1">
          <span class="search-icon">🔍</span>
          <input class="search-input" id="track-input" type="text" placeholder="Ticket ID / เบอร์ / ชื่อ (ไม่บังคับ)"/>
        </div>
        <select class="filter-select" id="f-filter-brand" required>
          <option value="">— แบรนด์ —</option>
          <option>Dunkin'</option>
          <option>Greyhound Cafe</option>
          <option>Greyhound Original</option>
          <option>Au Bon Pain</option>
          <option>Funky Fries</option>
        </select>
        <input class="filter-select" id="f-filter-branch" type="text" placeholder="รหัสสาขา *" required/>
      </div>
      <div class="search-hint" id="filter-hint" style="color:#ff8099;display:none">⚠️ กรุณาเลือกแบรนด์และกรอกรหัสสาขา</div>
      <div class="search-hint" id="filter-hint-ok" style="display:none">ค้นหา Ticket ด้วย ID หรือเบอร์มือถือที่ใช้แจ้ง</div>
      <div class="search-hint" id="filter-hint-default">กรอกแบรนด์และรหัสสาขาเพื่อค้นหา</div>
      <div id="track-result"></div>
      <div id="track-history-wrap" style="position:relative">
        <div id="track-history"></div>
      </div>

</div>


<!-- ═══════════════════════════════════════════════════
     FAB NAVIGATION PANEL (Report)
     - search popup → เชื่อม #f-search input เดิม
     - pagination → แบ่งหน้าผลใน #track-result
═══════════════════════════════════════════════════ -->
<div class="fab-wrap" id="rpt-fab-wrap">
  <div class="fab-search-pop" id="fab-search-pop">
    <label>ค้นหา Ticket</label>
    <input class="fab-search-input" id="fab-search-input" type="text" placeholder="ID, ชื่อ, ประเภท…"/>
    <div class="fab-search-hint">พิมพ์เพื่อกรองทันที · คลิกนอกเพื่อปิด</div>
  </div>
  <div class="fab-branch-top">
    <button class="fab-btn fab-icon" id="fab-to-top">↑</button>
    <button class="fab-btn fab-icon" id="fab-search-btn">⌕</button>
    <button class="fab-btn fab-icon" id="fab-to-bottom">↓</button>
  </div>
  <div class="fab-branch-left" id="fab-pag-bar"></div>
  <button class="fab-main" id="fab-main-btn">+</button>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {

// ── Brand from URL path ───────────────────────────────────────
(function applyBrandFromUrl(){
  const BRAND_MAP = {
    'dunkin':             "Dunkin'",
    'greyhound cafe':     'Greyhound Cafe',
    'greyhound original': 'Greyhound Original',
    'au bon pain':        'Au Bon Pain',
    'funky fries':        'Funky Fries',
  };
  const raw   = decodeURIComponent(window.location.pathname.split('/').pop()||'');
  const slug  = raw.replace(/[+]/g,' ').trim().toLowerCase();
  const brand = BRAND_MAP[slug];
  if(!brand) return;

  // Lock form brand select
  const fBrand = document.getElementById('f-brand');
  if(fBrand){ fBrand.value=brand; fBrand.disabled=true; fBrand.style.cssText+='opacity:.6;cursor:not-allowed'; }

  // Lock filter brand select
  const fFilter = document.getElementById('f-filter-brand');
  if(fFilter){ fFilter.value=brand; fFilter.disabled=true; fFilter.style.cssText+='opacity:.6;cursor:not-allowed'; }

  // Show brand name under header
  const hdr = document.querySelector('.header-text');
  if(hdr){
    const b = document.createElement('div');
    b.style.cssText = 'font-size:11px;color:var(--accent);font-weight:600;margin-top:2px';
    b.textContent = brand;
    hdr.appendChild(b);
  }
  // Auto-trigger search
  setTimeout(()=>{ if(typeof triggerSearch==='function') triggerSearch(); }, 600);
})();

// ── State ────────────────────────────────────────────────────
const STATUSES = ['แก้ไข','รอดำเนินการ ⏱️','ตรวจงาน','อยู่ระหว่างดำเนินการ ⚙️','เสร็จสิ้น ✅','ยกเลิก ❌'];
let allTickets = [];
let sseConn = null;
let trackTimer = null;

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function cssStatus(s){ return String(s||'').replace(/[✅⚙️⏱️❌🔍✏️]/g,'').trim(); }
function safe(s){ if(!s) return ''; if(String(s).startsWith('http')) return ''; return String(s); }

// ── SSE ──────────────────────────────────────────────────────
function connectSSE(){
  sseConn = new EventSource('/api/events');
  sseConn.addEventListener('ticket_updated', async e => {
    try{
      const d = JSON.parse(e.data);
      allTickets = allTickets.map(t => t._recordId===d.recordId ? {...t, status:d.status||t.status} : t);
      renderHistory();
      const shown = document.getElementById('track-result').dataset.rid;
      if(shown && shown===d.recordId) searchById(d.recordId, true);
    }catch(_){}
  });
  sseConn.onopen  = () => { document.getElementById('dot').style.background='#00e5a0'; };
  sseConn.onerror = () => { document.getElementById('dot').style.background='#ff4d6d'; setTimeout(connectSSE,5000); };
}
connectSSE();

// ── Load tickets (cached) ────────────────────────────────────
async function loadTickets(){
  try{
    const ctrl = new AbortController();
    const tid  = setTimeout(()=>ctrl.abort(), 8000); // timeout 8s
    const r = await fetch('/api/tickets', { signal: ctrl.signal });
    clearTimeout(tid);
    const d = await r.json();
    if(d.ok) allTickets = d.tickets;
  }catch(e){
    console.warn('[loadTickets]', e.message);
  }
}

// ── Initial load ─────────────────────────────────────────────
(async()=>{
  try{
    renderHistory();
    await loadTickets();
    renderHistory();
  }catch(e){ console.error('boot error:',e); }
  finally{ window.hideSplash?.(); }
})();

// ── Auto-refresh ทุก 30 วิ ────────────────────────────────────
setInterval(async()=>{
  const rdot = document.getElementById('refresh-dot');
  if(rdot) rdot.classList.add('spinning');
  try{
    await loadTickets();
    renderHistory();
    const shown = document.getElementById('track-result').dataset.rid;
    if(shown) searchById(shown, true);
  } finally {
    if(rdot) setTimeout(()=>rdot.classList.remove('spinning'), 500);
  }
}, 30000);

// ── Tabs ──────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t => {
  t.onclick = () => {
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('tab-'+t.dataset.tab).classList.add('active');
    if(t.dataset.tab==='track') renderHistory();
  };
});

// ── Search input ──────────────────────────────────────────────
function triggerSearch(){
  clearTimeout(trackTimer);
  const brand  = (document.getElementById('f-filter-brand')?.value||'').trim();
  const branch = (document.getElementById('f-filter-branch')?.value||'').trim();
  const q      = (document.getElementById('track-input')?.value||'').trim();
  // Brand และ Branch บังคับ
  if(!brand || !branch){
    document.getElementById('filter-hint').style.display = 'flex';
    document.getElementById('filter-hint-default').style.display = 'none';
    document.getElementById('filter-hint-ok').style.display = 'none';
    document.getElementById('track-result').innerHTML='';
    document.getElementById('track-result').dataset.rid='';
    renderHistory();
    return;
  }
  document.getElementById('filter-hint').style.display = 'none';
  document.getElementById('filter-hint-default').style.display = 'none';
  document.getElementById('filter-hint-ok').style.display = 'block';
  trackTimer = setTimeout(()=>doSearch(q, brand, branch), 300);
}
document.getElementById('track-input').oninput = triggerSearch;
document.getElementById('f-filter-brand').onchange = triggerSearch;
document.getElementById('f-filter-branch').oninput = triggerSearch;

async function doSearch(q, brand, branch){
  if(!allTickets.length) await loadTickets();
  const ql = (q||'').toLowerCase();
  const bl = (branch||'').toLowerCase();
  let found = allTickets.filter(t => {
    // Brand และ Branch บังคับตรง
    const brandOk  = brand  ? (t.brand||'').toLowerCase().includes(brand.toLowerCase()) : true;
    const branchOk = branch ? (t.branchCode||'').toLowerCase().includes(bl) : true;
    if(!brandOk || !branchOk) return false;
    // keyword ไม่บังคับ
    if(!ql) return true;
    return (t.id||'').toLowerCase().includes(ql) ||
           (t.phone||'').includes(ql) ||
           (t.reporter||'').toLowerCase().includes(ql) ||
           (t.detail||'').toLowerCase().includes(ql);
  });
  const el = document.getElementById('track-result');
  el.dataset.rid = '';
  if(!found.length){
    el.innerHTML='<div class="alert alert-err">⚠️ ไม่พบ Ticket ของ <b>'+esc(brand)+'</b> สาขา <b>'+esc(branch)+'</b>'+(ql?' ที่ตรงกับ "'+esc(q)+'"':'')+'</div>';
    return;
  }
  el.innerHTML = renderGrouped(found);
}

async function searchById(rid, silent=false){
  if(!rid) return;
  const resultEl = document.getElementById('track-result');
  resultEl.dataset.rid = rid;
  if(!silent){
    document.getElementById('track-input').value='';
    resultEl.innerHTML='<div class="loading"><div class="spinner"></div> กำลังโหลด...</div>';
    await loadTickets();
  }
  const t = allTickets.find(x => x._recordId===rid || x.id===rid);
  if(t) resultEl.innerHTML = ticketCard(t, true);
  else  resultEl.innerHTML = '<div class="alert alert-err">ไม่พบ Ticket นี้</div>';
}

// ── Render grouped by status ──────────────────────────────────
function renderGrouped(tickets){
  const GROUPS = [
    { label:'⏱️ รอดำเนินการ',      statuses:['รอดำเนินการ ⏱️','แก้ไข'] },
    { label:'⚙️ กำลังดำเนินการ',   statuses:['อยู่ระหว่างดำเนินการ ⚙️'] },
    { label:'🔍 ตรวจสอบ',           statuses:['ตรวจงาน'] },
    { label:'✅ เสร็จสิ้น',         statuses:['เสร็จสิ้น ✅'] },
    { label:'❌ ยกเลิก',            statuses:['ยกเลิก ❌'] },
  ];
  let html = '';
  GROUPS.forEach(g => {
    const items = tickets.filter(t => g.statuses.includes(t.status||'แก้ไข'));
    if(!items.length) return;
    html += `<div class="group-section">
      <div class="group-toggle open" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
        <span>${g.label}</span>
        <span class="g-count">${items.length}</span>
        <span class="ht-arrow" style="margin-left:auto">▼</span>
      </div>
      <div class="group-body open">
        ${items.map(t => `<div class="ticket-row" onclick="searchById('${esc(t._recordId||t.id)}')">
          <span class="hi-id">🎫 ${esc(t.id||'—')}</span>
          <span class="ticket-row-type">${esc(t.type||'-')}</span>
          <span class="ticket-row-branch">${esc(t.branchCode||t.brand||'-')}</span>
        </div>`).join('')}
      </div>
    </div>`;
  });
  return html || '<div class="alert alert-info">ไม่มีข้อมูล</div>';
}

// ── History dropdown (10 latest from API) ────────────────────
function toggleHistory(el){
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('open');
}

async function renderHistory(){
  const el = document.getElementById('track-history');
  if(!el) return;
  if(!allTickets.length) await loadTickets();
  const latest = allTickets.slice(0, 10);
  const count  = allTickets.length;
  const isOpen = !!(el.querySelector && el.querySelector('.history-dropdown.open'));
  if(!latest.length){
    el.innerHTML='<div class="history-toggle"><span>📋 Ticket ล่าสุด</span><span class="ht-arrow" style="margin-left:auto">▼</span></div><div class="history-dropdown"><div style="padding:16px;text-align:center;color:var(--fg3);font-size:13px">ยังไม่มี Ticket</div></div>';
    return;
  }
  const rows = latest.map(h=>`<div class="history-item" onclick="searchById('${esc(h._recordId||h.id)}')">
    <span class="hi-id">🎫 ${esc(h.id||'—')}</span>
    <span style="font-size:11px;color:var(--fg3);margin:0 6px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(h.type||h.detail||'-')}</span>
    <span class="hi-status"><span class="status-pill s-${cssStatus(h.status)}" style="font-size:10px;padding:2px 8px;white-space:nowrap">${esc(h.status||'แก้ไข')}</span></span>
  </div>`).join('');
  el.innerHTML=`<div class="history-toggle ${isOpen?'open':''}" onclick="toggleHistory(this)">
    <span>📋 Ticket ล่าสุด</span>
    <span style="background:var(--accent);color:#000;border-radius:99px;font-size:10px;font-weight:700;padding:1px 7px;margin-left:6px">${count}</span>
    <span class="ht-arrow">▼</span>
  </div>
  <div class="history-dropdown ${isOpen?'open':''}">${rows}</div>`;
}

// ── Ticket card ───────────────────────────────────────────────
function ticketCard(t, expanded=false){
  const TL        = ['รอดำเนินการ ⏱️','อยู่ระหว่างดำเนินการ ⚙️','ตรวจงาน','เสร็จสิ้น ✅'];
  const TL_LABELS = ['รอดำเนินการ','กำลังดำเนินการ','ตรวจสอบ','เสร็จสิ้น'];
  const TL_ICONS  = ['⏱️','⚙️','🔍','✅'];
  const STATUS_IDX = {'แก้ไข':0,'รอดำเนินการ ⏱️':0,'อยู่ระหว่างดำเนินการ ⚙️':1,'ตรวจงาน':2,'เสร็จสิ้น ✅':3,'ยกเลิก ❌':-1};
  const si = STATUS_IDX[t.status] ?? 0;
  const isCancelled = t.status === 'ยกเลิก ❌';
  const steps = TL.map((s,i)=>`
    <div class="tl-step ${isCancelled?'cancelled':(i<si?'done':i===si?'active':'')}">
      <div class="tl-dot">${isCancelled?'✕':i<si?'✓':i===si?TL_ICONS[i]:''}</div>
      <div class="tl-label">${TL_LABELS[i]}</div>
    </div>`).join('');
  return `<div class="ticket-card">
    <div class="tc-head">
      <div>
        <div class="tc-id">🎫 ${esc(t.id||t._recordId||'—')}</div>
        <div class="tc-brand">${esc(t.brand||'-')} ${t.branchCode?'· '+esc(t.branchCode):''}</div>
      </div>
      <span class="status-pill s-${cssStatus(t.status)}">${esc(t.status||'แก้ไข')}</span>
    </div>
    <div class="tc-type">${esc(t.type||'—')}</div>
    <div class="tc-detail">${esc(safe(t.detail)||'-')}</div>
    <div class="tc-meta">
      <span>👤 ${esc(t.reporter||'-')}</span>
      <span>📅 ${esc(t.sentDate||'-')}</span>
      ${t.engineerName?`<span>🔧 ${esc(t.engineerName)}</span>`:''}
      ${t.location && t.location.length<100 && !t.location.startsWith('http')?`<span>📍 ${esc(t.location)}</span>`:''}
    </div>
    <div class="timeline">
      <div class="tl-title">สถานะงาน</div>
      <div class="tl-steps">${steps}</div>
    </div>
    ${t.workDetail?`<div style="margin-top:14px;padding:12px;background:rgba(0,229,160,.06);border-radius:8px;border:1px solid rgba(0,229,160,.15)">
      <div style="font-size:11px;color:var(--accent);font-weight:600;margin-bottom:6px">📋 รายงานช่าง</div>
      <div style="font-size:13px;color:var(--fg2)">${esc(t.workDetail)}</div>
      ${t.partsUsed?`<div style="font-size:12px;color:var(--fg3);margin-top:4px">อะไหล่: ${esc(t.partsUsed)}</div>`:''}
    </div>`:''}
  </div>`;
}

// ── Form ──────────────────────────────────────────────────────
function showErr(msg){ const e=document.getElementById('form-error'); e.textContent='⚠️ '+msg; e.style.display='flex'; }
function showSuccess(ticket){
  document.getElementById('form-area').style.display='none';
  document.getElementById('success-section').style.display='block';
  document.getElementById('success-id').textContent = ticket.id || ticket._recordId || '—';
  saveHistory(ticket);
}
function resetForm(){
  document.getElementById('form-area').style.display='block';
  document.getElementById('success-section').style.display='none';
  ['f-name','f-phone','f-branch','f-location','f-detail'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});const fs=document.getElementById('f-type');if(fs)fs.selectedIndex=0;
  document.getElementById('char-num').textContent='0';
  document.getElementById('form-error').style.display='none';
}
function saveHistory(ticket){
  const key='it_history';
  let h=[];
  try{ h=JSON.parse(localStorage.getItem(key)||'[]'); }catch(_){}
  h.unshift({ _recordId:ticket._recordId, id:ticket.id, brand:ticket.brand, status:ticket.status, ticketId:ticket.id });
  h = h.slice(0,20);
  try{ localStorage.setItem(key, JSON.stringify(h)); }catch(_){}
}

document.getElementById('char-num') && (document.getElementById('f-detail').oninput = ()=>{
  document.getElementById('char-num').textContent = document.getElementById('f-detail').value.length;
});

document.getElementById('btn-submit').onclick = async () => {
  const err = document.getElementById('form-error');
  err.style.display='none';
  const name     = document.getElementById('f-name').value.trim();
  const phone    = document.getElementById('f-phone').value.trim();
  const brand    = document.getElementById('f-brand').value.trim();
  const branch   = document.getElementById('f-branch').value.trim();
  const type     = document.getElementById('f-type').value;
  const location = document.getElementById('f-location').value.trim();
  const detail   = document.getElementById('f-detail').value.trim();
  if(!name)   return showErr('กรุณากรอกชื่อผู้แจ้ง');
  if(!phone)  return showErr('กรุณากรอกเบอร์ติดต่อ');
  if(!brand)  return showErr('กรุณากรอกแบรนด์');
  if(!type)   return showErr('กรุณาเลือกประเภทปัญหา');
  if(!detail) return showErr('กรุณากรอกรายละเอียดปัญหา');
  const btn = document.getElementById('btn-submit');
  btn.disabled=true; btn.textContent='⏳ กำลังส่ง...';
  try{
    const r = await fetch('/api/tickets',{ method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ reporter:name, phone, brand, branchCode:branch, type, location, detail }) });
    const d = await r.json();
    if(d.ok){ showSuccess(d.ticket); await loadTickets(); renderHistory(); }
    else showErr(d.error||'เกิดข้อผิดพลาด');
  }catch(e){ showErr('ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้'); }
  finally{ btn.disabled=false; btn.textContent='📤 ส่งแจ้งปัญหา'; }
};

// FAB NAVIGATION PANEL — Report
// ═══════════════════════════════════════════════════════════════
document.addEventListener("DOMContentLoaded", (function(){
  let rptPage=1, rptPerPage=20, fabOpen=false, fabSearchOpen=false;
  let _lastRptTickets=[];

  const fabWrap   = document.getElementById('rpt-fab-wrap');
  const fabMain   = document.getElementById('fab-main-btn');
  const fabPagBar = document.getElementById('fab-pag-bar');
  const searchPop = document.getElementById('fab-search-pop');
  const searchInp = document.getElementById('fab-search-input');
  const fabSBtn   = document.getElementById('fab-search-btn');

  if(!fabWrap||!fabMain) return;

  // ── Patch renderGrouped to paginate ─────────────────────────
  const _orig = window.renderGrouped;
  window.renderGrouped = function(tickets){
    _lastRptTickets = tickets;
    const tot=Math.max(1,Math.ceil(tickets.length/rptPerPage));
    rptPage=Math.min(Math.max(rptPage,1),tot);
    const paged=tickets.slice((rptPage-1)*rptPerPage,rptPage*rptPerPage);
    _orig(paged);
    renderRptPag(tickets.length,tot);
  };

  function renderRptPag(total,totalPages){
    if(!fabPagBar) return;
    const isFirst=rptPage===1, isLast=rptPage===totalPages;
    function pageRange(cur,tot){
      if(tot<=7) return Array.from({length:tot},(_,i)=>i+1);
      const pages=[1]; let l=Math.max(2,cur-1),r=Math.min(tot-1,cur+1);
      if(l>2) pages.push('…'); for(let i=l;i<=r;i++) pages.push(i);
      if(r<tot-1) pages.push('…'); pages.push(tot); return pages;
    }
    let html=`<select class="fab-perpage" id="fab-perpage-sel"><option value="10"${rptPerPage===10?' selected':''}>10/หน้า</option><option value="20"${rptPerPage===20?' selected':''}>20/หน้า</option><option value="50"${rptPerPage===50?' selected':''}>50/หน้า</option><option value="999"${rptPerPage===999?' selected':''}>ทั้งหมด</option></select>`;
    if(totalPages>1){
      html+=`<button class="fab-btn${isLast?' fab-disabled':''}" data-pag="last">สุดท้าย</button>`;
      html+=`<button class="fab-btn fab-icon${isLast?' fab-disabled':''}" data-pag="next">›</button>`;
      pageRange(rptPage,totalPages).forEach(p=>{ if(p==='…') html+=`<button class="fab-btn fab-disabled" style="min-width:32px;padding:0">…</button>`; else html+=`<button class="fab-btn${p===rptPage?' fab-active':''}" data-page="${p}">${p}</button>`; });
      html+=`<button class="fab-btn fab-icon${isFirst?' fab-disabled':''}" data-pag="prev">‹</button>`;
      html+=`<button class="fab-btn${isFirst?' fab-disabled':''}" data-pag="first">แรก</button>`;
    } else { html+=`<span style="font-size:12px;color:var(--fg2);padding:0 8px">${total} รายการ</span>`; }
    fabPagBar.innerHTML=html;
    const pp=document.getElementById('fab-perpage-sel');
    if(pp) pp.onchange=function(){ rptPerPage=Number(this.value)||20; rptPage=1; renderGrouped(_lastRptTickets); };
  }

  fabPagBar.addEventListener('click',e=>{
    const btn=e.target.closest('button');
    if(!btn||btn.classList.contains('fab-disabled')) return;
    const page=btn.dataset.page, pag=btn.dataset.pag;
    const tot=Math.max(1,Math.ceil(_lastRptTickets.length/rptPerPage));
    if(page){ rptPage=Number(page); } else { switch(pag){ case 'first':rptPage=1;break; case 'prev':rptPage=Math.max(1,rptPage-1);break; case 'next':rptPage=Math.min(tot,rptPage+1);break; case 'last':rptPage=tot;break; } }
    renderGrouped(_lastRptTickets);
    window.scrollTo({top:0,behavior:'smooth'});
  });

  function openFab(){ fabOpen=true; fabWrap.classList.add('fab-open'); }
  function closeFab(){ fabOpen=false; fabWrap.classList.remove('fab-open'); closeSearch(); }
  function openSearch(){ openFab(); fabSearchOpen=true; searchPop.classList.add('fab-search-open'); setTimeout(()=>searchInp.focus(),60); }
  function closeSearch(){ fabSearchOpen=false; searchPop.classList.remove('fab-search-open'); }

  fabMain.addEventListener('click',e=>{ e.stopPropagation(); fabOpen?closeFab():openFab(); });
  fabSBtn.addEventListener('click',e=>{ e.stopPropagation(); fabSearchOpen?closeSearch():openSearch(); });
  document.getElementById('fab-to-top')?.addEventListener('click',()=>window.scrollTo({top:0,behavior:'smooth'}));
  document.getElementById('fab-to-bottom')?.addEventListener('click',()=>window.scrollTo({top:document.documentElement.scrollHeight,behavior:'smooth'}));
  searchInp.addEventListener('input',e=>{
    const fs=document.getElementById('f-search');
    if(fs){ fs.value=e.target.value; fs.dispatchEvent(new Event('input')); }
    rptPage=1;
  });
  document.addEventListener('click',e=>{ if(!e.target.closest('#rpt-fab-wrap')) closeFab(); });
  window.addEventListener('scroll',()=>{ if(fabSearchOpen) closeSearch(); },{passive:true});
  document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeFab(); });
})());

// CLOCK + TEMPERATURE
// ═══════════════════════════════════════════════════════════════
(function(){
  // อัป clock ทุก 1 วินาที
  function tickClock(){
    const now = new Date();
    const hh = String(now.getHours()).padStart(2,'0');
    const mm = String(now.getMinutes()).padStart(2,'0');
    const ss = String(now.getSeconds()).padStart(2,'0');
    const el = document.getElementById('clock-time');
    if(el) el.textContent = hh+':'+mm+':'+ss;
  }
  tickClock();
  setInterval(tickClock, 1000);

  // ดึงอุณหภูมิจาก Open-Meteo (Bangkok default, ถ้าได้ GPS ใช้ตำแหน่งจริง)
  async function fetchTemp(lat, lon){
    try{
      const r = await fetch(
        `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`
      );
      const d = await r.json();
      const t = d.current_weather?.temperature;
      const el = document.getElementById('clock-temp');
      if(el && t !== undefined) el.textContent = Math.round(t)+'°C';
    }catch(_){}
  }

  // ขอ GPS ถ้าได้ ใช้ตำแหน่งจริง ถ้าไม่ได้ใช้กรุงเทพ
  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      pos => fetchTemp(pos.coords.latitude, pos.coords.longitude),
      ()  => fetchTemp(13.75, 100.52) // กรุงเทพ fallback
    );
  } else {
    fetchTemp(13.75, 100.52);
  }
  // refresh อุณหภูมิทุก 10 นาที
  setInterval(()=>{
    if(navigator.geolocation){
      navigator.geolocation.getCurrentPosition(
        pos => fetchTemp(pos.coords.latitude, pos.coords.longitude),
        ()  => fetchTemp(13.75, 100.52)
      );
    } else { fetchTemp(13.75, 100.52); }
  }, 600_000);
})();

</script>
