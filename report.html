<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Report — IT Support</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+Thai:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--bg2:#f7f7f7;--bg3:#efefef;--fg:#111;--fg2:#444;--fg3:#888;--border:#e2e2e2;--border2:#ccc;--card:#fff;--sans:'Noto Sans Thai','Space Grotesk',sans-serif;--display:'Space Grotesk','Noto Sans Thai',sans-serif;--mono:'JetBrains Mono',monospace;--ease:cubic-bezier(.22,.61,.36,1)}
[data-theme="dark"]{--bg:#111;--bg2:#1a1a1a;--bg3:#222;--fg:#eee;--fg2:#aaa;--fg3:#666;--border:#2a2a2a;--border2:#3a3a3a;--card:#1a1a1a}
html,body{min-height:100%;background:var(--bg);color:var(--fg);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s}
a{color:inherit;text-decoration:none}
@keyframes up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

.top{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border);transition:background .3s,border-color .3s}
.top-logo{width:26px;height:26px;background:var(--fg);border-radius:6px;display:grid;place-items:center;font-family:var(--mono);font-size:9px;font-weight:700;color:var(--bg);flex-shrink:0;transition:background .3s,color .3s}
.top-t{font-family:var(--display);font-size:14px;font-weight:700;flex:1;color:var(--fg)}
.smb{padding:5px 9px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--fg2);font-family:var(--sans);font-size:11px;cursor:pointer;transition:all .15s}.smb:hover{background:var(--bg2);color:var(--fg)}

.wrap{max-width:520px;margin:0 auto;padding:16px 14px 50px}

.rtabs{display:flex;gap:3px;margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:5px;transition:border-color .3s}
.rtab{padding:6px 14px;border-radius:6px;border:none;background:transparent;color:var(--fg3);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
.rtab:hover{color:var(--fg)}.rtab.on{background:var(--bg3);color:var(--fg);font-weight:600}

.fcard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;animation:up .35s var(--ease);transition:background .3s,border-color .3s}
.fcard-h{font-family:var(--display);font-size:17px;font-weight:700;margin-bottom:3px;color:var(--fg)}
.fcard-s{font-size:13px;color:var(--fg2);margin-bottom:14px}
.fg{margin-bottom:8px}.fg label{display:block;font-size:10px;font-weight:700;color:var(--fg3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.04em}
.fg label .req{color:#c00;margin-left:1px}
[data-theme="dark"] .fg label .req{color:#f66}
.fg input,.fg select,.fg textarea{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:7px;padding:9px 10px;color:var(--fg);font-family:var(--sans);font-size:14px;outline:none;transition:border-color .2s,background .3s,color .3s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--fg)}
.fg input::placeholder,.fg textarea::placeholder{color:var(--fg3)}
.fg textarea{resize:none;min-height:90px;line-height:1.6}
.fg select{appearance:none;cursor:pointer}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:6px}

.sub-btn{width:100%;padding:11px;background:var(--fg);color:var(--bg);border:none;border-radius:7px;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s,background .3s,color .3s;margin-top:4px}
.sub-btn:hover{opacity:.8}.sub-btn:disabled{opacity:.3}

.success{text-align:center;padding:36px 14px;animation:up .35s var(--ease)}
.suc-t{font-family:var(--display);font-size:18px;font-weight:700;color:var(--fg);margin-bottom:6px}
.suc-id{font-family:var(--mono);font-size:13px;color:var(--fg);background:var(--bg3);padding:5px 12px;border-radius:6px;display:inline-block;margin-bottom:10px;transition:background .3s}
.suc-d{font-size:14px;color:var(--fg2);margin-bottom:14px;line-height:1.6}
.suc-btn{display:inline-flex;padding:9px 16px;border-radius:6px;border:1px solid var(--border);background:var(--card);color:var(--fg);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;margin:0 3px;transition:all .15s}
.suc-btn:hover{background:var(--bg2)}.suc-btn.pri{background:var(--fg);color:var(--bg);border-color:var(--fg)}.suc-btn.pri:hover{opacity:.8}

.tcard{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px;animation:up .35s var(--ease);transition:background .3s,border-color .3s}
.tcard-h{font-family:var(--display);font-size:17px;font-weight:700;margin-bottom:10px;color:var(--fg)}
.tsrch{display:flex;gap:5px;margin-bottom:14px}
.tsrch input{flex:1;background:var(--bg2);border:1.5px solid var(--border);border-radius:7px;padding:9px 10px;color:var(--fg);font-family:var(--sans);font-size:14px;outline:none;transition:background .3s,border-color .3s,color .3s}
.tsrch input:focus{border-color:var(--fg)}.tsrch input::placeholder{color:var(--fg3)}
.tsrch button{padding:9px 14px;background:var(--fg);color:var(--bg);border:none;border-radius:7px;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;transition:background .3s,color .3s}

.tres{background:var(--bg2);border-radius:8px;padding:12px;animation:up .25s var(--ease);transition:background .3s}
.tres-id{font-family:var(--mono);font-size:11px;color:var(--fg3);margin-bottom:3px}
.tres-type{font-size:14px;font-weight:600;color:var(--fg);margin-bottom:6px}
.tres-row{display:flex;gap:4px;margin-bottom:2px;font-size:13px}
.tres-l{color:var(--fg3);min-width:65px;font-size:11px}.tres-v{color:var(--fg);font-weight:500;flex:1}
.pill{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:var(--bg3);color:var(--fg2);transition:background .3s,color .3s}

.bpick{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:6px;margin-bottom:14px}
.bpick-c{background:var(--card);border:2px solid var(--border);border-radius:8px;padding:12px;text-align:center;cursor:pointer;transition:all .2s}
.bpick-c:hover{border-color:var(--border2)}
.bpick-c.sel{border-color:var(--fg);background:var(--bg2)}
.bpick-n{font-size:13px;font-weight:600;color:var(--fg)}

.empty{text-align:center;padding:20px;color:var(--fg3);font-size:13px}
.toast{position:fixed;top:12px;right:12px;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:8px 14px;font-size:13px;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,.06);animation:up .2s var(--ease);display:none;color:var(--fg);transition:background .3s,border-color .3s,color .3s}
@media(max-width:640px){.g2{grid-template-columns:1fr}.wrap{padding:10px 10px 40px}}
</style>
</head>
<body>

<div class="top">
  <div class="top-logo" id="top-icon">RP</div>
  <div class="top-t" id="top-t">Report IT Issue</div>
  <button class="smb" onclick="togTheme()">Theme</button>
  <a href="/" class="smb">Home</a>
</div>

<div class="wrap">
  <div class="rtabs"><button class="rtab on" id="tab-report" onclick="showTab('report')">Report</button><button class="rtab" id="tab-track" onclick="showTab('track')">Track</button></div>
  <div id="view-report"></div>
  <div id="view-track" style="display:none"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const BRANDS=[{s:'dunkin',n:"Dunkin'"},{s:'greyhound-cafe',n:'Greyhound Cafe'},{s:'greyhound-original',n:'Greyhound Original'},{s:'au-bon-pain',n:'Au Bon Pain'},{s:'funky-fries',n:'Funky Fries'}];
const CATS=['POS / ระบบขาย','เครือข่าย / Internet','เครื่องพิมพ์','คอมพิวเตอร์ / โน้ตบุ๊ก','กล้องวงจรปิด / CCTV','ระบบไฟฟ้า','อื่นๆ'];
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function statusLabel(s){return(s||'--').replace(/[⏱️⚙️✅❌]/g,'').trim();}

let brand=null,curTab='report';

function detectBrand(){const p=location.pathname.toLowerCase();for(const b of BRANDS)if(p.includes(b.s))return b;return null;}
function setBrand(b){brand=b;document.getElementById('top-t').textContent=b.n+' — Report';renderForm();}
function showTab(t){curTab=t;document.getElementById('tab-report').classList.toggle('on',t==='report');document.getElementById('tab-track').classList.toggle('on',t==='track');document.getElementById('view-report').style.display=t==='report'?'':'none';document.getElementById('view-track').style.display=t==='track'?'':'none';if(t==='track')renderTrack();}

function renderForm(){
  if(!brand){document.getElementById('view-report').innerHTML=`<div class="fcard"><div style="text-align:center;margin-bottom:8px;font-size:13px;color:var(--fg2)">Select your brand</div><div class="bpick">${BRANDS.map(b=>`<div class="bpick-c" onclick="setBrand(BRANDS.find(x=>x.s==='${b.s}'))"><div class="bpick-n">${b.n}</div></div>`).join('')}</div></div>`;return;}
  document.getElementById('view-report').innerHTML=`
    <div class="fcard">
      <div class="fcard-h">${brand.n}</div>
      <div class="fcard-s">Fill in the form to report an IT issue</div>
      <div class="g2">
        <div class="fg"><label>Name <span class="req">*</span></label><input id="f-name" placeholder="Full name"/></div>
        <div class="fg"><label>Phone <span class="req">*</span></label><input id="f-phone" type="tel" placeholder="08x-xxx-xxxx"/></div>
      </div>
      <div class="g2">
        <div class="fg"><label>Branch Code <span class="req">*</span></label><input id="f-branch" placeholder="e.g. DK001"/></div>
        <div class="fg"><label>Location</label><input id="f-loc" placeholder="e.g. Floor 1"/></div>
      </div>
      <div class="fg"><label>Category <span class="req">*</span></label><select id="f-cat"><option value="">-- Select --</option>${CATS.map(c=>`<option>${c}</option>`).join('')}</select></div>
      <div class="fg"><label>Detail <span class="req">*</span></label><textarea id="f-detail" placeholder="Describe the issue..."></textarea></div>
      <div class="fg"><label>LINE User ID (optional)</label><input id="f-line" placeholder="For LINE notifications"/></div>
      <button class="sub-btn" id="btn-sub" onclick="doSubmit()">Submit Report</button>
    </div>`;
}

async function doSubmit(){
  const name=(document.getElementById('f-name')?.value||'').trim();
  const phone=(document.getElementById('f-phone')?.value||'').trim();
  const branch=(document.getElementById('f-branch')?.value||'').trim();
  const loc=(document.getElementById('f-loc')?.value||'').trim();
  const cat=document.getElementById('f-cat')?.value||'';
  const detail=(document.getElementById('f-detail')?.value||'').trim();
  const line=(document.getElementById('f-line')?.value||'').trim();
  if(!name||!phone||!branch||!cat||!detail){toast('Fill in all required fields (*)');return;}
  const btn=document.getElementById('btn-sub');btn.disabled=true;btn.textContent='Submitting...';
  try{
    const body={reporter:name,phone,branchCode:branch,location:loc,type:cat,detail,brand:brand.n,lineUserId:line};
    const d=await fetch('/api/public/tickets',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}).then(r=>r.json());
    if(!d.ok)throw new Error(d.error||'Failed');
    showSuccess(d.ticket?.id||d.ticketId||'--');
  }catch(e){toast('Error: '+e.message);btn.disabled=false;btn.textContent='Submit Report';}
}

function showSuccess(tid){
  document.getElementById('view-report').innerHTML=`<div class="success"><div class="suc-t">Report Submitted</div><div class="suc-id">${esc(tid)}</div><div class="suc-d">The team has been notified via LINE.<br/>Use the ticket ID to track status.</div><button class="suc-btn" onclick="showTab('track')">Track Status</button><button class="suc-btn pri" onclick="renderForm()">New Report</button></div>`;
}

function renderTrack(){
  document.getElementById('view-track').innerHTML=`<div class="tcard"><div class="tcard-h">Track Ticket</div><div class="tsrch"><input id="trk-id" placeholder="Ticket ID e.g. DK-00042"/><button onclick="doTrack()">Search</button></div><div id="trk-result"></div></div>`;
}

async function doTrack(){
  const id=(document.getElementById('trk-id')?.value||'').trim();
  if(!id){toast('Enter ticket ID');return;}
  const out=document.getElementById('trk-result');out.innerHTML='<div class="empty">Searching...</div>';
  try{
    const d=await fetch('/api/public/tickets/'+encodeURIComponent(id)).then(r=>r.json());
    if(!d.ok)throw new Error(d.error||'Not found');
    const t=d.ticket;
    out.innerHTML=`<div class="tres"><div class="tres-id">${esc(t.id)}</div><div class="tres-type">${esc(t.type||'-')}</div><div style="margin-bottom:6px"><span class="pill">${statusLabel(t.status)}</span></div>${[['Brand',t.brand],['Branch',t.branchCode],['Reporter',t.reporter],['Date',t.sentDate],['Engineer',t.engineerName]].map(([l,v])=>v?`<div class="tres-row"><span class="tres-l">${l}</span><span class="tres-v">${esc(v)}</span></div>`:'').join('')}${t.detail?`<div style="background:var(--bg);border-radius:6px;padding:7px;font-size:12px;color:var(--fg2);margin-top:5px;line-height:1.5;transition:background .3s">${esc(t.detail)}</div>`:''}${t.workDetail?`<div style="background:var(--bg);border-radius:6px;padding:7px;font-size:12px;color:var(--fg2);margin-top:4px;border-left:2px solid var(--fg);transition:background .3s"><strong>Engineer:</strong> ${esc(t.workDetail)}</div>`:''}</div>`;
  }catch(e){out.innerHTML=`<div class="empty">${esc(e.message)}</div>`;}
}

function togTheme(){const d=document.documentElement;d.dataset.theme=d.dataset.theme==='dark'?'':'dark';localStorage.setItem('rep_theme',d.dataset.theme);}
if(localStorage.getItem('rep_theme')==='dark')document.documentElement.dataset.theme='dark';
let toastT;function toast(m){const el=document.getElementById('toast');el.textContent=m;el.style.display='block';el.style.animation='none';el.offsetHeight;el.style.animation='';clearTimeout(toastT);toastT=setTimeout(()=>el.style.display='none',2500);}
const detected=detectBrand();if(detected)setBrand(detected);else renderForm();renderTrack();
</script>
</body>
</html>
