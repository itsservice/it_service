<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Report — IT Support</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f5f5f5;--bg2:#ffffff;--bg3:#f4f4f4;--bg4:#eeeeee;--fg:#0a0a0a;--fg2:#3a3a38;--fg3:#7a7a75;--fg4:#a8a8a2;--border:#e8e8e8;--border2:#d4d4d4;--card:#ffffff;--green:#2d7a4f;--red:#b83232;--display:'Prompt',sans-serif;--sans:'Prompt',sans-serif;--mono:'Prompt',monospace;--ease:cubic-bezier(.22,.61,.36,1)}
[data-t="dark"]{--bg:#0a0a0a;--bg2:#141413;--bg3:#1e1e1c;--bg4:#282826;--fg:#f0f0eb;--fg2:#b8b8b2;--fg3:#7a7a75;--fg4:#4a4a46;--border:#252523;--border2:#353532;--card:#141413;--green:#4ade80;--red:#f87171}
html,body{min-height:100%;background:var(--bg);color:var(--fg);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s}
a{color:inherit;text-decoration:none}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

.top{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--bg);border-bottom:1px solid var(--border);transition:all .4s}
.top-logo{width:28px;height:28px;background:var(--fg);border-radius:7px;display:grid;place-items:center;font-family:var(--mono);font-size:10px;font-weight:500;color:var(--bg);flex-shrink:0;transition:all .4s}
.top-t{font-family:var(--display);font-size:14px;font-weight:800;flex:1;color:var(--fg);letter-spacing:-.02em}
.top-clock{font-family:var(--mono);font-size:11px;color:var(--fg4)}
.smb{padding:5px 10px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--fg3);font-family:var(--sans);font-size:11px;font-weight:500;cursor:pointer;transition:all .2s}.smb:hover{background:var(--bg2);color:var(--fg)}
.smb.lang-active{background:var(--fg);color:var(--bg);border-color:var(--fg)}
.wrap{max-width:540px;margin:0 auto;padding:16px 14px 60px}

.rtabs{display:flex;gap:3px;margin-bottom:14px;border-bottom:1px solid var(--border);padding-bottom:6px;transition:border-color .4s}
.rtab{padding:7px 14px;border-radius:6px;border:none;background:transparent;color:var(--fg4);font-family:var(--display);font-size:12px;font-weight:700;cursor:pointer;transition:all .2s;letter-spacing:-.01em}
.rtab:hover{color:var(--fg)}.rtab.on{background:var(--bg3);color:var(--fg)}

.fcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;animation:up .4s var(--ease);transition:all .4s}
.fcard-h{font-family:var(--display);font-size:18px;font-weight:800;margin-bottom:3px;color:var(--fg);letter-spacing:-.03em}
.fcard-s{font-size:13px;color:var(--fg3);margin-bottom:16px}
.fg{margin-bottom:10px}.fg label{display:block;font-family:var(--display);font-size:10px;font-weight:700;color:var(--fg4);margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em}
.fg label .req{color:var(--red);margin-left:1px}
.fg input,.fg select,.fg textarea{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--fg);font-family:var(--sans);font-size:14px;outline:none;transition:all .3s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--fg)}
.fg input::placeholder,.fg textarea::placeholder{color:var(--fg4)}
.fg textarea{resize:none;min-height:100px;line-height:1.6}
.fg select{appearance:none;cursor:pointer}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
#other-input{display:none;margin-top:6px}

/* Branch picker button */
.branch-btn{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--fg);font-family:var(--sans);font-size:14px;text-align:left;cursor:pointer;transition:all .3s;display:flex;align-items:center;justify-content:space-between}
.branch-btn:hover{border-color:var(--fg)}
.branch-btn.has-val{border-color:var(--fg)}
.branch-btn-placeholder{color:var(--fg4)}
.branch-btn-arrow{color:var(--fg4);font-size:10px;flex-shrink:0}

/* GPS status bar */
.gps-bar{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;font-size:11px;font-weight:600;margin-top:5px;transition:all .3s}
.gps-bar.gps-none{background:var(--bg3);color:var(--fg4)}
.gps-bar.gps-loading{background:#fef9ec;color:#92400e}
[data-t="dark"] .gps-bar.gps-loading{background:#2a1f08;color:#fcd34d}
.gps-bar.gps-ok{background:#f0fdf4;color:#166534}
[data-t="dark"] .gps-bar.gps-ok{background:#052e16;color:#4ade80}
.gps-bar.gps-denied{background:#fff5f5;color:#991b1b}
[data-t="dark"] .gps-bar.gps-denied{background:#1c0606;color:#f87171}
.gps-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.gps-none .gps-dot{background:var(--fg4)}
.gps-loading .gps-dot{background:#f59e0b;animation:gpspulse 1s infinite}
.gps-ok .gps-dot{background:var(--green)}
.gps-denied .gps-dot{background:var(--red)}
@keyframes gpspulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Bottom sheet */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;opacity:0;transition:opacity .3s;pointer-events:none}
.sheet-overlay.open{opacity:1;pointer-events:all}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:201;background:var(--card);border-radius:16px 16px 0 0;max-height:80vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .35s var(--ease);box-shadow:0 -4px 30px rgba(0,0,0,.12)}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border2);margin:10px auto 0}
.sheet-head{padding:12px 16px 8px;border-bottom:1px solid var(--border);flex-shrink:0}
.sheet-title{font-family:var(--display);font-size:14px;font-weight:800;color:var(--fg);letter-spacing:-.02em}
.sheet-search{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--fg);font-family:var(--sans);font-size:14px;outline:none;transition:all .3s;margin-top:8px}
.sheet-search:focus{border-color:var(--fg)}
.sheet-search::placeholder{color:var(--fg4)}
.sheet-list{overflow-y:auto;flex:1;padding:6px 8px 20px}
.sheet-item{padding:10px 10px;border-radius:8px;cursor:pointer;transition:background .15s;display:flex;flex-direction:column;gap:1px}
.sheet-item:hover{background:var(--bg3)}
.sheet-item-code{font-family:var(--mono);font-size:10px;color:var(--fg4)}
.sheet-item-name{font-size:14px;font-weight:600;color:var(--fg)}
.sheet-item-sub{font-size:11px;color:var(--fg3)}
.sheet-empty{text-align:center;padding:24px;color:var(--fg4);font-size:13px}

/* GPS consent popup */
.popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;opacity:0;transition:opacity .25s;pointer-events:none}
.popup-overlay.open{opacity:1;pointer-events:all}
.popup-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;max-width:340px;width:100%;text-align:center;animation:up .25s var(--ease)}
.popup-icon{font-size:30px;margin-bottom:10px}
.popup-title{font-family:var(--display);font-size:15px;font-weight:800;color:var(--fg);margin-bottom:6px;letter-spacing:-.02em}
.popup-desc{font-size:13px;color:var(--fg3);margin-bottom:18px;line-height:1.6}
.popup-btns{display:flex;gap:8px;justify-content:center}
.popup-btn{flex:1;padding:10px 14px;border-radius:8px;border:1px solid var(--border);background:var(--bg2);color:var(--fg);font-family:var(--display);font-size:13px;font-weight:700;cursor:pointer;transition:all .2s}
.popup-btn:hover{background:var(--bg3)}
.popup-btn.pri{background:var(--fg);color:var(--bg);border-color:var(--fg)}
.popup-btn.pri:hover{opacity:.8}

.sub-btn{width:100%;padding:12px;background:var(--fg);color:var(--bg);border:none;border-radius:8px;font-family:var(--display);font-size:14px;font-weight:700;cursor:pointer;transition:all .3s;margin-top:6px;letter-spacing:-.01em}
.sub-btn:hover{opacity:.8}.sub-btn:disabled{opacity:.3}

.success{text-align:center;padding:40px 16px;animation:up .4s var(--ease)}
.suc-t{font-family:var(--display);font-size:20px;font-weight:800;color:var(--fg);margin-bottom:8px;letter-spacing:-.03em}
.suc-id{font-family:var(--mono);font-size:14px;color:var(--fg);background:var(--bg3);padding:6px 16px;border-radius:7px;display:inline-block;margin-bottom:12px;transition:background .4s}
.suc-d{font-size:14px;color:var(--fg3);margin-bottom:16px;line-height:1.6}
.suc-btn{display:inline-flex;padding:10px 18px;border-radius:7px;border:1px solid var(--border);background:var(--card);color:var(--fg);font-family:var(--display);font-size:13px;font-weight:600;cursor:pointer;margin:0 3px;transition:all .2s}
.suc-btn:hover{background:var(--bg2)}.suc-btn.pri{background:var(--fg);color:var(--bg);border-color:var(--fg)}.suc-btn.pri:hover{opacity:.8}

.tcard{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;animation:up .4s var(--ease);transition:all .4s}
.tcard-h{font-family:var(--display);font-size:18px;font-weight:800;margin-bottom:12px;color:var(--fg);letter-spacing:-.03em}
.tsrch{display:flex;gap:5px;margin-bottom:14px}
.tsrch input{flex:1;background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--fg);font-family:var(--sans);font-size:14px;outline:none;transition:all .3s}
.tsrch input:focus{border-color:var(--fg)}.tsrch input::placeholder{color:var(--fg4)}
.tsrch button{padding:10px 16px;background:var(--fg);color:var(--bg);border:none;border-radius:8px;font-family:var(--display);font-size:13px;font-weight:700;cursor:pointer;transition:all .3s}

.tres{background:var(--bg2);border-radius:10px;padding:14px;animation:up .3s var(--ease);transition:background .4s}
.tres-id{font-family:var(--mono);font-size:11px;color:var(--fg4);margin-bottom:4px}
.tres-type{font-family:var(--display);font-size:15px;font-weight:800;color:var(--fg);margin-bottom:8px;letter-spacing:-.02em}
.tres-row{display:flex;gap:4px;margin-bottom:3px;font-size:13px}
.tres-l{color:var(--fg4);min-width:70px;font-size:11px;font-weight:600}.tres-v{color:var(--fg);font-weight:500;flex:1}
.pill{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:var(--bg3);color:var(--fg2);font-family:var(--mono);transition:all .4s}

/* ── TRACK TIMELINE ── */
.tpgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:1.5rem}
.tswrap{text-align:center;position:relative}
.tsline{position:absolute;top:16px;left:-50%;right:50%;height:2px;z-index:0;transition:background .3s}
.tscirc{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 5px;position:relative;z-index:1;transition:all .3s}
.tslabel{font-size:10px;color:var(--fg3);line-height:1.4}
.tl-row{display:flex;gap:10px;position:relative;cursor:pointer}
.tl-row+.tl-row{margin-top:0}
.tl-row:not(:last-child) .tl-main{padding-bottom:14px}
.tl-row:not(:last-child)::before{content:'';position:absolute;left:5px;top:11px;height:100%;width:1px;background:var(--border)}
.tl-dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;margin-top:2px;z-index:1;transition:background .2s}
.tl-main{flex:1}
.tl-head{display:flex;align-items:center;justify-content:space-between}
.tl-title{font-size:13px;font-weight:600;color:var(--fg)}
.tl-arrow{font-size:10px;color:var(--fg4);transition:transform .25s;flex-shrink:0;margin-left:6px}
.tl-row.open .tl-arrow{transform:rotate(180deg)}
.tl-sub{font-size:12px;color:var(--fg3);margin-top:2px}
.tl-time{font-size:11px;color:var(--fg4);margin-top:2px}
.tl-detail{max-height:0;overflow:hidden;transition:max-height .35s ease,opacity .25s ease,margin .2s ease;opacity:0;margin-top:0}
.tl-row.open .tl-detail{max-height:220px;opacity:1;margin-top:8px}
.tl-detail-inner{background:var(--bg3);border-radius:6px;padding:10px 12px;font-size:12px;color:var(--fg3);line-height:1.8;border-left:2px solid var(--border2)}
.tl-detail-inner strong{color:var(--fg2);font-weight:600}
.tl-pop{animation:tlpop .35s var(--ease)}
@keyframes tlpop{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}

.bpick{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:6px;margin-bottom:14px}
.bpick-c{background:var(--card);border:2px solid var(--border);border-radius:8px;padding:14px;text-align:center;cursor:pointer;transition:all .25s}
.bpick-c:hover{border-color:var(--border2);transform:translateY(-1px)}
.bpick-c.sel{border-color:var(--fg);background:var(--bg2)}
.bp-prefix{font-family:var(--mono);font-size:10px;color:var(--fg4);margin-bottom:2px}
.bp-name{font-family:var(--display);font-size:14px;font-weight:700;color:var(--fg);letter-spacing:-.02em}

.empty{text-align:center;padding:20px;color:var(--fg4);font-size:13px}
.toast{position:fixed;top:14px;right:14px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:13px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.06);animation:up .2s var(--ease);display:none;color:var(--fg);font-weight:500;transition:all .4s}
@media(max-width:640px){.g2{grid-template-columns:1fr}.wrap{padding:10px 10px 40px}}
</style>
</head>
<body>

<!-- Bottom Sheet -->
<div class="sheet-overlay" id="sheet-overlay" onclick="closeSheet()"></div>
<div class="sheet" id="branch-sheet">
  <div class="sheet-handle"></div>
  <div class="sheet-head">
    <div class="sheet-title" id="sheet-title">เลือกสาขา</div>
    <input class="sheet-search" id="sheet-search" placeholder="ค้นหาชื่อ หรือ รหัสสาขา..." oninput="filterBranches(this.value)"/>
  </div>
  <div class="sheet-list" id="sheet-list"></div>
</div>

<!-- GPS Consent Popup -->
<div class="popup-overlay" id="gps-popup">
  <div class="popup-box">
    <div class="popup-icon">📍</div>
    <div class="popup-title" id="gps-popup-title">อนุญาตเข้าถึง GPS?</div>
    <div class="popup-desc" id="gps-popup-desc">ระบบจะบันทึกพิกัดตำแหน่งปัจจุบันเพื่อช่วยให้ช่างค้นหาสาขาได้รวดเร็วขึ้น</div>
    <div class="popup-btns">
      <button class="popup-btn" onclick="denyGPS()">ไม่อนุญาต</button>
      <button class="popup-btn pri" onclick="allowGPS()">อนุญาต</button>
    </div>
  </div>
</div>

<div class="top">
  <div class="top-logo" id="top-icon">RP</div>
  <div class="top-t" id="top-t">Report IT Issue</div>
  <div class="top-clock" id="clock">--:--:--</div>
  <button class="smb" id="btn-lang" onclick="toggleLang()">EN</button>
  <button class="smb" id="btn-theme" onclick="togTheme()">Dark</button>
  <a href="/" class="smb">Home</a>
</div>

<div class="wrap">
  <div class="rtabs">
    <button class="rtab on" id="tab-report" onclick="showTab('report')"></button>
    <button class="rtab" id="tab-track" onclick="showTab('track')"></button>
  </div>
  <div id="view-report"></div>
  <div id="view-track" style="display:none"></div>
</div>
<div class="toast" id="toast"></div>

function detectBrand(){
  const p=location.pathname;
  const parts=p.split('/');
  const raw=parts[parts.length-1];
  if(!raw||raw==='report')return null;
  const decoded=decodeURIComponent(raw).toLowerCase().trim();
  for(const b of BRANDS){
    if(decoded===b.s||decoded===b.n.toLowerCase()||decoded.includes(b.s)||b.n.toLowerCase().includes(decoded))return b;
  }
  return null;
}

}

async function loadBranchesIfNeeded(){

  try{
    const d=await fetch('/api/branches').then(r=>r.json());
    if(d.ok)allBranches=d.branches||{};
  }catch(e){console.warn('[branches]',e.message);}
}

function getBrandBranches(q=''){
  if(!brand)return[];
  const list=allBranches[brand.n]||[];
  if(!q)return list;
  const lq=q.toLowerCase();
  return list.filter(b=>(b.code||'').toLowerCase().includes(lq)||(b.nameTh||'').toLowerCase().includes(lq)||(b.nameEn||'').toLowerCase().includes(lq));
}

function openSheet(){
  document.getElementById('sheet-overlay').classList.add('open');

function closeSheet(){

function renderSheetList(q){
  const l=t();

function showGPSPopup(){
  const l=t();
  document.getElementById('gps-popup-title').textContent=l.gpsTitle;
  document.getElementById('gps-popup-desc').textContent=l.gpsDesc;
  document.getElementById('gps-popup').classList.add('open');
}
function hideGPSPopup(){
  document.getElementById('gps-popup').classList.remove('open');
}

function allowGPS(){
  hideGPSPopup();
  gpsState='loading';
  updateGPSBar();
  if(!navigator.geolocation){gpsState='denied';updateGPSBar();return;}
  navigator.geolocation.getCurrentPosition(
    pos=>{
      gpsCoords={lat:pos.coords.latitude,lng:pos.coords.longitude,source:'GPS'};
      gpsState='ok';
      updateGPSBar();
    },
    ()=>{gpsState='denied';updateGPSBar();},
    {timeout:10000,maximumAge:30000}
  );
}

function denyGPS(){
  hideGPSPopup();
  gpsState='denied';
  gpsCoords=null;
  updateGPSBar();
}

function updateGPSBar(){
  const bar=document.getElementById('gps-bar');
  if(!bar)return;
  const l=t();
  const states={
    none:  {cls:'gps-none',   txt:l.gpsNone},
    loading:{cls:'gps-loading',txt:l.gpsLoading},
    ok:    {cls:'gps-ok',     txt:gpsCoords?.source==='DB'?l.gpsOkDB:l.gpsOkBrowser},
    denied:{cls:'gps-denied', txt:l.gpsDenied},
  };
  const s=states[gpsState]||states.none;
  bar.className=`gps-bar ${s.cls}`;
  bar.innerHTML=`<span class="gps-dot"></span><span>${s.txt}</span>
    ${gpsState==='ok'&&gpsCoords?`<span style="font-family:var(--mono);font-size:10px;margin-left:auto;opacity:.7">${gpsCoords.lat.toFixed(5)}, ${gpsCoords.lng.toFixed(5)}</span>`:''}`;
}

// ══ SUBMIT ═════════════════════════════════════════════════
const RETRY_MAX=3;
const RETRY_LABELS_TH=['กำลังส่ง...','ลองใหม่ครั้งที่ 2...','ลองใหม่ครั้งที่ 3...'];
const RETRY_LABELS_EN=['Submitting...','Retrying (2/3)...','Retrying (3/3)...'];

async function fetchWithTimeout(url,opts,ms=30000){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),ms);
  try{
    const r=await fetch(url,{...opts,signal:ctrl.signal});
    clearTimeout(tid);
    return r;
  }catch(e){
    clearTimeout(tid);
    throw e.name==='AbortError'?new Error('timeout'):e;
  }
}

async function doSubmit(){
  const l=t();
  const branchCode=selectedBranch?.code||'';
  const name=(document.getElementById('f-name')?.value||'').trim();
  const phone=(document.getElementById('f-phone')?.value||'').trim();
  let cat=document.getElementById('f-cat')?.value||'';
  if(cat==='อื่นๆ'){const other=(document.getElementById('other-input')?.value||'').trim();if(other)cat=other;}
  const detail=(document.getElementById('f-detail')?.value||'').trim();
  let loc=(document.getElementById('f-loc')?.value||'').trim();

  if(!branchCode||!name||!phone||!cat||!detail||!loc){toast(l.required);return;}
  if(detail.length<10){toast(l.detailMin);return;}

  if(gpsCoords){
    const tag=`[${gpsCoords.source}:${gpsCoords.lat.toFixed(6)},${gpsCoords.lng.toFixed(6)}]`;
    if(!loc.includes('[GPS:')&&!loc.includes('[DB:'))loc=loc+' '+tag;
  }

  const btn=document.getElementById('btn-sub');
  const body={reporter:name,phone,branchCode,location:loc,type:cat,detail,brand:brand.n};
  const retryLabels=lang==='th'?RETRY_LABELS_TH:RETRY_LABELS_EN;

  btn.disabled=true;

  for(let attempt=0;attempt<RETRY_MAX;attempt++){
    btn.textContent=retryLabels[attempt];
    if(attempt>0){
      // wait 2s before retry + show countdown
      for(let s=2;s>0;s--){
        btn.textContent=(lang==='th'?`รอ ${s}s...`:`Wait ${s}s...`);
        await new Promise(r=>setTimeout(r,1000));
      }
      btn.textContent=retryLabels[attempt];
    }
    try{
      const r=await fetchWithTimeout('/api/tickets',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify(body),
      },30000);
      const d=await r.json();
      if(!d.ok)throw new Error(d.error||'Submission failed');
      showSuccess(d.ticket?.id||d.ticketId||'--');
      return;
    }catch(e){
      const isLast=attempt===RETRY_MAX-1;
      if(isLast){
        // ทุก retry ล้มเหลว
        const errMsg=e.message?.includes('timeout')
          ?(lang==='th'
            ?'Server ตอบช้าเกินไป กรุณาลองอีกครั้งในอีกสักครู่'
            :'Server timeout — please try again later')
          :'Error: '+e.message;
        toast(errMsg);
        btn.textContent=l.submit;
        btn.disabled=false;
        // แสดง retry button แยกต่างหาก
        showRetryButton(body);
      }
      // ถ้ายังไม่ใช่ครั้งสุดท้าย → loop ต่อ
    }
  }
}

function showRetryButton(body){
  const l=t();
  // เพิ่ม retry hint ใต้ปุ่ม
  const existing=document.getElementById('retry-hint');
  if(existing)return;
  const hint=document.createElement('div');
  hint.id='retry-hint';
  hint.style.cssText='margin-top:8px;text-align:center;font-size:12px;color:var(--fg3)';
  hint.innerHTML=lang==='th'
    ?'หากปัญหายังคงอยู่ กรุณาติดต่อ IT Support โดยตรง'
    :'If issue persists, please contact IT Support directly';
  document.getElementById('btn-sub')?.after(hint);
}

const TK_STATUS_CFG={
  'pending':     {label:'รอดำเนินการ',    pillBg:'#F1EFE8',pillC:'#5F5E5A',dot:'#B4B2A9'},
  'assigned':    {label:'มอบหมายช่าง',   pillBg:'#E6F1FB',pillC:'#185FA5',dot:'#378ADD'},
  'in_progress': {label:'กำลังดำเนินการ',pillBg:'#FAEEDA',pillC:'#854F0B',dot:'#EF9F27'},
  'review':      {label:'รอตรวจรับ',     pillBg:'#EEEDFE',pillC:'#3C3489',dot:'#7F77DD'},
  'completed':   {label:'เสร็จสิ้น',     pillBg:'#EAF3DE',pillC:'#3B6D11',dot:'#3B6D11'},
  'cancelled':   {label:'ยกเลิก',        pillBg:'#FAECE7',pillC:'#993C1D',dot:'#D85A30'},
};
const TK_PROG=[
  {k:'pending',l:'รับเรื่อง'},{k:'assigned',l:'มอบหมายช่าง'},
  {k:'in_progress',l:'ดำเนินการ'},{k:'completed',l:'เสร็จสิ้น'},
];
const TK_ORD=['pending','assigned','in_progress','review','completed','cancelled'];
const TK_DOTS=['#3B6D11','#639922','#97C459','#EF9F27','#378ADD','#D85A30'];

function tkStatusKey(raw){
  if(!raw)return'pending';
  const r=raw.toLowerCase().replace(/[⏱️⚙️✅❌\s]/g,'');
  if(/cancel|ยกเลิก/.test(r))return'cancelled';
  if(/complet|เสร็จ|done/.test(r))return'completed';
  if(/review|ตรวจ/.test(r))return'review';
  if(/progress|ระหว่าง|inprogress/.test(r))return'in_progress';
  if(/assign|มอบ/.test(r))return'assigned';
  return'pending';
}

function buildTkTimeline(tk){
  const sid=tkStatusKey(tk.status);
  const ci=TK_ORD.indexOf(sid);
  const hist=[];
  hist.push({title:'รับเรื่องแล้ว — รอมอบหมายช่าง',sub:`ผู้แจ้ง: ${tk.reporter||'-'} · ${tk.phone||'-'}`,
    rows:[['ประเภท',tk.type||'-'],['รายละเอียด',tk.detail||'-'],['สถานที่',tk.location||'-'],['วันที่แจ้ง',tk.sentDate||'-']],dot:'#B4B2A9'});
  if(ci>=TK_ORD.indexOf('assigned'))
    hist.push({title:'มอบหมายช่างแล้ว',sub:`ช่าง: ${tk.engineerName||tk.assignedTo||'-'}`,
      rows:[['ช่างผู้รับงาน',tk.engineerName||tk.assignedTo||'-'],['แบรนด์',tk.brand||'-'],['หมายเหตุ Admin',tk.adminNote||'-']],dot:'#378ADD'});
  if(ci>=TK_ORD.indexOf('in_progress'))
    hist.push({title:'ช่างเริ่มทำงานแล้ว',sub:`ช่าง${tk.engineerName||'-'} · เดินทางถึงสาขา`,
      rows:[['เวลาเริ่มงาน',tk.startedAt||'-'],['GPS',tk.completedLat?`${tk.completedLat}, ${tk.completedLng}`:'-']],dot:'#EF9F27'});
  if(ci>=TK_ORD.indexOf('review'))
    hist.push({title:'ช่างส่งงาน — รอ Admin ตรวจรับ',sub:`ช่าง${tk.engineerName||'-'}`,
      rows:[['รายละเอียดงาน',tk.workDetail||'-'],['อะไหล่',tk.partsUsed||'-'],['ชั่วโมงทำงาน',tk.workHours?tk.workHours+' ชม.':'-']],dot:'#7F77DD'});
  if(sid==='completed')
    hist.push({title:'ปิดงานเรียบร้อย',sub:`ปิดโดย: ${tk.closedBy||'Admin'}`,
      rows:[['หมายเหตุ',tk.adminNote||'-'],['เวลาปิดงาน',tk.closedAt||'-']],dot:'#3B6D11'});
  if(sid==='cancelled')
    hist.push({title:'ยกเลิก Ticket',sub:`โดย: ${tk.closedBy||'Admin'}`,
      rows:[['หมายเหตุ',tk.adminNote||'-'],['เวลา',tk.closedAt||'-']],dot:'#D85A30'});
  return hist.reverse();
}

let _trkOpen=0;
function toggleTlRow(i){

function renderTicketTimeline(tk){
  const sid=tkStatusKey(tk.status);
  const cfg=TK_STATUS_CFG[sid]||TK_STATUS_CFG['pending'];
  const ci=TK_ORD.indexOf(sid);
  const cancelled=sid==='cancelled';
  const hist=buildTkTimeline(tk);

  const progHtml=cancelled
    ?`<div style="grid-column:1/-1;text-align:center;padding:10px 0;color:#993C1D;font-size:13px;font-weight:700"><div style="font-size:20px;margin-bottom:4px">✕</div>ยกเลิก Ticket แล้ว</div>`
    :TK_PROG.map((p,i)=>{
      const pi=TK_ORD.indexOf(p.k);const done=ci>=pi;
      const lc=i>0&&done?'#3B6D11':'var(--border)';
      const cc=done?'#3B6D11':ci===pi?'#185FA5':'var(--border)';
      const ico=done
        ?`<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>`
        :`<span style="font-size:10px;color:${ci===pi?'#fff':'var(--fg4)'};font-weight:600">${i+1}</span>`;
      return`<div class="tswrap">${i>0?`<div class="tsline" style="background:${lc}"></div>`:''}
        <div class="tscirc" style="background:${cc}">${ico}</div>
        <div class="tslabel">${p.l}</div></div>`;
    }).join('');

  const tlHtml=hist.map((h,i)=>{
    const dc=TK_DOTS[Math.min(i,TK_DOTS.length-1)];
    const rows=h.rows.filter(([,v])=>v&&v!=='-')
      .map(([k,v])=>`<div style="display:flex;gap:6px;flex-wrap:wrap"><strong style="min-width:90px;flex-shrink:0">${k}</strong><span style="flex:1">${esc(v)}</span></div>`).join('');
    return`<div style="position:relative">
      ${i<hist.length-1?`<div style="position:absolute;left:5px;top:11px;height:100%;width:1px;background:var(--border)"></div>`:''}
      <div class="tl-row${i===0?' open tl-pop':''}" onclick="toggleTlRow(${i})">
        <div class="tl-dot" style="background:${dc}"></div>
        <div class="tl-main">
          <div class="tl-head"><span class="tl-title">${h.title}</span><span class="tl-arrow">▾</span></div>
          <div class="tl-sub">${h.sub}</div>
          <div class="tl-detail"><div class="tl-detail-inner">${rows||'<span style="color:var(--fg4)">ไม่มีข้อมูลเพิ่มเติม</span>'}</div></div>
        </div>
      </div>
    </div>`;
  }).join('');

  return`<div style="background:transparent">
    <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">
        <span style="font-family:var(--mono);font-size:11px;color:var(--fg4)">${esc(tk.id)}</span>
        <span style="font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;background:${cfg.pillBg};color:${cfg.pillC}">${cfg.label}</span>
      </div>
      <div style="font-size:15px;font-weight:700;color:var(--fg);margin-bottom:2px">${esc(tk.type||'-')}</div>
      <div style="font-size:12px;color:var(--fg3)">${esc(tk.brand||'-')} / ${esc(tk.branchCode||'-')}</div>
    </div>
    <div style="background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px">
      <div class="tpgrid">${progHtml}</div>
      <div style="border-top:1px solid var(--border);padding-top:12px">
        <div style="font-size:10px;font-weight:700;color:var(--fg4);margin-bottom:12px;letter-spacing:.08em;text-transform:uppercase">
          ประวัติการดำเนินการ <span style="font-weight:400">— กดเพื่อดูรายละเอียด</span>
        </div>
        ${tlHtml}
      </div>
    </div>
  </div>`;
}

async function doTrack(){
  const l=t();
  const id=(document.getElementById('trk-id')?.value||'').trim();
  if(!id){toast(l.ticketNotFound);return;}
  const out=document.getElementById('trk-result');
  out.innerHTML='<div class="empty">...</div>';
  try{
    const d=await fetch('/api/tickets').then(r=>r.json());
    if(!d.ok)throw new Error(d.error||'Error');
    const tk=(d.tickets||[]).find(x=>(x.id||'').toLowerCase()===id.toLowerCase()||x._recordId===id);
    if(!tk)throw new Error(l.ticketNotFound+': '+id);
    _trkOpen=0;
    out.innerHTML=renderTicketTimeline(tk);
  }catch(e){out.innerHTML=`<div class="empty">${esc(e.message)}</div>`;}
}

// ══ CLOCK ══════════════════════════════════════════════════
setInterval(()=>{
  const el=document.getElementById('clock');
  if(el)el.textContent=new Date().toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
},1000);

// ══ TOAST ══════════════════════════════════════════════════
let toastT;
function toast(m){
  const el=document.getElementById('toast');
  el.textContent=m;el.style.display='block';
  el.style.animation='none';el.offsetHeight;el.style.animation='';
  clearTimeout(toastT);toastT=setTimeout(()=>el.style.display='none',2500);
}

// ══ SHEET SEARCH — keyboard close ══════════════════════════
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){
    closeSheet();
    document.getElementById('gps-popup')?.classList.remove('open');
  }
});

// ══ INIT ═══════════════════════════════════════════════════
// restore theme
if(localStorage.getItem('rep_theme')==='dark')document.documentElement.dataset.t='dark';
document.getElementById('btn-theme').textContent=document.documentElement.dataset.t==='dark'?'Light':'Dark';

// restore lang
lang=localStorage.getItem('rep_lang')||'th';
document.getElementById('btn-lang').textContent=lang==='th'?'EN':'TH';
document.getElementById('btn-lang').classList.toggle('lang-active',lang==='en');
applyLang();

// init tabs
document.getElementById('tab-report').textContent=t().tabReport;
document.getElementById('tab-track').textContent=t().tabTrack;

// detect brand from URL
const detected=detectBrand();
if(detected)setBrand(detected);
else renderForm();

renderTrack();
</script>
