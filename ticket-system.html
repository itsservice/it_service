!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>IT Ticket System</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#070b12;--bg2:#0c1220;
  --s1:rgba(255,255,255,.05);--s2:rgba(255,255,255,.09);--s3:rgba(255,255,255,.14);
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.14);
  --fg:rgba(255,255,255,.90);--fg2:rgba(255,255,255,.45);--fg3:rgba(255,255,255,.22);
  --accent:#60a5fa;--glow:rgba(96,165,250,.22);
  --green:#4ade80;--orange:#fb923c;--red:#f87171;--yellow:#facc15;--teal:#2dd4bf;
  --r:10px;--r2:14px;
  --ease:cubic-bezier(.22,.61,.36,1);--spring:cubic-bezier(.34,1.56,.64,1);
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-left:env(safe-area-inset-left,0px);--safe-right:env(safe-area-inset-right,0px);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--fg);font-size:14px;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── LOGIN ── */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#070b12,#0c1a2e);position:relative;z-index:1}
.login-card{background:var(--bg2);border:1px solid var(--b2);border-radius:20px;padding:40px 36px;width:360px;max-width:92vw;box-shadow:0 24px 64px rgba(0,0,0,.6);backdrop-filter:blur(20px)}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:26px}
.login-logo-icon{width:40px;height:40px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px}
.login-logo-text{font-size:19px;font-weight:600;color:var(--fg)}
.login-subtitle{font-size:12px;color:var(--fg2);margin-top:2px}
.field{margin-bottom:13px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--fg2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.field input,.field select,.field textarea{width:100%;padding:10px 13px;border:1px solid var(--b2);border-radius:var(--r);font-family:'Outfit',sans-serif;font-size:14px;color:var(--fg);outline:none;transition:border-color .15s;background:var(--s1)}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field select option{background:#0c1220;color:var(--fg)}
.field textarea{resize:vertical}
.login-btn{width:100%;padding:11px;background:var(--accent);color:#070b12;border:none;border-radius:var(--r);font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s}
.login-btn:hover{opacity:.85}
.error-msg{color:var(--red);font-size:13px;margin-top:10px;text-align:center;min-height:18px}
.demo-box{margin-top:13px;padding:11px 13px;background:var(--s1);border:1px solid var(--b1);border-radius:8px;font-size:12px;color:var(--fg2)}
.demo-box strong{display:block;margin-bottom:5px;color:var(--fg3)}
.demo-row{display:flex;gap:8px;margin-bottom:3px}
.demo-u{font-family:'DM Mono',monospace;color:var(--accent);min-width:80px}
.demo-p{font-family:'DM Mono',monospace;min-width:80px}

/* ── HAMBURGER FAB ── */
.menu-fab{
  position:fixed;top:calc(16px + var(--safe-top));left:calc(14px + var(--safe-left));
  z-index:90;width:44px;height:44px;border-radius:12px;
  background:var(--s3);border:1px solid var(--b2);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  transition:opacity .25s,transform .2s var(--spring);overflow:hidden;
}
.menu-fab:hover{transform:scale(1.07)}
.menu-fab:active{transform:scale(.93)}
.bar{display:block;width:17px;height:1.5px;background:var(--fg);border-radius:2px;transition:.28s var(--ease)}
.bar-2{width:11px;margin-left:-6px}
.menu-open .menu-fab{opacity:0;pointer-events:none}

/* ── SCRIM ── */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.52);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);z-index:85;animation:scrimIn .22s ease}
@keyframes scrimIn{from{opacity:0}to{opacity:1}}

/* ── SIDEBAR (portal style) ── */
.sidebar{
  position:fixed;top:0;left:0;height:100%;width:clamp(240px,80vw,280px);
  background:var(--bg2);border-right:1px solid var(--b1);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  z-index:86;display:flex;flex-direction:column;
  clip-path:circle(0% at 36px 36px);
  transition:clip-path .42s var(--ease);will-change:clip-path;
  padding-top:var(--safe-top);
}
.sidebar.open{clip-path:circle(200% at 36px 36px)}
.sidebar-head{display:flex;align-items:center;justify-content:space-between;padding:16px 13px 12px;border-bottom:1px solid var(--b1);flex-shrink:0}
.sidebar-logo-wrap{display:flex;align-items:center;gap:9px}
.sidebar-logo-icon{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.sidebar-logo-text{font-size:15px;font-weight:600;color:var(--fg)}
.close-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--b1);background:var(--s1);color:var(--fg2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s,transform .2s var(--spring);overflow:hidden;position:relative;flex-shrink:0}
.close-btn:hover{background:var(--s2);color:var(--fg);transform:scale(1.1)}
.close-btn:active{transform:scale(.92)}
.sidebar-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 8px calc(12px + var(--safe-bottom));scrollbar-width:thin;scrollbar-color:var(--b2) transparent;-webkit-overflow-scrolling:touch}
.sidebar-sec{padding:9px 7px 3px;font-size:10px;font-weight:600;color:var(--fg3);letter-spacing:.08em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 11px;margin:1px 0;border-radius:9px;border:1px solid transparent;cursor:pointer;color:var(--fg2);font-size:13.5px;transition:background .12s,color .12s,transform .18s var(--ease);position:relative;overflow:hidden;opacity:0;transform:translateX(-10px)}
.nav-item.visible{animation:slideIn .3s var(--ease) forwards}
@keyframes slideIn{to{opacity:1;transform:translateX(0)}}
.nav-item:hover{background:var(--s2);color:var(--fg);transform:translateX(4px)}
.nav-item.active{background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.25);color:var(--accent)}
.nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--s3);color:var(--fg2);font-size:10px;padding:2px 7px;border-radius:99px;font-family:'DM Mono',monospace;flex-shrink:0}
.nav-item.active .nav-badge{background:rgba(96,165,250,.2);color:var(--accent)}
.sidebar-user-wrap{border-top:1px solid var(--b1);padding:8px 8px calc(8px + var(--safe-bottom));flex-shrink:0}
.sidebar-user{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;cursor:pointer;transition:background .12s}
.sidebar-user:hover{background:var(--s2)}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
.sidebar-username{font-size:13px;font-weight:500;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-role{font-size:11px;color:var(--fg2)}
.logout-btn{display:flex;align-items:center;gap:8px;padding:8px 11px;margin:2px 0;border-radius:9px;cursor:pointer;color:var(--fg2);font-size:13px;transition:background .12s,color .12s}
.logout-btn:hover{background:rgba(248,113,113,.1);color:var(--red)}

/* ── TOPBAR ── */
.topbar{
  position:fixed;top:0;left:0;right:0;
  height:calc(56px + var(--safe-top));padding-top:var(--safe-top);
  background:rgba(7,11,18,.88);border-bottom:1px solid var(--b1);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  display:flex;align-items:center;
  padding-left:calc(68px + var(--safe-left));padding-right:calc(14px + var(--safe-right));
  gap:10px;z-index:70;
}
.breadcrumb{font-size:13px;color:var(--fg2);flex:1;display:flex;align-items:center;gap:5px;overflow:hidden;min-width:0}
.breadcrumb span{cursor:pointer;white-space:nowrap;flex-shrink:0}
.breadcrumb span:hover{color:var(--accent)}
.breadcrumb-cur{color:var(--fg);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topbar-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.clock-pill{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;background:var(--s1);border:1px solid var(--b1);font-family:'DM Mono',monospace;font-size:11px;color:var(--fg2);white-space:nowrap}
.pill-sep{width:1px;height:9px;background:var(--b2)}

/* ── MAIN ── */
.main{position:relative;z-index:1;padding-top:calc(56px + var(--safe-top));min-height:100vh}
.content{padding:16px 15px calc(30px + var(--safe-bottom))}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);border:1px solid transparent;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none;position:relative;overflow:hidden}
.btn-primary{background:var(--accent);color:#070b12;border-color:var(--accent)}.btn-primary:hover{opacity:.85}
.btn-outline{background:var(--s2);color:var(--fg);border-color:var(--b2)}.btn-outline:hover{background:var(--s3)}
.btn-danger{background:rgba(248,113,113,.12);color:var(--red);border-color:rgba(248,113,113,.25)}.btn-danger:hover{background:rgba(248,113,113,.22)}
.btn-ghost{background:transparent;color:var(--fg2);border-color:transparent;padding:5px 8px}.btn-ghost:hover{background:var(--s2);color:var(--fg)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.15);transform:scale(0);pointer-events:none;animation:ripple .5s ease-out forwards}
@keyframes ripple{to{transform:scale(5);opacity:0}}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;font-size:11.5px;font-weight:500;white-space:nowrap}
.badge-blue{background:rgba(96,165,250,.12);color:#60a5fa}
.badge-green{background:rgba(74,222,128,.12);color:#4ade80}
.badge-orange{background:rgba(251,146,60,.12);color:#fb923c}
.badge-red{background:rgba(248,113,113,.12);color:#f87171}
.badge-yellow{background:rgba(250,204,21,.12);color:#facc15}
.badge-teal{background:rgba(45,212,191,.12);color:#2dd4bf}
.badge-gray{background:var(--s2);color:var(--fg2)}
.badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ── STATS ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:16px}
.stat-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);padding:15px 17px;backdrop-filter:blur(8px)}
.stat-label{font-size:10.5px;color:var(--fg2);margin-bottom:7px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.stat-val{font-size:26px;font-weight:600;line-height:1}

/* ── TABLE ── */
.table-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);overflow:hidden}
.table-toolbar{display:flex;align-items:center;gap:9px;padding:10px 13px;border-bottom:1px solid var(--b1);flex-wrap:wrap}
.search-box{display:flex;align-items:center;gap:7px;padding:6px 11px;border:1px solid var(--b2);border-radius:var(--r);background:var(--s1);flex:1;max-width:250px}
.search-box input{border:none;outline:none;font-family:'Outfit',sans-serif;font-size:13px;color:var(--fg);width:100%;background:transparent}
.search-box input::placeholder{color:var(--fg3)}
.filter-chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{padding:4px 10px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--b2);color:var(--fg2);background:var(--s1);transition:all .12s}
.chip:hover,.chip.active{background:rgba(96,165,250,.1);border-color:rgba(96,165,250,.3);color:var(--accent)}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:9px 12px;font-size:10.5px;font-weight:600;color:var(--fg2);border-bottom:1px solid var(--b1);background:rgba(255,255,255,.025);white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
td{padding:9px 12px;border-bottom:1px solid var(--b1);font-size:13px;color:var(--fg);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:var(--s1)}
.mono{font-family:'DM Mono',monospace;font-size:12px}
.row-group td{background:rgba(255,255,255,.02);padding:5px 12px;font-size:11px;font-weight:600;color:var(--fg2)}
.sla-chip{display:inline-block;padding:2px 8px;border-radius:4px;font-family:'DM Mono',monospace;font-size:11px;font-weight:600}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;border-top:1px solid var(--b1)}
.page-info{font-size:12px;color:var(--fg2)}
.page-btns{display:flex;gap:3px}
.page-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--b2);background:var(--s1);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--fg2);transition:all .12s}
.page-btn:hover{border-color:var(--accent);color:var(--accent)}
.page-btn.active{background:var(--accent);color:#070b12;border-color:var(--accent)}
.page-btn:disabled{opacity:.3;cursor:default}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px)}
.modal{background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r2);padding:24px;width:540px;max-width:95vw;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:9px;color:var(--fg)}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;border-top:1px solid var(--b1);padding-top:13px}

/* ── DRAWER ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:150;backdrop-filter:blur(2px)}
.drawer{position:fixed;right:0;top:0;bottom:0;width:450px;max-width:95vw;background:var(--bg2);border-left:1px solid var(--b1);z-index:151;overflow-y:auto;display:flex;flex-direction:column}
.drawer-head{padding:17px 20px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1}
.drawer-body{padding:20px;flex:1}
.drawer-sec-title{font-size:10px;font-weight:700;color:var(--fg3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px}
.drawer-field{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--b1)}
.drawer-field:last-child{border-bottom:none}
.drawer-field-label{font-size:12px;color:var(--fg2);min-width:110px}
.drawer-field-value{font-size:12.5px;color:var(--fg);text-align:right;flex:1}
.status-btns{display:flex;gap:6px;flex-wrap:wrap}
.status-btn{cursor:pointer;border:1.5px solid transparent;transition:all .15s;border-radius:99px}
.status-btn.selected{border-color:currentColor;transform:scale(1.06)}

/* ── USER GRID ── */
.user-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px}
.user-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);padding:17px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:9px;position:relative;transition:border-color .2s}
.user-card:hover{border-color:var(--b2)}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(22px + var(--safe-bottom));right:calc(18px + var(--safe-right));padding:10px 15px;border-radius:var(--r);background:var(--bg2);border:1px solid var(--b2);color:var(--fg);font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:300;animation:toastIn .22s ease;pointer-events:none;backdrop-filter:blur(12px)}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── EMPTY ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:52px 20px;color:var(--fg2)}
.empty-icon{font-size:34px;margin-bottom:11px;opacity:.3}

/* ── RESPONSIVE ── */
@media(max-width:640px){
  .stat-grid{grid-template-columns:1fr 1fr}
  .user-grid{grid-template-columns:1fr 1fr}
  .drawer{width:100%;max-width:100%}
  .modal-grid{grid-template-columns:1fr}
  #ts-temp,.pill-sep{display:none}
}
@media(max-width:380px){
  .user-grid{grid-template-columns:1fr}
  .clock-pill{font-size:10px;padding:4px 8px}
  .topbar{padding-left:calc(62px + var(--safe-left))}
  .stat-val{font-size:22px}
}
</style>
</head>
<body>
<canvas id="bgCanvas" aria-hidden="true"></canvas>
<button class="menu-fab" id="menuFab" aria-label="Menu">
  <span class="bar bar-1"></span>
  <span class="bar bar-2"></span>
  <span class="bar bar-3"></span>
</button>
<div id="app"></div>
<script>

// =====================
// DATA & HELPERS
// =====================
const AVATAR_COLORS = ['#2563eb','#7c3aed','#db2777','#0d9488','#ea580c','#16a34a','#ca8a04'];
const avatarColor = s => AVATAR_COLORS[(s||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0) % AVATAR_COLORS.length];
const initials = n => (n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const uid = () => Math.random().toString(36).slice(2,8).toUpperCase();
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const BRANDS = ['ALL','Animal House','Another Hound Cafe','Au Bon Pain',"Dunkin'","Greyhound Cafe",'Greyhound Coffee','Greyhound Original','Kin+Hey','Le Grand Vefour','M-Kitchen','Smileyhound'];
const STATUSES = ['ตรวจงาน','อยู่ระหว่างดำเนินการ','รอชิ้นส่วน','เสร็จสิ้น','ยกเลิก'];
const TYPES = ['งานระบบไฟฟ้า','งานระบบปรับอากาศ','เครื่องทำน้ำร้อน','เครื่องทำกาแฟ','งานซ่อมแซม','งานติดตั้ง','อุปกรณ์เครือข่าย'];
const SLA_LIST = ['K.0001','K.0002','K.0003','K.0006'];

const statusBadge = s => {
  const m = {ตรวจงาน:'badge-yellow',อยู่ระหว่างดำเนินการ:'badge-blue',รอชิ้นส่วน:'badge-orange',เสร็จสิ้น:'badge-green',ยกเลิก:'badge-red'};
  return m[s]||'badge-gray';
};
const slaColor = s => ({K:'#f97316','K.0001':'#f97316','K.0002':'#3b82f6','K.0003':'#a855f7','K.0006':'#6b7280'}[s]||'#6b7280');
const roleBadge = r => r==='admin'?'badge-red':r==='manager'?'badge-blue':'badge-teal';
const roleLabel = r => ({admin:'Admin',manager:'Manager',staff:'Staff'}[r]||r);

// State
let STATE = {
  users: null, tickets: null,
  currentUser: null, page: 'dashboard',
  drawerTicket: null, editTicket: null, showAddTicket: false,
  editUser: null, showAddUser: false,
  filterStatus: 'ALL', filterBrand: 'ALL', search: '', ticketPage: 1,
  userSearch: '', userView: 'grid',
  toast: null, toastTimer: null,
};
const PER_PAGE = 15;

function loadData() {
  try { STATE.users = JSON.parse(localStorage.getItem('ts_users')||'null'); } catch{}
  try { STATE.tickets = JSON.parse(localStorage.getItem('ts_tickets')||'null'); } catch{}
  if(!STATE.users) STATE.users = [

function addRipple(el,e){
  const rect=el.getBoundingClientRect(),src=e?.touches?.[0]||e;
  const x=src?src.clientX-rect.left:rect.width/2,y=src?src.clientY-rect.top:rect.height/2;
  const size=Math.max(rect.width,rect.height),r=document.createElement('span');
  r.className='btn-ripple';
  r.style.cssText=`width:${size}px;height:${size}px;left:${x-size/2}px;top:${y-size/2}px;`;
  el.appendChild(r);r.addEventListener('animationend',()=>r.remove());
}

function getFilteredTickets() {
  const u = STATE.currentUser;
  return STATE.tickets.filter(t=>{
    if(STATE.page==='inprogress'&&t.status!=='อยู่ระหว่างดำเนินการ') return false;
    if(u.brand!=='ALL'&&t.brand!==u.brand) return false;
    if(STATE.filterBrand!=='ALL'&&t.brand!==STATE.filterBrand) return false;
    if(STATE.filterStatus!=='ALL'&&t.status!==STATE.filterStatus) return false;
    if(STATE.search){
      const q=STATE.search.toLowerCase();
      if(!(t.id+' '+t.reporter+' '+t.type+' '+t.detail+' '+t.branchCode).toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

function bindApp() {
  // ── Sidebar ──
  const menuFab = document.getElementById('menuFab');
  const tsClose = document.getElementById('ts-close-btn');
  const tsScrim = document.getElementById('ts-scrim');
  const tsSb    = document.getElementById('ts-sidebar');
  if(menuFab) menuFab.onclick = e=>{ addRipple(menuFab,e); openSidebar(); };
  if(tsClose) tsClose.onclick = e=>{ addRipple(tsClose,e); closeSidebar(); };
  if(tsScrim) tsScrim.onclick = closeSidebar;
  // swipe-left to close
  let tx0=null,ty0=null;
  if(tsSb){
    tsSb.addEventListener('touchstart',e=>{const t=e.touches[0];tx0=t.clientX;ty0=t.clientY;},{passive:true});
    tsSb.addEventListener('touchmove',e=>{
      if(!sidebarOpen||tx0==null)return;
      const t=e.touches[0],dx=t.clientX-tx0,dy=t.clientY-ty0;
      if(Math.abs(dy)>Math.abs(dx))return;
      if(dx<-50){closeSidebar();tx0=ty0=null;}
    },{passive:true});
    tsSb.addEventListener('touchend',()=>{tx0=ty0=null;},{passive:true});
  }
  document.onkeydown=e=>{if(e.key==='Escape'){closeSidebar();if(STATE.drawerTicket){STATE.drawerTicket=null;render();}}};

  // ── Navigation ──
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.onclick=()=>{STATE.page=el.dataset.nav;STATE.ticketPage=1;closeSidebar();render();};
  });
  document.querySelectorAll('[data-nav-brand]').forEach(el=>{
    el.onclick=()=>{STATE.page='tickets';STATE.filterBrand=el.dataset.navBrand;STATE.ticketPage=1;closeSidebar();render();};
  });
  if(document.getElementById('btn-logout'))
    document.getElementById('btn-logout').onclick=()=>{STATE.currentUser=null;closeSidebar();render();};
  if(document.getElementById('sidebar-user-btn'))
    document.getElementById('sidebar-user-btn').onclick=()=>{if(STATE.currentUser.role==='admin'){STATE.page='users';closeSidebar();render();}};

  // ── Clock ──
  function updateClock(){
    const el=document.getElementById('ts-clock');if(!el)return;
    const now=new Date(),m=window.innerWidth<480;
    el.textContent=m?now.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})
      :now.toLocaleString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }
  clearInterval(window._ck);window._ck=setInterval(updateClock,1000);updateClock();
  if(!window._tempDone){
    window._tempDone=true;
    fetch('https://api.open-meteo.com/v1/forecast?latitude=13.7563&longitude=100.5018&current=temperature_2m',{cache:'no-store'})
      .then(r=>r.json()).then(j=>{const t=Math.round(j?.current?.temperature_2m);if(Number.isFinite(t)){const el=document.getElementById('ts-temp');if(el)el.textContent=t+'\u00b0C';}}).catch(()=>{});
  }

  // ── Tickets ──
  if(document.getElementById('btn-add-ticket'))
    document.getElementById('btn-add-ticket').onclick=()=>{STATE.showAddTicket=true;STATE.editTicket=null;render();};
  if(document.getElementById('search-inp'))
    document.getElementById('search-inp').oninput=e=>{STATE.search=e.target.value;STATE.ticketPage=1;renderPageContent();};
  if(document.getElementById('brand-filter'))
    document.getElementById('brand-filter').onchange=e=>{STATE.filterBrand=e.target.value;STATE.ticketPage=1;renderPageContent();};
  document.querySelectorAll('[data-filter-status]').forEach(el=>{
    el.onclick=()=>{STATE.filterStatus=el.dataset.filterStatus;STATE.ticketPage=1;renderPageContent();};
  });
  document.querySelectorAll('[data-page]').forEach(el=>{
    el.onclick=()=>{if(!el.disabled){STATE.ticketPage=parseInt(el.dataset.page);renderPageContent();}};
  });
  document.querySelectorAll('[data-open-ticket]').forEach(el=>{
    el.onclick=()=>{STATE.drawerTicket=el.dataset.openTicket;render();};
  });
  document.querySelectorAll('[data-edit-ticket]').forEach(el=>{
    el.onclick=()=>{STATE.editTicket=STATE.tickets.find(t=>t.id===el.dataset.editTicket)||null;STATE.showAddTicket=false;render();};
  });
  document.querySelectorAll('[data-del-ticket]').forEach(el=>{
    el.onclick=()=>{
      if(!confirm('ลบ '+el.dataset.delTicket+' ?'))return;
      STATE.tickets=STATE.tickets.filter(t=>t.id!==el.dataset.delTicket);
      saveData();showToast('ลบ Ticket แล้ว');renderPageContent();
    };
  });

  // ── Users ──
  if(document.getElementById('btn-add-user'))
    document.getElementById('btn-add-user').onclick=()=>{STATE.showAddUser=true;STATE.editUser=null;render();};
  if(document.getElementById('user-search-inp'))
    document.getElementById('user-search-inp').oninput=e=>{STATE.userSearch=e.target.value;renderPageContent();};
  document.querySelectorAll('[data-user-view]').forEach(el=>{
    el.onclick=()=>{STATE.userView=el.dataset.userView;renderPageContent();};
  });
  document.querySelectorAll('[data-edit-user]').forEach(el=>{
    el.onclick=()=>{STATE.editUser=STATE.users.find(u=>u.id===el.dataset.editUser)||null;STATE.showAddUser=false;render();};
  });
  document.querySelectorAll('[data-toggle-user]').forEach(el=>{
    el.onclick=()=>{
      const id=el.dataset.toggleUser;
      if(id===STATE.currentUser.id){showToast('ไม่สามารถปิดตัวเองได้');return;}
      const u=STATE.users.find(x=>x.id===id);
      STATE.users=STATE.users.map(x=>x.id===id?{...x,active:!x.active}:x);
      saveData();showToast(u?.active?'ปิดใช้งานแล้ว':'เปิดใช้งานแล้ว');renderPageContent();
    };
  });
  document.querySelectorAll('[data-del-user]').forEach(el=>{
    el.onclick=()=>{
      if(!confirm('ยืนยันการลบผู้ใช้?'))return;
      STATE.users=STATE.users.filter(u=>u.id!==el.dataset.delUser);
      saveData();showToast('ลบผู้ใช้แล้ว');renderPageContent();
    };
  });

  // ── Modal ──
  if(document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').onclick=e=>{if(e.target.id==='modal-overlay')closeModal();};
  if(document.getElementById('modal-cancel'))
    document.getElementById('modal-cancel').onclick=closeModal;
  if(document.getElementById('modal-save'))
    document.getElementById('modal-save').onclick=saveModal;

  // ── Drawer ──
  if(document.getElementById('drawer-overlay'))
    document.getElementById('drawer-overlay').onclick=()=>{STATE.drawerTicket=null;render();};
  if(document.getElementById('close-drawer'))
    document.getElementById('close-drawer').onclick=()=>{STATE.drawerTicket=null;render();};
  document.querySelectorAll('[data-set-status]').forEach(el=>{
    el.onclick=()=>{
      const s=el.dataset.setStatus;
      STATE.tickets=STATE.tickets.map(t=>t.id===STATE.drawerTicket?{...t,status:s}:t);
      saveData();showToast('สถานะ → '+s);
      document.querySelectorAll('.status-btn').forEach(b=>b.classList.toggle('selected',b.dataset.setStatus===s));
    };
  });
  if(STATE.toast)showToast(STATE.toast);
}


function closeModal() {
  STATE.showAddTicket=false; STATE.editTicket=null;
  STATE.showAddUser=false; STATE.editUser=null;
  render();
}

function saveModal() {
  if(STATE.showAddTicket||STATE.editTicket) saveTicketModal();
  else saveUserModal();
}

function saveTicketModal() {
  const reporter=document.getElementById('m-reporter').value.trim();
  const phone=document.getElementById('m-phone').value.trim();
  if(!reporter||!phone){alert('กรุณากรอกชื่อผู้แจ้งและเบอร์');return;}
  const ticket = {
    id: STATE.editTicket?.id||('GD-'+uid()),
    brand: document.getElementById('m-brand').value,
    status: document.getElementById('m-status').value,
    reporter, phone,
    branchCode: document.getElementById('m-branch').value,
    sla: document.getElementById('m-sla').value,
    type: document.getElementById('m-type').value,
    location: document.getElementById('m-location').value,
    detail: document.getElementById('m-detail').value,
    sentDate: STATE.editTicket?.sentDate||new Date().toLocaleDateString('th-TH'),
    slaDate: STATE.editTicket?.slaDate||'09/03/2569',
    createdAt: STATE.editTicket?.createdAt||new Date().toISOString(),
  };
  if(STATE.editTicket) STATE.tickets=STATE.tickets.map(t=>t.id===ticket.id?ticket:t);
  else STATE.tickets=[ticket,...STATE.tickets];
  saveData(); showToast(STATE.editTicket?'บันทึกแล้ว':'เพิ่ม Ticket แล้ว');
  closeModal();
}

function saveUserModal() {
  const name=document.getElementById('m-name').value.trim();
  const username=document.getElementById('m-username').value.trim();
  const password=document.getElementById('m-password').value;
  if(!name||!username||!password){alert('กรุณากรอกข้อมูลให้ครบ');return;}
  const brand=document.getElementById('m-ubrand').value.replace(' (ทุกแบรนด์)','');
  const user={
    id:STATE.editUser?.id||('u'+uid()),
    name,username,password,
    role:document.getElementById('m-role').value,
    brand, active:document.getElementById('m-active').checked,
  };
  if(STATE.editUser) STATE.users=STATE.users.map(u=>u.id===user.id?user:u);
  else {
    if(STATE.users.find(u=>u.username===username)){alert('Username นี้ถูกใช้แล้ว');return;}
    STATE.users=[...STATE.users,user];
  }
  saveData(); showToast(STATE.editUser?'บันทึกแล้ว':'เพิ่มผู้ใช้แล้ว');
  closeModal();
}

function renderPageContent() {
  const pc=document.getElementById('page-content');
  if(pc){pc.innerHTML=renderPage();bindApp();}
}

  const pts=Array.from({length:COUNT},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.3,vx:(Math.random()-.5)*.14,vy:(Math.random()-.5)*.14,o:Math.random()*.38+.1}));
  let mx=-999,my=-999;
  window.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;},{passive:true});
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      if(!mob){const dx=p.x-mx,dy=p.y-my,d=Math.sqrt(dx*dx+dy*dy);if(d<100){p.vx+=dx/d*.03;p.vy+=dy/d*.03;}const sp=Math.sqrt(p.vx*p.vx+p.vy*p.vy);if(sp>.5){p.vx*=.5/sp;p.vy*=.5/sp;}}
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(150,190,255,${p.o})`;ctx.fill();
    });
    for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
      const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<DIST){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=`rgba(150,190,255,${.07*(1-d/DIST)})`;ctx.lineWidth=.6;ctx.stroke();}
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

</script>
