<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>IT Ticket System</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f8fa;--surface:#fff;--surface2:#f0f2f5;
  --border:#e4e7ec;--border2:#d0d5dd;
  --text:#0f1623;--text2:#6b7280;--text3:#9ca3af;
  --accent:#2563eb;--green:#16a34a;--orange:#ea580c;
  --red:#dc2626;--yellow:#ca8a04;--teal:#0d9488;
  --r:8px;--r2:12px;
}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* LOGIN */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f1623,#1e2d4a)}
.login-card{background:#fff;border-radius:20px;padding:44px 40px;width:380px;box-shadow:0 24px 64px rgba(0,0,0,.35)}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.login-logo-icon{width:40px;height:40px;background:var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:20px}
.login-logo-text{font-size:20px;font-weight:700}
.login-subtitle{font-size:13px;color:var(--text2);margin-top:2px}
.field{margin-bottom:16px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.field input,.field select,.field textarea{width:100%;padding:10px 13px;border:1.5px solid var(--border2);border-radius:var(--r);font-family:'Outfit',sans-serif;font-size:14px;color:var(--text);outline:none;transition:border-color .15s;background:#fff}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:var(--r);font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s}
.login-btn:hover{opacity:.88}
.error-msg{color:var(--red);font-size:13px;margin-top:10px;text-align:center;min-height:20px}
.demo-box{margin-top:16px;padding:12px 14px;background:#f8fafc;border-radius:8px;font-size:12px;color:#6b7280}
.demo-box strong{display:block;margin-bottom:6px;color:#374151}
.demo-row{display:flex;gap:8px;margin-bottom:3px}
.demo-u{font-family:monospace;color:#2563eb;min-width:80px}
.demo-p{font-family:monospace;min-width:80px}

/* LAYOUT */
.app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:220px;flex-shrink:0;background:#111827;display:flex;flex-direction:column;overflow-y:auto;transition:transform .3s}
.sidebar-logo{padding:16px;display:flex;align-items:center;gap:9px;border-bottom:1px solid rgba(255,255,255,.07)}
.sidebar-logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0}
.sidebar-logo-text{font-size:15px;font-weight:700;color:#fff}
.sidebar-sec{padding:10px 10px 4px;font-size:10px;font-weight:600;color:rgba(255,255,255,.3);letter-spacing:.08em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 14px;margin:1px 6px;border-radius:var(--r);cursor:pointer;color:rgba(255,255,255,.65);font-size:13.5px;transition:background .12s,color .12s;user-select:none}
.nav-item:hover{background:rgba(255,255,255,.07);color:rgba(255,255,255,.9)}
.nav-item.active{background:var(--accent);color:#fff;font-weight:500}
.nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:rgba(255,255,255,.15);color:rgba(255,255,255,.8);font-size:10px;padding:1px 6px;border-radius:99px;font-family:'DM Mono',monospace}
.nav-item.active .nav-badge{background:rgba(255,255,255,.25)}
.sidebar-bottom{margin-top:auto;border-top:1px solid rgba(255,255,255,.07);padding:10px}
.sidebar-user{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:var(--r);cursor:pointer;transition:background .12s}
.sidebar-user:hover{background:rgba(255,255,255,.07)}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
.sidebar-username{font-size:13px;font-weight:500;color:rgba(255,255,255,.88);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-role{font-size:11px;color:rgba(255,255,255,.4)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:52px;flex-shrink:0;background:#fff;border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px}
.breadcrumb{font-size:13px;color:var(--text2);flex:1;display:flex;align-items:center;gap:6px}
.breadcrumb span{cursor:pointer}.breadcrumb span:hover{color:var(--accent)}
.topbar-right{display:flex;align-items:center;gap:8px}
.content{flex:1;overflow-y:auto;padding:20px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);border:1.5px solid transparent;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent)}.btn-primary:hover{background:#1d4ed8}
.btn-outline{background:#fff;color:var(--text);border-color:var(--border2)}.btn-outline:hover{background:var(--surface2)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{background:#b91c1c}
.btn-ghost{background:transparent;color:var(--text2);border-color:transparent;padding:5px 8px}.btn-ghost:hover{background:var(--surface2);color:var(--text)}
.btn-sm{padding:5px 10px;font-size:12px}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;font-size:12px;font-weight:500;white-space:nowrap}
.badge-blue{background:rgba(37,99,235,.10);color:#2563eb}
.badge-green{background:rgba(22,163,74,.10);color:#16a34a}
.badge-orange{background:rgba(234,88,12,.10);color:#ea580c}
.badge-red{background:rgba(220,38,38,.10);color:#dc2626}
.badge-yellow{background:rgba(202,138,4,.10);color:#ca8a04}
.badge-teal{background:rgba(13,148,136,.10);color:#0d9488}
.badge-gray{background:var(--surface2);color:var(--text2)}
.badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}

/* STATS */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:var(--r2);padding:18px 20px}
.stat-label{font-size:11px;color:var(--text2);margin-bottom:8px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.stat-val{font-size:28px;font-weight:700;line-height:1}

/* TABLE */
.table-wrap{background:#fff;border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.table-toolbar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.search-box{display:flex;align-items:center;gap:8px;padding:7px 12px;border:1.5px solid var(--border2);border-radius:var(--r);background:#fff;flex:1;max-width:280px}
.search-box input{border:none;outline:none;font-family:'Outfit',sans-serif;font-size:13px;color:var(--text);width:100%;background:transparent}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap}
.chip{padding:4px 10px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;border:1.5px solid var(--border2);color:var(--text2);background:#fff;transition:all .12s}
.chip:hover,.chip.active{background:rgba(37,99,235,.08);border-color:var(--accent);color:var(--accent)}
.tbl-scroll{overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:10px 14px;font-size:11px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap;text-transform:uppercase;letter-spacing:.04em}
td{padding:10px 14px;border-bottom:1px solid var(--border);font-size:13.5px;color:var(--text);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:#f9fafb}
.mono{font-family:'DM Mono',monospace;font-size:12.5px}
.row-group td{background:var(--surface2);padding:7px 14px;font-size:12px;font-weight:600;color:var(--text2)}
.sla-chip{display:inline-block;padding:2px 8px;border-radius:4px;font-family:'DM Mono',monospace;font-size:11.5px;font-weight:600}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-top:1px solid var(--border)}
.page-info{font-size:12.5px;color:var(--text2)}
.page-btns{display:flex;gap:4px}
.page-btn{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--border2);background:#fff;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .12s}
.page-btn:hover{border-color:var(--accent);color:var(--accent)}
.page-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.page-btn:disabled{opacity:.4;cursor:default}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(2px)}
.modal{background:#fff;border-radius:var(--r2);padding:28px;width:560px;max-width:95vw;box-shadow:0 4px 32px rgba(0,0,0,.15);max-height:90vh;overflow-y:auto}
.modal-title{font-size:17px;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:10px}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:24px;border-top:1px solid var(--border);padding-top:16px}

/* DRAWER */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:900;backdrop-filter:blur(1px)}
.drawer{position:fixed;right:0;top:0;bottom:0;width:500px;background:#fff;box-shadow:-8px 0 32px rgba(0,0,0,.12);z-index:901;overflow-y:auto;display:flex;flex-direction:column}
.drawer-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.drawer-body{padding:24px;flex:1}
.drawer-sec-title{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:12px}
.drawer-field{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--border)}
.drawer-field:last-child{border-bottom:none}
.drawer-field-label{font-size:12.5px;color:var(--text2);min-width:120px}
.drawer-field-value{font-size:13px;color:var(--text);text-align:right;flex:1}
.status-btns{display:flex;gap:8px;flex-wrap:wrap}
.status-btn{cursor:pointer;border:1.5px solid transparent;transition:all .15s;border-radius:99px}
.status-btn.selected{border-color:currentColor;transform:scale(1.05)}

/* USER GRID */
.user-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.user-card{background:#fff;border:1px solid var(--border);border-radius:var(--r2);padding:20px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px;position:relative}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;padding:12px 18px;border-radius:var(--r);background:#111827;color:#fff;font-size:13.5px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.2);z-index:2000;animation:toastIn .22s ease;pointer-events:none}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* EMPTY */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--text2)}
.empty-icon{font-size:40px;margin-bottom:14px;opacity:.4}

@media(max-width:768px){
  .stat-grid{grid-template-columns:1fr 1fr}
  .user-grid{grid-template-columns:1fr 1fr}
  .sidebar{display:none}
  .drawer{width:100%}
}
</style>
</head>
<body>

<div id="app"></div>

<script>
// =====================
// DATA & HELPERS
// =====================
const AVATAR_COLORS = ['#2563eb','#7c3aed','#db2777','#0d9488','#ea580c','#16a34a','#ca8a04'];
const avatarColor = s => AVATAR_COLORS[(s||'').split('').reduce((a,c)=>a+c.charCodeAt(0),0) % AVATAR_COLORS.length];
const initials = n => (n||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const uid = () => Math.random().toString(36).slice(2,8).toUpperCase();
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

const BRANDS = ['ALL','Animal House','Another Hound Cafe','Au Bon Pain',"Dunkin'","Greyhound Cafe",'Greyhound Coffee','Greyhound Original','Kin+Hey','Le Grand Vefour','M-Kitchen','Smileyhound'];
const STATUSES = ['ตรวจงาน','อยู่ระหว่างดำเนินการ','รอชิ้นส่วน','เสร็จสิ้น','ยกเลิก'];
const TYPES = ['งานระบบไฟฟ้า','งานระบบปรับอากาศ','เครื่องทำน้ำร้อน','เครื่องทำกาแฟ','งานซ่อมแซม','งานติดตั้ง','อุปกรณ์เครือข่าย'];
const SLA_LIST = ['K.0001','K.0002','K.0003','K.0006'];

const statusBadge = s => {
  const m = {ตรวจงาน:'badge-yellow',อยู่ระหว่างดำเนินการ:'badge-blue',รอชิ้นส่วน:'badge-orange',เสร็จสิ้น:'badge-green',ยกเลิก:'badge-red'};
  return m[s]||'badge-gray';
};
const slaColor = s => ({K:'#f97316','K.0001':'#f97316','K.0002':'#3b82f6','K.0003':'#a855f7','K.0006':'#6b7280'}[s]||'#6b7280');
const roleBadge = r => r==='admin'?'badge-red':r==='manager'?'badge-blue':'badge-teal';
const roleLabel = r => ({admin:'Admin',manager:'Manager',staff:'Staff'}[r]||r);

// State
let STATE = {
  users: null, tickets: null,
  currentUser: null, page: 'dashboard',
  drawerTicket: null, editTicket: null, showAddTicket: false,
  editUser: null, showAddUser: false,
  filterStatus: 'ALL', filterBrand: 'ALL', search: '', ticketPage: 1,
  userSearch: '', userView: 'grid',
  toast: null, toastTimer: null,
};
const PER_PAGE = 15;

function loadData() {
  try { STATE.users = JSON.parse(localStorage.getItem('ts_users')||'null'); } catch{}
  try { STATE.tickets = JSON.parse(localStorage.getItem('ts_tickets')||'null'); } catch{}
  if(!STATE.users) STATE.users = [
    {id:'u1',name:'Admin System',username:'admin',password:'admin1234',role:'admin',brand:'ALL',active:true},
    {id:'u2',name:'Greyhound IT',username:'gd_it',password:'gd1234',role:'manager',brand:'Greyhound Cafe',active:true},
    {id:'u3',name:'Au Bon Pain IT',username:'abp_it',password:'abp1234',role:'staff',brand:'Au Bon Pain',active:true},
    {id:'u4',name:'Smileyhound IT',username:'smile_it',password:'smile1234',role:'staff',brand:'Smileyhound',active:true},
  ];
  if(!STATE.tickets) {
    const brandSamples=['Greyhound Cafe','Au Bon Pain',"Dunkin'",'Smileyhound','M-Kitchen'];
    const reporters=['สมชาย','วิไล','ประเสริฐ','สุดา','มานะ'];
    STATE.tickets=[];
    for(let i=43;i>=1;i--){
      const brand=brandSamples[i%brandSamples.length];
      const sla=SLA_LIST[i%4];
      STATE.tickets.push({
        id:`GD-${String(i).padStart(5,'0')}`,
        status: i<=5?'เสร็จสิ้น':i===35?'ตรวจงาน':'อยู่ระหว่างดำเนินการ',
        branchCode: sla, sla,
        sentDate:`${new Date(Date.now()-i*3600000).toLocaleDateString('th-TH')}`,
        slaDate:'09/03/2569',
        reporter:reporters[i%reporters.length],
        phone:`0${Math.floor(800000000+Math.random()*99999999)}`,
        type:TYPES[i%TYPES.length],
        detail:`รายละเอียดงาน GD-${String(i).padStart(5,'0')} -- ${TYPES[i%TYPES.length]}`,
        location:['ชั้น 1','ชั้น 2','ครัว','หน้าร้าน'][i%4],
        brand, createdAt:new Date(Date.now()-i*3600000).toISOString(),
      });
    }
  }
}
function saveData() {
  try{localStorage.setItem('ts_users',JSON.stringify(STATE.users));}catch{}
  try{localStorage.setItem('ts_tickets',JSON.stringify(STATE.tickets));}catch{}
}

// =====================
// TOAST
// =====================
function showToast(msg) {
  if(STATE.toastTimer) clearTimeout(STATE.toastTimer);
  STATE.toast = msg;
  const t = document.getElementById('toast');
  if(t){t.textContent=msg;t.style.display='block';}
  STATE.toastTimer = setTimeout(()=>{
    STATE.toast=null;
    const t2=document.getElementById('toast');
    if(t2) t2.style.display='none';
  },2400);
}

// =====================
// RENDER ENGINE
// =====================
function render() {
  const root = document.getElementById('app');
  if(!STATE.currentUser) { root.innerHTML = renderLogin(); bindLogin(); return; }
  root.innerHTML = renderApp();
  bindApp();
}

// =====================
// LOGIN
// =====================
function renderLogin() {
  return `
  <div class="login-page">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-icon">🎫</div>
        <div>
          <div class="login-logo-text">IT Ticket System</div>
          <div class="login-subtitle">ระบบจัดการ Ticket ภายใน</div>
        </div>
      </div>
      <div class="field"><label>Username</label><input id="inp-user" placeholder="กรอก Username" autocomplete="username"/></div>
      <div class="field"><label>Password</label><input id="inp-pass" type="password" placeholder="กรอก Password" autocomplete="current-password"/></div>
      <button class="login-btn" id="btn-login">เข้าสู่ระบบ</button>
      <div class="error-msg" id="login-err"></div>
      <div class="demo-box">
        <strong>Demo Accounts</strong>
        <div class="demo-row"><span class="demo-u">admin</span><span class="demo-p">admin1234</span><span>Admin</span></div>
        <div class="demo-row"><span class="demo-u">gd_it</span><span class="demo-p">gd1234</span><span>Manager</span></div>
        <div class="demo-row"><span class="demo-u">smile_it</span><span class="demo-p">smile1234</span><span>Staff</span></div>
      </div>
    </div>
  </div>`;
}
function bindLogin() {
  const doLogin = () => {
    const u = document.getElementById('inp-user').value.trim();
    const p = document.getElementById('inp-pass').value;
    const found = STATE.users.find(x=>x.username===u&&x.password===p&&x.active);
    if(found){ STATE.currentUser=found; STATE.filterBrand=found.brand==='ALL'?'ALL':found.brand; render(); }
    else { document.getElementById('login-err').textContent='Username หรือ Password ไม่ถูกต้อง'; }
  };
  document.getElementById('btn-login').onclick = doLogin;
  document.getElementById('inp-pass').onkeydown = e=>{ if(e.key==='Enter') doLogin(); };
  document.getElementById('inp-user').focus();
}

// =====================
// APP SHELL
// =====================
function renderApp() {
  const u = STATE.currentUser;
  const myTickets = u.brand==='ALL'?STATE.tickets:STATE.tickets.filter(t=>t.brand===u.brand);
  const pendingCount = myTickets.filter(t=>t.status==='อยู่ระหว่างดำเนินการ').length;
  const NAV = [
    {id:'dashboard',label:'Dashboard',icon:'📊',badge:null},
    {id:'tickets',label:'All Ticket',icon:'🎫',badge:myTickets.length},
    {id:'inprogress',label:'กำลังดำเนินการ',icon:'⚙️',badge:pendingCount},
    ...(u.role==='admin'?[{id:'users',label:'จัดการผู้ใช้',icon:'👥',badge:STATE.users.length}]:[]),
  ];
  const brandList = u.brand==='ALL'?BRANDS.slice(1):BRANDS.filter(b=>b===u.brand);
  const pageLabel = NAV.find(n=>n.id===STATE.page)?.label||STATE.page;

  return `
  <div class="app">
    <div class="sidebar">
      <div class="sidebar-logo">
        <div class="sidebar-logo-icon">🎫</div>
        <div class="sidebar-logo-text">IT Ticket</div>
      </div>
      <div style="padding:10px 0;flex:1">
        <div class="sidebar-sec">เมนูหลัก</div>
        ${NAV.map(n=>`
        <div class="nav-item ${STATE.page===n.id?'active':''}" data-nav="${n.id}">
          <span class="nav-icon">${n.icon}</span>
          <span>${n.label}</span>
          ${n.badge!==null?`<span class="nav-badge">${n.badge}</span>`:''}
        </div>`).join('')}
        <div class="sidebar-sec" style="margin-top:10px">แบรนด์</div>
        ${brandList.map(b=>`
        <div class="nav-item" data-nav-brand="${esc(b)}" style="font-size:12.5px">
          <span style="width:6px;height:6px;border-radius:50%;background:${avatarColor(b)};flex-shrink:0;display:inline-block"></span>

function renderPage() {
  if(STATE.page==='dashboard') return renderDashboard();

  if(STATE.page==='users') return renderUsers();

}

// TICKETS PAGE
// =====================
function getFilteredTickets() {
  const u = STATE.currentUser;
  return STATE.tickets.filter(t=>{
    if(STATE.page==='inprogress'&&t.status!=='อยู่ระหว่างดำเนินการ') return false;
    if(u.brand!=='ALL'&&t.brand!==u.brand) return false;
    if(STATE.filterBrand!=='ALL'&&t.brand!==STATE.filterBrand) return false;
    if(STATE.filterStatus!=='ALL'&&t.status!==STATE.filterStatus) return false;
    if(STATE.search){
      const q=STATE.search.toLowerCase();
      if(!(t.id+' '+t.reporter+' '+t.type+' '+t.detail+' '+t.branchCode).toLowerCase().includes(q)) return false;
    }
    return true;
  });
}

function renderTickets() {
  const filtered = getFilteredTickets();
  const u = STATE.currentUser;
  const cnt={};filtered.forEach(t=>{cnt[t.status]=(cnt[t.status]||0)+1;});
  const totalPages = Math.ceil(filtered.length/PER_PAGE);
  const page = Math.min(STATE.ticketPage, Math.max(1,totalPages));
  const paged = filtered.slice((page-1)*PER_PAGE, page*PER_PAGE);

  // group by status
  const grouped={};
  paged.forEach(t=>{ if(!grouped[t.status])grouped[t.status]=[]; grouped[t.status].push(t); });

  const brandOpts = u.brand==='ALL'?BRANDS:[u.brand];

  return `
  <div class="stat-grid">
    ${[
      {label:'ทั้งหมด',val:filtered.length,color:'#2563eb'},

      {label:'รอตรวจงาน',val:cnt['ตรวจงาน']||0,color:'#ca8a04'},

      </div>
      <div class="filter-chips">
        ${['ALL',...STATUSES].map(s=>`

          ${s==='ALL'?'ทั้งหมด':esc(s)}${s!=='ALL'?` <span style="opacity:.7;font-size:10px">${cnt[s]||0}</span>`:''}

      <div style="margin-left:auto;display:flex;gap:8px;align-items:center">

          ${brandOpts.map(b=>`<option value="${esc(b)}" ${STATE.filterBrand===b?'selected':''}>${b==='ALL'?'ทุกแบรนด์':esc(b)}</option>`).join('')}

        <button class="btn btn-primary btn-sm" id="btn-add-ticket">➕ เพิ่ม Ticket</button>
      </div>
    </div>
    <div class="tbl-scroll">

          <th>Number Ticket</th><th>สถานะ</th><th>รหัสสาขา</th><th>SLA</th>

        </tr></thead>
        <tbody>

              </div>
            </td>
          </tr>`).join('')}`).join('')}
          ${paged.length===0?`<tr><td colspan="11"><div class="empty"><div class="empty-icon">🔍</div><div style="font-weight:500">ไม่พบ Ticket</div><div style="font-size:13px;color:var(--text3)">ลองเปลี่ยน filter</div></div></td></tr>`:''}
        </tbody>
      </table>
    </div>
    <div class="pagination">
      <div class="page-info">แสดง ${Math.min((page-1)*PER_PAGE+1,filtered.length)}--${Math.min(page*PER_PAGE,filtered.length)} จาก ${filtered.length} รายการ</div>
      <div class="page-btns">
        <button class="page-btn" ${page===1?'disabled':''} data-page="${page-1}">‹</button>
        ${Array.from({length:totalPages},(_,i)=>i+1)
          .filter(p=>p===1||p===totalPages||Math.abs(p-page)<=1)
          .map((p,i,arr)=>(i>0&&arr[i-1]!==p-1?'<span style="padding:0 4px;color:var(--text3)">...</span>':'')+
            `<button class="page-btn ${page===p?'active':''}" data-page="${p}">${p}</button>`).join('')}

}

      <div class="field"><label>ชื่อ-นามสกุล *</label><input id="m-name" value="${val('name')}" placeholder="ชื่อเต็ม"/></div>
      <div class="modal-grid">
        <div class="field"><label>Username *</label><input id="m-username" value="${val('username')}" placeholder="ตั้ง username"/></div>
        <div class="field"><label>Password *</label><input id="m-password" value="${val('password')}" placeholder="ตั้ง password"/></div>
        <div class="field"><label>Role</label>
          <select id="m-role">
            <option value="admin" ${u.role==='admin'?'selected':''}>Admin</option>
            <option value="manager" ${u.role==='manager'?'selected':''}>Manager</option>
            <option value="staff" ${(!u.role||u.role==='staff')?'selected':''}>Staff</option>
          </select></div>
        <div class="field"><label>แบรนด์</label>
          <select id="m-ubrand">${BRANDS.map(b=>`<option ${u.brand===b?'selected':''}>${b==='ALL'?'ALL (ทุกแบรนด์)':esc(b)}</option>`).join('')}</select></div>
      </div>
      <div class="field"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;text-transform:none;letter-spacing:0">
        <input type="checkbox" id="m-active" ${u.active!==false?'checked':''}/>
        <span style="font-size:13px;font-weight:400">เปิดใช้งาน Account</span>
      </label></div>
      <div class="modal-footer">
        <button class="btn btn-outline" id="modal-cancel">ยกเลิก</button>
        <button class="btn btn-primary" id="modal-save">${isEdit?'บันทึก':'เพิ่มผู้ใช้'}</button>
      </div>
    </div>
  </div>`;
}

// =====================
// DRAWER
// =====================
function renderDrawer() {
  if(!STATE.drawerTicket) return '';
  const t = STATE.tickets.find(x=>x.id===STATE.drawerTicket)||STATE.drawerTicket;
  return `
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <div class="drawer">
    <div class="drawer-head">
      <div>
        <div class="mono" style="font-size:13px;color:var(--text2);margin-bottom:2px">${esc(t.id)}</div>
        <div style="font-size:17px;font-weight:700">${esc(t.type)}</div>
      </div>
      <button class="btn btn-ghost" id="close-drawer" style="font-size:16px">✕</button>
    </div>
    <div class="drawer-body">
      <div style="margin-bottom:24px">
        <div class="drawer-sec-title">สถานะ</div>
        <div class="status-btns">
          ${STATUSES.map(s=>`
          <button class="badge ${statusBadge(s)} status-btn ${t.status===s?'selected':''}" data-set-status="${esc(s)}" style="cursor:pointer">
            <span class="badge-dot"></span>${esc(s)}
          </button>`).join('')}
        </div>
      </div>
      <div style="margin-bottom:24px">
        <div class="drawer-sec-title">ข้อมูล Ticket</div>
        ${[['หมายเลข',t.id],['รหัสสาขา',t.branchCode],['SLA',t.sla],['แบรนด์',t.brand],['วันที่ส่ง',t.sentDate],['SLA Date',t.slaDate]]
          .map(([l,v])=>`<div class="drawer-field"><div class="drawer-field-label">${esc(l)}</div><div class="drawer-field-value mono" style="font-size:13px">${esc(v)}</div></div>`).join('')}
      </div>
      <div style="margin-bottom:24px">
        <div class="drawer-sec-title">ผู้แจ้ง</div>
        ${[['ชื่อผู้แจ้ง',t.reporter],['เบอร์ติดต่อ',t.phone],['สถานที่',t.location]]
          .map(([l,v])=>`<div class="drawer-field"><div class="drawer-field-label">${esc(l)}</div><div class="drawer-field-value">${esc(v)}</div></div>`).join('')}
      </div>
      <div>
        <div class="drawer-sec-title">รายละเอียด</div>
        <div style="padding:12px 14px;background:var(--surface2);border-radius:8px;font-size:13.5px;line-height:1.7">${esc(t.detail)}</div>
      </div>
    </div>
  </div>`;
}

// =====================
// EVENT BINDING
// =====================
function bindApp() {
  // Navigation
  document.querySelectorAll('[data-nav]').forEach(el=>{
    el.onclick = ()=>{ STATE.page=el.dataset.nav; STATE.ticketPage=1; render(); };
  });
  document.querySelectorAll('[data-nav-brand]').forEach(el=>{
    el.onclick = ()=>{
      STATE.page='tickets'; STATE.filterBrand=el.dataset.navBrand; STATE.ticketPage=1; render();
    };
  });
  document.getElementById('btn-logout').onclick = ()=>{ STATE.currentUser=null; render(); };
  if(document.getElementById('sidebar-user-btn'))
    document.getElementById('sidebar-user-btn').onclick = ()=>{ if(STATE.currentUser.role==='admin'){ STATE.page='users'; render(); }};

  // Tickets
  if(document.getElementById('btn-add-ticket'))
    document.getElementById('btn-add-ticket').onclick = ()=>{ STATE.showAddTicket=true; STATE.editTicket=null; render(); };
  if(document.getElementById('search-inp'))
    document.getElementById('search-inp').oninput = e=>{ STATE.search=e.target.value; STATE.ticketPage=1; renderPageContent(); };
  if(document.getElementById('brand-filter'))
    document.getElementById('brand-filter').onchange = e=>{ STATE.filterBrand=e.target.value; STATE.ticketPage=1; renderPageContent(); };

  document.querySelectorAll('[data-filter-status]').forEach(el=>{
    el.onclick = ()=>{ STATE.filterStatus=el.dataset.filterStatus; STATE.ticketPage=1; renderPageContent(); };
  });
  document.querySelectorAll('[data-page]').forEach(el=>{
    el.onclick = ()=>{ if(!el.disabled){ STATE.ticketPage=parseInt(el.dataset.page); renderPageContent(); }};
  });
  document.querySelectorAll('[data-open-ticket]').forEach(el=>{
    el.onclick = ()=>{ STATE.drawerTicket=el.dataset.openTicket; render(); };
  });
  document.querySelectorAll('[data-edit-ticket]').forEach(el=>{
    el.onclick = ()=>{ STATE.editTicket=STATE.tickets.find(t=>t.id===el.dataset.editTicket)||null; STATE.showAddTicket=false; render(); };
  });
  document.querySelectorAll('[data-del-ticket]').forEach(el=>{
    el.onclick = ()=>{
      if(!confirm(`ลบ ${el.dataset.delTicket} ?`)) return;
      STATE.tickets=STATE.tickets.filter(t=>t.id!==el.dataset.delTicket);
      saveData(); showToast('ลบ Ticket แล้ว'); renderPageContent();
    };
  });

  // Users
  if(document.getElementById('btn-add-user'))
    document.getElementById('btn-add-user').onclick = ()=>{ STATE.showAddUser=true; STATE.editUser=null; render(); };
  if(document.getElementById('user-search-inp'))
    document.getElementById('user-search-inp').oninput = e=>{ STATE.userSearch=e.target.value; renderPageContent(); };
  document.querySelectorAll('[data-user-view]').forEach(el=>{
    el.onclick = ()=>{ STATE.userView=el.dataset.userView; renderPageContent(); };
  });
  document.querySelectorAll('[data-edit-user]').forEach(el=>{
    el.onclick = ()=>{ STATE.editUser=STATE.users.find(u=>u.id===el.dataset.editUser)||null; STATE.showAddUser=false; render(); };
  });
  document.querySelectorAll('[data-toggle-user]').forEach(el=>{
    el.onclick = ()=>{
      const id=el.dataset.toggleUser;
      if(id===STATE.currentUser.id){showToast('⚠️ ไม่สามารถปิดตัวเองได้');return;}
      const u=STATE.users.find(x=>x.id===id);
      STATE.users=STATE.users.map(x=>x.id===id?{...x,active:!x.active}:x);
      saveData(); showToast(u?.active?'ปิดใช้งานแล้ว':'เปิดใช้งานแล้ว'); renderPageContent();
    };
  });
  document.querySelectorAll('[data-del-user]').forEach(el=>{
    el.onclick = ()=>{
      if(!confirm('ยืนยันการลบผู้ใช้?')) return;
      STATE.users=STATE.users.filter(u=>u.id!==el.dataset.delUser);
      saveData(); showToast('ลบผู้ใช้แล้ว'); renderPageContent();
    };
  });

  // Modal
  if(document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').onclick = e=>{ if(e.target.id==='modal-overlay') closeModal(); };
  if(document.getElementById('modal-cancel'))
    document.getElementById('modal-cancel').onclick = closeModal;
  if(document.getElementById('modal-save'))
    document.getElementById('modal-save').onclick = saveModal;

  // Drawer
  if(document.getElementById('drawer-overlay'))
    document.getElementById('drawer-overlay').onclick = ()=>{ STATE.drawerTicket=null; render(); };
  if(document.getElementById('close-drawer'))
    document.getElementById('close-drawer').onclick = ()=>{ STATE.drawerTicket=null; render(); };
  document.querySelectorAll('[data-set-status]').forEach(el=>{
    el.onclick = ()=>{
      const s=el.dataset.setStatus;
      STATE.tickets=STATE.tickets.map(t=>t.id===STATE.drawerTicket?{...t,status:s}:t);
      saveData(); showToast(`สถานะ → ${s}`);
      // update drawer
      document.querySelectorAll('.status-btn').forEach(b=>b.classList.toggle('selected',b.dataset.setStatus===s));
    };
  });

  // toast restore
  if(STATE.toast) showToast(STATE.toast);
}

function closeModal() {
  STATE.showAddTicket=false; STATE.editTicket=null;
  STATE.showAddUser=false; STATE.editUser=null;
  render();
}

function saveModal() {
  if(STATE.showAddTicket||STATE.editTicket) saveTicketModal();
  else saveUserModal();
}

function saveTicketModal() {
  const reporter=document.getElementById('m-reporter').value.trim();
  const phone=document.getElementById('m-phone').value.trim();
  if(!reporter||!phone){alert('กรุณากรอกชื่อผู้แจ้งและเบอร์');return;}
  const ticket = {
    id: STATE.editTicket?.id||('GD-'+uid()),
    brand: document.getElementById('m-brand').value,
    status: document.getElementById('m-status').value,
    reporter, phone,
    branchCode: document.getElementById('m-branch').value,
    sla: document.getElementById('m-sla').value,
    type: document.getElementById('m-type').value,
    location: document.getElementById('m-location').value,
    detail: document.getElementById('m-detail').value,
    sentDate: STATE.editTicket?.sentDate||new Date().toLocaleDateString('th-TH'),
    slaDate: STATE.editTicket?.slaDate||'09/03/2569',
    createdAt: STATE.editTicket?.createdAt||new Date().toISOString(),
  };
  if(STATE.editTicket) STATE.tickets=STATE.tickets.map(t=>t.id===ticket.id?ticket:t);
  else STATE.tickets=[ticket,...STATE.tickets];
  saveData(); showToast(STATE.editTicket?'บันทึกแล้ว':'เพิ่ม Ticket แล้ว');
  closeModal();
}

function saveUserModal() {
  const name=document.getElementById('m-name').value.trim();
  const username=document.getElementById('m-username').value.trim();
  const password=document.getElementById('m-password').value;
  if(!name||!username||!password){alert('กรุณากรอกข้อมูลให้ครบ');return;}
  const brand=document.getElementById('m-ubrand').value.replace(' (ทุกแบรนด์)','');
  const user={
    id:STATE.editUser?.id||('u'+uid()),
    name,username,password,
    role:document.getElementById('m-role').value,
    brand, active:document.getElementById('m-active').checked,
  };
  if(STATE.editUser) STATE.users=STATE.users.map(u=>u.id===user.id?user:u);
  else {
    if(STATE.users.find(u=>u.username===username)){alert('Username นี้ถูกใช้แล้ว');return;}
    STATE.users=[...STATE.users,user];
  }
  saveData(); showToast(STATE.editUser?'บันทึกแล้ว':'เพิ่มผู้ใช้แล้ว');
  closeModal();
}

function renderPageContent() {
  const pc=document.getElementById('page-content');
  if(pc){pc.innerHTML=renderPage();bindApp();}
}

// =====================
// INIT
// =====================
loadData();
render();
</script>
</body>
</html>
