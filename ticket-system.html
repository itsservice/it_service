<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>IT Ticket System</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#070b12;--bg2:#0c1220;
  --s1:rgba(255,255,255,.05);--s2:rgba(255,255,255,.09);--s3:rgba(255,255,255,.14);
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.14);
  --fg:rgba(255,255,255,.90);--fg2:rgba(255,255,255,.45);--fg3:rgba(255,255,255,.22);
  --accent:#60a5fa;--green:#4ade80;--orange:#fb923c;--red:#f87171;--yellow:#facc15;--teal:#2dd4bf;
  --r:10px;--r2:14px;
  --ease:cubic-bezier(.22,.61,.36,1);--spring:cubic-bezier(.34,1.56,.64,1);
  --safe-top:env(safe-area-inset-top,0px);--safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-left:env(safe-area-inset-left,0px);--safe-right:env(safe-area-inset-right,0px);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--fg);font-size:14px;min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px}
#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── LOGIN ── */
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;padding:20px}
.login-card{background:var(--bg2);border:1px solid var(--b2);border-radius:20px;padding:40px 36px;width:380px;max-width:100%;box-shadow:0 24px 64px rgba(0,0,0,.6);backdrop-filter:blur(20px)}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:26px}
.login-logo-icon{width:44px;height:44px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.login-logo-text{font-size:19px;font-weight:600}
.login-subtitle{font-size:12px;color:var(--fg2);margin-top:2px}
.field{margin-bottom:13px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--fg2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.field input,.field select,.field textarea{width:100%;padding:10px 13px;border:1px solid var(--b2);border-radius:var(--r);font-family:'Outfit',sans-serif;font-size:14px;color:var(--fg);outline:none;transition:border-color .15s;background:var(--s1)}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.field select option{background:#0c1220;color:var(--fg)}
.field textarea{resize:vertical;min-height:80px}
.login-btn{width:100%;padding:12px;background:var(--accent);color:#070b12;border:none;border-radius:var(--r);font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s}
.login-btn:hover{opacity:.85}
.login-btn:disabled{opacity:.5;cursor:default}
.error-msg{color:var(--red);font-size:13px;margin-top:10px;text-align:center;min-height:18px}
.demo-box{margin-top:14px;padding:12px 14px;background:var(--s1);border:1px solid var(--b1);border-radius:8px;font-size:12px;color:var(--fg2)}
.demo-box strong{display:block;margin-bottom:6px;color:var(--fg3);font-size:11px;text-transform:uppercase;letter-spacing:.05em}
.demo-row{display:grid;grid-template-columns:100px 90px 1fr;gap:6px;margin-bottom:4px;align-items:center}
.demo-u{font-family:'DM Mono',monospace;color:var(--accent);font-size:11px}
.demo-p{font-family:'DM Mono',monospace;font-size:11px}
.demo-r{font-size:11px;color:var(--fg3)}

/* ── HAMBURGER FAB ── */
.menu-fab{position:fixed;top:calc(16px + var(--safe-top));left:calc(14px + var(--safe-left));z-index:90;width:44px;height:44px;border-radius:12px;background:var(--s3);border:1px solid var(--b2);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;transition:opacity .25s,transform .2s var(--spring);overflow:hidden}
.menu-fab:hover{transform:scale(1.07)}
.menu-fab:active{transform:scale(.93)}
.bar{display:block;width:17px;height:1.5px;background:var(--fg);border-radius:2px;transition:.28s var(--ease)}
.bar-2{width:11px;margin-left:-6px}
.menu-open .menu-fab{opacity:0;pointer-events:none}

/* ── SCRIM ── */
.scrim{position:fixed;inset:0;background:rgba(0,0,0,.52);backdrop-filter:blur(3px);-webkit-backdrop-filter:blur(3px);z-index:85;animation:scrimIn .22s ease}
@keyframes scrimIn{from{opacity:0}to{opacity:1}}

/* ── SIDEBAR ── */
.sidebar{position:fixed;top:0;left:0;height:100%;width:clamp(240px,80vw,280px);background:var(--bg2);border-right:1px solid var(--b1);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);z-index:86;display:flex;flex-direction:column;clip-path:circle(0% at 36px 36px);transition:clip-path .42s var(--ease);will-change:clip-path;padding-top:var(--safe-top)}
.sidebar.open{clip-path:circle(200% at 36px 36px)}
.sidebar-head{display:flex;align-items:center;justify-content:space-between;padding:16px 13px 12px;border-bottom:1px solid var(--b1);flex-shrink:0}
.sidebar-logo-wrap{display:flex;align-items:center;gap:9px}
.sidebar-logo-icon{width:30px;height:30px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.sidebar-logo-text{font-size:15px;font-weight:600}
.close-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--b1);background:var(--s1);color:var(--fg2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s,transform .2s var(--spring);overflow:hidden;position:relative;flex-shrink:0}
.close-btn:hover{background:var(--s2);color:var(--fg);transform:scale(1.1)}
.sidebar-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:8px 8px calc(12px + var(--safe-bottom));scrollbar-width:thin;scrollbar-color:var(--b2) transparent;-webkit-overflow-scrolling:touch}
.sidebar-sec{padding:9px 7px 3px;font-size:10px;font-weight:600;color:var(--fg3);letter-spacing:.08em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 11px;margin:1px 0;border-radius:9px;border:1px solid transparent;cursor:pointer;color:var(--fg2);font-size:13.5px;transition:background .12s,color .12s,transform .18s var(--ease);position:relative;overflow:hidden;opacity:0;transform:translateX(-10px)}
.nav-item.visible{animation:slideIn .3s var(--ease) forwards}
@keyframes slideIn{to{opacity:1;transform:translateX(0)}}
.nav-item:hover{background:var(--s2);color:var(--fg);transform:translateX(4px)}
.nav-item.active{background:rgba(96,165,250,.12);border-color:rgba(96,165,250,.25);color:var(--accent)}
.nav-icon{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--s3);color:var(--fg2);font-size:10px;padding:2px 7px;border-radius:99px;font-family:'DM Mono',monospace;flex-shrink:0}
.nav-item.active .nav-badge{background:rgba(96,165,250,.2);color:var(--accent)}
.sidebar-user-wrap{border-top:1px solid var(--b1);padding:8px 8px calc(8px + var(--safe-bottom));flex-shrink:0}
.sidebar-user{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;cursor:pointer;transition:background .12s}
.sidebar-user:hover{background:var(--s2)}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
.sidebar-username{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-role{font-size:11px;color:var(--fg2)}
.logout-btn{display:flex;align-items:center;gap:8px;padding:8px 11px;margin:2px 0;border-radius:9px;cursor:pointer;color:var(--fg2);font-size:13px;transition:background .12s,color .12s}
.logout-btn:hover{background:rgba(248,113,113,.1);color:var(--red)}

/* ── TOPBAR ── */
.topbar{position:fixed;top:0;left:0;right:0;height:calc(56px + var(--safe-top));padding-top:var(--safe-top);background:rgba(7,11,18,.9);border-bottom:1px solid var(--b1);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);display:flex;align-items:center;padding-left:calc(68px + var(--safe-left));padding-right:calc(14px + var(--safe-right));gap:8px;z-index:70}
.breadcrumb{font-size:13px;color:var(--fg2);flex:1;display:flex;align-items:center;gap:5px;overflow:hidden;min-width:0}
.breadcrumb span{cursor:pointer;white-space:nowrap;flex-shrink:0}
.breadcrumb span:hover{color:var(--accent)}
.breadcrumb-cur{color:var(--fg);font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topbar-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.clock-pill{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;background:var(--s1);border:1px solid var(--b1);font-family:'DM Mono',monospace;font-size:11px;color:var(--fg2);white-space:nowrap}
.pill-sep{width:1px;height:9px;background:var(--b2);flex-shrink:0}
.online-dot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0;transition:background .5s}
.online-dot.live{background:var(--green)}
.refresh-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--b1);background:var(--s1);color:var(--fg2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:background .12s,transform .3s;flex-shrink:0}
.refresh-btn:hover{background:var(--s2);color:var(--fg)}
.refresh-btn.spinning{animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.refresh-btn:disabled{opacity:.4;cursor:default}

/* ── MAIN LAYOUT ── */
.main{position:relative;z-index:1;padding-top:calc(56px + var(--safe-top));min-height:100vh}
.content{padding:16px 15px calc(32px + var(--safe-bottom))}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:var(--r);border:1px solid transparent;font-family:'Outfit',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;user-select:none;position:relative;overflow:hidden}
.btn-primary{background:var(--accent);color:#070b12;border-color:var(--accent)}.btn-primary:hover{opacity:.85}
.btn-outline{background:var(--s2);color:var(--fg);border-color:var(--b2)}.btn-outline:hover{background:var(--s3)}
.btn-danger{background:rgba(248,113,113,.12);color:var(--red);border-color:rgba(248,113,113,.25)}.btn-danger:hover{background:rgba(248,113,113,.2)}
.btn-ghost{background:transparent;color:var(--fg2);border-color:transparent;padding:5px 8px}.btn-ghost:hover{background:var(--s2);color:var(--fg)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-xs{padding:3px 7px;font-size:11px;border-radius:6px}
.btn-ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,.15);transform:scale(0);pointer-events:none;animation:ripple .5s ease-out forwards}
@keyframes ripple{to{transform:scale(5);opacity:0}}

/* ── STATUS QUICK BUTTONS ── */
.sq-wrap{display:flex;flex-wrap:wrap;gap:4px}
.sq-btn{padding:3px 8px;border-radius:99px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid transparent;transition:all .15s;white-space:nowrap;background:transparent}
.sq-btn:hover{transform:scale(1.05);opacity:.9}
.sq-btn.sq-active{border-color:currentColor!important;background:currentColor;color:#07090f!important;transform:scale(1.07)}
.sq-btn:disabled{opacity:.4;cursor:default}

/* ── BADGES ── */
.badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:99px;font-size:11.5px;font-weight:500;white-space:nowrap}
.badge-blue{background:rgba(96,165,250,.12);color:#60a5fa}
.badge-green{background:rgba(74,222,128,.12);color:#4ade80}
.badge-orange{background:rgba(251,146,60,.12);color:#fb923c}
.badge-red{background:rgba(248,113,113,.12);color:#f87171}
.badge-yellow{background:rgba(250,204,21,.12);color:#facc15}
.badge-teal{background:rgba(45,212,191,.12);color:#2dd4bf}
.badge-purple{background:rgba(168,85,247,.12);color:#a855f7}
.badge-gray{background:var(--s2);color:var(--fg2)}
.badge-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}

/* ── STATS ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:16px}
.stat-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);padding:15px 17px;backdrop-filter:blur(8px)}
.stat-label{font-size:10px;color:var(--fg2);margin-bottom:7px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.stat-val{font-size:26px;font-weight:700;line-height:1}

/* ── TABLE ── */
.table-wrap{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);overflow:hidden}
.table-toolbar{display:flex;align-items:center;gap:9px;padding:10px 13px;border-bottom:1px solid var(--b1);flex-wrap:wrap}
.search-box{display:flex;align-items:center;gap:7px;padding:6px 11px;border:1px solid var(--b2);border-radius:var(--r);background:var(--s1);flex:1;max-width:260px;min-width:120px}
.search-box input{border:none;outline:none;font-family:'Outfit',sans-serif;font-size:13px;color:var(--fg);width:100%;background:transparent}
.search-box input::placeholder{color:var(--fg3)}
.filter-chips{display:flex;gap:5px;flex-wrap:wrap}
.chip{padding:4px 10px;border-radius:99px;font-size:12px;font-weight:500;cursor:pointer;border:1px solid var(--b2);color:var(--fg2);background:var(--s1);transition:all .12s}
.chip:hover,.chip.active{background:rgba(96,165,250,.1);border-color:rgba(96,165,250,.3);color:var(--accent)}
.tbl-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:9px 12px;font-size:10px;font-weight:700;color:var(--fg2);border-bottom:1px solid var(--b1);background:rgba(255,255,255,.025);white-space:nowrap;text-transform:uppercase;letter-spacing:.05em}
td{padding:9px 12px;border-bottom:1px solid var(--b1);font-size:13px;color:var(--fg);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr{transition:background .1s}
tbody tr:hover td{background:rgba(255,255,255,.03)}
.mono{font-family:'DM Mono',monospace;font-size:12px}
.row-group td{background:rgba(255,255,255,.025);padding:5px 12px;font-size:11px;font-weight:600;color:var(--fg2)}
.sla-chip{display:inline-block;padding:2px 8px;border-radius:5px;font-family:'DM Mono',monospace;font-size:11px;font-weight:600}
.pagination{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;border-top:1px solid var(--b1);flex-wrap:wrap;gap:8px}
.page-info{font-size:12px;color:var(--fg2)}
.page-btns{display:flex;gap:3px;flex-wrap:wrap}
.page-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--b2);background:var(--s1);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--fg2);transition:all .12s}
.page-btn:hover{border-color:var(--accent);color:var(--accent)}
.page-btn.active{background:var(--accent);color:#070b12;border-color:var(--accent)}
.page-btn:disabled{opacity:.3;cursor:default}

/* ── MODAL ── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);display:flex;align-items:center;justify-content:center;z-index:200;backdrop-filter:blur(4px);padding:16px}
.modal{background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r2);padding:24px;width:580px;max-width:100%;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:600;margin-bottom:18px;display:flex;align-items:center;gap:9px}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;border-top:1px solid var(--b1);padding-top:14px}

/* ── DRAWER ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:150;backdrop-filter:blur(2px)}
.drawer{position:fixed;right:0;top:0;bottom:0;width:480px;max-width:100vw;background:var(--bg2);border-left:1px solid var(--b1);z-index:151;overflow-y:auto;display:flex;flex-direction:column}
.drawer-head{padding:18px 20px;border-bottom:1px solid var(--b1);display:flex;align-items:flex-start;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1}
.drawer-body{padding:20px;flex:1}
.drawer-sec{font-size:10px;font-weight:700;color:var(--fg3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;margin-top:20px}
.drawer-sec:first-child{margin-top:0}
.drawer-field{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid var(--b1)}
.drawer-field:last-child{border-bottom:none}
.drawer-field-label{font-size:12px;color:var(--fg2);min-width:110px}
.drawer-field-value{font-size:13px;color:var(--fg);text-align:right;flex:1}

/* ── USER GRID ── */
.user-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.user-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r2);padding:18px;display:flex;flex-direction:column;align-items:center;text-align:center;gap:10px;position:relative;transition:border-color .2s}
.user-card:hover{border-color:var(--b2)}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(22px + var(--safe-bottom));right:calc(18px + var(--safe-right));padding:10px 16px;border-radius:var(--r);background:var(--bg2);border:1px solid var(--b2);color:var(--fg);font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,.5);z-index:500;animation:toastIn .2s ease;pointer-events:none;backdrop-filter:blur(16px);max-width:300px}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── SYNC BAR ── */
.sync-bar{height:2px;background:linear-gradient(90deg,transparent 0%,var(--accent) 50%,transparent 100%);position:fixed;top:0;left:0;right:0;z-index:300;animation:syncMove 1s ease-in-out infinite}
@keyframes syncMove{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

/* ── EMPTY ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;color:var(--fg2)}
.empty-icon{font-size:36px;margin-bottom:12px;opacity:.3}

/* ── RESPONSIVE ── */

/* ── MOBILE CARD LAYOUT (≤640px) ── */
@media(max-width:640px){
  .tbl-scroll table,.tbl-scroll thead,.tbl-scroll tbody,.tbl-scroll tr,.tbl-scroll td,.tbl-scroll th{display:block!important;width:100%!important}
  .tbl-scroll thead{display:none!important}
  .tbl-scroll tbody tr{border:1px solid var(--b1);border-radius:var(--r2);margin-bottom:10px;padding:0;background:var(--bg2);overflow:hidden}
  .tbl-scroll tbody tr.row-group{border:none!important;border-radius:0;margin-bottom:5px;padding:4px 8px;background:transparent;overflow:visible}
  .tbl-scroll td{padding:8px 12px!important;border-bottom:1px solid var(--b1)!important;font-size:13px!important;display:flex!important;align-items:center;gap:8px;flex-wrap:wrap}
  .tbl-scroll td.td-id{background:rgba(96,165,250,.07);font-size:13.5px!important;font-weight:600}
  .tbl-scroll td.td-sq{padding:8px 10px!important}
  .tbl-scroll td:last-child{border-bottom:none!important;padding:6px 10px!important}
  .tbl-scroll td:empty{display:none!important}
  .sq-btn{padding:4px 9px!important;font-size:11px!important}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .user-grid{grid-template-columns:repeat(2,1fr)}
  .modal-grid{grid-template-columns:1fr}
}

/* ── Engineer/Admin action bar ── */
.eng-sec{font-size:10px;font-weight:700;color:var(--fg3);text-transform:uppercase;letter-spacing:.07em;margin:14px 0 8px;padding-bottom:4px;border-bottom:1px solid var(--b1)}
.eng-sec:first-child{margin-top:0}
.action-bar{display:flex;gap:8px;flex-wrap:wrap;margin-top:2px}
@media(max-width:768px){
  .stat-grid{grid-template-columns:repeat(2,1fr)}
  .user-grid{grid-template-columns:repeat(2,1fr)}
  .modal-grid{grid-template-columns:1fr}
}
@media(max-width:600px){
  .drawer{width:100%;max-width:100%;border-left:none;border-top:1px solid var(--b1)}
  #ts-temp,.pill-sep{display:none}
  .topbar{padding-left:calc(62px + var(--safe-left))}
}
@media(max-width:420px){
  .user-grid{grid-template-columns:1fr}

// แปลง timestamp (Unix ms หรือ string ตัวเลข) → วันที่ไทย
function fmtDate(val){
  if(!val&&val!==0)return'-';
  const n=typeof val==='number'?val:Number(val);
  if(!isNaN(n)&&n>1_000_000_000_000){
    return new Date(n).toLocaleDateString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric'});
  }
  return String(val||'-');
}

// ── TOAST ──────────────────────────────────────────────────────────────────
function showToast(msg,type=''){
  if(STATE.toastTimer)clearTimeout(STATE.toastTimer);
  const t=document.getElementById('toast');
  if(!t)return;
  t.textContent=msg;
  t.style.display='block';
  t.style.borderColor=type==='ok'?'rgba(74,222,128,.35)':type==='err'?'rgba(248,113,113,.35)':'';
  STATE.toastTimer=setTimeout(()=>{const t2=document.getElementById('toast');if(t2)t2.style.display='none';},3000);
}

let _sseConn=null,_autoInt=null;

function setSyncUI(on){
  const bar=document.getElementById('sync-bar');
  const btn=document.getElementById('ts-refresh-btn');
  if(bar)bar.style.display=on?'block':'none';
  if(btn){btn.disabled=!!on;btn.classList.toggle('spinning',!!on);}
}
function setOnlineUI(on){
  STATE.larkOnline=on;
  const dot=document.getElementById('ts-online-dot');
  if(dot){dot.classList.toggle('live',on);dot.title='Lark: '+(on?'Connected':'Disconnected');}
}

async function loadTicketsFromAPI(silent=false){
  if(!silent)setSyncUI(true);
  try{
    const r=await fetch('/api/tickets',{cache:'no-store'});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const j=await r.json();
    if(!j.ok)throw new Error(j.error||'api error');
    STATE.tickets=j.tickets||[];
    STATE.lastSync=new Date();
    setOnlineUI(true);
    if(!silent)showToast('\u2713 \u0E42\u0E2B\u0E25\u0E14\u0E02\u0E49\u0E2D\u0E21\u0E39\u0E25\u0E08\u0E32\u0E01 Lark \u0E41\u0E25\u0E49\u0E27','ok');
    renderPageContent();
  }catch(err){
    setOnlineUI(false);
    if(!silent)showToast('\u26A0\uFE0F \u0E44\u0E21\u0E48\u0E2A\u0E32\u0E21\u0E32\u0E23\u0E16\u0E40\u0E0A\u0E37\u0E48\u0E2D\u0E21\u0E15\u0E48\u0E2D Lark: '+err.message,'err');
  }finally{
    setSyncUI(false);
  }
}

async function apiPatchStatus(recordId,status){
  if(!recordId)return false;
  try{
    const r=await fetch('/api/tickets/'+recordId+'/status',{
      method:'PATCH',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({status,updatedBy:STATE.currentUser?.name||'?'}),
    });
    return (await r.json()).ok;
  }catch{return false;}
}

async function apiPatchFields(recordId,fields){
  if(!recordId)return false;
  try{
    const r=await fetch('/api/tickets/'+recordId,{
      method:'PATCH',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(fields),
    });
    return (await r.json()).ok;
  }catch{return false;}
}

function connectSSE(){
  if(_sseConn){try{_sseConn.close();}catch{}_sseConn=null;}
  try{
    _sseConn=new EventSource('/api/events');
    _sseConn.onopen=()=>setOnlineUI(true);
    _sseConn.onerror=()=>{setOnlineUI(false);setTimeout(connectSSE,5000);};
    _sseConn.addEventListener('ticket_updated',e=>{
      try{
        const d=JSON.parse(e.data);
        STATE.tickets=STATE.tickets.map(t=>{
          const match=t._recordId===d.recordId||t.id===d.recordId;
          if(!match)return t;
          if(d.status)return{...t,status:d.status};
          if(d.fields)return{...t,...d.fields};
          return t;
        });
        renderPageContent();
        showToast('\u{1F504} Ticket \u0E2D\u0E31\u0E1E\u0E40\u0E14\u0E17');
      }catch{}
    });
    _sseConn.addEventListener('ticket_created',e=>{
      try{
        const d=JSON.parse(e.data);
        if(d.ticket)STATE.tickets=[d.ticket,...STATE.tickets];
        renderPageContent();
        showToast('\u{1F4E8} Ticket \u0E43\u0E2B\u0E21\u0E48\u0E08\u0E32\u0E01 Lark!');
      }catch{}
    });
  }catch{setTimeout(connectSSE,5000);}
}

function startAutoRefresh(){
  if(_autoInt)clearInterval(_autoInt);

function bindLogin(){
  const doLogin=async()=>{
    const uname=document.getElementById('inp-user').value.trim();
    const pass=document.getElementById('inp-pass').value;
    const found=STATE.users.find(x=>x.username===uname&&x.password===pass&&x.active);
    const errEl=document.getElementById('login-err');
    if(!found){if(errEl)errEl.textContent='Username \u0E2B\u0E23\u0E37\u0E2D Password \u0E44\u0E21\u0E48\u0E16\u0E39\u0E01\u0E15\u0E49\u0E2D\u0E07';return;}
    STATE.currentUser=found;
    STATE.filterBrand=can('seeAll')?'ALL':found.brand;
    const btn=document.getElementById('btn-login');
    if(btn){btn.disabled=true;btn.textContent='\u0E01\u0E33\u0E25\u0E31\u0E07\u0E40\u0E0A\u0E37\u0E48\u0E2D\u0E21\u0E15\u0E48\u0E2D...';}
    render();
    await loadTicketsFromAPI(false);
    connectSSE();
    startAutoRefresh();
  };
  const loginBtn=document.getElementById('btn-login');
  const passInp=document.getElementById('inp-pass');
  const userInp=document.getElementById('inp-user');
  if(loginBtn)loginBtn.onclick=doLogin;
  if(passInp)passInp.onkeydown=e=>{if(e.key==='Enter')doLogin();};
  if(userInp){userInp.onkeydown=e=>{if(e.key==='Enter')doLogin();};userInp.focus();}
}

function sqBtns(ticket,compact=false){
  if(!can('editStatus'))return`<span class="badge ${statusBadge(ticket.status)}" style="font-size:11px"><span class="badge-dot"></span>${esc((ticket.status||'').slice(0,8))}</span>`;
  const rid=ticket._recordId||ticket.id;
  return`<div class="sq-wrap">${STATUSES.map(s=>{
    const c=statusColor(s);
    const active=ticket.status===s;
    return`<button class="sq-btn ${active?'sq-active':''}" data-sq-s="${esc(s)}" data-sq-r="${esc(rid)}"
      style="color:${c};background:${active?c:'transparent'};border-color:${active?'transparent':c+'44'}"
      title="${esc(s)}">${compact?esc(s.slice(0,3)):esc(s)}</button>`;
  }).join('')}</div>`;
}

// ── DASHBOARD ─────────────────────────────────────────────────────────────

    {label:'\u0E23\u0E2D\u0E15\u0E23\u0E27\u0E08\u0E07\u0E32\u0E19',val:cnt['\u0E15\u0E23\u0E27\u0E08\u0E07\u0E32\u0E19']||0,c:'#facc15',i:'\u{1F50D}'},
    {label:'\u0E40\u0E2A\u0E23\u0E47\u0E08\u0E2A\u0E34\u0E49\u0E19',val:cnt['\u0E40\u0E2A\u0E23\u0E47\u0E08\u0E2A\u0E34\u0E49\u0E19']||0,c:'#4ade80',i:'\u2705'},

    <div class="tbl-scroll"><table>
      <thead><tr><th>ID</th><th>\u0E2A\u0E16\u0E32\u0E19\u0E30</th><th>\u0E1C\u0E39\u0E49\u0E41\u0E08\u0E49\u0E07</th>${can('editStatus')?'<th>\u0E40\u0E1B\u0E25\u0E35\u0E48\u0E22\u0E19\u0E2A\u0E16\u0E32\u0E19\u0E30</th>':''}</tr></thead>
      <tbody>${recent.map(t=>`<tr>

        <td style="font-size:12.5px">${esc(t.reporter||'-')}</td>
        ${can('editStatus')?`<td>${sqBtns(t,true)}</td>`:''}

      ${recent.length===0?`<tr><td colspan="4"><div class="empty"><div class="empty-icon">\u{1F3AB}</div><div>\u0E22\u0E31\u0E07\u0E44\u0E21\u0E48\u0E21\u0E35 Ticket</div></div></td></tr>`:''}

      ${Object.entries(bCnt).sort((a,b)=>b[1]-a[1]).slice(0,9).map(([brand,count])=>`

</div>`;
}

// ── TICKETS PAGE ──────────────────────────────────────────────────────────
function getFiltered(){
  const u=STATE.currentUser;
  return STATE.tickets.filter(t=>{
    if(STATE.page==='inprogress'&&t.status!=='\u0E2D\u0E22\u0E39\u0E48\u0E23\u0E30\u0E2B\u0E27\u0E48\u0E32\u0E07\u0E14\u0E33\u0E40\u0E19\u0E34\u0E19\u0E01\u0E32\u0E23')return false;
    if(!can('seeAll')&&t.brand!==u.brand)return false;
    if(STATE.filterBrand!=='ALL'&&t.brand!==STATE.filterBrand)return false;
    if(STATE.filterStatus!=='ALL'&&t.status!==STATE.filterStatus)return false;
    if(STATE.search){const q=STATE.search.toLowerCase();if(!(t.id+' '+t.reporter+' '+t.type+' '+t.detail+' '+t.branchCode).toLowerCase().includes(q))return false;}
    return true;
  });
}

function renderTickets(){
  const u=STATE.currentUser;
  const filtered=getFiltered();
  const cnt={};filtered.forEach(t=>{cnt[t.status]=(cnt[t.status]||0)+1;});
  const totalPages=Math.max(1,Math.ceil(filtered.length/PER_PAGE));
  const page=Math.min(STATE.ticketPage,totalPages);
  const paged=filtered.slice((page-1)*PER_PAGE,page*PER_PAGE);
  const grouped={};paged.forEach(t=>{if(!grouped[t.status])grouped[t.status]=[];grouped[t.status].push(t);});
  const brandOpts=can('seeAll')?BRANDS:[u.brand];
  return`<div class="stat-grid">
  ${[
    {label:'\u0E17\u0E31\u0E49\u0E07\u0E2B\u0E21\u0E14',val:filtered.length,c:'#60a5fa'},
    {label:'\u0E01\u0E33\u0E25\u0E31\u0E07\u0E14\u0E33\u0E40\u0E19\u0E34\u0E19\u0E01\u0E32\u0E23',val:cnt['\u0E2D\u0E22\u0E39\u0E48\u0E23\u0E30\u0E2B\u0E27\u0E48\u0E32\u0E07\u0E14\u0E33\u0E40\u0E19\u0E34\u0E19\u0E01\u0E32\u0E23']||0,c:'#60a5fa'},
    {label:'\u0E23\u0E2D\u0E15\u0E23\u0E27\u0E08\u0E07\u0E32\u0E19',val:cnt['\u0E15\u0E23\u0E27\u0E08\u0E07\u0E32\u0E19']||0,c:'#facc15'},
    {label:'\u0E40\u0E2A\u0E23\u0E47\u0E08\u0E2A\u0E34\u0E49\u0E19',val:cnt['\u0E40\u0E2A\u0E23\u0E47\u0E08\u0E2A\u0E34\u0E49\u0E19']||0,c:'#4ade80'},
  ].map(s=>`<div class="stat-card">
    <div class="stat-label"><span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${s.c};margin-right:5px"></span>${s.label}</div>
    <div class="stat-val" style="color:${s.c}">${s.val}</div>
  </div>`).join('')}
</div>
<div class="table-wrap">
  <div class="table-toolbar">
    <div class="search-box">
      <span style="color:var(--fg3)">\u{1F50D}</span>
      <input id="search-inp" value="${esc(STATE.search)}" placeholder="\u0E04\u0E49\u0E19\u0E2B\u0E32 Ticket..."/>
    </div>
    <div class="filter-chips">
      ${['ALL',...STATUSES].map(s=>`<button class="chip ${STATE.filterStatus===s?'active':''}" data-fst="${esc(s)}">
        ${s==='ALL'?'\u0E17\u0E31\u0E49\u0E07\u0E2B\u0E21\u0E14':esc(s)}${s!=='ALL'?` <span style="opacity:.6;font-size:10px">${cnt[s]||0}</span>`:''}
      </button>`).join('')}
    </div>
    <div style="margin-left:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      ${can('seeAll')?`<select id="brand-filter" style="padding:6px 10px;border:1px solid var(--b2);border-radius:var(--r);font-family:'Outfit',sans-serif;font-size:12.5px;color:var(--fg);background:var(--s1)">
        ${brandOpts.map(b=>`<option value="${esc(b)}" ${STATE.filterBrand===b?'selected':''}>${b==='ALL'?'\u0E17\u0E38\u0E01\u0E41\u0E1A\u0E23\u0E19\u0E14\u0E4C':esc(b)}</option>`).join('')}
      </select>`:''}
      ${can('manageTickets')?`<button class="btn btn-primary btn-sm" id="btn-add-ticket">\u2795 \u0E40\u0E1E\u0E34\u0E48\u0E21 Ticket</button>`:''}
    </div>
  </div>
  <div class="tbl-scroll">
    <table>
      <thead><tr>
        <th>Ticket ID</th>
        ${can('editStatus')?'<th>\u0E40\u0E1B\u0E25\u0E35\u0E48\u0E22\u0E19\u0E2A\u0E16\u0E32\u0E19\u0E30</th>':'<th>\u0E2A\u0E16\u0E32\u0E19\u0E30</th>'}
        <th>\u0E23\u0E2B\u0E31\u0E2A\u0E2A\u0E32\u0E02\u0E32</th><th>SLA</th><th>\u0E27\u0E31\u0E19\u0E17\u0E35\u0E48\u0E2A\u0E48\u0E07</th><th>\u0E1C\u0E39\u0E49\u0E41\u0E08\u0E49\u0E07</th><th>\u0E40\u0E1A\u0E2D\u0E23\u0E4C</th><th>\u0E1B\u0E23\u0E30\u0E40\u0E20\u0E17</th><th>\u0E23\u0E32\u0E22\u0E25\u0E30\u0E40\u0E2D\u0E35\u0E22\u0E14</th><th></th>
      </tr></thead>
      <tbody>
        ${Object.entries(grouped).map(([status,rows])=>`
        <tr class="row-group"><td colspan="20">
          <span class="badge ${statusBadge(status)}" style="font-size:11px"><span class="badge-dot"></span>${esc(status)}</span>
          <span style="margin-left:8px;color:var(--fg3)">${rows.length} \u0E23\u0E32\u0E22\u0E01\u0E32\u0E23</span>
        </td></tr>
        ${rows.map(t=>`<tr>
          <td style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap">
            <span class="mono" style="color:var(--accent);cursor:pointer;font-weight:600;font-size:14px" data-open="${esc(t._recordId||t.id)}">${esc(t.id||t._recordId||'-')}</span>
            <div style="display:flex;gap:3px;flex-shrink:0">
              <button class="btn btn-ghost btn-xs" data-open="${esc(t._recordId||t.id)}" title="\u0E14\u0E39">\u{1F441}</button>
              ${can('manageTickets')?`<button class="btn btn-ghost btn-xs" data-edit="${esc(t._recordId||t.id)}" title="\u0E41\u0E01\u0E49\u0E44\u0E02">\u270F\uFE0F</button>`:''}
            </div>
          </td>
          <td>${sqBtns(t,true)}</td>
          <td><span style="font-size:11px;color:var(--fg3);margin-right:4px">\u0E1C\u0E39\u0E49\u0E41\u0E08\u0E49\u0E07:</span><span style="font-weight:500">${esc(t.reporter||'-')}</span> <span class="mono" style="font-size:11.5px;color:var(--fg2)">${esc(t.phone||'-')}</span></td>
          <td><span style="font-size:11px;color:var(--fg3);margin-right:4px">\u0E2A\u0E32\u0E02\u0E32:</span><span class="sla-chip" style="background:${slaColor(t.sla)}18;color:${slaColor(t.sla)}">${esc(t.branchCode||'-')}</span> <span class="sla-chip" style="background:${slaColor(t.sla)}18;color:${slaColor(t.sla)}">${esc(t.sla||'-')}</span></td>
          <td><span style="font-size:11px;color:var(--fg3);margin-right:4px">\u0E27\u0E31\u0E19\u0E17\u0E35\u0E48:</span><span class="mono" style="font-size:12px;color:var(--fg2)">${fmtDate(t.sentDate)}</span> <span style="background:var(--s2);padding:2px 7px;border-radius:5px;font-size:11.5px;color:var(--fg2)">${esc((t.type||'-').slice(0,14))}</span></td>
          ${t.detail?`<td style="font-size:12px;color:var(--fg2);border-top:1px solid var(--b1)!important;padding-top:6px!important">${esc(t.detail.slice(0,80))}${t.detail.length>80?'…':''}</td>`:''}
        </tr>`).join('')}`).join('')}
        ${paged.length===0?`<tr><td colspan="20"><div class="empty"><div class="empty-icon">\u{1F50D}</div><div>\u0E44\u0E21\u0E48\u0E1E\u0E1A Ticket</div><div style="font-size:12px;color:var(--fg3)">\u0E25\u0E2D\u0E07\u0E40\u0E1B\u0E25\u0E35\u0E48\u0E22\u0E19 filter</div></div></td></tr>`:''}
      </tbody>
    </table>
  </div>
  <div class="pagination">
    <div class="page-info">\u0E41\u0E2A\u0E14\u0E07 ${filtered.length===0?0:Math.min((page-1)*PER_PAGE+1,filtered.length)}-${Math.min(page*PER_PAGE,filtered.length)} \u0E08\u0E32\u0E01 ${filtered.length} \u0E23\u0E32\u0E22\u0E01\u0E32\u0E23</div>
    <div class="page-btns">
      <button class="page-btn" ${page===1?'disabled':''} data-page="${page-1}">\u2039</button>
      ${Array.from({length:totalPages},(_,i)=>i+1).filter(p=>p===1||p===totalPages||Math.abs(p-page)<=1).map((p,i,arr)=>
        (i>0&&arr[i-1]!==p-1?'<span style="padding:0 4px;color:var(--fg3)">...</span>':'')+
        `<button class="page-btn ${page===p?'active':''}" data-page="${p}">${p}</button>`).join('')}
      <button class="page-btn" ${page>=totalPages?'disabled':''} data-page="${page+1}">\u203a</button>
    </div>
  </div>
</div>`;
}

// ── SIDEBAR // ── SIDEBAR ───────────────────────────────────────────────────────────────
let sidebarOpen=false;
function openSidebar(){
  sidebarOpen=true;
  const sb=document.getElementById('ts-sidebar'),sc=document.getElementById('ts-scrim');
  if(!sb||!sc)return;
  sb.classList.add('open');sc.hidden=false;document.body.classList.add('menu-open');
  sb.querySelectorAll('.nav-item').forEach((el,i)=>{el.classList.remove('visible');el.style.animationDelay=i*28+40+'ms';void el.offsetWidth;el.classList.add('visible');});
}
function closeSidebar(){
  sidebarOpen=false;
  const sb=document.getElementById('ts-sidebar'),sc=document.getElementById('ts-scrim');
  if(!sb||!sc)return;
  sb.classList.remove('open');sc.hidden=true;document.body.classList.remove('menu-open');
}
function addRipple(el,e){
  const rect=el.getBoundingClientRect(),src=e?.touches?.[0]||e;
  const x=src?src.clientX-rect.left:rect.width/2,y=src?src.clientY-rect.top:rect.height/2;
  const size=Math.max(rect.width,rect.height),r=document.createElement('span');
  r.className='btn-ripple';r.style.cssText=`width:${size}px;height:${size}px;left:${x-size/2}px;top:${y-size/2}px;`;
  el.appendChild(r);r.addEventListener('animationend',()=>r.remove());
}

// ── BIND APP ──────────────────────────────────────────────────────────────
function bindApp(){
  const menuFab=document.getElementById('menuFab');
  const tsClose=document.getElementById('ts-close-btn');
  const tsScrim=document.getElementById('ts-scrim');
  const tsSb=document.getElementById('ts-sidebar');

  if(menuFab)menuFab.onclick=e=>{addRipple(menuFab,e);openSidebar();};
  if(tsClose)tsClose.onclick=e=>{addRipple(tsClose,e);closeSidebar();};
  if(tsScrim)tsScrim.onclick=closeSidebar;

  let tx0=null,ty0=null;
  if(tsSb){
    tsSb.addEventListener('touchstart',e=>{const t=e.touches[0];tx0=t.clientX;ty0=t.clientY;},{passive:true});
    tsSb.addEventListener('touchmove',e=>{if(!sidebarOpen||tx0==null)return;const t=e.touches[0],dx=t.clientX-tx0,dy=t.clientY-ty0;if(Math.abs(dy)>Math.abs(dx))return;if(dx<-50){closeSidebar();tx0=ty0=null;}},{passive:true});
    tsSb.addEventListener('touchend',()=>{tx0=ty0=null;},{passive:true});
  }
  document.onkeydown=e=>{if(e.key==='Escape'){closeSidebar();if(STATE.drawerTicket){STATE.drawerTicket=null;render();}}};

  // NAV
  document.querySelectorAll('[data-nav]').forEach(el=>el.onclick=()=>{STATE.page=el.dataset.nav;STATE.ticketPage=1;closeSidebar();render();});
  document.querySelectorAll('[data-nav-brand]').forEach(el=>el.onclick=()=>{STATE.page='tickets';STATE.filterBrand=el.dataset.navBrand;STATE.ticketPage=1;closeSidebar();render();});

  // LOGOUT
  const logoutBtn=document.getElementById('btn-logout');
  if(logoutBtn)logoutBtn.onclick=()=>{
    STATE.currentUser=null;closeSidebar();
    if(_sseConn){try{_sseConn.close();}catch{}_sseConn=null;}
    if(_autoInt){clearInterval(_autoInt);_autoInt=null;}
    render();
  };

  // SIDEBAR USER → go to users page
  const subBtn=document.getElementById('sidebar-user-btn');
  if(subBtn)subBtn.onclick=()=>{if(can('manageUsers')){STATE.page='users';closeSidebar();render();}};

  // CLOCK
  function updateClock(){
    const el=document.getElementById('ts-clock');if(!el)return;
    const now=new Date(),m=window.innerWidth<480;
    el.textContent=m?now.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'}):now.toLocaleString('th-TH',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }
  clearInterval(window._ck);window._ck=setInterval(updateClock,1000);updateClock();
  if(!window._tempLoaded){
    window._tempLoaded=true;
    fetch('https://api.open-meteo.com/v1/forecast?latitude=13.7563&longitude=100.5018&current=temperature_2m',{cache:'no-store'})
      .then(r=>r.json()).then(j=>{const t=Math.round(j?.current?.temperature_2m);if(Number.isFinite(t)){const el=document.getElementById('ts-temp');if(el)el.textContent=t+'\u00b0C';}}).catch(()=>{});
  }

  // REFRESH
  const rfBtn=document.getElementById('ts-refresh-btn');
  if(rfBtn)rfBtn.onclick=()=>loadTicketsFromAPI(false);

  // SEARCH + FILTER
  const searchInp=document.getElementById('search-inp');
  if(searchInp)searchInp.oninput=e=>{STATE.search=e.target.value;STATE.ticketPage=1;renderPageContent();};
  const brandFilter=document.getElementById('brand-filter');
  if(brandFilter)brandFilter.onchange=e=>{STATE.filterBrand=e.target.value;STATE.ticketPage=1;renderPageContent();};
  document.querySelectorAll('[data-fst]').forEach(el=>el.onclick=()=>{STATE.filterStatus=el.dataset.fst;STATE.ticketPage=1;renderPageContent();});
  document.querySelectorAll('[data-page]').forEach(el=>el.onclick=()=>{if(!el.disabled){STATE.ticketPage=parseInt(el.dataset.page);renderPageContent();}});

  // OPEN DRAWER
  document.querySelectorAll('[data-open]').forEach(el=>el.onclick=()=>{STATE.drawerTicket=el.dataset.open;render();});

  // EDIT TICKET
  document.querySelectorAll('[data-edit]').forEach(el=>el.onclick=()=>{
    const rid=el.dataset.edit;
    STATE.editTicket=STATE.tickets.find(t=>t._recordId===rid||t.id===rid)||null;
    STATE.showAddTicket=false;render();
  });

  // ADD TICKET
  const addTBtn=document.getElementById('btn-add-ticket');
  if(addTBtn)addTBtn.onclick=()=>{STATE.showAddTicket=true;STATE.editTicket=null;render();};

  // QUICK STATUS BUTTONS (table + dashboard rows)
  document.querySelectorAll('[data-sq-s]').forEach(el=>el.onclick=async ev=>{
    ev.stopPropagation();
    const s=el.dataset.sqS,rid=el.dataset.sqR;
    el.disabled=true;
    // optimistic update
    STATE.tickets=STATE.tickets.map(t=>(t._recordId===rid||t.id===rid)?{...t,status:s}:t);
    // update all sq buttons for this rid
    document.querySelectorAll(`[data-sq-r="${rid}"]`).forEach(b=>{
      const c=statusColor(b.dataset.sqS);
      const active=b.dataset.sqS===s;
      b.classList.toggle('sq-active',active);
      b.style.color=c;
      b.style.background=active?c:'transparent';
      b.style.borderColor=active?'transparent':c+'44';
    });
    const ok=await apiPatchStatus(rid,s);
    if(ok)showToast('\u2713 \u0E2A\u0E16\u0E32\u0E19\u0E30 \u2192 '+s,'ok');
    else{showToast('\u26A0\uFE0F Lark \u0E2D\u0E31\u0E1E\u0E40\u0E14\u0E17\u0E44\u0E21\u0E48\u0E2A\u0E33\u0E40\u0E23\u0E47\u0E08','err');}
    el.disabled=false;
  });

  // USERS PAGE
  const addUBtn=document.getElementById('btn-add-user');
  if(addUBtn)addUBtn.onclick=()=>{STATE.showAddUser=true;STATE.editUser=null;render();};
  const userSearchInp=document.getElementById('user-search-inp');
  if(userSearchInp)userSearchInp.oninput=e=>{STATE.userSearch=e.target.value;renderPageContent();};
  document.querySelectorAll('[data-uview]').forEach(el=>el.onclick=()=>{STATE.userView=el.dataset.uview;renderPageContent();});
  document.querySelectorAll('[data-eu]').forEach(el=>el.onclick=()=>{STATE.editUser=STATE.users.find(u=>u.id===el.dataset.eu)||null;STATE.showAddUser=false;render();});
  document.querySelectorAll('[data-tu]').forEach(el=>el.onclick=()=>{
    const id=el.dataset.tu;
    if(id===STATE.currentUser.id){showToast('\u0E44\u0E21\u0E48\u0E2A\u0E32\u0E21\u0E32\u0E23\u0E16\u0E1B\u0E34\u0E14\u0E15\u0E31\u0E27\u0E40\u0E2D\u0E07\u0E44\u0E14\u0E49');return;}
    const u=STATE.users.find(x=>x.id===id);
    STATE.users=STATE.users.map(x=>x.id===id?{...x,active:!x.active}:x);
    saveData();showToast(u?.active?'\u0E1B\u0E34\u0E14\u0E43\u0E0A\u0E49\u0E07\u0E32\u0E19\u0E41\u0E25\u0E49\u0E27':'\u0E40\u0E1B\u0E34\u0E14\u0E43\u0E0A\u0E49\u0E07\u0E32\u0E19\u0E41\u0E25\u0E49\u0E27');renderPageContent();
  });
  document.querySelectorAll('[data-du]').forEach(el=>el.onclick=()=>{
    if(!confirm('\u0E22\u0E37\u0E19\u0E22\u0E31\u0E19\u0E01\u0E32\u0E23\u0E25\u0E1A\u0E1C\u0E39\u0E49\u0E43\u0E0A\u0E49?'))return;
    STATE.users=STATE.users.filter(u=>u.id!==el.dataset.du);
    saveData();showToast('\u0E25\u0E1A\u0E1C\u0E39\u0E49\u0E43\u0E0A\u0E49\u0E41\u0E25\u0E49\u0E27');renderPageContent();
  });

  // MODAL
  const modalOverlay=document.getElementById('modal-overlay');
  if(modalOverlay)modalOverlay.onclick=e=>{if(e.target.id==='modal-overlay')closeModal();};
  const modalCancel=document.getElementById('modal-cancel');
  if(modalCancel)modalCancel.onclick=closeModal;
  const modalSave=document.getElementById('modal-save');
  if(modalSave)modalSave.onclick=saveModal;

  // DRAWER
  const drawerOverlay=document.getElementById('drawer-overlay');
  if(drawerOverlay)drawerOverlay.onclick=()=>{STATE.drawerTicket=null;render();};
  const closeDrawer=document.getElementById('close-drawer');
  if(closeDrawer)closeDrawer.onclick=()=>{STATE.drawerTicket=null;render();};
  const engBtn=document.getElementById('btn-eng-submit');
  if(engBtn)engBtn.onclick=()=>{const rid=engBtn.dataset.rid;STATE.engTicket=STATE.tickets.find(x=>x._recordId===rid||x.id===rid)||null;STATE.showEngModal=true;render();};
  const adminCloseBtn=document.getElementById('btn-admin-close');
  if(adminCloseBtn)adminCloseBtn.onclick=()=>{const rid=adminCloseBtn.dataset.rid;STATE.adminTicket=STATE.tickets.find(x=>x._recordId===rid||x.id===rid)||null;STATE.adminModalType='close';STATE.showAdminModal=true;render();};
  const adminNoteBtn=document.getElementById('btn-admin-note');
  if(adminNoteBtn)adminNoteBtn.onclick=()=>{const rid=adminNoteBtn.dataset.rid;STATE.adminTicket=STATE.tickets.find(x=>x._recordId===rid||x.id===rid)||null;STATE.adminModalType='note';STATE.showAdminModal=true;render();};
}

// ── MODAL ACTIONS ─────────────────────────────────────────────────────────
function closeModal(){STATE.showAddTicket=false;STATE.editTicket=null;STATE.showAddUser=false;STATE.editUser=null;STATE.showEngModal=false;STATE.engTicket=null;STATE.showAdminModal=false;STATE.adminTicket=null;render();}
function saveModal(){
  if(STATE.showEngModal)return saveEngineerModal();
  if(STATE.showAdminModal)return saveAdminModal();
  if(STATE.showAddTicket||STATE.editTicket)return saveTicketModal();
  saveUserModal();
}
async function saveEngineerModal(){
  const t=STATE.engTicket;if(!t)return;
  const wd=(document.getElementById('eng-workDetail')||{}).value?.trim();
  if(!wd){alert('กรุณากรอกรายละเอียดงาน');return;}
  const btn=document.getElementById('modal-save');
  if(btn){btn.disabled=true;btn.textContent='⏳ กำลังส่ง...';}
  const fields={workDetail:wd,partsUsed:(document.getElementById('eng-partsUsed')||{}).value?.trim()||'',
    workHours:(document.getElementById('eng-workHours')||{}).value||'',
    engineerName:STATE.currentUser.name,status:document.getElementById('eng-status').value,
    completedAt:new Date().toLocaleDateString('th-TH')};
  const rid=t._recordId||t.id;
  const ok=await apiPatchFields(rid,fields);
  if(ok){STATE.tickets=STATE.tickets.map(x=>(x._recordId===rid||x.id===rid)?{...x,...fields}:x);
    showToast('✅ ส่งงานแล้ว — แจ้ง Admin ทาง LINE','ok');STATE.drawerTicket=null;
  }else showToast('❌ บันทึกไม่สำเร็จ','err');
  closeModal();
}

async function saveAdminModal(){
  const t=STATE.adminTicket;if(!t)return;
  const isClose=STATE.adminModalType==='close';
  const note=(document.getElementById('admin-note')||{}).value?.trim()||'';
  if(isClose&&!note){alert('กรุณากรอกหมายเหตุ');return;}
  const btn=document.getElementById('modal-save');
  if(btn){btn.disabled=true;btn.textContent='⏳...';}
  const fields={adminNote:note,closedBy:STATE.currentUser.name};
  if(isClose){fields.status='เสร็จสิ้น';fields.closedAt=new Date().toLocaleDateString('th-TH');}
  const rid=t._recordId||t.id;
  const ok=await apiPatchFields(rid,fields);
  if(ok){STATE.tickets=STATE.tickets.map(x=>(x._recordId===rid||x.id===rid)?{...x,...fields}:x);
    showToast(isClose?'✅ จบงานแล้ว — แจ้ง User ทาง LINE':'💾 บันทึกหมายเหตุแล้ว','ok');
    if(isClose)STATE.drawerTicket=null;
  }else showToast('❌ บันทึกไม่สำเร็จ','err');
  closeModal();
}



async function saveTicketModal(){
  const reporter=(document.getElementById('m-reporter')||{}).value?.trim();
  const phone=(document.getElementById('m-phone')||{}).value?.trim();
  if(!reporter||!phone){alert('\u0E01\u0E23\u0E38\u0E13\u0E32\u0E01\u0E23\u0E2D\u0E01\u0E0A\u0E37\u0E48\u0E2D\u0E1C\u0E39\u0E49\u0E41\u0E08\u0E49\u0E07\u0E41\u0E25\u0E30\u0E40\u0E1A\u0E2D\u0E23\u0E4C');return;}
  const fields={
    brand:document.getElementById('m-brand').value,
    status:document.getElementById('m-status').value,
    reporter,phone,
    branchCode:document.getElementById('m-branch').value,
    sla:document.getElementById('m-sla').value,
    type:document.getElementById('m-type').value,
    location:document.getElementById('m-location').value,
    detail:document.getElementById('m-detail').value,
  };
  const saveBtn=document.getElementById('modal-save');
  if(saveBtn){saveBtn.disabled=true;saveBtn.textContent='\u0E01\u0E33\u0E25\u0E31\u0E07\u0E1A\u0E31\u0E19\u0E17\u0E36\u0E01...';}
  if(STATE.editTicket&&STATE.editTicket._recordId){
    const ok=await apiPatchFields(STATE.editTicket._recordId,fields);
    if(ok){STATE.tickets=STATE.tickets.map(t=>t._recordId===STATE.editTicket._recordId?{...t,...fields}:t);showToast('\u0E1A\u0E31\u0E19\u0E17\u0E36\u0E01\u0E44\u0E1B\u0E22\u0E31\u0E07 Lark \u0E41\u0E25\u0E49\u0E27 \u2713','ok');}
  }else{
    try{
      const r=await fetch('/api/tickets',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...fields,sentDate:new Date().toLocaleDateString('th-TH'),createdAt:new Date().toISOString()})});
      const j=await r.json();
      if(j.ok){STATE.tickets=[j.ticket,...STATE.tickets];showToast('\u0E40\u0E1E\u0E34\u0E48\u0E21 Ticket \u0E43\u0E19 Lark \u0E41\u0E25\u0E49\u0E27 \u2713','ok');}
      else throw new Error(j.error);
    }catch(err){showToast('\u0E2A\u0E23\u0E49\u0E32\u0E07\u0E44\u0E21\u0E48\u0E2A\u0E33\u0E40\u0E23\u0E47\u0E08: '+err.message,'err');if(saveBtn){saveBtn.disabled=false;saveBtn.textContent='\u0E40\u0E1E\u0E34\u0E48\u0E21 Ticket';}return;}
  }
  closeModal();
}

function saveUserModal(){
  const name=(document.getElementById('m-name')||{}).value?.trim();
  const username=(document.getElementById('m-username')||{}).value?.trim();
  const password=(document.getElementById('m-password')||{}).value;
  if(!name||!username||!password){alert('\u0E01\u0E23\u0E38\u0E13\u0E32\u0E01\u0E23\u0E2D\u0E01\u0E02\u0E49\u0E2D\u0E21\u0E39\u0E25\u0E43\u0E2B\u0E49\u0E04\u0E23\u0E1A');return;}
  const brand=document.getElementById('m-ubrand').value.replace(' (\u0E17\u0E38\u0E01\u0E41\u0E1A\u0E23\u0E19\u0E14\u0E4C)','');
  const user={id:STATE.editUser?.id||('u'+uid()),name,username,password,role:document.getElementById('m-role').value,brand,active:document.getElementById('m-active').checked};
  if(STATE.editUser)STATE.users=STATE.users.map(u=>u.id===user.id?user:u);
  else{if(STATE.users.find(u=>u.username===username)){alert('Username \u0E19\u0E35\u0E49\u0E16\u0E39\u0E01\u0E43\u0E0A\u0E49\u0E41\u0E25\u0E49\u0E27');return;}STATE.users=[...STATE.users,user];}
  saveData();showToast(STATE.editUser?'\u0E1A\u0E31\u0E19\u0E17\u0E36\u0E01\u0E41\u0E25\u0E49\u0E27':'\u0E40\u0E1E\u0E34\u0E48\u0E21\u0E1C\u0E39\u0E49\u0E43\u0E0A\u0E49\u0E41\u0E25\u0E49\u0E27','ok');closeModal();
}

function renderPageContent(){
  const pc=document.getElementById('page-content');
  if(pc){pc.innerHTML=renderPage();bindApp();}
}

// ── INIT ──────────────────────────────────────────────────────────────────
loadData();
render();

// ── PARTICLE CANVAS ───────────────────────────────────────────────────────
(function(){
  const cv=document.getElementById('bgCanvas');if(!cv)return;
  const ctx=cv.getContext('2d');let W,H;
  function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
  window.addEventListener('resize',resize,{passive:true});resize();
  const mob=window.innerWidth<600,COUNT=mob?20:45,DIST=mob?65:100;
  const pts=Array.from({length:COUNT},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.3,vx:(Math.random()-.5)*.14,vy:(Math.random()-.5)*.14,o:Math.random()*.38+.1}));
  let mx=-999,my=-999;
  if(!mob)window.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;},{passive:true});
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      if(!mob){const dx=p.x-mx,dy=p.y-my,d=Math.sqrt(dx*dx+dy*dy);if(d<100){p.vx+=dx/d*.03;p.vy+=dy/d*.03;}const sp=Math.sqrt(p.vx*p.vx+p.vy*p.vy);if(sp>.5){p.vx*=.5/sp;p.vy*=.5/sp;}}
      p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(150,190,255,${p.o})`;ctx.fill();
    });
    for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){
      const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<DIST){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=`rgba(150,190,255,${.07*(1-d/DIST)})`;ctx.lineWidth=.6;ctx.stroke();}
    }
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
